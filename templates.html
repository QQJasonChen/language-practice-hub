<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Echo Dutch — 口說練習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root{--bg:#050510;--card:rgba(255,255,255,0.04);--gb:rgba(255,255,255,0.08);--accent:#ff3b5c;--a2:#7c5cfc;--text:#f2f2f7;--muted:#a0a0b8;--dim:#606078;--green:#34d399;--orange:#fb923c;--blue:#60a5fa}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
  .hdr{display:flex;align-items:center;gap:10px;padding:12px 0}
  .hdr a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600}
  .hdr h1{font-size:16px;font-weight:800;flex:1}
  .tabs{display:flex;gap:0;margin:8px 0;background:var(--card);border-radius:12px;padding:3px;border:1px solid var(--gb)}
  .tab{flex:1;background:none;border:none;color:var(--dim);padding:10px 6px;cursor:pointer;font-size:12px;font-weight:600;border-radius:10px}
  .tab.active{background:var(--accent);color:#fff}
  .pane{display:none;max-height:calc(100vh - 130px);overflow-y:auto;padding-bottom:20px}
  .pane.active{display:block}
  .pane::-webkit-scrollbar{width:3px}
  .pane::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
  .pills{display:flex;gap:6px;margin:8px 0 12px;overflow-x:auto;padding-bottom:4px}
  .pills::-webkit-scrollbar{display:none}
  .pill{flex-shrink:0;padding:6px 12px;border-radius:100px;background:var(--card);border:1px solid var(--gb);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
  .pill:active{transform:scale(0.95)}
  .pill.on{background:var(--a2);color:#fff;border-color:var(--a2)}

  /* ── Card: 1 question = 1 template = 1 example ── */
  .card{background:var(--card);border:1px solid var(--gb);border-radius:16px;padding:0;margin-bottom:12px;overflow:hidden}
  .card-q{padding:14px 16px;background:rgba(96,165,250,0.06);border-bottom:1px solid var(--gb)}
  .card-q .label{font-size:10px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .card-q .q-text{font-size:15px;font-weight:700;color:var(--blue);line-height:1.6}
  .card-t{padding:12px 16px;border-bottom:1px solid var(--gb)}
  .card-t .label{font-size:10px;color:var(--a2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .card-t .t-nl{font-size:14px;font-weight:600;line-height:1.5}
  .card-t .t-nl em{font-style:normal;background:rgba(52,211,153,0.2);color:var(--green);padding:1px 6px;border-radius:4px;font-weight:700}
  .card-t .t-zh{font-size:12px;color:var(--dim);margin-top:2px}
  .card-e{padding:12px 16px;border-bottom:1px solid var(--gb)}
  .card-e .label{font-size:10px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .card-e .e-nl{font-size:14px;line-height:1.7;color:var(--text)}
  .card-e .e-zh{font-size:12px;color:var(--dim);margin-top:4px}
  .card-tip{padding:8px 16px;font-size:12px;color:var(--orange);background:rgba(251,146,60,0.06)}
  .card-try{padding:12px 16px}
  .card-try textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--gb);color:var(--text);padding:10px;border-radius:10px;font-size:14px;font-family:inherit;resize:none}
  .card-try textarea:focus{outline:none;border-color:var(--accent)}
  .card-try button{background:var(--green);color:#000;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
  .card-try button:active{transform:scale(0.95)}
  .card-result{margin-top:8px;padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;font-size:13px;line-height:1.7}

  /* ── 考題 Tab ── */
  .q-card{background:var(--card);border:1px solid var(--gb);border-radius:16px;padding:14px;margin-bottom:8px}
  .q-type{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .q-topic{font-size:14px;font-weight:700;margin-bottom:6px}
  .q-text{font-size:14px;line-height:1.6;margin-bottom:3px}
  .q-sample{display:none;margin-top:8px;padding:10px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.15);border-radius:10px;font-size:13px;line-height:1.7}
  .q-sample.show{display:block}
  .q-btn{background:var(--card);border:1px solid var(--gb);color:var(--text);padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px}
  .q-btn:active{transform:scale(0.95)}
  .q-btn.primary{background:var(--blue);color:#fff;border:none}

  /* ── 翻牌 Tab ── */
  .flash-card{background:var(--card);border:1px solid var(--gb);border-radius:16px;padding:20px;margin-bottom:8px;cursor:pointer;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.2s}
  .flash-card:active{transform:scale(0.98)}
  .flash-zh{font-size:15px;color:var(--muted);line-height:1.6}
  .flash-nl{display:none;font-size:17px;font-weight:700;color:var(--text);line-height:1.6;margin-top:12px;padding-top:12px;border-top:1px solid var(--gb)}
  .flash-card.flipped .flash-nl{display:block}
  .flash-card.flipped{border-color:var(--green)}
  .flash-hint{font-size:11px;color:var(--dim);margin-top:6px}
  .spk-btn{background:none;border:1px solid var(--gb);color:var(--muted);padding:2px 8px;border-radius:6px;font-size:11px;cursor:pointer;margin-left:6px;vertical-align:middle}
  .spk-btn:active{transform:scale(0.9);color:var(--green)}
  .count{text-align:center;color:var(--dim);font-size:11px;padding:6px}
</style>
</head>

rbeeld [舉例].", "template_zh": "我知道荷蘭小學[描述]，例如[舉例]。", "example": "Ik weet dat de Nederlandse basisschool acht jaar duurt en dat kinderen daar lezen en rekenen leren.", "example_zh": "我知道荷蘭的小學為期八年，孩子們在那裡學習閱讀和算術。", "tips": "說出你知道小學的基礎資訊"}, {"question": "Wat is uw beroep en hoe lang bent u dat al?", "template": "Ik ben [職業]. Ik ben dat al [時間].", "template_zh": "我是[職業]。我已經當了[時間]。", "example": "Ik ben leraar. Ik ben dat al vijf jaar.", "example_zh": "我是老師。我已經當了五年。", "tips": "說出職業和多久了"}, {"question": "Wat is het probleem? Wat kan zij het beste doen?", "template": "Het probleem is [問題]. Zij kan het beste [建議].", "template_zh": "問題是[問題]。她最好[建議]。", "example": "Het probleem is dat zij geen energie heeft. Zij kan het beste meer slapen.", "example_zh": "問題是她沒有精神。她最好多睡覺。", "tips": "說明問題和建議解決方法"}, {"question": "Wat gaat hij volgens u doen met deze e-mails? Wat doet u zelf met uw e-mails?", "template": "Volgens mij gaat hij [動作] met deze e-mails. Ikzelf [自己的做法].", "template_zh": "我覺得他會對這些電子郵件[動作]。我自己會[自己的做法]。", "example": "Volgens mij gaat hij deze e-mails beantwoorden. Ikzelf verwijder ongewenste e-mails.", "example_zh": "我覺得他會回復這些電子郵件。我自己會刪除垃圾郵件。", "tips": "描述對方的動作和你自己的習慣"}, {"question": "Wat doet u liever in de vakantie? Vertel ook wanneer u op vakantie gaat.", "template": "In de vakantie doe ik het liefst [活動]. Ik ga meestal op vakantie in [月份/seizoen].", "template_zh": "我假期時最喜歡做[活動]。我通常在[月份/季節]去度假。", "example": "In de vakantie doe ik het liefst zwemmen. Ik ga meestal op vakantie in de zomer.", "example_zh": "我假期時最喜歡游泳。我通常夏天去度假。", "tips": "說出假期喜好和時間"}, {"question": "Hoe gaat u het liefst op vakantie? Vertel ook hoe vaak u met het vliegtuig reist.", "template": "Ik ga het liefst op vakantie met [交通工具]. Ik reis ongeveer [頻率] met het vliegtuig.", "template_zh": "我最喜歡用[交通工具]去度假。我大約[頻率]搭飛機旅行。", "example": "Ik ga het liefst op vakantie met het vliegtuig. Ik reis ongeveer twee keer per jaar met het vliegtuig.", "example_zh": "我最喜歡搭飛機去度假。我大約一年搭飛機兩次。", "tips": "講述交通偏好和飛機搭乘頻率"}, {"question": "Wat doet zij in het restaurant en met wie is zij daar? Gebruik alle plaatjes.", "template": "Zij is aan het [動作1] in het restaurant met [人物]. Ook doet zij [動作2] en [動作3].", "template_zh": "她和[人物]在餐廳裡[動作1]。她還做了[動作2]和[動作3]。", "example": "Zij is aan het eten in het restaurant met haar vriend. Ook is zij aan het praten en lachen.", "example_zh": "她和她男朋友在餐廳吃飯。她還在聊天和笑。", "tips": "描述她的活動和同伴"}, {"question": "Wat ziet hij als hij door de stad loopt? Gebruik alle plaatjes.", "template": "Als hij door de stad loopt, ziet hij [物品1], [物品2] en [物品3].", "template_zh": "他走在城市時看到[物品1]、[物品2]和[物品3]。", "example": "Als hij door de stad loopt, ziet hij een café, een winkel en een park.", "example_zh": "他走在城市時看到一家咖啡館、一間商店和一個公園。", "tips": "依圖片說明看到的東西"}, {"question": "Wat vindt u een leuk programma op tv? Vertel ook welk programma u niet leuk vindt.", "template": "Ik vind [喜歡的節目] leuk. Ik vind [不喜歡的節目] niet leuk omdat [原因].", "template_zh": "我喜歡[喜歡的節目]。我不喜歡[不喜歡的節目]，因為[原因]。", "example": "Ik vind een filmprogramma leuk. Ik vind soapseries niet leuk omdat ze langdradig zijn.", "example_zh": "我喜歡電影節目。我不喜歡肥皂劇，因為它們很拖沓。", "tips": "說出喜歡和不喜歡的電視節目和原因"}, {"question": "Welk fruit eet u graag? Vertel ook hoe vaak u fruit eet.", "template": "Ik eet graag [水果]. Ik eet fruit ongeveer [頻率].", "template_zh": "我喜歡吃[水果]。我大約[頻率]吃水果。", "example": "Ik eet graag appels. Ik eet fruit ongeveer elke dag.", "example_zh": "我喜歡吃蘋果。我大約每天都吃水果。", "tips": "說喜歡的水果和吃的頻率"}, {"question": "Wat vindt u daarvan? Vertel ook hoe het weer is in uw eigen land.", "template": "Ik vind dat [看法]. In mijn land is het weer meestal [天氣情況].", "template_zh": "我覺得[看法]。我國的天氣通常是[天氣情況]。", "example": "Ik vind dat mooi. In mijn land is het weer meestal warm en zonnig.", "example_zh": "我覺得那很漂亮。我國的天氣通常是溫暖和有陽光的。", "tips": "表達看法並講述家鄉天氣"}, {"question": "Hoe vaak gebruikt u uw telefoon? Vertel ook waarvoor u uw telefoon gebruikt.", "template": "Ik gebruik mijn telefoon ongeveer [頻率]. Ik gebruik het vooral voor [用途].", "template_zh": "我大約[頻率]使用手機。我主要用它來[用途]。", "example": "Ik gebruik mijn telefoon elke dag. Ik gebruik het vooral voor bellen en sociale media.", "example_zh": "我每天使用手機。我主要用手機打電話和用社交媒體。", "tips": "說頻率和手機用途"}, {"question": "Waarom bent u wel eens te laat? Zeg ook wat u dan doet.", "template": "Ik ben soms te laat omdat [原因]. Dan [做法].", "template_zh": "我有時會遲到，因為[原因]。那時我會[做法]。", "example": "Ik ben soms te laat omdat het verkeer druk is. Dan bel ik mijn afspraak om het te zeggen.", "example_zh": "我有時候遲到因為交通很擁擠。那時我會打電話給約會人員說明。", "tips": "說明遲到原因和你如何處理"}, {"question": "Wat vindt u daarvan? Zeg ook hoe laat u zelf meestal eet.", "template": "Ik vind dat [看法]. Ik eet meestal om [時間].", "template_zh": "我覺得那[看法]。我通常在[時間]吃飯。", "example": "Ik vind dat goed. Ik eet meestal om half zes.", "example_zh": "我覺得那很好。我通常五點半吃飯。", "tips": "說看法和自己吃飯時間"}, {"question": "Welk dier vindt u niet leuk? En vertel ook waarom.", "template": "Ik vind [動物] niet leuk omdat [原因].", "template_zh": "我不喜歡[動物]，因為[原因]。", "example": "Ik vind spinnen niet leuk omdat ik er bang voor ben.", "example_zh": "我不喜歡蜘蛛，因為我害怕牠們。", "tips": "說不喜歡的動物和原因"}]};
let qF='all',flashF='all';
function spk(t){const u=new SpeechSynthesisUtterance(t);u.lang='nl-NL';u.rate=0.85;speechSynthesis.speak(u)}
function sw(m){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelector(`.tab[onclick*="${m}"]`).classList.add('active');document.querySelectorAll('.pane').forEach(c=>c.classList.remove('active'));document.getElementById(`p-${m}`).classList.add('active')}
function esc(t){return t?t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

// ── 模板 Tab: 每張卡 = 1考題 + 1模板 + 1範例 ──
let tmplF = 'all';
function renderTmpl(){
  const cards = DATA.cards || [];
  cards.forEach(c => {
    if (c._cat) return;
    const q = (c.question + ' ' + (c.template||'')).toLowerCase();
    if (/vakantie|reis/.test(q)) c._cat = '假期旅行';
    else if (/taal|moedertaal|spreek/.test(q)) c._cat = '語言';
    else if (/familie|broer|zus|kind/.test(q)) c._cat = '家庭';
    else if (/ochtend|dag begint|opstaat|dagrit/.test(q)) c._cat = '日常作息';
    else if (/woon|buur|huis|stad|straat|hoofdstad/.test(q)) c._cat = '居住';
    else if (/gezond|sport|eet|drink|pauze|fruit/.test(q)) c._cat = '健康飲食';
    else if (/werk|baan|moet.*doen|collega|cursus/.test(q)) c._cat = '工作學習';
    else if (/liever|het liefst|vind.*leuk|kies/.test(q)) c._cat = '偏好選擇';
    else if (/boos|blij|bang|verjaardag|feest/.test(q)) c._cat = '情緒生活';
    else if (/koop|winkel|geld|boodschap/.test(q)) c._cat = '購物';
    else if (/auto|fiets|bus|trein|reis/.test(q)) c._cat = '交通';
    else c._cat = '其他';
  });
  const cats = {}; cards.forEach(c => { cats[c._cat] = (cats[c._cat]||0)+1; });
  const filtered = tmplF === 'all' ? cards : cards.filter(c => c._cat === tmplF);
  document.getElementById('p-tmpl').innerHTML =
    `<div class="pills"><div class="pill ${tmplF==='all'?'on':''}" onclick="tmplF='all';renderTmpl()">全部 ${cards.length}</div>${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<div class="pill ${tmplF===c?'on':''}" onclick="tmplF='${c}';renderTmpl()">${c} ${n}</div>`).join('')}</div>` +
    cards.map((c, i) => {
      const tmplHtml = esc(c.template).replace(/\[([^\]]+)\]/g, '<em>[$1]</em>');
      return `<div class="card">
        <div class="card-q">
          <div class="label">❓ 考題 <button class="spk-btn" onclick="event.stopPropagation();spk('${esc(c.question).replace(/'/g,"\\'")}')">🔊</button></div>
          <div class="q-text">${esc(c.question)}</div>
        </div>
        <div class="card-t">
          <div class="label">📝 回答模板</div>
          <div class="t-nl">${tmplHtml}</div>
          <div class="t-zh">${esc(c.template_zh)}</div>
        </div>
        <div class="card-e">
          <div class="label">✅ 範例回答 <button class="spk-btn" onclick="event.stopPropagation();spk('${esc(c.example).replace(/'/g,"\\'")}')">🔊</button></div>
          <div class="e-nl">${esc(c.example)}</div>
          <div class="e-zh">${esc(c.example_zh)}</div>
        </div>
        ${c.tips ? `<div class="card-tip">💡 ${esc(c.tips)}</div>` : ''}
        <div class="card-try">
          <textarea id="ct-${i}" rows="2" placeholder="用模板造你自己的回答..."></textarea>
          <button onclick="chkCard(${i})">✅ AI 檢查</button>
          <div class="card-result" id="cr-${i}" style="display:none"></div>
        </div>
      </div>`;
    }).join('');
}

function chkCard(i){
  const c = DATA.cards[i];
  const inp = document.getElementById(`ct-${i}`).value.trim();
  if(!inp) return;
  const r = document.getElementById(`cr-${i}`);
  r.style.display='block'; r.innerHTML='🤖 檢查中...';
  const k=localStorage.getItem('lph_openai_key')||'';
  if(!k){r.innerHTML='請先設定 API Key';return}
  const x=new XMLHttpRequest();
  x.open('POST','https://api.openai.com/v1/chat/completions');
  x.setRequestHeader('Authorization','Bearer '+k);
  x.setRequestHeader('Content-Type','application/json');
  x.onload=function(){try{r.innerHTML=JSON.parse(x.responseText).choices[0].message.content.replace(/\n/g,'<br>')}catch(e){r.innerHTML='❌'}};
  x.send(JSON.stringify({model:'gpt-4.1-nano',messages:[{role:'user',content:`荷蘭文A2教練。考題：${c.question}，模板：${c.template}，學生回答：${inp}。繁體中文簡短：1.✅或❌ 2.有沒有回答所有問題點 3.文法對嗎 4.更好的寫法`}],max_tokens:300}));
}

// ── 考題 Tab ──
function renderQuest(){
  const types=['個人問答','看圖描述','看圖比較','看圖敘述工作','三圖描述'];
  const fl=qF==='all'?DATA.questions:DATA.questions.filter(q=>q.type.includes(qF));
  document.getElementById('p-quest').innerHTML=
    `<div class="pills"><div class="pill ${qF==='all'?'on':''}" onclick="qF='all';renderQuest()">全部 ${DATA.questions.length}</div>${types.map(t=>{const n=DATA.questions.filter(q=>q.type.includes(t)).length;return n?`<div class="pill ${qF===t?'on':''}" onclick="qF='${t}';renderQuest()">${t} ${n}</div>`:''}).join('')}</div>`+
    fl.map(q=>{
      const qs=q.questions.map(qq=>`<div class="q-text">❓ ${esc(qq)}</div>`).join('');
      return`<div class="q-card"><div class="q-type">${esc(q.type)}</div><div class="q-topic">${esc(q.topic)}</div>${qs}<button class="q-btn primary" onclick="this.nextElementSibling.classList.toggle('show')">👀 範例</button><div class="q-sample">${esc(q.sample)||'（無）'}</div></div>`}).join('');
}

// ── 翻牌 Tab ──
function renderFlash(){
  const cats={};DATA.examples.forEach(e=>{if(!cats[e.cat])cats[e.cat]=0;cats[e.cat]++});
  const sc=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const fl=(flashF==='all'?DATA.examples:DATA.examples.filter(e=>e.cat===flashF)).sort(()=>Math.random()-0.5);
  document.getElementById('p-flash').innerHTML=
    `<div class="pills"><div class="pill ${flashF==='all'?'on':''}" onclick="flashF='all';renderFlash()">全部 ${DATA.examples.length}</div>${sc.map(([c,n])=>`<div class="pill ${flashF===c?'on':''}" onclick="flashF='${c}';renderFlash()">${c} ${n}</div>`).join('')}</div>
    <div class="count">${fl.length} 張（隨機）</div>`+
    fl.map(e=>`<div class="flash-card" onclick="this.classList.toggle('flipped')"><div class="flash-zh">${esc(e.cat)}</div><div class="flash-hint">點擊翻開荷蘭文</div><div class="flash-nl">${esc(e.nl)}</div></div>`).join('');
}

renderTmpl(); renderQuest(); renderFlash();
</script>
