<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Echo Dutch — 模板練習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root {
    --bg: #050510; --card: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08);
    --accent: #ff3b5c; --accent2: #7c5cfc;
    --text: #f2f2f7; --muted: #a0a0b8; --dim: #606078;
    --green: #34d399; --orange: #fb923c; --blue: #60a5fa; --r: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }

  .header { display:flex; align-items:center; gap:10px; padding:12px 0; }
  .header a { color:var(--muted); text-decoration:none; font-size:13px; font-weight:600; }
  .header h1 { font-size:16px; font-weight:800; flex:1; }

  .tabs { display:flex; gap:0; margin:12px 0; background:var(--card); border-radius:12px; padding:3px; border:1px solid var(--glass-border); }
  .tab { flex:1; background:none; border:none; color:var(--dim); padding:10px; cursor:pointer; font-size:13px; font-weight:600; border-radius:10px; }
  .tab.active { background:var(--accent); color:#fff; }

  /* Template cards */
  .tmpl-cat { color:var(--accent); font-size:13px; font-weight:700; padding:16px 0 8px; border-bottom:1px solid var(--glass-border); margin-bottom:8px; }
  .tmpl-card { background:var(--card); border:1px solid var(--glass-border); border-radius:12px; padding:14px; margin-bottom:8px; cursor:pointer; transition:all 0.2s; }
  .tmpl-card:active { transform:scale(0.98); }
  .tmpl-nl { font-size:15px; font-weight:600; margin-bottom:4px; line-height:1.5; }
  .tmpl-zh { font-size:12px; color:var(--dim); }
  .tmpl-card.expanded { border-color:var(--accent); }
  .tmpl-practice { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--glass-border); }
  .tmpl-card.expanded .tmpl-practice { display:block; }
  .tmpl-example { background:rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.2); border-radius:10px; padding:12px; margin:8px 0; font-size:14px; line-height:1.7; }
  .tmpl-example strong { color:var(--green); }
  .tmpl-input { width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--glass-border); color:var(--text); padding:12px; border-radius:10px; font-size:15px; font-family:inherit; margin:8px 0; resize:none; }
  .tmpl-input:focus { outline:none; border-color:var(--accent); }
  .tmpl-btn { background:var(--green); color:#000; border:none; padding:10px 18px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; margin-right:6px; }
  .tmpl-btn:active { transform:scale(0.95); }
  .tmpl-btn.secondary { background:var(--card); color:var(--text); border:1px solid var(--glass-border); }
  .tmpl-result { margin-top:10px; padding:12px; background:rgba(255,255,255,0.03); border-radius:10px; font-size:13px; line-height:1.8; }
  .tmpl-result .score { font-size:20px; font-weight:800; margin-bottom:6px; }
  .tmpl-result .good { color:var(--green); }
  .tmpl-result .tip { color:var(--orange); }

  /* Question practice */
  .q-card { background:var(--card); border:1px solid var(--glass-border); border-radius:var(--r); padding:16px; margin-bottom:10px; }
  .q-type { font-size:11px; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .q-topic { font-size:15px; font-weight:700; margin-bottom:8px; }
  .q-text { font-size:14px; line-height:1.7; color:var(--text); margin-bottom:4px; }
  .q-sample { display:none; margin-top:10px; padding:12px; background:rgba(52,211,153,0.06); border:1px solid rgba(52,211,153,0.15); border-radius:10px; font-size:14px; line-height:1.7; }
  .q-sample.show { display:block; }
  .q-vocab { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .q-vocab-item { background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.2); padding:3px 10px; border-radius:6px; font-size:12px; }
  .q-btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .q-btn { background:var(--card); border:1px solid var(--glass-border); color:var(--text); padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
  .q-btn:active { transform:scale(0.95); }
  .q-btn.primary { background:var(--blue); color:#fff; border:none; }

  .content { max-height:calc(100vh - 120px); overflow-y:auto; padding-bottom:20px; }
  .content::-webkit-scrollbar { width:3px; }
  .content::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

  .filter-pills { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; }
  .filter-pills::-webkit-scrollbar { display:none; }
  .fpill { flex-shrink:0; padding:6px 14px; border-radius:100px; background:var(--card); border:1px solid var(--glass-border); color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; }
  .fpill:active { transform:scale(0.95); }
  .fpill.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }

  .empty { text-align:center; padding:40px; color:var(--dim); }
</style>
</head>

const templates = DATA.templates;
const questions = DATA.questions;
let mode = 'templates';
let qFilter = 'all';

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${m}"]`).classList.add('active');
  document.getElementById('content-templates').style.display = m === 'templates' ? 'block' : 'none';
  document.getElementById('content-questions').style.display = m === 'questions' ? 'block' : 'none';
  if (m === 'questions') renderQuestions();
}

function esc(t) { return t ? t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

// ── Templates ──
function renderTemplates() {
  const container = document.getElementById('content-templates');
  let currentCat = '';
  let html = '';
  templates.forEach((t, i) => {
    if (t.cat !== currentCat) {
      currentCat = t.cat;
      html += `<div class="tmpl-cat">${esc(currentCat)}</div>`;
    }
    const example = t.nl.replace(/\+\s*/g, '').replace(/動詞|名詞|語言|城市|地點|國家|數字|時間|交通工具|食物|受詞|原因|活動/g, (m) => `<strong>[${m}]</strong>`);
    html += `<div class="tmpl-card" id="t-${i}" onclick="toggleTemplate(${i})">
      <div class="tmpl-nl">${example}</div>
      <div class="tmpl-zh">${esc(t.zh)}</div>
      <div class="tmpl-practice">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">用這個模板造一個句子：</div>
        <textarea class="tmpl-input" id="ti-${i}" rows="2" placeholder="用荷蘭文寫你的句子..."></textarea>
        <div>
          <button class="tmpl-btn" onclick="event.stopPropagation();checkTemplate(${i})">✅ 檢查</button>
          <button class="tmpl-btn secondary" onclick="event.stopPropagation();showExample(${i})">💡 看範例</button>
        </div>
        <div class="tmpl-result" id="tr-${i}" style="display:none"></div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function toggleTemplate(i) {
  document.getElementById(`t-${i}`).classList.toggle('expanded');
}

function showExample(i) {
  const t = templates[i];
  const examples = {
    '頻率表達': 'Ik ga twee keer per jaar op vakantie.',
    '地點與方向': 'Ik woon in Amsterdam.',
    '能力與程度': 'Mijn moedertaal is Chinees. Ik spreek ook een beetje Nederlands.',
    '擁有（hebben）': 'Ik heb twee broers en één zus.',
    '時間': 'Ik sta op om zeven uur. Ik drink dan eerst koffie.',
  };
  const ex = examples[t.sub] || t.nl.replace(/\+\s*/g, '').replace(/動詞|名詞|語言/g, '...');
  const result = document.getElementById(`tr-${i}`);
  result.style.display = 'block';
  result.innerHTML = `<div class="tmpl-example">${esc(ex)}</div>`;
}

function checkTemplate(i) {
  const input = document.getElementById(`ti-${i}`).value.trim();
  if (!input) { alert('請先輸入句子'); return; }
  const t = templates[i];
  const result = document.getElementById(`tr-${i}`);
  result.style.display = 'block';
  result.innerHTML = '<div style="color:var(--muted)">🤖 AI 檢查中...</div>';

  const apiKey = localStorage.getItem('lph_openai_key') || '';
  if (!apiKey) { result.innerHTML = '<div style="color:var(--accent)">請先設定 API Key（在任何影片練習頁點 💡 設定）</div>'; return; }

  const prompt = `你是荷蘭文 A2 口說教練。學生嘗試用這個句型模板造句：
模板：${t.nl}
學生寫的：${input}

用繁體中文回覆（簡短），包含：
1. ✅ 或 ❌ 句子是否正確
2. 如果有錯，指出哪裡錯（文法/詞序/拼寫）
3. 給一個更好的範例句子
4. 一句鼓勵的話`;

  const xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.openai.com/v1/chat/completions');
  xhr.setRequestHeader('Authorization', 'Bearer ' + apiKey);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    try {
      const data = JSON.parse(xhr.responseText);
      result.innerHTML = data.choices[0].message.content.replace(/\n/g, '<br>');
    } catch(e) { result.innerHTML = '<div style="color:var(--accent)">❌ 錯誤</div>'; }
  };
  xhr.onerror = function() { result.innerHTML = '<div style="color:var(--accent)">❌ 網路錯誤</div>'; };
  xhr.send(JSON.stringify({ model: 'gpt-4.1-nano', messages: [{ role: 'user', content: prompt }], max_tokens: 300 }));
}

// ── Questions ──
function renderQuestions() {
  const container = document.getElementById('content-questions');
  const types = [...new Set(questions.map(q => q.type.split('（')[0].split('（')[0].trim()))];

  let pills = `<div class="filter-pills">
    <div class="fpill ${qFilter==='all'?'active':''}" onclick="setQFilter('all')">全部 (${questions.length})</div>
    ${types.slice(0,5).map(t => {
      const count = questions.filter(q => q.type.includes(t)).length;
      return `<div class="fpill ${qFilter===t?'active':''}" onclick="setQFilter('${t}')">${t} (${count})</div>`;
    }).join('')}
  </div>`;

  const filtered = qFilter === 'all' ? questions : questions.filter(q => q.type.includes(qFilter));

  let html = pills + filtered.map((q, i) => {
    const qs = q.questions.map(qq => `<div class="q-text">❓ ${esc(qq)}</div>`).join('');
    const vocab = q.vocab.map(v => `<span class="q-vocab-item">${esc(v.nl)} = ${esc(v.zh)}</span>`).join('');
    return `<div class="q-card">
      <div class="q-type">${esc(q.type)} · ${esc(q.exam.replace('A2_Spreken_','').replace('A2_Spreekvaardigheid','Exam 1'))}</div>
      <div class="q-topic">${esc(q.topic)}</div>
      ${qs}
      ${vocab ? `<div class="q-vocab">${vocab}</div>` : ''}
      <div class="q-btns">
        <button class="q-btn primary" onclick="practiceQ(this, ${i})">🎙️ 練習回答</button>
        <button class="q-btn" onclick="showSample(this, ${i})">👀 看範例</button>
      </div>
      <div class="q-sample" id="qs-${i}">${esc(q.sample)}</div>
    </div>`;
  }).join('');

  container.innerHTML = html || '<div class="empty">沒有符合的題目</div>';
}

function setQFilter(f) { qFilter = f; renderQuestions(); }
function showSample(btn, i) { document.getElementById(`qs-${i}`).classList.toggle('show'); }
function practiceQ(btn, i) {
  const q = questions[i];
  alert(`🎙️ 練習模式\n\n題目：${q.questions[0] || q.topic}\n\n請大聲說出你的答案（30 秒）\n\n提示：用 2-3 句回答，確保回答所有問題點。`);
}

renderTemplates();
</script>
