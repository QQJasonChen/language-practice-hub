<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root{--bg:#050510;--card:rgba(255,255,255,0.04);--gb:rgba(255,255,255,0.08);--accent:#ff3b5c;--a2:#7c5cfc;--text:#f2f2f7;--muted:#a0a0b8;--dim:#606078;--green:#34d399;--orange:#fb923c;--blue:#60a5fa}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
  .hdr{display:flex;align-items:center;gap:10px;padding:12px 0}
  .hdr a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600}
  .hdr h1{font-size:16px;font-weight:800;flex:1}
  .tabs{display:flex;gap:0;margin:8px 0;background:var(--card);border-radius:12px;padding:3px;border:1px solid var(--gb)}
  .tab{flex:1;background:none;border:none;color:var(--dim);padding:10px 6px;cursor:pointer;font-size:12px;font-weight:600;border-radius:10px}
  .tab.active{background:var(--accent);color:#fff}
  .pills{display:flex;gap:6px;margin:8px 0 12px;overflow-x:auto;padding-bottom:4px}
  .pills::-webkit-scrollbar{display:none}
  .pill{flex-shrink:0;padding:6px 12px;border-radius:100px;background:var(--card);border:1px solid var(--gb);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
  .pill:active{transform:scale(0.95)}
  .pill.on{background:var(--a2);color:#fff;border-color:var(--a2)}
  .pane{display:none;max-height:calc(100vh - 150px);overflow-y:auto;padding-bottom:20px}
  .pane.active{display:block}
  .pane::-webkit-scrollbar{width:3px}
  .pane::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
  .cat-label{color:var(--accent);font-size:13px;font-weight:700;padding:14px 0 6px}
  .hint{background:rgba(251,146,60,0.08);border-left:3px solid var(--orange);padding:8px 12px;border-radius:0 10px 10px 0;font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.6}
  .word-card{background:var(--card);border:1px solid var(--gb);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all 0.15s}
  .word-card:active{transform:scale(0.98)}
  .word-card.playing{border-color:var(--green);background:rgba(52,211,153,0.06)}
  .word-nl{font-size:20px;font-weight:800;flex:1}
  .word-zh{font-size:12px;color:var(--dim)}
  .word-type{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700}
  .type-kort{background:rgba(96,165,250,0.15);color:var(--blue)}
  .type-lang{background:rgba(255,59,92,0.15);color:var(--accent)}
  .type-twee{background:rgba(52,211,153,0.15);color:var(--green)}
  .wb{background:none;border:1px solid var(--gb);color:var(--muted);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .wb:active{transform:scale(0.9)}
  /* Minimal pair card */
  .pair-card{background:var(--card);border:1px solid var(--gb);border-radius:12px;padding:16px;margin-bottom:10px}
  .pair-title{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--orange)}
  .pair-row{display:flex;gap:10px;margin-bottom:6px}
  .pair-word{flex:1;text-align:center;padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--gb);border-radius:10px;cursor:pointer;transition:all 0.2s}
  .pair-word:active{transform:scale(0.95)}
  .pair-word .pw-nl{font-size:22px;font-weight:800}
  .pair-word .pw-zh{font-size:11px;color:var(--dim);margin-top:2px}
  .pair-word .pw-hint{font-size:10px;color:var(--muted);margin-top:4px}
  .pair-word.playing{border-color:var(--green);background:rgba(52,211,153,0.08)}
  /* Echo mini */
  .echo-mini{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--gb);padding:16px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));z-index:100;text-align:center}
  .echo-mini.active{display:block}
  .echo-mini .em-word{font-size:28px;font-weight:800;margin-bottom:4px}
  .echo-mini .em-zh{font-size:13px;color:var(--dim);margin-bottom:10px}
  .echo-mini .em-phase{font-size:14px;color:var(--green);font-weight:600;margin-bottom:10px}
  .echo-mini .em-btns{display:flex;gap:8px;justify-content:center}
  .echo-mini .em-btn{background:var(--card);border:1px solid var(--gb);color:var(--text);padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
  .echo-mini .em-btn:active{transform:scale(0.95)}
  .echo-mini .em-btn.primary{background:var(--green);color:#000;border:none}
</style>

var filter = 'all';
var echoIdx = -1;
var echoTimer = null;

function sw(m){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});document.querySelector('.tab[onclick*="'+m+'"]').classList.add('active');document.querySelectorAll('.pane').forEach(function(c){c.classList.remove('active')});document.getElementById('p-'+m).classList.add('active');if(m==='pairs')renderPairs()}

function renderWords(){
  var cats={};WORDS.forEach(function(w){if(!cats[w.cat])cats[w.cat]=0;cats[w.cat]++});
  document.getElementById('pills').innerHTML='<div class="pill '+(filter==='all'?'on':'')+'" onclick="filter=\'all\';renderWords()">全部 '+WORDS.length+'</div>'+Object.entries(cats).map(function(e){return'<div class="pill '+(filter===e[0]?'on':'')+'" onclick="filter=\''+e[0]+'\';renderWords()">'+e[0]+' '+e[1]+'</div>'}).join('');
  var fl=filter==='all'?WORDS:WORDS.filter(function(w){return w.cat===filter});
  var cv='',h='';
  fl.forEach(function(w){
    var vowelLabel = w.vowel ? w.vowel.toUpperCase() : w.cat;
    if(w.vowel!==cv){cv=w.vowel;h+='<div class="cat-label">'+vowelLabel+' — '+(w.cat==='短音'?'短音 (kort)':w.cat==='長音'?'長音 (lang)':'雙字母音')+'</div>'}
    var gi=WORDS.indexOf(w);
    var tc=w.cat==='短音'?'type-kort':w.cat==='長音'?'type-lang':'type-twee';
    h+='<div class="word-card" id="wc-'+gi+'" onclick="playWord('+gi+')"><div><div class="word-nl">'+w.nl+'</div><div class="word-zh">'+w.zh+'</div></div><span class="word-type '+tc+'">'+w.cat+'</span><div style="display:flex;gap:6px"><button class="wb" onclick="event.stopPropagation();playWord('+gi+')">🔊</button><button class="wb" onclick="event.stopPropagation();startEcho('+gi+')">🔄</button></div></div>'
  });
  document.getElementById('word-list').innerHTML=h
}

function playWord(idx){
  var w=WORDS[idx];var a=new Audio('audio/pronunciation/'+w.nl+'.mp3');a.playbackRate=0.85;a.play();
  document.querySelectorAll('.word-card').forEach(function(c){c.classList.remove('playing')});
  var card=document.getElementById('wc-'+idx);if(card)card.classList.add('playing');
  a.onended=function(){if(card)card.classList.remove('playing')}
}

function startEcho(idx){echoIdx=idx;document.getElementById('echo-mini').classList.add('active');runEchoCycle()}
function runEchoCycle(){
  var w=WORDS[echoIdx];if(!w)return;
  document.getElementById('em-word').textContent=w.nl;
  document.getElementById('em-zh').textContent=w.zh;
  document.getElementById('em-phase').textContent='🎧 聽...';
  var a=new Audio('audio/pronunciation/'+w.nl+'.mp3');a.playbackRate=0.85;a.play();
  a.onended=function(){
    document.getElementById('em-phase').textContent='🧠 在腦中迴想...';
    echoTimer=setTimeout(function(){
      document.getElementById('em-phase').textContent='🗣️ 大聲說：'+w.nl;
      echoTimer=setTimeout(function(){document.getElementById('em-phase').textContent='✅ '+w.nl},4000)
    },3000)
  }
}
function echoReplay(){if(echoTimer)clearTimeout(echoTimer);runEchoCycle()}
function echoNextWord(){
  if(echoTimer)clearTimeout(echoTimer);
  var fl=filter==='all'?WORDS:WORDS.filter(function(w){return w.cat===filter});
  var cp=fl.indexOf(WORDS[echoIdx]);var np=(cp+1)%fl.length;
  echoIdx=WORDS.indexOf(fl[np]);runEchoCycle()
}
function closeEchoMini(){if(echoTimer)clearTimeout(echoTimer);document.getElementById('echo-mini').classList.remove('active')}

// Minimal pairs
function renderPairs(){
  var h='<div style="color:var(--muted);font-size:12px;margin:8px 0 12px">聽兩個相似的音，練習區分差異</div>';
  PAIRS.forEach(function(p,i){
    h+='<div class="pair-card"><div class="pair-title">'+p.title+'</div><div class="hint">'+p.hint+'</div><div class="pair-row"><div class="pair-word" id="pa-'+i+'" onclick="playPair('+i+',\'a\')"><div class="pw-nl">'+p.a.nl+'</div><div class="pw-zh">'+p.a.zh+'</div><div class="pw-hint">'+p.a.sound+'</div></div><div class="pair-word" id="pb-'+i+'" onclick="playPair('+i+',\'b\')"><div class="pw-nl">'+p.b.nl+'</div><div class="pw-zh">'+p.b.zh+'</div><div class="pw-hint">'+p.b.sound+'</div></div></div></div>'
  });
  document.getElementById('p-pairs').innerHTML=h
}

function playPair(i,side){
  var p=PAIRS[i];var w=side==='a'?p.a:p.b;
  // Use OpenAI TTS via SpeechSynthesis as fallback
  var u=new SpeechSynthesisUtterance(w.nl);u.lang='nl-NL';u.rate=0.7;speechSynthesis.speak(u);
  // Try audio file first
  var a=new Audio('audio/pronunciation/'+w.nl+'.mp3');
  a.playbackRate=0.8;
  a.play().catch(function(){});
  // Visual
  document.getElementById('pa-'+i).classList.remove('playing');
  document.getElementById('pb-'+i).classList.remove('playing');
  document.getElementById('p'+side+'-'+i).classList.add('playing');
  setTimeout(function(){document.getElementById('p'+side+'-'+i).classList.remove('playing')},2000)
}
