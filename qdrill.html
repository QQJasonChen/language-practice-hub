<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>⚡ 題目拆解 — A2 Listening Hub</title>
<style>
  *{box-sizing:border-box}
  :root{--bg:#0a0a0f;--card:#15151c;--card2:#1f1f29;--line:rgba(255,255,255,0.08);
    --text:#e8e8f0;--text2:#9ca3af;--dim:#6b7280;--ok:#4ade80;--bad:#f87171;
    --accent:#fb923c;--ring:#5eead4;--blue:#60a5fa}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font:14.5px/1.55 -apple-system,"PingFang TC","Hiragino Sans",sans-serif}
  .wrap{max-width:680px;margin:0 auto;padding:16px 14px 80px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  header a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:600}
  h1{margin:0;font-size:18px;flex:1}
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:12px;color:var(--text2)}
  .bar .mastered{margin-left:auto;font-weight:800;color:var(--ring)}
  .timer{height:4px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:14px}
  .timer i{display:block;height:100%;background:var(--accent);width:100%}
  .timer.warn i{background:var(--bad)}

  .ctx{font-size:12px;color:var(--text2);background:var(--card);border-radius:8px;padding:8px 12px;margin-bottom:10px}
  .vraag{background:#10243f;border:1px solid rgba(96,165,250,.35);border-radius:12px;padding:13px 15px;margin-bottom:12px}
  .vraag .lbl{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);font-weight:800}
  .vraag .q-nl{font-size:17px;font-weight:700;margin-top:5px;line-height:1.45}
  .vraag .q-zh{font-size:13px;color:var(--ring);margin-top:7px;display:none}
  .revealed .vraag .q-zh{display:block}
  .qbreak{display:none;font-size:11.5px;color:var(--text2);margin-top:8px;line-height:1.7}
  .revealed .qbreak{display:block}
  .qbreak b{color:#fcd34d;font-weight:700}

  .asking{display:none;margin:0 0 12px;padding:10px 13px;background:rgba(94,234,212,0.08);
    border-left:3px solid var(--ring);border-radius:8px;font-size:12.5px;color:var(--text)}
  .revealed .asking{display:block}
  .asking b{color:var(--ring)}

  .lbl-opts{font-size:11px;color:var(--dim);margin:2px 0 8px;letter-spacing:.05em}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;
    background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 13px}
  .opt .ltr{flex:0 0 24px;height:24px;border-radius:6px;background:var(--card2);color:var(--text2);
    font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
  .opt .o-nl{font-size:14.5px;font-weight:600}
  .opt .o-zh{font-size:12px;color:var(--ring);margin-top:3px;display:none}
  .revealed .opt .o-zh{display:block}
  .obreak{display:none;font-size:11.5px;color:var(--dim);margin-top:6px;line-height:1.7}
  .revealed .obreak{display:block}
  .obreak b{color:#fcd34d;font-weight:700}

  .reveal-btn{width:100%;margin-top:16px;padding:14px;background:var(--blue);color:#000;
    border:0;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer}
  .grade{display:none;gap:8px;margin-top:16px}
  .revealed .grade{display:flex}
  .revealed .reveal-btn{display:none}
  .grade button{flex:1;padding:14px 6px;border:0;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer}
  .grade .no{background:var(--bad);color:#fff}
  .grade .yes{background:var(--ok);color:#000}
  .hint{font-size:11px;color:var(--dim);text-align:center;margin-top:10px}
  .empty{text-align:center;padding:50px 20px;color:var(--text2)}
  .empty .e{font-size:46px;margin-bottom:10px}
</style>
  <script src="gate.js"></script>
</head>
<body>
<div class="wrap">
  <header><a href="index.html">← 返回</a><h1>⚡ 題目拆解</h1></header>
  <div class="bar">
    <span id="prog">—</span>
    <span>· 練習「秒讀懂」題目＋選項</span>
    <span class="mastered" id="mastered"></span>
  </div>
  <div class="timer" id="timer"><i id="timerfill"></i></div>
  <div id="box"></div>
</div>

<script>
const MOCKS=['mock3_a2_2026','_iC1Pooi2UA','AMVy2zPNLso'];
const LTR=['A','B','C','D','E'];
const STATE_KEY='lph_qdrill_state';
let deck=[], qi=0, ana={}, timerId=null;

function loadState(){try{return JSON.parse(localStorage.getItem(STATE_KEY)||'{}')}catch(e){return{}}}
function saveState(s){localStorage.setItem(STATE_KEY,JSON.stringify(s))}
function esc(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

async function load(){
  try{ ana=await(await fetch('output/q_analysis.json')).json(); }catch(e){ ana={}; }
  for(const vid of MOCKS){
    let ex; try{ ex=await(await fetch(`output/${vid}/exam.json`)).json(); }catch(e){ continue; }
    for(const sc of ex.scenarios||[]){
      for(const q of sc.questions||[]){
        deck.push({vid, ctx:sc.context_zh||'', q, a:ana[`${vid}|${sc.n}|${q.n}`]||{}});
      }
    }
  }
  // AI-generated practice questions (grounded in the real transcripts) — adds volume
  try{
    const bank=await(await fetch('output/qbank.json')).json();
    bank.forEach((it,idx)=>deck.push({vid:it.vid, ctx:it.ctx, gen:true,
      q:{q_nl:it.q_nl, q_zh:it.q_zh, options:it.options, answer:it.answer, n:'g'+idx},
      a:{qb:it.qb, asking:it.asking, ob:it.ob}}));
  }catch(e){}
  // 「不熟」優先、それから未習、各内シャッフル
  const st=loadState();
  deck=deck.map(d=>({...d,key:`${d.vid}|${d.q.n}|${(d.q.q_nl||'').slice(0,18)}`}));
  const weak=shuffle(deck.filter(d=>st[d.key]==='x'));
  const rest=shuffle(deck.filter(d=>st[d.key]!=='x'));
  deck=[...weak,...rest];
  qi=0; render();
}

function masteredCount(){ const st=loadState(); return deck.filter(d=>st[d.key]==='o').length; }

function startTimer(){
  const t=document.getElementById('timer'), f=document.getElementById('timerfill');
  f.style.transition='none'; f.style.width='100%'; t.classList.remove('warn');
  void f.offsetWidth; f.style.transition='width 25s linear'; f.style.width='0%';
  if(timerId) clearTimeout(timerId);
  timerId=setTimeout(()=>{ t.classList.add('warn'); }, 18000);
}

function render(){
  const box=document.getElementById('box');
  if(qi>=deck.length){
    box.innerHTML=`<div class="empty"><div class="e">🎉</div>
      <div style="font-size:18px;font-weight:800;color:var(--ok)">這一輪做完了</div>
      <div style="margin-top:8px;color:var(--text2)">已掌握 ${masteredCount()} / ${deck.length}　·　「不熟」的會優先再出</div>
      <button class="reveal-btn" style="display:block;max-width:200px;margin:18px auto 0" onclick="location.reload()">再來一輪</button></div>`;
    document.getElementById('timer').style.display='none';
    return;
  }
  document.getElementById('timer').style.display='block';
  const d=deck[qi], q=d.q, a=d.a;
  document.getElementById('prog').textContent=`${qi+1} / ${deck.length}`;
  document.getElementById('mastered').textContent=`已掌握 ${masteredCount()}`;
  const qbreak=(a.qb||[]).map(c=>`<b>${esc(c[0])}</b> ${esc(c[1])}`).join('　');
  const opts=(q.options||[]).map((o,i)=>{
    const ob=((a.ob||[])[i]||[]).map(c=>`<b>${esc(c[0])}</b> ${esc(c[1])}`).join('　');
    return `<div class="opt">
      <span class="ltr">${LTR[i]}</span>
      <span style="flex:1">
        <span class="o-nl">${esc(o.nl)}</span>
        <span class="o-zh">${esc(o.zh)}</span>
        ${ob?`<span class="obreak">💡 ${ob}</span>`:''}
      </span></div>`;
  }).join('');
  box.innerHTML=`
    ${(d.ctx||d.gen)?`<div class="ctx">${d.gen?'✏️ 練習題　':'📋 '}${esc(d.ctx)}</div>`:''}
    <div class="vraag">
      <div class="lbl">Vraag（問題）</div>
      <div class="q-nl">${esc(q.q_nl)}</div>
      <div class="q-zh">${esc(q.q_zh)}</div>
      ${qbreak?`<div class="qbreak">💡 ${qbreak}</div>`:''}
    </div>
    ${a.asking?`<div class="asking"><b>👂 在問：</b>${esc(a.asking)}</div>`:''}
    <div class="lbl-opts">選項（先自己拆解看看）</div>
    <div class="opts">${opts}</div>
    <button class="reveal-btn" onclick="reveal()">翻牌看拆解（中文＋單字）</button>
    <div class="grade">
      <button class="no" onclick="grade(false)">✗ 還不熟</button>
      <button class="yes" onclick="grade(true)">✓ 看懂了</button>
    </div>
    <div class="hint">先讀荷文、自己拆解每個詞 → 翻牌對照</div>`;
  startTimer();
}

function reveal(){
  if(timerId) clearTimeout(timerId);
  document.getElementById('timer').classList.remove('warn');
  document.getElementById('box').classList.add('revealed');
}
function grade(ok){
  const d=deck[qi], st=loadState();
  st[d.key]=ok?'o':'x'; saveState(st);
  qi++; render();
}

load();
</script>
</body>
</html>
