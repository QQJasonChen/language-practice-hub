<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>📚 詞彙閃卡 — A2 Listening Hub</title>
<style>
  *{box-sizing:border-box}
  :root{--bg:#0a0a0f;--card:#15151c;--card2:#1f1f29;--line:rgba(255,255,255,0.08);
    --text:#e8e8f0;--text2:#9ca3af;--dim:#6b7280;--ok:#4ade80;--bad:#f87171;
    --accent:#fb923c;--ring:#5eead4;--purple:#a78bfa}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font:14.5px/1.55 -apple-system,"PingFang TC","Hiragino Sans","Noto Sans JP",sans-serif}
  .wrap{max-width:680px;margin:0 auto;padding:18px 14px 80px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  header a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:600}
  h1{margin:0;font-size:19px;flex:1}
  .stats{display:flex;gap:8px;margin-bottom:14px}
  .stat{flex:1;text-align:center;padding:10px;background:var(--card);border-radius:10px}
  .stat .n{font-size:20px;font-weight:800}
  .stat .l{font-size:11px;color:var(--text2);margin-top:2px}
  .stat.due .n{color:var(--accent)}
  .stat.learning .n{color:var(--ring)}
  .stat.mastered .n{color:var(--ok)}

  .tabs{display:flex;gap:4px;margin:14px 0 10px;border-bottom:1px solid var(--line)}
  .tab{padding:8px 14px;cursor:pointer;font-size:13px;font-weight:700;
    color:var(--text2);border-bottom:2px solid transparent}
  .tab.on{color:var(--ring);border-color:var(--ring)}

  /* Card view */
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:16px;padding:30px 22px;text-align:center;min-height:280px;
    display:flex;flex-direction:column;justify-content:center}
  .card-src{font-size:11px;color:var(--dim);margin-bottom:14px}
  .card-nl{font-size:32px;font-weight:800;margin:6px 0;color:var(--text);
    word-break:break-word;line-height:1.2}
  .card-kana{font-size:14px;color:var(--text2);margin-top:4px}
  .card-tts{display:inline-block;margin:14px 0;padding:8px 16px;background:rgba(94,234,212,0.15);
    color:var(--ring);border:1px solid var(--ring);border-radius:8px;cursor:pointer;font-size:14px}
  .card-tts:hover{background:rgba(94,234,212,0.25)}
  .ctx-panel{display:none;margin:10px 0 4px;padding:12px;background:rgba(94,234,212,0.06);
    border-left:3px solid var(--ring);border-radius:6px;text-align:left;font-size:13.5px;line-height:1.6}
  .ctx-panel.show{display:block}
  .ctx-nl{color:var(--text);font-weight:600}
  .ctx-nl mark{background:rgba(251,146,60,0.3);color:#fdba74;padding:0 3px;border-radius:3px;font-weight:800}
  .ctx-zh{color:var(--text2);font-size:12px;margin-top:4px}
  .ctx-empty{color:var(--dim);font-size:12px;font-style:italic}
  .card-zh{font-size:20px;color:var(--ring);margin:14px 0 4px;font-weight:600;display:none}
  .card-note{font-size:13px;color:var(--text2);margin:8px 0;font-style:italic;display:none}
  .card.revealed .card-zh,.card.revealed .card-note{display:block}
  .prod-back{display:none}
  .card.revealed .prod-back{display:block}

  .reveal-btn{padding:14px 28px;background:var(--purple);color:#000;border:0;
    border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;margin-top:16px}
  .grade-row{display:none;gap:8px;margin-top:18px;flex-direction:column}
  .card.revealed ~ .grade-row{display:flex}
  .grade-row.show{display:flex}
  .grade-row > div{display:flex;gap:6px}
  .grade{flex:1;padding:14px 6px;border:0;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer}
  .grade .top{font-size:15px;display:block}
  .grade .bot{font-size:10px;opacity:.7;display:block;margin-top:3px;font-weight:600}
  .grade.again{background:var(--bad);color:#fff}
  .grade.hard{background:#f59e0b;color:#000}
  .grade.good{background:var(--ring);color:#000}
  .grade.easy{background:var(--ok);color:#000}

  .empty{text-align:center;padding:40px 20px;color:var(--text2)}
  .empty .e-emoji{font-size:48px;margin-bottom:10px}

  /* List view */
  .vlist{display:flex;flex-direction:column;gap:6px}
  .vrow{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);
    border-radius:8px;border:1px solid var(--line)}
  .vrow .vnl{flex:1;font-weight:700;font-size:14px}
  .vrow .vzh{color:var(--text2);font-size:12px}
  .vrow .v-state{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:700}
  .v-state.new{background:rgba(255,255,255,0.05);color:var(--text2)}
  .v-state.learn{background:rgba(94,234,212,0.15);color:var(--ring)}
  .v-state.due{background:rgba(251,146,60,0.2);color:var(--accent)}
  .v-state.done{background:rgba(74,222,128,0.15);color:var(--ok)}
  .vrow .v-src{font-size:10px;color:var(--dim)}
  .filter{margin-bottom:10px;display:flex;gap:6px;flex-wrap:wrap}
  .filter button{padding:5px 10px;background:var(--card2);border:1px solid var(--line);
    color:var(--text2);border-radius:6px;font-size:12px;cursor:pointer}
  .filter button.on{background:var(--ring);color:#000;border-color:var(--ring)}

  .lg-row{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:6px}
  .lg-toggle{padding:5px 10px;background:var(--card2);border:1px solid var(--line);
    color:var(--text2);border-radius:6px;font-size:11.5px;cursor:pointer;opacity:.7}
  .lg-toggle.on{background:rgba(94,234,212,0.12);border-color:var(--ring);color:var(--ring);opacity:1}
  .lapse-pill{display:inline-block;padding:2px 8px;margin-left:6px;
    background:rgba(94,234,212,0.2);color:var(--ring);border-radius:8px;
    font-size:10px;font-weight:700;vertical-align:middle}
  .lg-hint{font-size:10.5px;color:var(--dim);margin-top:4px;text-align:center}

  /* Progress to finite goal — make the finish line visible */
  .progress-wrap{margin:0 0 14px;padding:12px 14px;background:var(--card);border-radius:10px}
  .progress-head{display:flex;justify-content:space-between;align-items:baseline;
    font-size:12px;margin-bottom:7px}
  .progress-head .core-lbl{color:var(--accent);font-weight:800}
  .progress-head .all-lbl{color:var(--text2)}
  .pbar{height:8px;background:var(--card2);border-radius:99px;overflow:hidden}
  .pbar+.pbar{margin-top:6px}
  .pbar .fill{height:100%;width:0;border-radius:99px;transition:width .45s ease;
    background:linear-gradient(90deg,var(--accent),#fbbf24)}
  .pbar .fill.all{background:linear-gradient(90deg,var(--ring),#34d399)}
  .progress-sub{font-size:10.5px;color:var(--dim);margin-top:7px;text-align:center}
  .core-badge{display:inline-block;font-size:10px;font-weight:800;color:var(--accent);
    background:rgba(251,146,60,0.15);border:1px solid rgba(251,146,60,0.4);
    padding:1px 6px;border-radius:6px;margin-left:6px;vertical-align:middle}

  /* Audio-first: auto-plays the word on show, but spelling stays visible —
     you need to see the word + hear it together to wire the sound↔meaning link */
  .af-prompt{font-size:11px;color:var(--dim);margin:2px 0 6px;text-align:center}
  .card.revealed .af-prompt{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="index.html">← 返回</a>
    <h1>📚 詞彙閃卡</h1>
  </header>

  <div class="stats">
    <div class="stat due"><div class="n" id="s-due">…</div><div class="l">今天該複習</div></div>
    <div class="stat learning"><div class="n" id="s-learning">…</div><div class="l">學習中</div></div>
    <div class="stat mastered"><div class="n" id="s-mastered">…</div><div class="l">已熟</div></div>
    <div class="stat"><div class="n" id="s-total">…</div><div class="l">總詞彙</div></div>
  </div>

  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <div class="progress-head">
      <span class="core-lbl">⭐ 核心字（跨模考高頻）<span id="pb-core-txt">0 / 0</span></span>
      <span class="all-lbl">全部 <span id="pb-all-txt">0 / 0</span></span>
    </div>
    <div class="pbar"><div class="fill" id="pb-core-fill"></div></div>
    <div class="pbar"><div class="fill all" id="pb-all-fill"></div></div>
    <div class="progress-sub" id="pb-sub">先把核心字啃到滾瓜爛熟，整段模考就會從噪音變成聽得懂</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="study" onclick="switchTab('study')">📖 複習</div>
    <div class="tab" data-tab="list" onclick="switchTab('list')">🗂 全部</div>
  </div>

  <!-- Study tab -->
  <div id="tab-study">
    <div class="lg-row">
      <button class="lg-toggle on" id="lg-toggle" onclick="toggleLapseGuard()"
        title="答錯/勉強的卡會在幾張卡之後再考一次（最多 2 次），強化短期 → 長期記憶">
        🔁 間歇複習：開
      </button>
      <button class="lg-toggle" id="dir-toggle" onclick="toggleDir()"
        title="中→荷 = production 模式：看中文，先大聲說出荷蘭文再翻牌。比認得難一倍、記得牢一倍，直接練口說考試要的能力">
      </button>
      <button class="lg-toggle" id="af-toggle" onclick="toggleAudioFirst()"
        title="先聽聲音 → 想意思 → 才翻牌看拼字。逼耳朵，不靠眼睛讀拼字。只在「荷→中（認）」模式有效">
      </button>
    </div>
    <div id="card-container"></div>
  </div>

  <!-- List tab -->
  <div id="tab-list" style="display:none">
    <div class="filter">
      <button class="on" data-f="all">全部 <span id="f-all-n"></span></button>
      <button data-f="due">該複習 <span id="f-due-n"></span></button>
      <button data-f="learn">學習中 <span id="f-learn-n"></span></button>
      <button data-f="done">已熟 <span id="f-done-n"></span></button>
      <button data-f="new">未學 <span id="f-new-n"></span></button>
    </div>
    <div class="filter" id="level-filter" style="margin-top:4px">
      <button class="on" data-l="all">所有難度 <span id="l-all-n"></span></button>
      <button data-l="A1">A1 <span id="l-A1-n"></span></button>
      <button data-l="A2">A2 <span id="l-A2-n"></span></button>
      <button data-l="B1">B1+ <span id="l-B1-n"></span></button>
    </div>
    <div class="vlist" id="vlist"></div>
  </div>
</div>

<script>
const MOCKS = ['_iC1Pooi2UA', 'AMVy2zPNLso', 'mock3_a2_2026'];
const MOCK_LABELS = {'_iC1Pooi2UA':'M1', 'AMVy2zPNLso':'M2', 'mock3_a2_2026':'M3'};
const SRS_KEY = 'lph_vocab_srs';
const LAPSE_KEY = 'lph_lapse_guard';
const LAPSE_MAX = 2;     // max re-queues per card per session
const INTERVALS = [1, 3, 7, 14, 30];  // days
let vocab = [];          // [{nl, zh, kana, src:[vid, scn], ...}]
let queue = [];          // due cards for study tab
let qi = 0;
let lapseGuard = localStorage.getItem(LAPSE_KEY) !== '0';  // default ON
let dir = localStorage.getItem('lph_vocab_dir') || 'nl2zh'; // nl2zh 認 / zh2nl 說
let audioFirst = localStorage.getItem('lph_audio_first') !== '0'; // default ON: ear before eyes
let lapseSeen = new Map();  // session-only: key → re-queue count
let lapseDone = 0;       // session counter for hint

function todayStr() { return new Date().toISOString().slice(0,10); }
function daysFromNow(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function loadSRS() {
  try { return JSON.parse(localStorage.getItem(SRS_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveSRS(s) { localStorage.setItem(SRS_KEY, JSON.stringify(s)); }

// "0:38" → 38, "1:42" → 102, "12:05" → 725
function parseTs(t) {
  const m = String(t || '').match(/(\d+):(\d+)/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : 0;
}
// Strip punctuation, lowercase
const normWord = s => String(s || '').toLowerCase()
  .replace(/[.,!?;:'"()（）。？！、，\-…]/g, '').replace(/\s+/g, ' ').trim();
// For patterns like "Ik wilde je uitnodigen om ... te ..." → return the longest
// non-`...` chunk to search for
function patternNeedle(nl) {
  const parts = String(nl || '').split(/\.{3}|…/).map(s => s.trim()).filter(Boolean);
  if (!parts.length) return normWord(nl);
  return normWord(parts.sort((a, b) => b.length - a.length)[0]);
}
// Find the best-matching dialogue line for a vocab/pattern needle.
// Returns {start, end} (seconds) or null.
function findAudioMatch(needle, dialogue) {
  const lineInfo = (i) => {
    const start = parseTs(dialogue[i].t);
    const next = dialogue[i + 1] ? parseTs(dialogue[i + 1].t) : start + 6;
    return {
      start, end: Math.max(start + 2, next),
      text: dialogue[i].nl || '',
      zh: dialogue[i].zh || '',
    };
  };
  const tryNeedle = (n) => {
    if (!n) return null;
    for (let i = 0; i < dialogue.length; i++) {
      if (normWord(dialogue[i].nl).includes(n)) return lineInfo(i);
    }
    return null;
  };
  // Build a list of needle variants to try in order
  const variants = [];
  variants.push(needle);
  // Split on slashes: "noten / notjes" → ["noten", "notjes"]
  if (/[\/／]/.test(needle)) {
    needle.split(/[\/／]/).map(s => s.trim()).filter(Boolean)
      .forEach(s => variants.push(normWord(s)));
  }
  // Strip parenthesised qualifier: "de patat (Franse / dikke)" → "de patat"
  if (/[()（）]/.test(needle)) {
    const cleaned = normWord(needle.replace(/[(（].*?[)）]/g, ''));
    if (cleaned) variants.push(cleaned);
  }
  // Strip leading article (de/het/een): "de folder" → "folder"
  variants.slice().forEach(v => {
    const m = v.match(/^(de|het|een)\s+(.+)$/);
    if (m) variants.push(m[2]);
  });
  // Try each variant in order
  for (const v of variants) {
    const hit = tryNeedle(v);
    if (hit) return hit;
  }
  // Last resort: stem-prefix match per word (catches "passen" → "past", "pas")
  const words = needle.split(/\s+/).filter(w => w.length >= 4);
  for (const w of words) {
    const stem = w.slice(0, Math.max(4, w.length - 2));
    for (let i = 0; i < dialogue.length; i++) {
      if (normWord(dialogue[i].nl).split(/\s+/).some(t => t.startsWith(stem))) {
        const start = parseTs(dialogue[i].t);
        const next = dialogue[i + 1] ? parseTs(dialogue[i + 1].t) : start + 6;
        return { start, end: Math.max(start + 2, next) };
      }
    }
  }
  return null;
}

async function loadVocab() {
  const m = new Map();  // key=normalized nl

  // Lazy-loaded data.json per mock (cached) for resolving segidx→{start,end}
  const dataCache = {};
  async function getSeg(vid, segidx) {
    if (!dataCache[vid]) {
      try { dataCache[vid] = (await (await fetch(`output/${vid}/data.json`)).json()).ai_data.segments; }
      catch(e) { dataCache[vid] = []; }
    }
    return dataCache[vid][segidx];
  }

  // ── Pass 1: GPT-extracted hard words from all_vocab.json (~500+ if exists) ──
  try {
    const all = await (await fetch('output/all_vocab.json')).json();
    for (const w of (all.words || [])) {
      const key = w.nl.toLowerCase().trim();
      const [vid, segidx] = (w.sources || [[null]])[0];
      const item = {
        nl: (w.nl || '').trim(), zh: w.zh || '', kana: '',
        type: 'word',
        level: w.level || 'A2',
        count: w.count || 1,
        src: (w.sources || []).map(([v]) => ({vid: v, scn: ''})),
      };
      if (vid && typeof segidx === 'number') {
        const seg = await getSeg(vid, segidx);
        if (seg) {
          item.audio = { vid, start: seg.start, end: seg.end };
          item.audio_text = seg.text || '';
          item.audio_zh = seg.translation || '';
        }
      }
      m.set(key, item);
    }
    console.log(`loaded ${m.size} hard words from all_vocab.json`);
  } catch(e) {
    console.log('all_vocab.json not available yet (GPT enrichment may still be running)');
  }

  // ── Pass 2: hand-curated vocab + patterns from exam.json (overlay) ──
  for (const vid of MOCKS) {
    try {
      const r = await fetch(`output/${vid}/exam.json`);
      const ex = await r.json();
      for (const sc of ex.scenarios || []) {
        const dlg = sc.dialogue || [];
        const addOrMerge = (key, base, needle) => {
          const audioMatch = findAudioMatch(needle, dlg);
          if (!m.has(key)) {
            const item = { ...base, src: [{vid, scn: sc.title_zh}] };
            if (audioMatch) {
              item.audio = { vid, start: audioMatch.start, end: audioMatch.end };
              item.audio_text = audioMatch.text || '';
              item.audio_zh = audioMatch.zh || '';
            }
            m.set(key, item);
          } else {
            const existing = m.get(key);
            existing.src.push({vid, scn: sc.title_zh});
            if (audioMatch && !existing.audio) {
              existing.audio = { vid, start: audioMatch.start, end: audioMatch.end };
              existing.audio_text = audioMatch.text || '';
              existing.audio_zh = audioMatch.zh || '';
            }
          }
        };
        for (const v of sc.vocab || []) {
          addOrMerge(v.nl.toLowerCase().trim(),
            { nl: v.nl, zh: v.zh, kana: v.kana || '', type: 'vocab' },
            normWord(v.nl));
        }
        for (const p of sc.patterns || []) {
          addOrMerge(p.nl.toLowerCase().trim(),
            { nl: p.nl, zh: p.zh, note: p.note || '', type: 'pattern' },
            patternNeedle(p.nl));
        }
      }
    } catch(e) { console.error('load fail', vid, e); }
  }
  vocab = [...m.values()];
  // Mark core words (appear in ≥2 mocks) — the high-yield bedrock to learn first.
  // Function words (de/een/het…) live in reducties; here we rank by frequency.
  for (const v of vocab) {
    v.core = new Set((v.src || []).map(s => s.vid).filter(Boolean)).size >= 2;
    if (typeof v.count !== 'number') v.count = 0;
  }
}

function getState(v) {
  const srs = loadSRS();
  const s = srs[v.nl.toLowerCase().trim()];
  if (!s) return 'new';
  if (s.reps >= 5) return 'done';
  if (s.due <= todayStr()) return 'due';
  return 'learn';
}

function updateStats() {
  const counts = { new: 0, learn: 0, due: 0, done: 0 };
  const lvCounts = { A1: 0, A2: 0, B1: 0 };  // B1 also counts B2
  for (const v of vocab) {
    counts[getState(v)]++;
    const lv = v.level || 'A2';
    if (lv === 'B2') lvCounts.B1++;
    else if (lvCounts[lv] !== undefined) lvCounts[lv]++;
  }
  document.getElementById('s-due').textContent = counts.due;
  document.getElementById('s-learning').textContent = counts.learn;
  document.getElementById('s-mastered').textContent = counts.done;
  document.getElementById('s-total').textContent = vocab.length;
  document.getElementById('f-all-n').textContent = '(' + vocab.length + ')';
  document.getElementById('f-due-n').textContent = '(' + counts.due + ')';
  document.getElementById('f-learn-n').textContent = '(' + counts.learn + ')';
  document.getElementById('f-done-n').textContent = '(' + counts.done + ')';
  document.getElementById('f-new-n').textContent = '(' + counts.new + ')';
  const setLv = (k) => { const el = document.getElementById('l-'+k+'-n'); if (el) el.textContent = '(' + (lvCounts[k] || 0) + ')'; };
  setLv('A1'); setLv('A2'); setLv('B1');
  const elAll = document.getElementById('l-all-n');
  if (elAll) elAll.textContent = '(' + vocab.length + ')';

  // Progress to finite goal: "已學" = engaged at least once (state ≠ new).
  const coreAll = vocab.filter(v => v.core);
  const coreLearned = coreAll.filter(v => getState(v) !== 'new').length;
  const allLearned = vocab.filter(v => getState(v) !== 'new').length;
  const pct = (a, b) => b ? Math.round(a / b * 100) : 0;
  const setTxt = (id, t) => { const e = document.getElementById(id); if (e) e.textContent = t; };
  const setW = (id, w) => { const e = document.getElementById(id); if (e) e.style.width = w + '%'; };
  setTxt('pb-core-txt', ` ${coreLearned} / ${coreAll.length}`);
  setTxt('pb-all-txt', `${allLearned} / ${vocab.length}`);
  setW('pb-core-fill', pct(coreLearned, coreAll.length));
  setW('pb-all-fill', pct(allLearned, vocab.length));
  const wrap = document.getElementById('progress-wrap');
  if (wrap && vocab.length) wrap.style.display = 'block';
  // Once core is done, nudge toward listening to whole mocks.
  if (coreAll.length && coreLearned >= coreAll.length) {
    setTxt('pb-sub', '🎉 核心字學完了！現在可以開始聽整段模考，不再是噪音了');
  }
}

function buildQueue() {
  // Due first, then new (limit 20 new/session). Skip done.
  // New words: core (cross-mock) first, then by frequency desc — so you always
  // meet the highest-yield unseen words before the long tail (3D / 27 april…).
  const dueArr = vocab.filter(v => getState(v) === 'due');
  const newArr = vocab.filter(v => getState(v) === 'new')
    .sort((a, b) => (b.core - a.core) || (b.count - a.count))
    .slice(0, 20);
  queue = [...dueArr, ...newArr];
  qi = 0;
  lapseSeen = new Map();   // reset session lapse tracking
  lapseDone = 0;
}

function toggleLapseGuard() {
  lapseGuard = !lapseGuard;
  localStorage.setItem(LAPSE_KEY, lapseGuard ? '1' : '0');
  const btn = document.getElementById('lg-toggle');
  btn.classList.toggle('on', lapseGuard);
  btn.textContent = lapseGuard ? '🔁 間歇複習：開' : '🔁 間歇複習：關';
}

function syncDirBtn() {
  const btn = document.getElementById('dir-toggle');
  if (!btn) return;
  btn.classList.toggle('on', dir === 'zh2nl');
  btn.textContent = dir === 'zh2nl' ? '🗣️ 中→荷（說）' : '👁 荷→中（認）';
}
function toggleDir() {
  dir = dir === 'nl2zh' ? 'zh2nl' : 'nl2zh';
  localStorage.setItem('lph_vocab_dir', dir);
  syncDirBtn();
  syncAfBtn();
  renderCard();
}

function syncAfBtn() {
  const b = document.getElementById('af-toggle');
  if (!b) return;
  b.classList.toggle('on', audioFirst);
  b.textContent = audioFirst ? '🔊 聽音優先：開' : '🔊 聽音優先：關';
  // Audio-first only makes sense in 荷→中（認）; in production mode the front is Chinese.
  b.style.display = dir === 'nl2zh' ? '' : 'none';
}
function toggleAudioFirst() {
  audioFirst = !audioFirst;
  localStorage.setItem('lph_audio_first', audioFirst ? '1' : '0');
  syncAfBtn();
  renderCard();
}

function renderCard() {
  const box = document.getElementById('card-container');
  if (!queue.length || qi >= queue.length) {
    box.innerHTML = `<div class="empty"><div class="e-emoji">🎉</div>
      <div style="font-size:17px;font-weight:700;color:var(--ok)">今天全部複習完了</div>
      <div style="margin-top:8px">明天再來看看吧，或切到「🗂 全部」瀏覽。</div></div>`;
    return;
  }
  const v = queue[qi];
  const af = audioFirst && dir === 'nl2zh';  // ear-before-eyes for recognition
  // Group by mock: M1 ×4 · M2 ×1 instead of M1, M1, M1, M1, M2
  const srcCounts = {};
  for (const s of v.src) {
    const lbl = MOCK_LABELS[s.vid];
    if (lbl) srcCounts[lbl] = (srcCounts[lbl] || 0) + 1;
  }
  const srcLabels = Object.entries(srcCounts)
    .map(([lbl, n]) => n > 1 ? `${lbl} ×${n}` : lbl)
    .join(' · ');
  const key = v.nl.toLowerCase().trim().replace(/'/g,"\\'");
  const playBtn = v.audio
    ? `<span class="card-tts" onclick="playVocab('${key}')">🔊 聽原音（${MOCK_LABELS[v.audio.vid]}）</span>`
    : `<span class="card-tts" style="opacity:.7" onclick="playVocab('${key}')" title="找不到原音，改用 TTS">🔊 TTS（無原音）</span>`;
  const ctxHtml = v.audio_text
    ? `<div class="ctx-panel" id="ctx-panel">
         <div class="ctx-nl">${highlightWord(v.audio_text, v.nl)}</div>
         ${v.audio_zh ? `<div class="ctx-zh">${esc(v.audio_zh)}</div>` : ''}
       </div>`
    : `<div class="ctx-panel" id="ctx-panel"><div class="ctx-empty">（無原音上下文，這字是 TTS 合成發音）</div></div>`;
  const reseen = lapseSeen.get(v.nl.toLowerCase().trim()) || 0;
  const lapsePill = reseen > 0
    ? `<span class="lapse-pill">🔁 第 ${reseen + 1} 次</span>` : '';
  const lapseHint = reseen > 0
    ? `<div class="lg-hint">這張剛剛沒答好，再考一次（${reseen}/${LAPSE_MAX}）</div>` : '';
  // zh2nl (production): front = Chinese, back = Dutch + audio + context.
  // Audio/context stay hidden pre-reveal so they don't leak the answer.
  const cardInner = dir === 'zh2nl'
    ? `<div class="card-src">${srcLabels}</div>
      <div class="card-nl" style="font-size:26px">${esc(v.zh)}</div>
      <div style="font-size:11.5px;color:var(--dim);margin-top:2px">先大聲說出荷蘭文，再翻牌</div>
      <div class="card-zh" style="font-size:28px;color:var(--text)">${esc(v.nl)}</div>
      <div class="prod-back">${playBtn}${ctxHtml}</div>
      ${v.note ? `<div class="card-note">💡 ${esc(v.note)}</div>` : ''}`
    : `<div class="card-src">${srcLabels}</div>
      ${af ? '<div class="af-prompt">🔊 自動播音中 — 看字+聽音，想好意思再翻牌</div>' : ''}
      <div class="card-nl">${esc(v.nl)}</div>
      ${v.kana ? `<div class="card-kana">${esc(v.kana)}</div>` : ''}
      ${playBtn}
      ${ctxHtml}
      <div class="card-zh">${esc(v.zh)}</div>
      ${v.note ? `<div class="card-note">💡 ${esc(v.note)}</div>` : ''}`;
  box.innerHTML = `
    <div style="text-align:center;font-size:12px;color:var(--dim);margin-bottom:8px">
      ${qi + 1} / ${queue.length} · ${v.type === 'pattern' ? '🔑 句型' : '📚 詞彙'}${v.core ? '<span class="core-badge">⭐ 核心</span>' : ''}${lapsePill}
    </div>
    ${lapseHint}
    <div class="card" id="card">${cardInner}</div>
    <div id="action-row" style="margin-top:14px">
      <button class="reveal-btn" style="width:100%" onclick="reveal()">${dir === 'zh2nl' ? '翻牌看荷蘭文' : '翻牌看意思'}</button>
      <button onclick="markKnown()" style="margin-top:8px;width:100%;padding:8px;
        background:transparent;border:1px solid var(--line);color:var(--text2);
        border-radius:8px;font:inherit;font-size:12px;font-weight:700;cursor:pointer">
        ✓✓ 我已經會這個字了 · 永遠跳過
      </button>
    </div>`;

  // Audio-first: auto-play the sound the moment the card shows, so the EAR is
  // the first cue (not the spelling). Browser may block until first interaction
  // — the 🔊 button is right there as fallback.
  if (af) setTimeout(() => {
    try { v.audio ? playSegment(v.audio) : speak(v.nl); } catch(e) {}
  }, 130);
}

// 把句子裡的目標字 highlight（不分大小寫，但保留原文 case）
function highlightWord(sentence, word) {
  const safe = esc(sentence);
  if (!word) return safe;
  // Build regex: match word with word-boundary; case-insensitive
  const re = new RegExp('(' + esc(word).replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function reveal() {
  document.getElementById('card').classList.add('revealed');
  // Reveal the example sentence on flip (so the word is seen in real context).
  const ctx = document.getElementById('ctx-panel');
  if (ctx) ctx.classList.add('show');
  document.getElementById('action-row').innerHTML = `
    <div class="grade-row show">
      <div>
        <button class="grade again" onclick="grade(0)"><span class="top">😕</span><span class="bot">忘了 (1d)</span></button>
        <button class="grade hard" onclick="grade(1)"><span class="top">🤔</span><span class="bot">勉強 (3d)</span></button>
        <button class="grade good" onclick="grade(2)"><span class="top">👍</span><span class="bot">會 (7d)</span></button>
        <button class="grade easy" onclick="grade(3)"><span class="top">⚡</span><span class="bot">超會 (14d)</span></button>
      </div>
    </div>`;
}

// Permanent skip: user explicitly says "I know this, never quiz me again"
function markKnown() {
  const v = queue[qi];
  const key = v.nl.toLowerCase().trim();
  const srs = loadSRS();
  // reps 999 → state 'done' forever (getState checks reps >= 5)
  srs[key] = { reps: 999, interval: 9999, due: daysFromNow(9999), lastSeen: todayStr(), skipped: true };
  saveSRS(srs);
  qi++;
  updateStats();
  renderCard();
}

function grade(g) {
  const v = queue[qi];
  const key = v.nl.toLowerCase().trim();
  const srs = loadSRS();
  const cur = srs[key] || { reps: 0, interval: 0 };
  let newReps, newInt;
  if (g === 0) { newReps = 0; newInt = 1; }
  else if (g === 1) { newReps = cur.reps; newInt = Math.max(2, Math.min(cur.interval || 1, 3)); }
  else if (g === 2) { newReps = cur.reps + 1; newInt = INTERVALS[Math.min(newReps, INTERVALS.length - 1)]; }
  else { newReps = cur.reps + 2; newInt = INTERVALS[Math.min(newReps, INTERVALS.length - 1)] * 2; }
  srs[key] = { reps: newReps, interval: newInt, due: daysFromNow(newInt), lastSeen: todayStr() };
  saveSRS(srs);

  // Lapse-guard: 忘了 (g=0) / 勉強 (g=1) 的卡，3-6 張之後再考一次（最多 2 次）
  if (lapseGuard && g <= 1) {
    const reseen = lapseSeen.get(key) || 0;
    if (reseen < LAPSE_MAX) {
      lapseSeen.set(key, reseen + 1);
      const remaining = queue.length - qi - 1;
      const offset = Math.min(Math.max(remaining, 1), 3 + Math.floor(Math.random() * 4));
      queue.splice(qi + 1 + offset, 0, v);
      lapseDone++;
    }
  }

  qi++;
  updateStats();
  renderCard();
}

// Shared <audio> element + auto-pause timer for original-mock playback
let _audio = null, _stopT = null;
function playSegment(audioInfo) {
  if (!audioInfo) return false;
  if (_stopT) { clearTimeout(_stopT); _stopT = null; }
  if (!_audio) _audio = new Audio();
  const src = `output/${audioInfo.vid}/audio.mp3`;
  if (_audio.src.indexOf(src) === -1) _audio.src = src;
  const playFromStart = () => {
    // pad both ends: Whisper segment boundaries often clip word onsets/tails
    const start = Math.max(0, audioInfo.start - 0.25);
    _audio.currentTime = start;
    _audio.play().catch(() => {});
    const durMs = Math.max(1500, (audioInfo.end + 0.6 - start) * 1000 + 300);
    _stopT = setTimeout(() => _audio.pause(), durMs);
  };
  if (_audio.readyState >= 1) {
    playFromStart();
  } else {
    _audio.addEventListener('loadedmetadata', playFromStart, { once: true });
    _audio.load();
  }
  return true;
}
// `text` = the word/pattern Dutch text. `audioInfo` may be passed when known.
function speak(text, audioInfo) {
  if (audioInfo && playSegment(audioInfo)) return;
  if (!window.speechSynthesis) { alert('沒有原版音檔，瀏覽器也不支援 TTS'); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'nl-NL';
  u.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
// Look up vocab by normalized key (used by inline onclick handlers in lists)
function vocabByKey(key) {
  return vocab.find(x => x.nl.toLowerCase().trim() === key);
}
function playVocab(key, fallbackText) {
  const v = vocabByKey(key);
  speak(fallbackText || (v && v.nl) || '', v && v.audio);
  // Reveal the context panel on the current card
  const panel = document.getElementById('ctx-panel');
  if (panel) panel.classList.add('show');
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('on', x.dataset.tab === t));
  document.getElementById('tab-study').style.display = t === 'study' ? 'block' : 'none';
  document.getElementById('tab-list').style.display = t === 'list' ? 'block' : 'none';
  if (t === 'list') renderList('all');
}

let _listState = 'all', _listLevel = 'all';
function renderList(filter, level) {
  if (filter) _listState = filter;
  if (level)  _listLevel = level;
  document.querySelectorAll('#tab-list .filter:nth-of-type(1) button').forEach(b =>
    b.classList.toggle('on', b.dataset.f === _listState));
  document.querySelectorAll('#level-filter button').forEach(b =>
    b.classList.toggle('on', b.dataset.l === _listLevel));
  const levelMatch = v => {
    if (_listLevel === 'all') return true;
    const lv = v.level || 'A2';
    if (_listLevel === 'B1') return lv === 'B1' || lv === 'B2';
    return lv === _listLevel;
  };
  const filtered = vocab.filter(v => (_listState === 'all' || getState(v) === _listState) && levelMatch(v));
  const box = document.getElementById('vlist');
  if (!filtered.length) { box.innerHTML = '<div class="empty">沒有符合的詞</div>'; return; }
  const stateLabels = { new: '新', learn: '學習', due: '該複習', done: '已熟' };
  box.innerHTML = filtered.map(v => {
    const st = getState(v);
    const key = v.nl.toLowerCase().trim().replace(/'/g,"\\'");
    const speaker = v.audio ? '🔊' : '🔈';
    const lv = v.level || '';
    const lvColor = {A1:'#4ade80', A2:'#5eead4', B1:'#fb923c', B2:'#f87171'}[lv] || '#9ca3af';
    return `<div class="vrow" onclick="playVocab('${key}')">
      <div style="flex:1">
        <div class="vnl">${speaker} ${esc(v.nl)}${v.kana ? ` <span style="color:var(--dim);font-weight:400;font-size:11px">${esc(v.kana)}</span>` : ''}</div>
        <div class="vzh">${esc(v.zh)}</div>
      </div>
      ${lv ? `<span style="font-size:10px;padding:1px 5px;background:${lvColor}22;color:${lvColor};border-radius:3px;font-weight:700">${lv}</span>` : ''}
      <span class="v-state ${st}">${stateLabels[st]}</span>
      <span class="v-src">${v.src.filter(s=>s.vid).map(s => MOCK_LABELS[s.vid]).filter((x,i,a)=>a.indexOf(x)===i).join(',')}</span>
    </div>`;
  }).join('');
}
// state filter buttons
document.querySelectorAll('#tab-list .filter:nth-of-type(1) button').forEach(b =>
  b.addEventListener('click', () => renderList(b.dataset.f, null)));
// level filter buttons
document.querySelectorAll('#level-filter button').forEach(b =>
  b.addEventListener('click', () => renderList(null, b.dataset.l)));

function esc(t) {
  return String(t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

(async function init() {
  await loadVocab();
  const withAudio = vocab.filter(v => v.audio).length;
  console.log(`vocab: ${withAudio}/${vocab.length} cards have original-audio playback`);
  // Sync toggle button to saved state
  const btn = document.getElementById('lg-toggle');
  btn.classList.toggle('on', lapseGuard);
  btn.textContent = lapseGuard ? '🔁 間歇複習：開' : '🔁 間歇複習：關';
  syncDirBtn();
  syncAfBtn();
  updateStats();
  buildQueue();
  renderCard();
})();
</script>
</body>
