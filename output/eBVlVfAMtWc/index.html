<script>
// ── Data (injected by generator) ──
const segments = [{"text": "All righty, so I recently got a question from one of my subscribers who feels like", "translation": "好啦，我最近收到一位訂閱者的問題，他覺得自己好像", "start": 0.0, "end": 3.26}, {"text": "they are trying to do too many things. This is a guy called Zach. Hey, what's going on, Oli?", "translation": "想做太多事情。這個人叫做Zach。嘿，Oli，最近怎麼樣？", "start": 3.26, "end": 7.8}, {"text": "He is trying to grow his photography business. He's trying to grow his YouTube channel. He feels like he's a bit overwhelmed.", "translation": "他正在努力發展他的攝影事業，也在嘗試壯大他的YouTube頻道。他覺得有點不知所措。", "start": 7.94, "end": 12.22}, {"text": "He's not really sure where it's all going. He feels like he's struggling to build systems around this sort of stuff.", "translation": "他不太確定一切會怎麼發展。他覺得自己在建立系統方面很掙扎。", "start": 12.32, "end": 15.64}, {"text": "And so in this video, I want to share some honest advice for someone who feels like they're trying", "translation": "所以在這支影片裡，我想分享一些真誠的建議，給那些覺得自己", "start": 15.76, "end": 19.72}, {"text": "to do too many things. So we're gonna start with a question from Zach and there will be timestamps down below", "translation": "想做太多事情的人。我們會從Zach的一個問題開始，影片下方會有時間戳記，", "start": 19.72, "end": 23.48}, {"text": "if you want to skip around this video. Hey, what's going on, Oli?", "translation": "如果你想跳著看。嘿，Oli，最近怎麼樣？", "start": 23.48, "end": 28.14}, {"text": "It's nice to send you a video. Actually, I just bought your book recently", "translation": "很高興能寄給你這支影片。其實我剛買了你的書，", "start": 28.74, "end": 32.9}, {"text": "and absolutely loved it. But to answer your question about goals,", "translation": "真的很喜歡。關於目標這個問題，我想回答一下，", "start": 32.9, "end": 38.32}, {"text": "one of the things I've been struggling with is trying to be in too many places at once.", "translation": "其中一個我正在掙扎的點是想同時身處太多地方。", "start": 38.48, "end": 44.22}, {"text": "And what I mean by that is I feel that", "translation": "我的意思是，", "start": 44.36, "end": 47.38}, {"text": "there are so many different things that we want to do or goals we want to go after,", "translation": "我們想做的事情或追求的目標太多了，", "start": 47.48, "end": 51.6}, {"text": "but actually committing to and delivering on said goal", "translation": "但實際承諾並完成這些目標", "start": 51.88, "end": 57.96}, {"text": "can be difficult for me because I want to do so many different things at once.", "translation": "對我來說很困難，因為我想同時做太多不同的事情。", "start": 58.7, "end": 62.62}, {"text": "And so to just give an example,", "translation": "舉個例子，", "start": 62.98, "end": 64.74}, {"text": "one being I am aspiring to become a portrait photographer,", "translation": "我希望成為一名人像攝影師，", "start": 65.0, "end": 69.14}, {"text": "so I actually have a studio in my house. And additionally, I'm trying to become", "translation": "我家裡其實有個攝影棚。另外，我也想成為", "start": 69.14, "end": 73.8}, {"text": "a full-time YouTuber like yourself. And so I lived in a van for 17 months", "translation": "像你一樣的全職YouTuber。我曾住過一輛車長達17個月，", "start": 73.8, "end": 79.64}, {"text": "and do a lot of backpacking and traveling", "translation": "經常背包旅行，做van life探險的事情。", "start": 79.66, "end": 83.04}, {"text": "and van life adventure stuff. So our channel is Zach and Fal", "translation": "所以我們的頻道是Zach 和 Fal，", "start": 83.04, "end": 88.56}, {"text": "and we're just really struggling to develop systems", "translation": "但我們真的很難發展系統，", "start": 88.56, "end": 93.58}, {"text": "where we feel that we're making tangible progress", "translation": "讓我們覺得自己確實有實質的進展，", "start": 95.38, "end": 99.1}, {"text": "and understand how to iterate, whether that's my personal business,", "translation": "並且了解怎麼去調整，不管是我個人的事業，", "start": 99.12, "end": 103.62}, {"text": "developing systems within that business or developing systems on our YouTube.", "translation": "在事業中建立系統或是針對我們的YouTube發展系統。", "start": 104.2, "end": 108.96}, {"text": "I do know you have a YouTuber Academy and I'm thinking about joining that,", "translation": "我知道你有YouTuber學院，我正在考慮要不要加入，", "start": 109.22, "end": 114.06}, {"text": "but ultimately just being in too many places at once", "translation": "但究竟如何在太多地方同時存在，", "start": 114.06, "end": 117.94}, {"text": "and really deciding where to put all of my effort and how to outsource beyond that.", "translation": "並真的決定要把所有努力放在哪裡，還有怎麼把部分工作外包，", "start": 117.94, "end": 122.36}, {"text": "Anyway, thanks again for a kick-ass book, dude. Really love your content.", "translation": "這些都是我很困惑的地方。", "start": 122.74, "end": 126.4}, {"text": "Cheers. Oh, thank you, Zach. That is a very nice question and I will be checking out the channel as well.", "translation": "總之，謝謝你精彩的書，兄弟。我真的很喜歡你的內容。", "start": 127.04, "end": 131.74}, {"text": "Okay, this is a problem that so many people have. I am trying to do too much shit at the same time", "translation": "乾杯。喔，謝謝你，Zach。這是個很貼心的問題，我也會去看看你的頻道。", "start": 132.9, "end": 138.04}, {"text": "and I find it overwhelming and I find it a struggle because I have too many goals and have all these interests", "translation": "好啦，這是很多人都有的問題。我同時想做太多事情，", "start": 138.04, "end": 141.88}, {"text": "and I don't know which one to go for. So Zach is trying to build a business", "translation": "我覺得很壓力大，心力交瘁，因為我有太多目標和興趣，", "start": 141.88, "end": 145.42}, {"text": "as a portrait photographer. Zach is also trying to go full-time on his YouTube channel.", "translation": "我不知道要追求哪一個。所以Zach在努力建立一個事業，", "start": 145.42, "end": 149.3}, {"text": "Let's have a look at the YouTube channel. Okay, so this is Zach's channel.", "translation": "作為人像攝影師。Zach也想全職經營他的YouTube頻道。", "start": 149.48, "end": 152.72}, {"text": "950 subscribers, 951 now. Feel free to subscribe. Actually, probably don't subscribe to Zach", "translation": "讓我們來看看他的YouTube頻道。好，這是Zach的頻道。", "start": 153.32, "end": 157.56}, {"text": "because if you don't like his content and you subscribe, it's actually bad algorithmically for this.", "translation": "950個訂閱者，現在是951。歡迎訂閱。其實，也許不要訂閱Zach的頻道，", "start": 157.56, "end": 161.2}, {"text": "So we are not going to put a link down below. Sorry, Zach, because we don't want to ruin your channel", "translation": "因為如果你不喜歡他的內容卻訂閱了，對他的頻道演算法其實是負面的。", "start": 161.36, "end": 165.36}, {"text": "with this sort of thing. But if you want to find it and you actually enjoy the content, then maybe you'd want to subscribe.", "translation": "所以我們不會在下方放連結。抱歉，Zach，因為我們不想因為這樣毀了你的頻道。", "start": 165.36, "end": 169.08}, {"text": "Anyway, vanlifevlogs, 12 days ago, two weeks ago. Okay, let's see popular videos, 27K views,", "translation": "不過如果你有找到頻道，又真的喜歡他的內容的話，也許你會想訂閱。", "start": 170.56, "end": 174.98}, {"text": "a handful of videos on the channel, 57 videos, 900 subscribers. In fairness, it took me 52 videos", "translation": "好啦，vanlifevlogs，12天前，也就是兩週前。來看熱門影片，27000觀看次數，", "start": 175.38, "end": 181.24}, {"text": "to get my first 1,000 subscribers over six months. So, I mean, you're growing at a similar rate that I did.", "translation": "頻道裡有幾段影片，共57支，有900個訂閱者。說實話，我花了52支影片，", "start": 181.24, "end": 185.78}, {"text": "Okay, so Zach is trying to grow his YouTube channel. Looks like his wife slash partner or whatever,", "translation": "才獲得我的第一個1000名訂閱者，花了六個月。所以，你的成長速度和我差不多。", "start": 186.06, "end": 190.48}, {"text": "grew a YouTube channel with vanlife, building systems.", "translation": "好，Zach正努力發展他的YouTube頻道。看起來他的妻子或伴侶，", "start": 190.6, "end": 193.62}, {"text": "But also, the initial thing that Zach said was like,", "translation": "經營了一個關於vanlife和系統建立的YouTube頻道。", "start": 194.14, "end": 197.32}, {"text": "I'm trying to do too many things, struggling with being in too many places at once.", "translation": "但最初Zach說的是，", "start": 197.32, "end": 201.12}, {"text": "Like, how do I figure this out? Okay, if Zach and I were having a chat", "translation": "他想做太多事情，掙扎於想同時在太多地方出現。", "start": 201.12, "end": 206.68}, {"text": "and he was asking me this question and I asked him permission", "translation": "那我要怎麼弄清楚這些？好，如果Zach跟我聊天，", "start": 206.84, "end": 209.84}, {"text": "to kind of coach him through the process, this is, and he were to say yes, of course.", "translation": "他問我這個問題，我會請求他的同意，", "start": 211.24, "end": 216.72}, {"text": "I don't just give this advice unsolicited, usually. I ask people if they would be open to a conversation.", "translation": "想跟他一起討論引導他完成這個過程，如果他願意當然好。", "start": 216.78, "end": 221.46}, {"text": "This is sort of the thing I'd be saying to Zach. And I'd be saying to anyone who's in the position", "translation": "我通常不會主動給這種建議。我會先問人們是否願意開啟對話。", "start": 222.64, "end": 226.26}, {"text": "Where they feel as if they're just doing too many things. And I think what it comes down to is three letters: GPS.", "translation": "他們感覺自己好像在做太多事情。我認為問題可以用三個字母來形容：GPS。", "start": 226.26, "end": 232.12}, {"text": "This is goal, plan, and system.", "translation": "這就是目標、計畫和系統。", "start": 232.78, "end": 235.92}, {"text": "So Zach seems to have two things going on. One of the goals is full-time YouTuber.", "translation": "所以Zach似乎有兩個目標。其中一個目標是成為全職YouTuber。", "start": 237.58, "end": 242.96}, {"text": "And the second goal seems to be to grow the portrait photography business.", "translation": "第二個目標似乎是擴展人像攝影生意。", "start": 243.6, "end": 248.7}, {"text": "And what Zach was saying is that he's struggling to find systems and stuff.", "translation": "Zach說他在尋找系統等方面感到掙扎。", "start": 248.84, "end": 252.16}, {"text": "But I don't think that struggle is actually what Zach thinks it is.", "translation": "但我不認為這個掙扎真的是Zach所想的那樣。", "start": 253.28, "end": 257.64}, {"text": "I don't actually think it's, I don't think it's about the systems. I think it's probably an issue with the goal", "translation": "我其實不認為這是系統的問題。我認為可能是目標", "start": 257.64, "end": 263.48}, {"text": "and/or the plan. Generally, when someone tells me a goal, like I want to be a full-time YouTuber,", "translation": "或是計劃的問題。通常當有人告訴我一個目標，例如我想成為全職YouTuber時，", "start": 263.48, "end": 267.02}, {"text": "I want to grow my business, I try and get them to be a little bit more specific about what that actually means.", "translation": "我會試著讓他們更具體說明這到底代表什麼意思。", "start": 267.12, "end": 271.16}, {"text": "So maybe what Zach means by full-time YouTuber is,", "translation": "所以也許Zach所說的全職YouTuber是，", "start": 271.32, "end": 274.16}, {"text": "well, if I could make 5K a month from my YouTube channel", "translation": "如果我能從我的YouTube頻道", "start": 274.52, "end": 277.74}, {"text": "or the business around it, that would allow me to go full-time. Maybe he doesn't actually want to do his photography business,", "translation": "或者周邊的生意賺到每月5千美元，", "start": 277.74, "end": 282.68}, {"text": "which is interesting. Maybe what he means by growing the photography business", "translation": "那我就可以全職做。也許他其實不想經營他的攝影生意，", "start": 282.74, "end": 285.9}, {"text": "is that, yeah, the goal, if I could get that to, I don't know, 10K a month in profit,", "translation": "這很有趣。也許他說的擴展攝影業務", "start": 285.9, "end": 289.6}, {"text": "then I'll feel like I'm really winning. It's hard to know in terms of, like, this business", "translation": "是指如果我能讓利潤每月達到1萬美元，", "start": 289.78, "end": 294.78}, {"text": "as to where it currently is, to where it needs to go. We have to know where we're going, which is the goal.", "translation": "那我會覺得我真的很成功。就這家生意而言，要知道它現在在哪裡，應該到哪裡去，", "start": 294.78, "end": 299.6}, {"text": "We have to know what is the plan that we're following to get there, which is sort of like the strategy.", "translation": "我們必須知道我們的目標是什麼。", "start": 299.9, "end": 303.8}, {"text": "And then the system just supports the strategy. And I suspect based on Zach's question", "translation": "我們必須知道我們用什麼計畫來達成目標，這就像是一種策略。", "start": 304.28, "end": 309.0}, {"text": "that he's either not clear on his goal, or if he is, he's not really clear on his plan or strategy.", "translation": "而系統則是支持策略的。我懷疑根據Zach的問題，", "start": 309.0, "end": 313.54}, {"text": "So for example, let's do it in the context of the business because it's a bit more of a clear thing", "translation": "他不是很清楚自己的目標，或者即使清楚，也不明白他的計畫或策略。", "start": 313.54, "end": 318.66}, {"text": "than in the context of growing a YouTube channel. Let's say Zach's business is currently doing 2K a month,", "translation": "舉例來說，我們在生意上下這個文境，因為它比擴展YouTube頻道更明確一些。", "start": 318.66, "end": 323.36}, {"text": "and he wants to grow it to 10K a month. Okay, that's pretty reasonable.", "translation": "假設Zach的生意目前每月收入2千美元，", "start": 324.0, "end": 327.98}, {"text": "It's like the goal is I want to add an extra 8K a month in profit or in revenue, whatever metric you want to use, to the business.", "translation": "他想把它成長到每月1萬美元。這很合理。", "start": 328.14, "end": 332.76}, {"text": "I would then ask the question, what is the plan? I.e., what are the big three to five chess moves", "translation": "目標是我想每月多加8千美元的利潤或是收入，無論你想用哪個指標來衡量生意。", "start": 333.18, "end": 339.06}, {"text": "that are going to get you to that goal? Now, in Zach's case,", "translation": "然後我會問，計畫是什麼？也就是說，有哪些三到五個重要策略", "start": 340.26, "end": 345.82}, {"text": "he's got a photography studio in his house. And let's say he signs a photography client for,", "translation": "會幫你達到目標？以Zach的情況，", "start": 345.86, "end": 351.0}, {"text": "I don't know, $500 a day, $500 a day.", "translation": "他家裡有一個攝影工作室。假設他簽下一個攝影客戶，", "start": 351.1, "end": 354.28}, {"text": "Okay, well, if Zach wants to add an extra $8,000 a month,", "translation": "我不知道，每天收500美元，每天500美元。", "start": 354.4, "end": 357.98}, {"text": "you know what, let's call this 12K just to keep the math simple. If Zach wants to add an extra 10K a month in revenue,", "translation": "好，如果Zach想每月多8千美元，", "start": 358.6, "end": 364.44}, {"text": "let's call it revenue rather than profit just to keep the number simple, how many clients does he need?", "translation": "不如叫它12千美元，這樣數字比較好算。如果他想每月多1萬美元收入，", "start": 365.28, "end": 368.52}, {"text": "Well, he needs an extra 20 clients because 20 times 500 is 10,000.", "translation": "我們稱之為收入而非利潤，保持數字簡單，他需要多少客戶？", "start": 368.58, "end": 372.88}, {"text": "And he needs an extra 20 clients a month. That seems like quite a lot.", "translation": "他需要額外20個客戶，因為20乘以500就等於1萬。", "start": 372.88, "end": 377.04}, {"text": "His strategy, his plan is probably not, let me try and get 20 clients a month at $500 a day", "translation": "他需要每月多20個客戶。這似乎相當多。", "start": 377.86, "end": 383.36}, {"text": "and that'll get me to my 10K a month in revenue. That's probably not it.", "translation": "他的策略、計畫大概不會是，每月找20個客戶，每天收500美元，", "start": 383.98, "end": 387.76}, {"text": "I'd be really saying to Zach, okay, Zach, mate, what actually is the goal?", "translation": "這樣就能達到每月1萬美元收入。那大概不是正確的做法。", "start": 388.2, "end": 391.74}, {"text": "Like, you want to grow the photography business, what does that mean? Where is it now, where is it going?", "translation": "我會跟Zach說，好吧，Zach，哥們，到底目標是什麼？", "start": 391.96, "end": 395.06}, {"text": "Once we figure out where it's going, what's the plan to get there? Now, with all this time that you free up,", "translation": "你想擴展攝影生意，那是什麼意思？現在在哪裡，要去哪裡？", "start": 395.4, "end": 399.7}, {"text": "you might like to spend some of it learning. And a great way to do that is using Brilliant,", "translation": "一旦我們搞清楚目標，接下來的計畫是什麼？現在，你有更多時間自由支配，", "start": 399.74, "end": 403.14}, {"text": "who are the sponsor of today's video. Brilliant is an interactive platform", "translation": "你可能想把一部分時間用來學習。很好的方式是使用Brilliant，", "start": 403.14, "end": 406.36}, {"text": "where you learn maths, programming, and AI. And they've got thousands of lessons", "translation": "他們是今天影片的贊助商。Brilliant是一個互動平台，", "start": 406.36, "end": 409.82}, {"text": "and their focus is on learning by doing, not just by consuming. I've been using Brilliant now for the last five years", "translation": "你可以在那裡學習數學、程式設計和人工智慧。他們有數千個課程，", "start": 409.82, "end": 414.92}, {"text": "and they've also been supporting the channel during that time as well. They've got a first principles approach to learning", "translation": "且重視學習過程中的實作，而不只是被動吸收。我使用Brilliant已經超過五年了，", "start": 414.92, "end": 419.36}, {"text": "which helps you build understanding from the ground up. And it's all crafted by an award-winning team", "translation": "他們這段時間也一直支持這個頻道。Brilliant採用基礎原理的學習方法，", "start": 419.36, "end": 423.38}, {"text": "of researchers, teachers, and professionals from funky places like MIT, Caltech,", "translation": "幫助你從根本建立理解。整個課程團隊由獲獎的研究員、教師和專業人士組成，出身於像MIT、Caltech、", "start": 423.38, "end": 427.56}, {"text": "Microsoft, Google, and more. Brilliant helps you build your critical thinking skills", "translation": "微軟、Google等頂尖機構。Brilliant幫助你透過解決問題建立批判性思考能力，", "start": 427.84, "end": 431.02}, {"text": "through problem solving, not memorizing things. So while you're building real knowledge on specific topics,", "translation": "而不是死記硬背。因此，你在吸收特定主題知識的同時，", "start": 431.02, "end": 435.56}, {"text": "you also become a better thinker. And I personally think that learning every day", "translation": "也會成為更好的思考者。我個人認為每天學習", "start": 435.66, "end": 439.0}, {"text": "is one of the most important things you can do. The new courses on programming are particularly good", "translation": "是你能做的最重要的事之一。新上的程式設計課程特別好，", "start": 439.0, "end": 442.54}, {"text": "and they can help you get familiar with the programming language, Python. And so you can start building programs on day one", "translation": "能幫助你熟悉程式語言Python，讓你能從第一天開始", "start": 442.54, "end": 447.48}, {"text": "with the built-in drag and drop editor. If any of that sounds good, you can try everything Brilliant has to offer for free.", "translation": "用內建的拖放編輯器建立程式。如果這些聽起來不錯，你可以免費試用Brilliant的所有內容。", "start": 447.48, "end": 452.88}, {"text": "For a full 30 days, just head over to brilliant.org/aliabdaal.", "translation": "完整30天，可以直接前往 brilliant.org/aliabdaal。", "start": 452.88, "end": 456.22}, {"text": "Or check out the link in the video description. That will also get you 20% off.", "translation": "或是在影片描述中查看連結。這樣還能享有20%的折扣。", "start": 456.26, "end": 459.8}, {"text": "Off the annual premium subscription. So thank you so much, Brilliant, for sponsoring this video.", "translation": "適用於年度高級訂閱。非常感謝 Brilliant 贊助本影片。", "start": 459.8, "end": 463.86}, {"text": "And let's get back to it. This is A, this is where you are right now, and this is B, where you want to get to.", "translation": "現在讓我們繼續。這是A，代表你現在的位置，這是B，代表你想要到達的地方。", "start": 463.86, "end": 467.84}, {"text": "This is your goal. This is the sort of destination that you figure out.", "translation": "這是你的目標。就是你想要達成的目的地。", "start": 468.08, "end": 472.02}, {"text": "Like, okay, I want to roughly go in the direction. This is the destination I want to get to.", "translation": "就像，好的，我想大致朝那個方向前進。這就是我想到達的目的地。", "start": 472.02, "end": 476.26}, {"text": "Now, usually there are multiple paths to get to that destination.", "translation": "通常，有多條路徑可以通往那個目的地。", "start": 476.84, "end": 481.04}, {"text": "If you were to ask someone who is a professional entrepreneur or who's been doing business for a very long time,", "translation": "如果你問一位專業企業家或是經營事業已久的人，", "start": 481.48, "end": 485.4}, {"text": "And you were to say, hey, how many ways are there to grow my business from 2K to 12K in revenue?", "translation": "你問他，從2000到12000營收，有多少種方法可以成長我的生意？", "start": 485.4, "end": 489.14}, {"text": "They would say there are infinite number of ways to do that. And so I would say to Zach,", "translation": "他會說你有無限的方式可以做到。於是我會對Zach說，", "start": 489.14, "end": 492.46}, {"text": "What are the different strategies or plans you could use to get from A to B,", "translation": "你有哪些不同的策略或計畫，可以讓你從A點到B點，", "start": 493.16, "end": 497.04}, {"text": "To grow from where your business is now to where it wants to be, or to grow your YouTube channel", "translation": "讓你的生意從現在的位置成長到想要的樣子，或是讓你的YouTube頻道從現在成長到想要的狀態，", "start": 497.12, "end": 501.12}, {"text": "From where it is now to where it wants to be? Now, ideally, Zach should be able to come up", "translation": "理想狀況下，Zach應該能提出至少五種方案。", "start": 501.12, "end": 504.52}, {"text": "With at least five options. If Zach cannot come up with five options,", "translation": "如果Zach想不出五種方案，", "start": 504.52, "end": 507.66}, {"text": "It means he has a knowledge problem. It means he just does not simply know what the options are.", "translation": "代表他在知識上有問題，他單純不知道有什麼選項。", "start": 507.76, "end": 512.16}, {"text": "In that case, I would say to Zach, well, if it's business, hire a business coach,", "translation": "這時候我會對Zach說，如果是生意問題，那就找個商業教練，", "start": 512.42, "end": 515.74}, {"text": "Pay them some money, find someone who is good. They usually give free sessions for the first one,", "translation": "付他們一些錢，找個優秀的人。他們通常會提供第一次的免費諮詢，", "start": 516.26, "end": 519.7}, {"text": "And then help them help you out in terms of figuring out what actually are the plans to get from A to B.", "translation": "然後在找出從A到B的計畫上，協助你。", "start": 519.72, "end": 524.16}, {"text": "I would say, watch a bunch of Alex Hormozi content, watch every entrepreneurship channel", "translation": "我會建議他多看Alex Hormozi的內容，觀看所有你能找到的YouTube上可信的創業頻道，", "start": 524.18, "end": 528.6}, {"text": "That's reputable on YouTube that you can find, read books like The E-Myth Revisited", "translation": "閱讀像是《E-Myth Revisited》這類的書籍，還有關於商業策略的書。最終你會搞清楚，", "start": 528.62, "end": 533.22}, {"text": "And books about business strategy and stuff. Eventually, you'll figure out that, okay,", "translation": "這些是我能採取的行動，可以讓我的生意從現狀成長到理想狀態。既然我們不再有知識上的問題，", "start": 533.48, "end": 537.3}, {"text": "These are the things I can do to get my business from where it is right now to where I want it to be. Now that we no longer have a knowledge problem,", "translation": "接下來就是決定我們要追求哪一套策略。", "start": 537.3, "end": 542.66}, {"text": "It's just a case of figuring out which one of these strategies we want to go after.", "translation": "因為這也是Zach最初的問題所在，", "start": 542.66, "end": 546.38}, {"text": "Because the thing with, and this was kind of Zach's initial question,", "translation": "他似乎想同時做太多事情。如果你方向朝這個那個那個那個那個走，", "start": 546.38, "end": 550.14}, {"text": "It sort of feels like he's trying to do too many things. If you're going in that direction and that direction,", "translation": "最後其實可能一事無成。", "start": 550.8, "end": 554.6}, {"text": "And that direction and that direction and that direction, you end up actually going nowhere.", "translation": "但如果你把所有努力集中在一個方向，只做一件事，", "start": 554.6, "end": 557.96}, {"text": "Whereas if you put all of that effort into a single direction, just doing one thing,", "translation": "你就比較有機會達成那件事情。達成後，再開始往上加其他事情。所以我會跟Zach說，", "start": 558.24, "end": 562.34}, {"text": "You're way more likely to get to that one thing. And then once that one thing has taken you", "translation": "我們要找到哪個策略，把你從現在的位置帶到你想去的地方，", "start": 562.44, "end": 566.7}, {"text": "To where you want it to be, you can then start adding more things onto it. So I'd be saying to Zach, okay,", "translation": "讓你的生意從，譬如說，2000成長到12000，不管情況如何。", "start": 566.7, "end": 570.88}, {"text": "What is the one strategy that we're trying to find to get you from where you are to where you want to be", "translation": "一旦確認計畫，假設Zach的方案是，", "start": 570.88, "end": 575.18}, {"text": "To grow your business from, I don't know, 2K to 12K or whatever the situation might be.", "translation": "比方說Zach決定，我不想再賣那些500美元的產品了。", "start": 575.18, "end": 579.26}, {"text": "Once we have identified the plan, let's say in Zach's case, the plan is going to be,", "translation": "我想至少賣2000美元以上，這可能代表我想收費給企業客戶，", "start": 579.8, "end": 584.26}, {"text": "Let's say Zach decides, you know what? I'm not going to deal with selling these $500 products.", "translation": "以及婚禮市場。你知道嗎？我們鎖定婚禮市場好了，", "start": 585.34, "end": 590.16}, {"text": "I want to sell at least $2,000. That probably means I want to charge businesses", "translation": "因為我年輕，長得不錯，我可以做婚禮攝影或其他的，挺酷的。", "start": 590.48, "end": 595.12}, {"text": "And weddings. And you know what, let's go after weddings,", "translation": "現在我只需要每個月五位客戶，", "start": 597.16, "end": 601.18}, {"text": "Because I'm a young guy, I'm a good-looking guy. I can be a wedding photographer or whatever, cool.", "translation": "五位婚禮客戶，每人付2000美元拍攝，訂婚照、婚禮照，", "start": 601.18, "end": 605.38}, {"text": "Now I just need five clients a month,", "translation": "一整套包含肖像照等等。也許我可以拍婚禮，也可加減拍家庭照，", "start": 605.38, "end": 608.1}, {"text": "Five wedding clients to pay me 2K for a photo shoot, an engagement photo shoot, a wedding photo shoot,", "translation": "但我先從婚禮開始。好，非常好，那我要怎麼找到這五位客戶？", "start": 609.12, "end": 613.5}, {"text": "The whole shebang for portraits and stuff. Maybe I can do weddings plus or minus families,", "translation": "如果我能約到20位客戶通話，那我的成交率是25%。", "start": 613.6, "end": 617.6}, {"text": "But let me start going after weddings. Okay, cool, so how do I land those five clients?", "translation": "那我要怎麼吸引20位客戶預約通話，", "start": 618.78, "end": 622.66}, {"text": "Well, if I can get 20 clients on a call, then my close rate is 25%.", "translation": "以便我能成交25%，獲得五筆訂單？", "start": 622.84, "end": 627.46}, {"text": "So how do I get 20 clients to book a call with me", "translation": "好，這麼好。現在我們開始找尋潛在客源。讀了Alex Almosi的書，", "start": 627.48, "end": 629.84}, {"text": "So that I can close 25% of them and get five sales?", "translation": "《一億美元的客源》，我們發現，好喔，有個本地的婚禮展或類似活動，", "start": 629.84, "end": 634.46}, {"text": "Well, okay, cool. Now we figure out sources of lead generation. So we read Alex Almosi's book,", "translation": "會有即將結婚的人們前往，像個展覽，他們會談論相關事物。", "start": 635.02, "end": 638.48}, {"text": "$100 Million Leads, and we figure out, okay, cool. There is a local, I don't know, wedding expo or whatever,", "translation": "或許我可以在本地婚禮雜誌投放廣告，", "start": 638.56, "end": 643.44}, {"text": "Where anyone who's getting married rocks up and it's like a fair and they talk about stuff.", "translation": "婚禮Podcast，婚禮YouTube頻道。我只需要讓這20位客戶預約通話，", "start": 643.48, "end": 646.5}, {"text": "Maybe I can run ads in the local wedding magazine,", "translation": "我們找出方法做到這件事。順帶一提，如果你喜歡這支影片，", "start": 646.88, "end": 650.2}, {"text": "Wedding podcast, wedding YouTube channel. I just need to get these 20 clients on a call,", "translation": "也對如何成長生意相關的內容有興趣，我其實正在啟動一個全新的，", "start": 650.5, "end": 653.52}, {"text": "And we figure out a method for doing that. Oh, by the way, if you are enjoying this video so far,", "translation": "", "start": 653.86, "end": 657.24}, {"text": "And you're interested in all this stuff around how to grow a business, I'm actually starting a brand new,", "translation": "", "start": 657.24, "end": 661.0}, {"text": "A completely free email newsletter called Business Class. And this is where my team and I", "translation": "一份完全免費名為 Business Class 的電子報。這是我和我的團隊", "start": 661.2, "end": 665.18}, {"text": "are going to be sharing insights from behind the scenes of how we grew our business from zero to 5 million", "translation": "將分享我們如何從零開始，將事業營收成長到 500 萬的幕後洞見，", "start": 665.18, "end": 669.06}, {"text": "in revenue and the stuff that we're doing to try and go from 5 million to 10 million.", "translation": "以及我們正在做的事情，嘗試將營收從 500 萬提升到 1000 萬。", "start": 669.06, "end": 672.16}, {"text": "This might be Loom videos, coaching call recordings, or like Notion templates and stuff.", "translation": "這可能包括 Loom 影片、教練諮詢通話錄音，或是 Notion 範本之類的東西。", "start": 672.56, "end": 676.98}, {"text": "Basically, as we're working on this business, we're generating so much stuff and content", "translation": "基本上，當我們努力經營這個事業時，會產出很多內容和素材，", "start": 677.36, "end": 681.28}, {"text": "that's super helpful for other entrepreneurs, but it's too niche to share on this YouTube channel.", "translation": "這些對其他創業者非常有幫助，但太過利基，不適合在這個 YouTube 頻道分享。", "start": 681.38, "end": 685.12}, {"text": "So we're putting it into a separate email called Business Class. It's completely free. There'll be a link down below", "translation": "所以我們另外製作了一封名為 Business Class 的電子報，完全免費，下面會有連結，", "start": 685.14, "end": 688.66}, {"text": "and you can check it out if you like. I heard this the other day. I was hanging out with a guy called Russell Brunson,", "translation": "如果你有興趣可以去看看。前幾天我聽到一件事，當時我在和一位叫 Russell Brunson 的人一起，", "start": 688.66, "end": 692.36}, {"text": "who's written amazing books called DotCom Secrets, Expert Secrets, and Traffic Secrets.", "translation": "他寫了非常棒的書，包括《DotCom Secrets》、《Expert Secrets》和《Traffic Secrets》。", "start": 692.58, "end": 695.78}, {"text": "And I had the pleasure of spending a few hours with him in Boise, Idaho at his office, and he was great.", "translation": "我很榮幸能在愛達荷州博伊西他的辦公室與他共度幾個小時，他很棒。", "start": 695.9, "end": 700.58}, {"text": "And he basically said business problems are only two things.", "translation": "他基本上說，商業問題大致上只有兩種。", "start": 700.66, "end": 704.08}, {"text": "It is either a math problem. He's American; I would say math problem.", "translation": "要嘛是數學問題。他是美國人，我會說是數學問題。", "start": 704.52, "end": 707.7}, {"text": "It's either a math problem or it is a drama problem.", "translation": "要嘛是數學問題，要嘛是戲劇問題。", "start": 707.78, "end": 710.92}, {"text": "It's either math or drama. So which one is it? Drama is like the psychological and emotional stuff,", "translation": "就是數學或戲劇問題。那到底是哪一種？戲劇指的是心理與情緒層面的問題，", "start": 711.68, "end": 716.82}, {"text": "and math is everything else. So in Zach's case,", "translation": "數學問題則是其他所有的問題。所以就以 Zach 為例，", "start": 716.82, "end": 719.86}, {"text": "figuring out how do I land an extra five clients a month at 2K, it's like, you would think it's a math problem", "translation": "想知道如何每個月多接五個 2K 的客戶，理應是數學問題，", "start": 720.02, "end": 724.9}, {"text": "because we just need to figure out the strategy and reverse engineer it.", "translation": "因為我們只需要找出策略並反向拆解。", "start": 724.9, "end": 728.08}, {"text": "But often drama problems disguise themselves as math problems.", "translation": "但戲劇問題常常偽裝成數學問題。", "start": 728.08, "end": 731.04}, {"text": "Maybe Zach feels scared to pitch his services out to people.", "translation": "或許 Zach 害怕向人推銷他的服務。", "start": 731.7, "end": 734.84}, {"text": "There's some sort of fear that's holding him back. Maybe he feels like,", "translation": "心中有某種恐懼阻礙著他。或許他覺得，", "start": 735.16, "end": 738.38}, {"text": "maybe he's unconsciously sabotaging himself. Zach, maybe like when the thought comes to get new clients,", "translation": "或許他無意識中在自我破壞。Zach，或許當想到要找新客戶時，", "start": 738.58, "end": 743.98}, {"text": "you sort of have this sense of imposter syndrome, and you feel like, I'm not a real photographer.", "translation": "你會有冒牌者症候群的感覺，覺得自己不是個真正的攝影師。", "start": 744.06, "end": 747.28}, {"text": "So maybe my service is not that good. Maybe I can't charge that much money. And so you subconsciously hold yourself back", "translation": "所以可能覺得自己的服務不夠好，不能收那麼多錢，所以潛意識裡會自我克制，", "start": 747.48, "end": 752.12}, {"text": "because you're afraid of putting yourself out there in that sense. And then you think, let me start a YouTube channel.", "translation": "因為害怕在這方面將自己推出去。然後你又想，讓我開個 YouTube 頻道吧。", "start": 752.12, "end": 756.18}, {"text": "Let me do something else. This is often a problem that entrepreneurs and really everyone has.", "translation": "或做些其他事情。這其實是創業者，甚至大部分人都會有的問題。", "start": 756.3, "end": 759.72}, {"text": "You start doing something, it goes up against your comfort zone,", "translation": "你開始做某件事，這會挑戰你的舒適圈，", "start": 760.0, "end": 764.08}, {"text": "and you start having to step outside of your comfort zone. But because you can't deal with stepping", "translation": "你必須開始走出舒適圈。但你不能好好面對走出舒適圈的事實，Zach，要誠實面對，因為這真的很難，", "start": 764.22, "end": 768.82}, {"text": "outside your comfort zone in the nicest possible way, Zach, because it's hard to step outside of your comfort zone,", "translation": "你就會退縮，然後想，讓我試試別的東西。然後你開了 YouTube 頻道。", "start": 768.82, "end": 772.94}, {"text": "you then retreat back and you think, let me try something new. And then you start a YouTube channel.", "translation": "到後來你發現覺得很難，又想，嗯，這不行。", "start": 773.26, "end": 777.18}, {"text": "And then you get to a point where it's hard and you think, you know what? That's not working.", "translation": "讓我試試在 Instagram 上成長。你知道嗎？大家常說你應該多元經營。", "start": 777.62, "end": 780.72}, {"text": "Let me try growing on Instagram. And you know what? Everyone says you should diversify anyway.", "translation": "那我就不只經營 YouTube，還同時經營 YouTube、Instagram 和 TikTok，加上 Shorts，對吧？", "start": 781.2, "end": 784.56}, {"text": "So let me just not grow on YouTube. Let me focus on YouTube and Instagram and TikTok plus Shorts, right?", "translation": "你知道，Shorts 很不錯，所以我可以在 YouTube Shorts、Instagram Reels 和 TikTok 上放同樣的內容。", "start": 784.62, "end": 788.34}, {"text": "You know, Shorts are good. So it's like, I can make the same content on YouTube Shorts, Instagram Reels, and TikTok.", "translation": "你知道嗎？我還可以放到 Facebook。大家說 Snapchat 不錯，Gary Vee 說 Snapchat 是個好地方。", "start": 788.36, "end": 791.62}, {"text": "You know what? I can put it on Facebook as well. Everyone says Snapchat. Gary Vee said Snapchat is where it's at.", "translation": "LinkedIn 也很厲害，現在 LinkedIn 很有觸及力。然後你開始瘋狂分散自己的精力，", "start": 791.92, "end": 795.82}, {"text": "LinkedIn. LinkedIn has amazing reach these days. And you start freaking spreading yourself miles thin", "translation": "因為當你只專注一件事時，", "start": 796.0, "end": 800.84}, {"text": "because when you are focusing on one thing,", "translation": "當你達到能力極限，要突破那道牆是很困難的。", "start": 802.3, "end": 805.32}, {"text": "and you go up against the limit of your competence to push through, that barrier is hard.", "translation": "戲劇問題就是在這裡產生的。所以 Zach，如果我能和你坐下來聊聊，", "start": 805.32, "end": 810.28}, {"text": "And that is where the drama comes in. So Zach, if I could sit down with you and ask you questions,", "translation": "我們會有類似這樣的對話，試著弄清楚你的目標是什麼，你的計畫是什麼，", "start": 810.72, "end": 813.92}, {"text": "we'd be having this sort of conversation. We'd be trying to figure out what your goal is, what your plan is,", "translation": "你達成那計畫的系統是什麼。我們會試著找出阻礙你的原因。", "start": 814.56, "end": 817.7}, {"text": "what your system is to get to that plan. And we'd be trying to identify what's holding you back.", "translation": "這是一個我覺得非常有用的問題。Zach 或是正在看這影片的你，", "start": 817.88, "end": 822.38}, {"text": "Here is a question that I find really helpful. So Zach or whoever is watching this,", "translation": "問自己一個問題，想想你的目標，然後問自己，", "start": 822.62, "end": 826.6}, {"text": "ask yourself the question, think about your goal and ask yourself,", "translation": "為什麼我還沒達成？然後想想第一個出現在你腦海的答案是什麼？", "start": 826.66, "end": 831.16}, {"text": "why am I not already there? And think about what's the first answer that comes to mind?", "translation": "為什麼我還沒達成？如果你真的誠實問自己，", "start": 831.5, "end": 836.0}, {"text": "Why am I not already there? So if you were to genuinely ask yourself,", "translation": "比方說我的目標是每月讓事業淨賺多一萬美金。好，Zach，你為何還沒達成？", "start": 836.12, "end": 840.2}, {"text": "let's say my goal is to get an extra 10K a month in profit for my business. All right, Zach, why are you not already there?", "translation": "你可能會說，因為沒有足夠的客戶。好，為什麼沒有足夠的客戶？", "start": 840.48, "end": 845.46}, {"text": "You might say, because we don't have enough clients. Okay, why don't you have enough clients?", "translation": "因為我們沒有夠積極曝光自己。為什麼你不夠積極曝光自己？", "start": 848.66, "end": 852.84}, {"text": "Because we don't put ourselves out there enough. Why don't you put yourselves out there enough?", "translation": "因為我害怕。答案通常就是這樣。", "start": 854.74, "end": 858.3}, {"text": "Because I'm scared. It's like, yes, we've got it somewhere.", "translation": "再說一次，這還不是我跟 Zach 雙向的對話，Zach，如果你哪天在倫敦，找我喔。", "start": 859.02, "end": 862.28}, {"text": "Again, this is not yet a two-way conversation with Zach, or Zach, if you're ever in London, hit me up.", "translation": "這還不是雙向的對話，但就是我問了自己這個問題。", "start": 863.6, "end": 868.0}, {"text": "This is not a two-way conversation, but it's like, I asked myself this question.", "translation": "", "start": 868.58, "end": 872.32}, {"text": "What I do when I'm having a business problem is I imagine myself having a conversation with Alex Cuomozzi.", "translation": "當我遇到商業問題時，我會想像自己在跟 Alex Cuomozzi 對話。", "start": 874.42, "end": 879.26}, {"text": "And I imagine him asking me those questions. It's like we're asking ourselves these questions", "translation": "我想像他在問我這些問題，就像我們在問自己這些問題一樣，", "start": 879.8, "end": 885.0}, {"text": "to reverse engineer from the thing that we think we want, to the strategy we're using to get there,", "translation": "從我們認為想要的目標反向推導出我們為達成目標使用的策略，", "start": 885.0, "end": 889.44}, {"text": "to the system that we're using to follow that plan. So taking this all the way back,", "translation": "再到我們用來執行這個計畫的系統。所以把這一切往回追溯，", "start": 889.44, "end": 894.4}, {"text": "and apologies that this is all over the place, but yeah, it's hard to give general advice", "translation": "抱歉講得有點亂，但要給出同時吸引多人的一般建議，並且針對 Zach 的問題做出具體回答真的很難。", "start": 895.04, "end": 900.0}, {"text": "that appeals to multiple people while also specifically trying to answer Zach's questions. But I hope, Zach, if you're watching this,", "translation": "但我希望 Zach，如果你在看的話，", "start": 900.0, "end": 904.62}, {"text": "I hope this gives you just a rough sense of the sort of things I'd be thinking about", "translation": "我希望這能讓你大致了解我會怎麼思考這類問題，", "start": 904.7, "end": 908.1}, {"text": "as it relates to your issue. So for the record, what I'm saying is", "translation": "就你的問題來說。所以我要說明的是，", "start": 908.1, "end": 911.2}, {"text": "I don't think your problem is in systems. I think your problem is that you're not sure what your goal is for your YouTube channel", "translation": "我不認為你的問題出在系統。我認為你的問題是你不確定你的 YouTube 頻道", "start": 911.2, "end": 915.48}, {"text": "and your business. And if you are, you're not sure what the specific plan is to get there.", "translation": "和你的事業的目標是什麼。如果你知道目標，也不確定具體怎麼達成，", "start": 915.48, "end": 919.22}, {"text": "And only when you've nailed both those things do you then have a systems problem to be like,", "translation": "只有當你釐清這兩件事後，才會有系統上的問題，比如說，", "start": 919.44, "end": 922.86}, {"text": "Okay, well, how do I build systems so that I can buy back my time and so that it's not too much of a faff?", "translation": "好，那我要怎麼建立系統，讓我能買回時間，不會太麻煩？", "start": 922.96, "end": 926.3}, {"text": "How can I outsource my editing, blah, blah, blah. But thinking on the level of system, when you haven't yet defined your goal", "translation": "我怎麼外包剪輯，諸如此類。但如果你還沒定義目標，", "start": 926.78, "end": 931.1}, {"text": "and defined a plan to get there is gonna just wind you in knots", "translation": "也沒定義計畫，就直接在系統層思考只會讓你陷入混亂，", "start": 931.1, "end": 935.48}, {"text": "and it's not actually gonna go anywhere. But the thing that you led with, which I think was quite telling,", "translation": "根本不會有進展。但你一開始提到的，我覺得很有意義，", "start": 935.48, "end": 939.2}, {"text": "I think what was telling is that you led with the question of how do I stop myself?", "translation": "我覺得很重要的是你一開始問「我怎麼阻止自己？」，", "start": 940.52, "end": 944.36}, {"text": "How do I figure out what I really want? How do I pursue one goal?", "translation": "我怎麼找出我真正想要的是什麼？我怎麼專注追求一個目標？", "start": 944.58, "end": 947.92}, {"text": "Because I feel like I'm trying to do too many things? And you ended with, oh, I feel like my systems aren't right.", "translation": "因為我覺得我正嘗試做太多事情。你最後又說，我覺得我的系統不對。", "start": 947.92, "end": 952.94}, {"text": "I suspect the real problem was somewhere at the start", "translation": "我懷疑真正的問題其實出在一開始，", "start": 953.68, "end": 957.12}, {"text": "where you were asking yourself, like, I have these different goals", "translation": "當時你在問自己，我有這些不同目標，", "start": 957.12, "end": 960.3}, {"text": "and I'm not sure which one to go for. Goal number one is grow my business.", "translation": "但我不確定該選哪一個。目標一是擴展我的事業，", "start": 960.3, "end": 963.8}, {"text": "Goal number two is try, or rather go full-time on YouTube.", "translation": "目標二是嘗試，或者說全職經營 YouTube。", "start": 965.8, "end": 969.78}, {"text": "Which of these is harder? Looking at your channel, I would say going full-time on YouTube", "translation": "哪一個比較難？看你的頻道，我會說全職做 YouTube", "start": 973.34, "end": 978.4}, {"text": "will be harder than growing a business. Growing a business is fairly straightforward, right?", "translation": "比擴展事業更難。擴展事業相當直接，對吧？", "start": 978.4, "end": 982.86}, {"text": "Like there is a fairly linear relationship", "translation": "因為你採取理性的行動和事業成長之間有相當線性的關係。", "start": 982.88, "end": 986.48}, {"text": "between you doing sensible things and your business growing. How do you get an extra 10K in revenue?", "translation": "你怎麼額外增加一萬美元收入？", "start": 986.82, "end": 991.48}, {"text": "Well, you just land five clients at a 2K client. Well, how do you land a 2K client?", "translation": "你只要拿下五位兩千美元的客戶。那怎麼拿下兩千美元的客戶？", "start": 991.6, "end": 995.02}, {"text": "I don't know, you land a 1K client and then you increase your prices or you look at who else is landing 2K clients", "translation": "我不知道，你先拿下一千美元的客戶，然後漲價，或看看其他拿兩千美元客戶的人，", "start": 995.16, "end": 999.12}, {"text": "and you speak to other photographers in your area and you see who is making the most money.", "translation": "你跟同地區其他攝影師聊聊，看看誰賺最多錢，", "start": 999.12, "end": 1002.74}, {"text": "You take them out for coffee or breakfast or something. You ask them for advice. You shadow them on a shoot.", "translation": "請他們喝咖啡或共進早餐，向他們請教。你跟著他們拍攝，", "start": 1003.2, "end": 1006.4}, {"text": "You see how they're doing things. You ask them to help you out. The thing with a business is a business is broadly a math problem.", "translation": "觀察他們怎麼做，請他們幫助你。事業本質上就是一個數學問題。", "start": 1006.5, "end": 1011.02}, {"text": "However, going full-time on YouTube is not a math problem. Going full-time on YouTube", "translation": "然而，全職做 YouTube 就不是數學問題。全職做 YouTube", "start": 1011.46, "end": 1015.34}, {"text": "is unfortunately a creative field. Creative fields are way more competitive", "translation": "不幸的是屬於創意領域。創意領域的競爭遠比那些你在自己社區拍攝照片的本地生意激烈得多。", "start": 1015.64, "end": 1019.82}, {"text": "than something like a local business where you're shooting photographs", "translation": "世界上有非常非常多的人", "start": 1020.44, "end": 1023.5}, {"text": "in your local apartment or whatever. Loads and loads and loads of people in the world", "translation": "想全職做 YouTube。但不是每個人都能成功。這需要相當大的運氣。", "start": 1023.58, "end": 1027.18}, {"text": "are trying to go full-time on YouTube. Not everyone is gonna make it. It takes a decent chunk of luck.", "translation": "需要正確的市場定位。需要不公平的優勢。你顯然懂得怎麼做影片，", "start": 1027.18, "end": 1031.4}, {"text": "It takes the right niche. It takes the right unfair advantages. You clearly know how to make videos.", "translation": "你的頻道很酷，那些露營車生活的內容。但露營車生活這個領域競爭也很激烈。", "start": 1031.94, "end": 1035.48}, {"text": "This channel is quite cool, the van life stuff. But also van life is a pretty saturated niche.", "translation": "很多人都在做露營車生活。我會想，假如你買我們的課程，", "start": 1035.62, "end": 1039.7}, {"text": "There's loads of people trying to do van life. I'd be thinking, okay, and if you take our course,", "translation": "你會看到，事實上，寄封電郵給我們。我們會給你免費課程的存取權。如果你看這件事，你會想，", "start": 1039.82, "end": 1043.0}, {"text": "you can see, in fact, email us. We'll give you free access to our course. If you look at this thing, you're like,", "translation": "誰是我的目標觀眾？我的價值主張是什麼？我的不公平優勢是什麼？我要怎麼在這飽和市場中突圍？", "start": 1043.12, "end": 1047.82}, {"text": "Who's my target audience? What's my value proposition? What's my unfair advantage? How am I gonna stand out in this otherwise saturated market?", "translation": "所有競爭者都在做什麼？讀一本叫做《藍海策略》的書，", "start": 1047.96, "end": 1052.88}, {"text": "What are all of the competitors doing? Read a book called Blue Ocean Strategy", "translation": "你會開始看，策略圖是什麼？我要怎麼定位我的頻道，讓自己跟其他也做露營車生活內容的人稍微不一樣？最終我能賣什麼產品？", "start": 1053.14, "end": 1056.4}, {"text": "and you start looking at, okay, what's the strategy map? How do I position my channel in a way", "translation": "因為全職做 YouTube 光靠 AdSense 和品牌合作真的很難。所以，我要做的產品是什麼？", "start": 1056.4, "end": 1060.12}, {"text": "that's slightly different from all these other people who are also doing this van life content? What is ultimately the product I can sell on the back end?", "translation": "這很難。全職做 YouTube 非常難。", "start": 1060.12, "end": 1065.36}, {"text": "Because going full-time on YouTube with just AdSense and brand deals is really hard. So like, what's the product I make on the back end?", "translation": "我不推薦。擴展事業相對容易，", "start": 1065.5, "end": 1069.48}, {"text": "This is hard. Very hard to go full-time on YouTube.", "translation": "事業擴展相當容易，因為有操作手冊，別人已經做過，", "start": 1069.9, "end": 1074.18}, {"text": "I would not recommend it. Growing a biz is fairly easy.", "translation": "也沒那麼依賴運氣。經營 YouTube 頻道，大多很靠運氣。", "start": 1074.46, "end": 1078.54}, {"text": "It's fairly easy to grow a business because there is a playbook. It's obvious, other people have done it.", "translation": "擴展事業，不太靠運氣。運氣，幸運女神，對事業不那麼重要。", "start": 1079.9, "end": 1084.28}, {"text": "It's a lot less reliant on luck. Growing a YouTube channel, a lot of it is about luck.", "translation": "", "start": 1084.76, "end": 1089.94}, {"text": "Growing a business, not really about luck. Luck, lady luck is not that involved in growing business.", "translation": "", "start": 1090.2, "end": 1094.52}, {"text": "It's just about doing sensible things. So, Zach, if you and I were having a conversation,", "translation": "這只是關於做明智的事情。所以，Zach，如果你和我在對話，", "start": 1094.52, "end": 1097.6}, {"text": "One of the things I'd be really trying to get you to nail down on is like, why?", "translation": "我會真正想讓你釐清的一件事是，為什麼？", "start": 1098.02, "end": 1101.48}, {"text": "What is the bigger why behind these things? Why do you want to grow your business", "translation": "這些事情背後更大的原因是什麼？你為什麼想要擴展你的事業，", "start": 1102.5, "end": 1105.54}, {"text": "and/or grow your YouTube channel and/or build systems and/or like do this outsourcing and stuff?", "translation": "和/或擴展你的YouTube頻道，和/或建立系統，和/或進行這種外包等等？", "start": 1105.54, "end": 1109.2}, {"text": "Knowing you, Zach, we probably find that money is a thing.", "translation": "認識你，Zach，我們可能會發現金錢是一個問題。", "start": 1110.02, "end": 1113.76}, {"text": "That money is the bottleneck. You probably feel like you're not making enough money or not as much money as you'd like.", "translation": "金錢是瓶頸。你可能覺得自己賺的錢不夠，或者沒有賺到你想要的錢。", "start": 1114.56, "end": 1119.28}, {"text": "Therefore, because going full time on YouTube is a money goal. It's like, I want to make enough money from YouTube", "translation": "因此，因為想要全職做YouTube是一個金錢目標。你想要從YouTube賺足夠的錢，", "start": 1119.96, "end": 1124.3}, {"text": "such that I can go full time, and I want to grow my photography business is also a money goal", "translation": "使我可以全職做，並且我想擴展我的攝影事業也是一個金錢目標，", "start": 1124.3, "end": 1128.08}, {"text": "because people don't want to grow a business just for the sake of it, unless it's a nonprofit,", "translation": "因為人們不會只是為了擴展事業而擴展，除非是非營利組織，", "start": 1128.08, "end": 1131.58}, {"text": "which I suspect yours is not. They want to grow a business because it makes more money. A lot of this stuff comes down to money", "translation": "而我懷疑你的並不是。他們想擴展事業是因為它能帶來更多收入。這很多都回歸到金錢，", "start": 1132.02, "end": 1136.18}, {"text": "and this is where we start getting into drama issues because we start confronting our scarcity mindset", "translation": "這也是我們開始進入戲劇性問題的地方，因為我們開始面對我們的稀缺心態，", "start": 1136.38, "end": 1140.86}, {"text": "and our limiting beliefs around money and blah, blah, blah, all that fun stuff. So I'd be really trying to ask you, Zach,", "translation": "以及我們對金錢的限制性信念，諸如此類的那些有趣的事情。所以我會真正想問你，Zach，", "start": 1140.86, "end": 1144.68}, {"text": "really, what's the goal? It's a money goal. Great, that's totally fine.", "translation": "到底目標是什麼？是一個金錢目標。很好，這完全沒問題。", "start": 1144.68, "end": 1148.02}, {"text": "How much money do you need to be coming in every month to feel satisfied? You might say what everyone says, which is 10K a month.", "translation": "你每個月需要多少錢進來才會感到滿足？你可能會說大家都說的話，就是一萬美金一個月。", "start": 1148.46, "end": 1154.18}, {"text": "Fantastic. And then we think, okay, so 10K a month is really the goal.", "translation": "太棒了。然後我們思考，好吧，所以一萬美金一個月真的是目標。", "start": 1155.6, "end": 1159.66}, {"text": "That is the true goal. Growing my business and going full time on YouTube,", "translation": "這才是真正的目標。擴展我的事業和全職投入YouTube，", "start": 1159.94, "end": 1163.96}, {"text": "these are just things that will hopefully get me to 10K a month", "translation": "這些只是希望能幫助我達到一萬美金每月的事情，", "start": 1164.14, "end": 1167.76}, {"text": "because then I'll be happy. Zach, you seem like a pretty chill guy anyway.", "translation": "因為這樣我才會快樂。Zach，你看起來本身就是個很隨和的人。", "start": 1167.76, "end": 1171.22}, {"text": "You're doing the van life thing. You're probably happy anyway. We don't need to have a philosophical conversation about really kind of the arrival fallacy", "translation": "你在過露營車生活。你可能本來就很快樂。我們不需要對那種到達錯覺之類的哲學問題做太多討論，", "start": 1171.32, "end": 1175.82}, {"text": "and all this sort of stuff. We'll just take this at face value. And we're just saying, okay, Zach,", "translation": "我們就直接接受這個表面價值。我們只是說，好吧，Zach，", "start": 1175.82, "end": 1180.18}, {"text": "if the goal is 10K a month, honestly, I wouldn't bother with a YouTube channel for now.", "translation": "如果目標是一萬美金一個月，說真的，我現在不會費心經營YouTube頻道。", "start": 1180.4, "end": 1185.2}, {"text": "I would say take a break from the YouTube channel unless it's just genuinely fun", "translation": "我會說暫時休息一下不碰YouTube頻道，除非它真的純粹是好玩，", "start": 1185.32, "end": 1188.66}, {"text": "and you're doing it as a hobby. If you're doing it as a hobby, great. It's, you know, men need their hobbies.", "translation": "並且你當作興趣來做。如果你當成興趣，那很好，你知道，人需要興趣。", "start": 1188.66, "end": 1192.08}, {"text": "People need their hobbies. It's good to have hobbies. Focus on growing the business.", "translation": "人們需要興趣。有興趣是好事。把注意力放在擴展事業上。", "start": 1192.24, "end": 1195.6}, {"text": "Make that your one work-themed goal. Make that the thing that you're focusing on", "translation": "把它當成你唯一的工作目標。讓它成為你每天專注的重點，", "start": 1196.06, "end": 1199.88}, {"text": "for 10 hours a day, focusing on growing a business. That's going to get you to 10K a month", "translation": "花10個小時每天在擴展事業上。這會比你每天花10個小時全職做YouTube，", "start": 1199.88, "end": 1204.02}, {"text": "way quicker and way easier and way less lucky than trying to go full-time on YouTube for 10 hours a day.", "translation": "更快、更輕鬆、也更少依賴運氣地讓你達到一萬美金每月。", "start": 1204.02, "end": 1209.68}, {"text": "Even working on a YouTube channel for 10 hours a day, there's no guarantee that it's going to get you", "translation": "即使每天花10個小時經營YouTube頻道，也不保證你能達到一萬美金每月，", "start": 1209.92, "end": 1213.1}, {"text": "to 10K a month. But working on your business for 10 hours a day", "translation": "但每天花10個小時經營你的事業，搭配正確建議，基本上可以保證你達到一萬美金每月。", "start": 1213.1, "end": 1216.3}, {"text": "with the right advice is basically guaranteed to get you to 10K a month.", "translation": "這其實不難。所以我會說，降低你對YouTube頻道的專注。", "start": 1216.92, "end": 1220.32}, {"text": "Like, it's not that hard. So I would say, reduce your focus on your YouTube channel.", "translation": "把它當作興趣。不要想我想全職做YouTube。YouTube頻道的狀況是，", "start": 1220.36, "end": 1224.22}, {"text": "Treat it like a hobby. Don't think I want to go full-time on YouTube. The thing with a YouTube channel is that, like,", "translation": "試圖從中賺錢反而幾乎讓賺錢變得更難。", "start": 1224.46, "end": 1230.22}, {"text": "trying to make money from it almost makes it harder", "translation": "如果你以一個純粹享受的心態來經營YouTube，並且是為了帶給別人價值，", "start": 1232.42, "end": 1235.58}, {"text": "to make money from it. If you approach a YouTube channel with the idea that,", "translation": "你實際上賺錢的機會會比你只想著要從YouTube賺錢時更高。因為你知道，你現在已經做了50個影片了。", "start": 1235.58, "end": 1239.08}, {"text": "like, you know what, I'm doing this for the joy of it, and I'm doing this to add value to people,", "translation": "這很難，這很艱難。你幾乎每個影片只有寥寥幾個觀看。", "start": 1239.42, "end": 1242.92}, {"text": "the chances of you being able to monetize that are actually higher than if you were to focus on,", "translation": "有時你會有兩千觀看，有時你有兩百觀看。那很好，有兩千人或兩百人看你的影片。", "start": 1243.82, "end": 1247.96}, {"text": "I'm going to make money from my YouTube channel. Because as you know, you've made 50 videos at this point.", "translation": "但這並不是真正通往一萬美金每月的路。所以，Zach，如果目標真的是錢，", "start": 1248.42, "end": 1251.46}, {"text": "It's hard. It's arduous. You only get, like, a few views per video.", "translation": "坦白說，目標真的是錢。別騙自己說，", "start": 1251.5, "end": 1255.36}, {"text": "Sometimes you get 2,000 views. Sometimes you get 200 views. That's great. 2,000 people, 200 people are watching the videos.", "translation": "真的我的問題是系統和外包。不是，問題是我有一個一萬美金每月的目標，", "start": 1255.58, "end": 1260.2}, {"text": "But it's not really the path to 10K a month. So, Zach, if the goal is really money,", "translation": "但我目前並沒有做最有效率的事情來達成這個目標。", "start": 1260.72, "end": 1264.04}, {"text": "let's be honest that the goal is really money. Let's not bullshit ourselves about, like,", "translation": "有人可能會說，不應該把錢當目標，我不同意。", "start": 1264.18, "end": 1267.58}, {"text": "really my problem is systems and outsourcing. No, the problem is I have a goal that's 10K a month,", "translation": "我完全支持有金錢目標。問題是，一旦你從生意中賺到一萬美金每月，", "start": 1267.58, "end": 1271.58}, {"text": "and I'm currently not doing the most efficient thing to get to that goal.", "translation": "你就有足夠的現金流，", "start": 1271.92, "end": 1275.1}, {"text": "Some people might be like, well, it's not good to have a money goal. And, like, I disagree.", "translation": "基本上不必擔心帳單，還能可能外包和雇用團隊成員。", "start": 1275.94, "end": 1279.44}, {"text": "I'm all in favor of having money goals. The thing is, once you're making 10K a month", "translation": "然後你擴展到兩萬美金每月。這是資本主義的一個令人遺憾的副作用，", "start": 1279.5, "end": 1283.78}, {"text": "from your business, now you have enough cash flow to be able to", "translation": "有錢的人比沒錢的人更容易賺錢。", "start": 1283.78, "end": 1287.08}, {"text": "kind of not worry about the bills and to be able to potentially outsource and hire team members for your business.", "translation": "達到一萬美金每月比從一萬到十萬更難。從一萬美金每月到十萬美金每月，", "start": 1287.4, "end": 1292.06}, {"text": "Then you grow to 20K a month. And it is an unfortunate side effect of capitalism", "translation": "", "start": 1292.46, "end": 1297.66}, {"text": "that those who have money find it easier to make money than those who do not have money.", "translation": "", "start": 1297.66, "end": 1301.82}, {"text": "Getting to 10K a month is actually harder than going from 10 to 100. Going from 10K a month to 100K a month,", "translation": "", "start": 1302.32, "end": 1306.64}, {"text": "I think it is easier than going from zero to 10K a month. Similarly, growing on YouTube,", "translation": "我覺得比起從零到月入一萬更容易。同樣地，在YouTube上成長，", "start": 1307.0, "end": 1310.8}, {"text": "Your first 1,000 subscribers are the hardest. It becomes easier after that.", "translation": "你的第一個一千名訂閱者是最難的。之後就會變得容易了。", "start": 1310.86, "end": 1313.86}, {"text": "But my point is, by focusing on what actually is the goal,", "translation": "但我的重點是，專注在真正的目標上，", "start": 1314.1, "end": 1318.52}, {"text": "and what is the most efficient vehicle you've got to get to that goal, which I suspect is your business,", "translation": "以及你手上最有效率能達成目標的工具，我猜那是你的生意，", "start": 1318.52, "end": 1322.44}, {"text": "rather than your YouTube channel, you focus your efforts on the business,", "translation": "而不是你的YouTube頻道，你應該把努力放在生意上，", "start": 1322.44, "end": 1325.62}, {"text": "you forget about the YouTube channel, treat it as a hobby, and once you're at the 10K, great.", "translation": "忘掉YouTube頻道，把它當成一個興趣，而當你達到一萬的時候，那就太好了。", "start": 1325.78, "end": 1329.2}, {"text": "Now you can go back on YouTube and you can do it for fun. Trust me when I say this,", "translation": "現在你可以回到YouTube，當作娛樂來做。相信我這句話，", "start": 1329.3, "end": 1332.36}, {"text": "YouTube is more fun when it is a side hustle rather than when it's your main source of income.", "translation": "YouTube當成副業會比較有趣，勝過當作你的主要收入來源。", "start": 1332.48, "end": 1336.12}, {"text": "I would say, given your niche, you actually don't want to go full-time on YouTube.", "translation": "以你的領域來說，我會說你其實不想全職經營YouTube。", "start": 1336.78, "end": 1339.96}, {"text": "Zach, you do not want to go full-time on YouTube. You do not want to be reliant on YouTube", "translation": "Zach，你不想全職做YouTube。你不想依賴YouTube", "start": 1340.3, "end": 1344.08}, {"text": "for your full-time living. A great place to be is when you have a business", "translation": "作為你全職的生活來源。一個很棒的位置是當你有自己的事業，", "start": 1344.08, "end": 1347.76}, {"text": "and you do YouTube for fun and you do YouTube for pocket money. If your YouTube channel generates leads for your business,", "translation": "你做YouTube是為了娛樂，也是賺點零用錢。如果你的YouTube頻道能為你的生意帶來潛在客戶，", "start": 1348.32, "end": 1353.14}, {"text": "then great, you're sort of getting the best of both worlds. That's a great place to be.", "translation": "那太好了，你就能同時擁有兩邊的好處。那是一個很棒的位置。", "start": 1353.3, "end": 1356.88}, {"text": "But most people who I know who are full-time YouTubers, where their YouTube channel is their main source of income,", "translation": "但我認識的大部分全職YouTuber，他們的YouTube頻道是主要收入來源，", "start": 1357.2, "end": 1362.56}, {"text": "are quite stressed. If you have a business underlying it, you're a lot less stressed.", "translation": "他們都相當有壓力。如果你背後有一個生意撐著，你的壓力會小很多。", "start": 1362.8, "end": 1366.4}, {"text": "So Zach, please don't try and go full-time on YouTube. Focus on your business, get a 10K a month,", "translation": "所以Zach，請不要試圖全職經營YouTube。專注在你的生意上，達到月入一萬，", "start": 1366.7, "end": 1370.16}, {"text": "assuming that's a goal. Do YouTube as a hobby. And Zach, if you're watching this or anyone else", "translation": "假設那是你的目標。把YouTube當作興趣來做。Zach，如果你看這個影片，或者其他任何人", "start": 1370.22, "end": 1373.52}, {"text": "and you've not yet seen my video, which is honest advice to someone who wants financial freedom,", "translation": "還沒看過我的影片，裡面是對想達到財務自由者的誠實建議，", "start": 1373.52, "end": 1376.8}, {"text": "which, Zach, I suspect is something you might want, then check out this video over here. Thank you so much for watching.", "translation": "Zach，我猜這可能是你想要的東西，那就去看看這支影片吧。非常感謝你的收看。", "start": 1376.8, "end": 1380.3}, {"text": "I hope you enjoyed this video. And see you in the next one. Bye bye.", "translation": "希望你喜歡這支影片，我們下次見。再見。", "start": 1380.44, "end": 1382.32}];
const questions = [{"question": "What is the main struggle Zach is facing according to the video?", "question_native": "根據影片，Zach面臨的主要問題是什麼？", "options": ["He has too few goals to focus on.", "He feels overwhelmed trying to do too many things at once.", "He has no interest in photography anymore."], "answer": "He feels overwhelmed trying to do too many things at once."}, {"question": "What are two main activities Zach is trying to grow?", "question_native": "Zach試圖發展的兩項主要活動是什麼？", "options": ["His cooking and gardening skills.", "His photography business and YouTube channel.", "His podcast and blogging."], "answer": "His photography business and YouTube channel."}, {"question": "What advice approach does the speaker mention when responding to Zach's question?", "question_native": "講者在回答Zach問題時提到採取什麼建議方式？", "options": ["He gives unsolicited advice immediately.", "He asks permission before coaching through the process.", "He avoids giving any advice."], "answer": "He asks permission before coaching through the process."}, {"question": "Why does the speaker mention not putting a direct link to Zach's channel?", "question_native": "為什麼講者提到不放Zach頻道的直接連結？", "options": ["Because they want to protect Zach’s channel from algorithm issues.", "Because they don't like Zach's content.", "Because Zach asked them to remove it."], "answer": "Because they want to protect Zach’s channel from algorithm issues."}, {"question": "How long did the speaker take to reach 1,000 subscribers on YouTube?", "question_native": "講者花了多久時間在YouTube達成1,000訂閱者？", "options": ["Six months and 52 videos.", "One year and 100 videos.", "Three months and 20 videos."], "answer": "Six months and 52 videos."}];

// ── Persistence ──
const VIDEO_ID = location.pathname.split('/').filter(Boolean).pop() || 'default';
const STORE_KEY = `lph_${VIDEO_ID}`;
function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; } }
function saveStore(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
let store = loadStore(); // { practiced: [idx,...], bookmarks: [idx,...], theme: 'dark' }
if (!store.practiced) store.practiced = [];
if (!store.bookmarks) store.bookmarks = [];

function renderDialogue() {
  const box = document.getElementById('dialogue-box');
  box.innerHTML = segments.map((s, i) => {
    const zh = s.translation || '';
    const isBookmarked = store.bookmarks.includes(i);
    return `<div class="dialogue-line" data-idx="${i}" onclick="jumpToLine(${i})">
      <span class="line-text">${escapeHtml(s.text)}${zh ? `<div class="line-zh">${escapeHtml(zh)}</div>` : ''}</span>
      <button class="rec-btn" id="rec-${i}" onclick="event.stopPropagation();toggleRec(${i})" title="錄音比對">🎙️</button>

      <button class="line-repeat-btn" onclick="event.stopPropagation();loopLine(${i})" title="單句Loop / Shift+點兩句=多句Loop">🔁</button>
    </div>`;
  }).join('');

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function applyModes() {
  const box = document.getElementById('dialogue-box');
  box.classList.toggle('show-zh', showZh);
  box.classList.toggle('dictation-mode', dictationMode);
}
function toggleZh() { showZh = !showZh; document.getElementById('zh-toggle').classList.toggle('active', showZh); applyModes(); }
function toggleDictation() {
  dictationMode = !dictationMode;
  document.getElementById('dictation-toggle').classList.toggle('active', dictationMode);
  document.querySelectorAll('.dialogue-line.revealed').forEach(l => l.classList.remove('revealed'));

function jumpToLine(idx) {
  setActiveDialogueLine(idx);
  if (dictationMode) { const lines = document.querySelectorAll('.dialogue-line'); if(lines[idx]) lines[idx].classList.add('revealed'); }
  const s = segments[idx];
  if (!s) return;

  // iOS: audio might not have duration yet, but we can still seek and play
  audio.currentTime = s.start;
  audio.play().then(() => setPlayButton(true)).catch(() => {
    // iOS first-play might fail — try again on next user tap
    setPlayButton(false);
  });
  updateProgressUI();
}

let loopRangeStart = null; // for multi-line loop selection

function loopLine(idx) {
  const s = segments[idx]; if (!s) return;

  // Multi-line loop: first click sets start, second click sets end
  if (loopRangeStart !== null && loopRangeStart !== idx) {
    const from = Math.min(loopRangeStart, idx);
    const to = Math.max(loopRangeStart, idx);
    pointA = segments[from].start;
    pointB = segments[to].end;
    loopEnabled = true; loopCount = 0;
    document.getElementById('loop-btn').classList.add('active');
    document.getElementById('set-a-btn').classList.add('active');
    document.getElementById('set-b-btn').classList.add('active');
    syncABLabels();
    audio.currentTime = pointA;
    updateProgressUI();
    audio.play().then(() => setPlayButton(true)).catch(() => {});
    // Highlight range
    const lines = document.querySelectorAll('.dialogue-line');
    lines.forEach((l, i) => l.classList.toggle('highlight', i >= from && i <= to));
    loopRangeStart = null;
    return;
  }

  // Single click: if no range active, start range OR single loop
  // Hold shift for range mode
  if (window._shiftHeld) {
    loopRangeStart = idx;
    // Visual feedback
    const lines = document.querySelectorAll('.dialogue-line');
    lines[idx].style.boxShadow = 'inset 3px 0 0 var(--green), inset -3px 0 0 var(--green)';
    return;
  }

  // Toggle: if already looping this line, cancel and show feedback
  if (loopEnabled && Math.abs(pointA - s.start) < 0.5 && Math.abs(pointB - s.end) < 0.5) {
    clearAB();
    // Flash the button to show it's cancelled
    const btn = document.querySelectorAll('.line-repeat-btn')[idx];
    if (btn) { btn.style.color = 'var(--green)'; setTimeout(() => btn.style.color = '', 500); }
    return;
  }

  // Default: single line loop
  pointA = s.start; pointB = s.end;
  loopEnabled = true; loopCount = 0;
  document.getElementById('loop-btn').classList.add('active');
  document.getElementById('set-a-btn').classList.add('active');
  document.getElementById('set-b-btn').classList.add('active');
  syncABLabels();
  audio.currentTime = s.start;
  updateProgressUI();
  audio.play().then(() => setPlayButton(true)).catch(() => {});
  setActiveDialogueLine(idx);
}

function prevSentence() { jumpToLine(Math.max(0, (activeLineIndex || 0) - 1)); }
function nextSentence() { jumpToLine(Math.min(segments.length - 1, (activeLineIndex || 0) + 1)); }

function setActiveDialogueLine(idx) {
  document.querySelectorAll('.dialogue-line').forEach(l => l.classList.remove('highlight'));
  const line = document.querySelectorAll('.dialogue-line')[idx];
  if (!line) return;
  line.classList.add('highlight');
  activeLineIndex = idx;
  const box = document.getElementById('dialogue-box');
  const boxRect = box.getBoundingClientRect();
  const lineRect = line.getBoundingClientRect();
  if (lineRect.top < boxRect.top || lineRect.bottom > boxRect.bottom) line.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderSegmentMarkers() {

function checkAnswer(btn, qi) {

function togglePlay() { if(audio.paused) audio.play().then(()=>setPlayButton(true)).catch(()=>setPlayButton(false)); else { audio.pause(); setPlayButton(false); } }

function toggleLoop() { loopEnabled = !loopEnabled; document.getElementById('loop-btn').classList.toggle('active', loopEnabled); }
function clearAB() { pointA=null; pointB=null; loopEnabled=false; loopCount=0; document.getElementById('a-time').textContent='—'; document.getElementById('b-time').textContent='—'; document.getElementById('loop-count').textContent='0'; ['a-marker','b-marker','ab-region'].forEach(id => document.getElementById(id).style.display='none'); ['set-a-btn','set-b-btn','loop-btn'].forEach(id => document.getElementById(id).classList.remove('active')); }

function syncABLabels() { document.getElementById('a-time').textContent = pointA!==null?fmt(pointA):'—'; document.getElementById('b-time').textContent = pointB!==null?fmt(pointB):'—'; updateMarkers(); }

function updateMarkers() {
  const dur = audio.duration || 1;
  if(pointA!==null) { const m=document.getElementById('a-marker'); m.style.left=`${(pointA/dur)*100}%`; m.style.display='block'; }
  if(pointB!==null) { const m=document.getElementById('b-marker'); m.style.left=`${(pointB/dur)*100}%`; m.style.display='block'; }
  if(pointA!==null&&pointB!==null) { const a=Math.min(pointA,pointB), b=Math.max(pointA,pointB), r=document.getElementById('ab-region'); r.style.left=`${(a/dur)*100}%`; r.style.width=`${((b-a)/dur)*100}%`; r.style.display='block'; }
}

function updateProgressUI() {
  if (!isFinite(audio.duration)) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-bar').style.width = `${pct}%`;
  document.getElementById('time-display').textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
  // Sync active line
  if (syncEnabled && segments.length) {
    const t = audio.currentTime;
    const idx = segments.findIndex((s, i) => t >= s.start && (t < s.end || i === segments.length - 1));
    if (idx !== -1 && idx !== activeLineIndex) setActiveDialogueLine(idx);

// ── Events ──
document.getElementById('progress-container').addEventListener('click', function(e) {
  if (!isFinite(audio.duration)) return;
  const pct = (e.clientX - this.getBoundingClientRect().left) / this.offsetWidth;
  audio.currentTime = pct * audio.duration;
  updateProgressUI();
});

audio.addEventListener('timeupdate', function() {
  updateProgressUI();
  if (loopEnabled && pointA !== null && pointB !== null) {
    const a = Math.min(pointA, pointB), b = Math.max(pointA, pointB);
    if (audio.currentTime >= b) { audio.currentTime = a; loopCount++; document.getElementById('loop-count').textContent = loopCount; }
  }
});
audio.addEventListener('ended', () => setPlayButton(false));
audio.addEventListener('loadedmetadata', () => { renderSegmentMarkers(); updateProgressUI(); });

// iOS fix: rAF-based sync (timeupdate fires too infrequently on iOS)
function iosSyncLoop() {
  if (!audio.paused) updateProgressUI();
  requestAnimationFrame(iosSyncLoop);
}
iosSyncLoop();

// ── Echo Method (flicker-free engine) ──
let echoState = { active: false, lineIdx: 0, phase: 'idle', timers: [], animId: null, cycleId: 0 };

function echoClearAll() {
  echoState.timers.forEach(t => clearTimeout(t));
  echoState.timers = [];
  if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }
  audio.pause();
  audio.volume = 1;
}

function openEcho() {
  if (!segments.length) return;
  echoClearAll();
  echoState.active = true;
  echoState.lineIdx = activeLineIndex || 0;
  echoState.phase = 'idle';
  document.getElementById('echo-overlay').classList.add('active');
  setPlayButton(false);
  updateEchoUI();
  document.getElementById('echo-pause').oninput = function() { document.getElementById('echo-pause-label').textContent = this.value+'s'; };
  document.getElementById('echo-repeat').oninput = function() { document.getElementById('echo-repeat-label').textContent = this.value+'s'; };
}

function closeEcho() {
  echoClearAll();
  echoState.active = false;
  echoState.phase = 'idle';
  document.getElementById('echo-overlay').classList.remove('active');
}

function updateEchoUI() {
  const s = segments[echoState.lineIdx];
  document.getElementById('echo-counter').textContent = `第 ${echoState.lineIdx + 1} / ${segments.length} 句`;
  document.getElementById('echo-sentence').innerHTML = s
    ? `<div><div class="nl">${escapeHtml(s.text)}</div>${s.translation ? `<div class="zh">${escapeHtml(s.translation)}</div>` : ''}</div>`
    : '';
}

function setEchoPhase(phase, emoji, text) {
  echoState.phase = phase;
  document.getElementById('echo-phase').innerHTML = `<span class="emoji">${emoji}</span><div>${text}</div><div class="label">${phase.toUpperCase()}</div>`;
}

function setEchoRing(p, l) {
  document.getElementById('echo-ring-fg').style.strokeDashoffset = 339.3 * (1 - p);
  document.getElementById('echo-ring-label').textContent = l;
}

// Smooth ring animation using requestAnimationFrame
function animateRing(startTime, duration, label, cycleId, onDone) {
  function step() {
    if (!echoState.active || ecleState_cycleId !== cycleId) return;
    const elapsed = Date.now() - startTime;
    const progress = Math.min(1, elapsed / duration);
    setEchoRing(progress, label);
    if (progress < 1) {
      echoState.animId = requestAnimationFrame(step);
    } else if (onDone) {
      onDone();
    }
  }
  // Use a closure variable to track the cycle
  const ecleState_cycleId = cycleId;
  echoState.animId = requestAnimationFrame(step);
}

let echoLoopMode = false;
function toggleEchoLoop() {
  echoLoopMode = !echoLoopMode;
  const btn = document.getElementById('echo-loop-btn');
  if (btn) {
    btn.style.background = echoLoopMode ? 'var(--orange)' : 'none';
    btn.style.color = echoLoopMode ? '#000' : 'var(--orange)';
  }
}

let echoPaused = false;
function toggleEchoPause() {
  echoPaused = !echoPaused;
  const btn = document.getElementById('echo-pause-btn');
  if (echoPaused) {
    audio.pause();
    echoState.timers.forEach(t => clearTimeout(t));
    echoState.timers = [];
    if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }
    echoState.cycleId++; // kill all running callbacks
    btn.textContent = '▶ 繼續';
    setEchoPhase('pause', '⏸', '已暫停');
  } else {
    btn.textContent = '⏸ 暫停';
    echoRunCycle(echoState.lineIdx);
  }
}

function echoBookmark() {
  toggleBookmark(echoState.lineIdx);
}
function echoExplain() {
  explainLine(echoState.lineIdx);
}
function echoRecToggle() {
  const btn = document.getElementById('echo-rec-btn');
  if (recState.recording) {
    stopRec();
    btn.textContent = '🎙️ 錄音';
    btn.style.color = '';
    btn.style.borderColor = '';
  } else {
    // Pause echo first
    if (!echoPaused) toggleEchoPause();
    audio.pause();
    startRec(echoState.lineIdx).then(() => {
      btn.textContent = '⏹ 停止';
      btn.style.color = 'var(--accent)';
      btn.style.borderColor = 'var(--accent)';
    }).catch(() => {
      alert('無法存取麥克風');
    });
  }
}

function echoPrev() {
  echoClearAll();
  echoState.lineIdx = Math.max(0, echoState.lineIdx - 1);
  updateEchoUI();
  echoRunCycle(echoState.lineIdx);
}

function echoNext() { echoPaused = false; document.getElementById('echo-pause-btn').textContent = '⏸ 暫停'; echoClearAll(); echoRunCycle(echoState.lineIdx); }
function echoReplay() { echoClearAll(); echoRunCycle(echoState.lineIdx); }
function echoSkip() {
  echoClearAll();
  echoState.lineIdx = Math.min(segments.length - 1, echoState.lineIdx + 1);
  updateEchoUI();
  echoRunCycle(echoState.lineIdx);
}

function echoRunCycle(idx) {
  if (!echoState.active) return;
  echoClearAll();

  const cycleId = ++echoState.cycleId;  // unique ID to cancel stale callbacks
  echoState.lineIdx = idx;
  updateEchoUI();
  setActiveDialogueLine(idx);

  const s = segments[idx];
  if (!s) return;

  const pauseDur = parseFloat(document.getElementById('echo-pause').value) * 1000;
  const repeatDur = parseFloat(document.getElementById('echo-repeat').value) * 1000;
  const listenDur = (s.end - s.start) * 1000 / audio.playbackRate;

  // ── Phase 1: LISTEN ──
  setEchoPhase('listen', '🎧', '仔細聽這句話');
  setEchoRing(0, '🎧');
  audio.volume = 1;
  audio.currentTime = s.start;
  audio.play().catch(() => {});

  const t0 = Date.now();
  animateRing(t0, listenDur, '🎧', cycleId, null);

  // Wait for audio to actually reach s.end (not setTimeout which can be inaccurate)
  function waitForEnd(callback) {
    function check() {
      if (cycleId !== echoState.cycleId) return;
      if (audio.currentTime >= s.end - 0.05 || audio.paused) { callback(); return; }
      requestAnimationFrame(check);
    }
    // Also set a safety timeout (listenDur + 1s buffer)
    const safetyTimer = setTimeout(() => { if (cycleId === echoState.cycleId) callback(); }, listenDur + 1000);
    echoState.timers.push(safetyTimer);
    check();
  }

  waitForEnd(() => {
    if (cycleId !== echoState.cycleId) return;
    if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }
    audio.pause();
    setEchoRing(1, '🎧');

    // ── Phase 2: ECHO ──
    setEchoPhase('echo', '🧠', '在腦中迴想剛才的聲音...');
    setEchoRing(0, '🧠');

    const t1 = Date.now();
    animateRing(t1, pauseDur, '🧠', cycleId, null);

    const timer2 = setTimeout(() => {
      if (cycleId !== echoState.cycleId) return;
      if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }

      // ── Phase 3: REPEAT (no audio replay — speak from memory!) ──
      setEchoPhase('repeat', '🗣️', '大聲跟著說！');
      setEchoRing(0, '🗣️');
      // Recording during repeat phase — only if mic already granted
      if (recState.stream) { startRec(idx).catch(() => {}); }

      const t2 = Date.now();
      animateRing(t2, repeatDur, '🗣️', cycleId, null);

      const timer3 = setTimeout(() => {
        if (cycleId !== echoState.cycleId) return;
        if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }
        audio.pause();
        audio.volume = 1;
        // Stop recording
        if (recState.recording) stopRec();

        // ── Done or auto-next or loop ──
        if (echoLoopMode) {
          setEchoPhase('listen', '🔄', '再來一次...');
          setEchoRing(1, '🔄');
          const timer4 = setTimeout(() => {
            if (cycleId !== echoState.cycleId) return;
            echoRunCycle(idx); // same sentence again
          }, 800);
          echoState.timers.push(timer4);
        } else if (document.getElementById('echo-auto').checked && idx < segments.length - 1) {
          setEchoPhase('listen', '✅', '很好！下一句...');
          setEchoRing(1, '✅');
          const timer4 = setTimeout(() => {
            if (cycleId !== echoState.cycleId) return;
            echoRunCycle(idx + 1);
          }, 1000);
          echoState.timers.push(timer4);
        } else if (idx >= segments.length - 1) {
          setEchoPhase('done', '🎉', '全部完成！太棒了！');
          setEchoRing(1, '🎉');
        } else {
          setEchoPhase('pause', '⏸', '準備好按「下一句」');
          setEchoRing(1, '⏸');
        }
      }, repeatDur);
      echoState.timers.push(timer3);
    }, pauseDur);
    echoState.timers.push(timer2);
  });
}

// ── Keyboard ──
// Track shift key for multi-line loop
window._shiftHeld = false;
document.addEventListener('keydown', function(e) { if(e.key==='Shift') window._shiftHeld = true; });
document.addEventListener('keyup', function(e) { if(e.key==='Shift') window._shiftHeld = false; });

document.addEventListener('keydown', function(e) {
  if(e.target.tagName==='INPUT') return;
  switch(e.code) {
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'KeyA': setA(); break; case 'KeyB': setB(); break;
    case 'KeyL': toggleLoop(); break; case 'KeyC': clearAB(); break;
    case 'ArrowLeft': e.shiftKey ? prevSentence() : (audio.currentTime = Math.max(0, audio.currentTime-3)); break;
    case 'ArrowRight': e.shiftKey ? nextSentence() : (audio.currentTime = Math.min(audio.duration, audio.currentTime+3)); break;
    case 'KeyZ': toggleZh(); break; case 'KeyD': toggleDictation(); break;
    case 'KeyE': openEcho(); break; case 'Escape': closeEcho(); break;
  }
});

function fmt(s) { if(!s||isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }

// ── Bookmarks ──
function toggleBookmark(idx) {
  const i = store.bookmarks.indexOf(idx);
  if (i >= 0) store.bookmarks.splice(i, 1);
  else store.bookmarks.push(idx);
  store.bookmarks.sort((a, b) => a - b);
  saveStore(store);
  // Update button state
  const btns = document.querySelectorAll('.bookmark-btn');
  if (btns[idx]) btns[idx].classList.toggle('bookmarked', store.bookmarks.includes(idx));
  updateBookmarkCount();
  renderBookmarks();
}

function updateBookmarkCount() {
  const el = document.getElementById('bookmark-count');
  el.textContent = store.bookmarks.length ? `(${store.bookmarks.length})` : '';
}

function renderBookmarks() {
  const box = document.getElementById('bookmark-box');
  if (!store.bookmarks.length) {
    box.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">還沒有書籤，點對話旁的 🔖 加入</p>';
    return;
  }
  box.innerHTML = '<div class="bookmark-list">' + store.bookmarks.map(idx => {
    const s = segments[idx];
    if (!s) return '';
    return `<div class="bookmark-item" onclick="jumpToLine(${idx})">
      <span class="bk-time">${fmt(s.start)}</span>

    </div>`;
  }).join('') + '</div>';
}
