<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>荷蘭文 A2 luisteren 模擬考三（真實做題版） — 荷蘭文練習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root, [data-theme="dark"] {
    --bg: #050510; --card: rgba(255,255,255,0.04); --card-solid: #14142a;
    --glass-border: rgba(255,255,255,0.08);
    --accent: #ff3b5c; --accent2: #7c5cfc;
    --text: #f2f2f7; --muted: #a0a0b8; --dim: #606078;
    --green: #34d399; --orange: #fb923c; --blue: #60a5fa;
    --r: 16px;
  }
  [data-theme="light"] {
    --bg: #f8f8fc; --card: rgba(0,0,0,0.03); --card-solid: #fff;
    --glass-border: rgba(0,0,0,0.08);
    --accent: #e63550; --accent2: #6c4de6;
    --text: #1a1a2e; --muted: #666680; --dim: #999;
    --green: #0d9668; --orange: #d97706; --blue: #2563eb;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 24px; }

  /* Header - compact */
  header { display: flex; align-items: center; gap: 10px; padding: 8px 0 6px; }
  header h1 { font-size: 13px; font-weight: 600; flex: 1; line-height: 1.3; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Mini player row */
  .mini-player-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .mini-player-row .progress-container { height: 32px; border-radius: 8px; }
  .mini-player-row .play-btn { min-width: 40px; padding: 8px; font-size: 14px; }

  /* Player actions */
  .player-actions { display: flex; gap: 4px; align-items: center; }
  .pa-btn {
    background: none; border: 1px solid var(--glass-border); color: var(--dim);
    padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600;
    transition: all 0.2s;
  }
  .pa-btn:active { transform: scale(0.92); color: var(--text); }

  /* Extra controls (collapsible) */
  .extra-controls { padding: 8px 0 4px; }
  .extra-controls .controls { gap: 4px; margin-bottom: 0; }
  .extra-controls .ctrl-btn { padding: 5px 10px; font-size: 11px; }

  /* Progress in header */
  .progress-summary { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .progress-summary .bar { flex: 1; height: 3px; background: var(--glass-border); border-radius: 2px; overflow: hidden; max-width: 120px; }
  .progress-summary .bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

  /* Player */
  .player-box {
    background: var(--card); border: 1px solid var(--glass-border);
    border-radius: var(--r); padding: 16px; margin-bottom: 12px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .progress-container { position: relative; height: 40px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 12px; cursor: pointer; overflow: hidden; }
  [data-theme="light"] .progress-container { background: rgba(0,0,0,0.04); }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); width: 0%; border-radius: 10px; transition: width 0.1s linear; }
  .ab-marker { position: absolute; top: 0; width: 2px; height: 100%; z-index: 2; }
  .ab-marker.a-marker { background: var(--green); }
  .ab-marker.b-marker { background: var(--orange); }
  .ab-region { position: absolute; top: 0; height: 100%; background: rgba(52,211,153,0.12); z-index: 1; }
  .segment-marker { position: absolute; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.08); z-index: 1; pointer-events: none; }
  .time-display { position: absolute; bottom: 6px; right: 10px; font-size: 11px; color: var(--muted); z-index: 3; font-weight: 500; font-variant-numeric: tabular-nums; }

  .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .ctrl-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--text);
    padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all 0.2s; backdrop-filter: blur(10px);
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ctrl-btn.play-btn {
    background: var(--green); color: #000; font-weight: 800; min-width: 52px;
    border: none; box-shadow: 0 2px 12px rgba(52,211,153,0.3);
  }
  .ctrl-btn.play-btn:active { transform: scale(0.92); }
  .speed-control { display: flex; align-items: center; gap: 3px; margin-left: auto; }
  .speed-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--muted);
    padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.2s;
  }
  .speed-btn:active { transform: scale(0.92); }
  .speed-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .ab-info { display: flex; gap: 12px; font-size: 12px; color: var(--dim); font-weight: 500; }
  .ab-info span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.green { background: var(--green); }
  .dot.orange { background: var(--orange); }
  .sentence-nav { display: flex; gap: 4px; align-items: center; margin-left: auto; }
  .nav-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--text);
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .nav-btn:active { transform: scale(0.9); }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 12px; background: var(--card); border-radius: 12px; padding: 3px; border: 1px solid var(--glass-border); }
  .tab {
    flex: 1; background: none; border: none; color: var(--dim); padding: 8px 8px;
    cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 10px;
    transition: all 0.25s;
  }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(255,59,92,0.3); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Mode bar */
  .mode-bar { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; }
  .mode-bar::-webkit-scrollbar { display: none; }
  .mode-btn {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--glass-border);
    color: var(--muted); padding: 6px 14px; border-radius: 100px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all 0.2s;
  }
  .mode-btn:active { transform: scale(0.95); }
  .mode-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .mode-btn.echo-btn { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); color: var(--green); }
  .mode-btn.echo-btn:active { background: var(--green); color: #000; }

  /* Dialogue */
  .dialogue-box {
    background: var(--card); border: 1px solid var(--glass-border);
    border-radius: var(--r); padding: 8px; max-height: 60vh; overflow-y: auto; scroll-behavior: smooth;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .dialogue-box::-webkit-scrollbar { width: 3px; }
  .dialogue-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .dialogue-line {
    padding: 10px 12px; border-radius: 12px; margin-bottom: 2px; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    line-height: 1.65; font-size: 14px; display: flex; align-items: flex-start; gap: 6px;
    flex-wrap: wrap;  /* analysis panel can wrap to new row below text + buttons */
  }
  .dialogue-line:active { transform: scale(0.98); }
  .dialogue-line:hover { background: rgba(255,255,255,0.04); }
  [data-theme="light"] .dialogue-line:hover { background: rgba(0,0,0,0.03); }
  .dialogue-line.highlight {
    background: rgba(255,59,92,0.08); border-left: 3px solid var(--accent);
    padding-left: 9px;
  }
  .line-text { flex: 1; }
  /* Stressed-word highlight inside dialogue text — OFF by default,
     toggled on via .show-stress on dialogue-box. Tap 🔔 重讀高亮 to enable. */
  .line-stress { background: none; color: inherit; padding: 0; border-radius: 0; font-weight: inherit; }
  .show-stress .line-stress { background: rgba(253,224,71,0.22); color: #fef3c7;
    padding: 1px 3px; border-radius: 3px; font-weight: 700; }
  [data-theme="light"] .show-stress .line-stress { background: rgba(234,179,8,0.25); color: #713f12; }
  .line-zh { font-size: 12px; color: var(--dim); margin-top: 3px; display: none; line-height: 1.5; }
  .show-zh .line-zh { display: block; }

  .explain-btn, .bookmark-btn, .line-repeat-btn, .rec-btn, .ana-btn {
    background: none; border: none; color: var(--dim); font-size: 14px;
    padding: 2px; cursor: pointer; opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
  }
  .dialogue-line:hover .explain-btn,
  .dialogue-line:hover .bookmark-btn,
  .dialogue-line:hover .line-repeat-btn,
  .dialogue-line:hover .rec-btn,
  .dialogue-line:hover .ana-btn { opacity: 0.5; }
  .explain-btn:hover, .bookmark-btn:hover, .line-repeat-btn:hover, .rec-btn:hover, .ana-btn:hover { opacity: 1 !important; }
  /* On touch devices (no hover), keep all inline buttons visible by default */
  @media (hover: none) {
    .explain-btn, .bookmark-btn, .line-repeat-btn, .rec-btn, .ana-btn { opacity: 0.55; }
    .ana-btn { color: #5eead4; opacity: 0.85; }  /* extra emphasis — newest feature */
  }
  .bookmark-btn.bookmarked { opacity: 1 !important; color: var(--orange); }
  .rec-btn.recording { opacity: 1 !important; color: var(--accent); animation: recPulse 0.8s ease-in-out infinite; }
  @keyframes recPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.2); } }

  /* Per-sentence analysis panel — collapses by default, expands on 🔬 click */
  .line-analysis { display: none; width: 100%; flex-basis: 100%; order: 99;
    margin: 8px 0 4px; padding: 10px 12px; background: rgba(94,234,212,0.05);
    border-left: 3px solid #5eead4; border-radius: 6px; font-size: 12.5px; line-height: 1.55; }
  .dialogue-line.show-analysis .line-analysis { display: block; }
  .dialogue-line.show-analysis .ana-btn { opacity: 1 !important; color: #5eead4; }
  .ana-sec { margin: 4px 0; }
  .ana-lbl { display: inline-block; color: #5eead4; font-weight: 800; font-size: 11px;
    min-width: 56px; margin-right: 6px; }
  .ana-text { color: var(--text2); }
  .ana-word { display: inline-block; padding: 2px 7px; margin: 2px 4px 2px 0;
    border: 1px solid; border-radius: 4px; font-size: 11.5px; }
  .ana-word b { font-weight: 700; }
  .ana-word .ana-zh { color: var(--text2); margin-left: 5px; font-size: 11px; }
  .ana-word .ana-lv { margin-left: 5px; font-size: 9.5px; font-weight: 700; }
  .ana-red { display: inline-flex; align-items: center; padding: 2px 7px; margin: 2px 4px 2px 0;
    background: rgba(255,255,255,0.04); border-radius: 4px; font-size: 11.5px; }
  .ana-red-w { color: var(--text2); }
  .ana-red-arr { margin: 0 6px; color: var(--dim); }
  .ana-red-s { color: var(--orange); font-weight: 700; font-family: ui-monospace, Menlo, monospace; }
  .ana-stress { display: inline-block; padding: 2px 8px; margin: 2px 4px 2px 0;
    background: rgba(253,224,71,0.15); color: #fde047; border: 1px solid #fde04766;
    border-radius: 4px; font-size: 12px; font-weight: 800;
    font-family: ui-monospace, Menlo, monospace; }
  .ana-hint { color: var(--dim); font-size: 11px; margin-left: 6px; font-style: italic; }
  .ana-trap { background: rgba(251,146,60,0.08); border-radius: 4px; padding: 6px 8px; margin-top: 4px; }
  .ana-trap .ana-lbl { color: var(--orange); }

  /* Recording result */
  .rec-result {
    margin-top: 6px; padding: 8px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    font-size: 12px; animation: slideUp 0.3s ease;
  }
  .rec-result .rec-score { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .rec-result .rec-score.good { color: var(--green); }
  .rec-result .rec-score.ok { color: var(--orange); }
  .rec-result .rec-score.bad { color: var(--accent); }
  .rec-result .rec-you { color: var(--muted); margin-bottom: 4px; }
  .rec-result .rec-diff { line-height: 1.8; }
  .rec-result .rec-diff .match { color: var(--green); }
  .rec-result .rec-diff .miss { color: var(--accent); text-decoration: line-through; }
  .rec-result .rec-diff .extra { color: var(--orange); font-style: italic; }
  .rec-playback { display: flex; gap: 6px; margin-top: 6px; }
  .rec-play-btn { background: var(--card); border: 1px solid var(--glass-border); color: var(--text); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .rec-play-btn:active { transform: scale(0.95); }

  /* Dictation mode */
  .dictation-mode .line-text { filter: blur(6px); transition: filter 0.3s; user-select: none; }
  .dictation-mode .line-zh { display: none !important; }
  .dictation-mode .dialogue-line:hover .line-text,
  .dictation-mode .dialogue-line.revealed .line-text { filter: none; }

  /* Quiz */
  .quiz-box { background: var(--card); border: 1px solid var(--glass-border); border-radius: var(--r); padding: 16px; }
  .question { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--glass-border); }
  .question:last-child { border-bottom: none; }
  .question h4 { margin-bottom: 4px; font-size: 14px; font-weight: 700; }
  .question .q-native { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  .option {
    display: block; width: 100%; text-align: left;
    background: var(--card); border: 1.5px solid var(--glass-border); color: var(--text);
    padding: 12px 14px; border-radius: 12px; margin-bottom: 6px; cursor: pointer;
    font-size: 14px; transition: all 0.2s;
  }
  .option:active { transform: scale(0.98); }
  .option.correct { border-color: var(--green); background: rgba(52,211,153,0.1); }
  .option.wrong { border-color: var(--accent); background: rgba(255,59,92,0.1); }
  .option.disabled { pointer-events: none; opacity: 0.6; }
  .score-bar { margin-top: 16px; padding: 14px; background: var(--card); border: 1px solid var(--glass-border); border-radius: 12px; text-align: center; font-size: 14px; font-weight: 700; display: none; }

  /* Vocab */
  .vocab-box { background: var(--card); border: 1px solid var(--glass-border); border-radius: var(--r); padding: 12px 16px; }
  .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
  .vocab-item:last-child { border-bottom: none; }
  .vocab-word { font-weight: 700; color: var(--green); }
  .vocab-meaning { color: var(--muted); font-size: 13px; }

  /* Echo overlay */
  .echo-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,16,0.96); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px;
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  }
  .echo-overlay.active { display: flex; }
  .echo-phase { font-size: 1.3em; font-weight: 700; text-align: center; min-height: 2em; }
  .echo-phase .emoji { font-size: 2.2em; display: block; margin-bottom: 10px; }
  .echo-phase .label { color: var(--green); font-size: 0.65em; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; }
  .echo-sentence {
    font-size: 15px; text-align: center; max-width: 500px; line-height: 1.8;
    padding: 20px 24px; background: rgba(255,255,255,0.04); border-radius: var(--r);
    border: 1px solid var(--glass-border); min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .echo-sentence .nl { color: var(--text); font-weight: 500; }
  .echo-sentence .zh { color: var(--dim); font-size: 13px; margin-top: 8px; }
  .echo-progress-ring { width: 120px; height: 120px; position: relative; }
  .echo-progress-ring svg { transform: rotate(-90deg); }
  .echo-progress-ring circle { fill: none; stroke-width: 3; }
  .echo-ring-bg { stroke: rgba(255,255,255,0.06); }
  .echo-ring-fg { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
  .echo-ring-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2em; font-weight: 800; }
  .echo-controls { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; width: 100%; max-width: 360px; }
  .echo-row { display: flex; gap: 6px; justify-content: center; }
  .echo-ctrl {
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.2s; text-align: center;
  }
  .echo-ctrl:active { transform: scale(0.95); }
  .echo-ctrl.primary { background: var(--green); color: #000; font-weight: 800; border: none; box-shadow: 0 4px 16px rgba(52,211,153,0.3); }
  .echo-actions { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
  .echo-action { background: none; border: 1px solid var(--glass-border); color: var(--dim); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .echo-action:active { transform: scale(0.95); color: var(--text); }
  .echo-settings { display: flex; gap: 14px; align-items: center; color: var(--dim); font-size: 12px; margin-top: 10px; font-weight: 500; }
  .echo-settings label { display: flex; align-items: center; gap: 6px; }
  .echo-settings input[type=range] { width: 50px; accent-color: var(--green); }
  .echo-counter { color: var(--dim); font-size: 12px; font-weight: 600; }

  /* AI Explain panel — bottom sheet */
  .explain-backdrop {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 149;
  }
  .explain-backdrop.open { display: block; }
  .explain-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-solid, #14142a); border-top: none;
    border-radius: 20px 20px 0 0;
    padding: 12px 20px 20px; padding-bottom: max(20px, env(safe-area-inset-bottom));
    z-index: 150; max-height: 55vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .explain-panel.open { transform: translateY(0); }
  .explain-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 12px; }
  [data-theme="light"] .explain-handle { background: rgba(0,0,0,0.15); }
  [data-theme="light"] .explain-panel { background: #fff; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
  .explain-close { position: absolute; top: 8px; right: 12px; background: none; border: none; color: var(--muted); font-size: 1.2em; cursor: pointer; }
  .explain-original { font-size: 1.05em; font-weight: 600; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #333; }
  [data-theme="light"] .explain-original { border-bottom-color: #ddd; }
  .explain-loading { color: var(--muted); font-size: 0.9em; }
  .explain-content { font-size: 0.9em; line-height: 1.8; }
  .explain-content h4 { color: var(--accent); font-size: 0.85em; margin-top: 10px; margin-bottom: 4px; }
  .explain-content .word-item { display: inline-block; background: rgba(78,204,163,0.1); border: 1px solid rgba(78,204,163,0.3); padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 0.85em; }
  .explain-content .pron-tip { background: rgba(245,166,35,0.1); border-left: 3px solid var(--orange); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0; font-size: 0.85em; }
  .explain-content .grammar-note { background: rgba(91,155,213,0.1); border-left: 3px solid var(--blue, #5b9bd5); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0; font-size: 0.85em; }
  .explain-btn { background: none; border: 1px solid #444; color: var(--muted); font-size: 0.7em; padding: 2px 6px; border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .dialogue-line:hover .explain-btn { opacity: 0.6; }
  .explain-btn:hover { opacity: 1 !important; border-color: var(--blue, #5b9bd5); color: var(--blue, #5b9bd5); }

  /* API key modal */
  .apikey-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
  .apikey-modal.open { display: flex; }
  .apikey-box { background: var(--card); border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; }
  .apikey-box h3 { margin-bottom: 8px; font-size: 1em; }

  /* Difficulty badge */

  /* Light theme overrides */

  [data-theme="light"] .echo-sentence { background: #f0eeea; border-color: #ddd; }
  [data-theme="light"] .echo-ctrl { background: #f0eeea; border-color: #ccc; }
  [data-theme="light"] .conn { background: #e8e6e0; border-color: #ccc; }

  /* Bookmark */

  /* Back button */
  .back-btn { position: fixed; top: 10px; left: 10px; background: var(--card); border: 1px solid #333; color: var(--text); padding: 6px 14px; border-radius: 8px; font-size: 0.85em; z-index: 50; text-decoration: none; transition: all 0.2s; }
  .back-btn:hover { border-color: var(--accent); }
  [data-theme="light"] .back-btn { background: #fff; border-color: #ccc; }

  /* Theme toggle */
  .theme-toggle { position: fixed; top: 10px; right: 10px; background: var(--card); border: 1px solid #333; color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.1em; z-index: 50; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }

  /* Progress bar in header */
  .progress-summary { display: flex; gap: 8px; align-items: center; margin-top: 6px; font-size: 0.75em; color: var(--muted); }
  .progress-summary .bar { flex: 1; height: 4px; background: #333; border-radius: 2px; overflow: hidden; max-width: 200px; }
  [data-theme="light"] .progress-summary .bar { background: #ddd; }

  /* Bookmarks tab */
  .bookmark-list { padding: 8px 0; }
  .bookmark-item { padding: 6px 12px; cursor: pointer; font-size: 0.85em; border-radius: 6px; transition: background 0.2s; display: flex; gap: 8px; align-items: center; }
  .bookmark-item:hover { background: rgba(255,255,255,0.05); }
  [data-theme="light"] .bookmark-item:hover { background: rgba(0,0,0,0.05); }
  .bookmark-item .bk-time { color: var(--muted); font-size: 0.8em; white-space: nowrap; }
  .bookmark-item .bk-text { flex: 1; }
  .bookmark-item .bk-remove { color: #555; cursor: pointer; font-size: 0.7em; opacity: 0; }
  .bookmark-item:hover .bk-remove { opacity: 1; }

  /* Spreken exam trainer */
  .spreken-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:185; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    overflow-y:auto;
  }
  .spreken-overlay.active { display:flex; }
  .spreken-header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; }
  .spreken-header .sq-num { font-size:14px; font-weight:700; color:var(--blue); }
  .spreken-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .spreken-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center; padding:10px; }
  .spreken-question { font-size:17px; font-weight:600; line-height:1.8; max-width:500px; padding:20px 24px; background:var(--card); border:1px solid var(--glass-border); border-radius:16px; }
  .spreken-question .q-zh { color:var(--dim); font-size:13px; margin-top:8px; }
  .spreken-timer-ring { width:100px; height:100px; position:relative; }
  .spreken-timer-ring svg { transform:rotate(-90deg); }
  .spreken-timer-ring circle { fill:none; stroke-width:4; }
  .spreken-timer-bg { stroke:rgba(255,255,255,0.06); }
  .spreken-timer-fg { stroke:var(--blue); stroke-linecap:round; transition:stroke-dashoffset 0.2s; }
  .spreken-timer-label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:24px; font-weight:800; }
  .spreken-rec-indicator { color:var(--accent); font-size:13px; font-weight:600; }
  .spreken-answer { width:100%; max-width:500px; padding:16px; background:var(--card); border:1px solid var(--glass-border); border-radius:12px; text-align:left; font-size:14px; line-height:1.7; }
  .spreken-answer h4 { color:var(--green); margin-bottom:6px; font-size:13px; }
  .spreken-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .spreken-btn { background:var(--card); border:1px solid var(--glass-border); color:var(--text); padding:10px 18px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .spreken-btn:active { transform:scale(0.95); }
  .spreken-btn.primary { background:var(--blue); color:#fff; border:none; }
  .spreken-phase { font-size:14px; color:var(--muted); font-weight:600; }

  /* Screen wake lock indicator */
  .wake-lock-btn { position: fixed; top: 10px; right: 52px; background: var(--card); border: 1px solid var(--glass-border); color: var(--dim); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 14px; z-index: 50; display: flex; align-items: center; justify-content: center; }
  .wake-lock-btn.active { color: var(--green); border-color: var(--green); }

  /* Smooth page transitions */
  .container { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Exam simulation mode */
  .exam-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:180; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }
  .exam-overlay.active { display:flex; }
  .exam-header { display:flex; justify-content:space-between; align-items:center; padding:16px 0; }
  .exam-header .timer { font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--accent); }
  .exam-header .eq-count { font-size:13px; color:var(--muted); font-weight:600; }
  .exam-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .exam-question {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:24px; padding:20px;
  }
  .exam-sentence { font-size:18px; font-weight:600; line-height:1.8; max-width:500px;
    padding:24px; background:var(--card); border:1px solid var(--glass-border);
    border-radius:16px; }
  .exam-instruction { font-size:13px; color:var(--muted); }
  .exam-rec-btn {
    width:80px; height:80px; border-radius:50%; border:none; font-size:28px;
    cursor:pointer; transition:all 0.2s;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; box-shadow:0 4px 20px rgba(255,59,92,0.4);
  }
  .exam-rec-btn:active { transform:scale(0.9); }
  .exam-rec-btn.recording { background:var(--accent); animation:recPulse 0.8s infinite; }
  .exam-actions { display:flex; gap:10px; }
  .exam-action { background:var(--card); border:1px solid var(--glass-border); color:var(--text);
    padding:10px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .exam-action:active { transform:scale(0.95); }
  .exam-action.primary { background:var(--green); color:#000; border:none; }
  .exam-result { text-align:center; padding:20px; }
  .exam-result .big { font-size:48px; font-weight:900; margin-bottom:8px; }
  .exam-result .big.good { color:var(--green); }
  .exam-result .big.ok { color:var(--orange); }
  .exam-result .big.bad { color:var(--accent); }
  .exam-result-list { text-align:left; max-height:40vh; overflow-y:auto; margin-top:16px; }
  .exam-result-item { padding:10px 12px; border-radius:10px; margin-bottom:6px; background:var(--card); border:1px solid var(--glass-border); font-size:13px; }
  .exam-result-item .eri-score { font-weight:700; margin-right:8px; }

  /* Connected-speech trap notebook */
  .trap-btn { background:none; border:none; cursor:pointer; font-size:15px; opacity:0; transition:opacity .15s; }
  .dialogue-line:hover .trap-btn { opacity:0.5; }
  .trap-btn.trapped { opacity:1 !important; filter:drop-shadow(0 0 4px var(--orange)); }
  .trap-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:185; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }
  .trap-overlay.active { display:flex; }
  .trap-header { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:16px 0; }
  .trap-header h2 { font-size:17px; font-weight:800; flex:1; }
  .trap-header .th-due { font-size:13px; color:var(--orange); font-weight:700; }
  .trap-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .trap-body { flex:1; overflow-y:auto; padding-bottom:20px; }
  .trap-empty { text-align:center; padding:40px 20px; color:var(--muted); line-height:1.7; }
  .trap-empty .big { font-size:2.4em; margin-bottom:10px; }
  .trap-list-item { display:flex; align-items:center; gap:10px; padding:12px; background:var(--card); border:1px solid var(--glass-border); border-radius:12px; margin-bottom:8px; }
  .tli-text { flex:1; font-size:14px; line-height:1.5; }
  .tli-meta { font-size:11px; color:var(--muted); margin-top:3px; }
  .tli-x { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; flex-shrink:0; }
  .trap-start { width:100%; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,var(--orange),var(--accent)); color:#fff; font-size:16px; font-weight:800; cursor:pointer; margin:6px 0 18px; }
  .trap-start:active { transform:scale(0.98); }
  .trap-start:disabled { opacity:0.45; cursor:default; filter:grayscale(0.5); }
  .trap-drill { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:22px; padding:20px 0; }
  .td-prompt { font-size:13px; color:var(--muted); letter-spacing:0.5px; }
  .td-replay { width:90px; height:90px; border-radius:50%; border:none; font-size:34px; cursor:pointer; color:#fff; background:linear-gradient(135deg,var(--orange),var(--accent)); box-shadow:0 4px 24px rgba(251,146,60,0.4); }
  .td-replay:active { transform:scale(0.92); }
  .td-loopbadge { font-size:12px; color:var(--orange); font-weight:700; min-height:1em; }
  .td-answer { font-size:18px; font-weight:600; line-height:1.7; max-width:520px; padding:20px; background:var(--card); border:1px solid var(--glass-border); border-radius:16px; transition:filter .25s; }
  .td-answer.hidden { filter:blur(10px); user-select:none; }
  .td-answer .zh { display:block; font-size:13px; color:var(--muted); margin-top:8px; font-weight:400; }
  .td-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .td-btn, .td-reveal { padding:12px 22px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; border:1px solid var(--glass-border); background:var(--card); color:var(--text); }
  .td-btn:active, .td-reveal:active { transform:scale(0.95); }
  .td-btn.again { border-color:var(--accent); color:var(--accent); }
  .td-btn.got { background:var(--green); color:#000; border:none; }

  /* Daily challenge */
  .daily-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:175; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }
  .daily-overlay.active { display:flex; }
  .daily-header { text-align:center; padding:20px 0; }
  .daily-header .flame { font-size:48px; margin-bottom:8px; }
  .daily-header h2 { font-size:20px; font-weight:800; margin-bottom:4px; }
  .daily-header .streak { color:var(--orange); font-size:14px; font-weight:700; }
  .daily-progress { display:flex; gap:6px; justify-content:center; margin:12px 0; }
  .daily-dot { width:12px; height:12px; border-radius:50%; background:var(--glass-border); transition:all 0.3s; }
  .daily-dot.done { background:var(--green); }
  .daily-dot.current { background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .daily-card {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; padding:20px; text-align:center;
  }
  .daily-sentence { font-size:17px; font-weight:600; line-height:1.8; max-width:480px;
    padding:20px 24px; background:var(--card); border:1px solid var(--glass-border);
    border-radius:16px; }
  .daily-translation { font-size:13px; color:var(--dim); margin-top:6px; }
  .daily-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .daily-btn { background:var(--card); border:1px solid var(--glass-border); color:var(--text);
    padding:10px 18px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .daily-btn:active { transform:scale(0.95); }
  .daily-btn.primary { background:var(--green); color:#000; border:none; }
  .daily-complete { text-align:center; padding:40px; }
  .daily-complete .big-emoji { font-size:64px; margin-bottom:16px; }
  .daily-complete h2 { font-size:22px; font-weight:800; margin-bottom:8px; }

  /* Touch-friendly: bigger tap targets on mobile */
  @media (max-width: 600px) {
    .controls { gap: 6px; }
    .ctrl-btn { padding: 8px 12px; font-size: 0.85em; }
    .speed-control { margin-left: 0; width: 100%; justify-content: center; margin-top: 4px; }
    .echo-controls { flex-wrap: wrap; justify-content: center; }

  }
</style>

<body>
<button class="wake-lock-btn" id="wake-btn" onclick="toggleWakeLock()" title="螢幕常亮">☀️</button>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="container">
  <!-- Compact top bar -->
  <header>
    <a href="../../index.html" style="color:var(--muted);text-decoration:none;font-size:13px;font-weight:600">← 返回</a>
    <h1>荷蘭文 A2 luisteren 模擬考三（真實做題版）</h1>
    <a href="exam.html" id="exam-link" style="display:none;padding:6px 12px;background:#9f1239;color:#fff;border-radius:6px;font-size:13px;text-decoration:none;font-weight:600;white-space:nowrap">📝 模擬考冊 →</a>
  </header>
  <script>
    // Show "go to exam.html" button only for videos that have one (mocks 1/2/3...)
    (function(){
      const HAS_EXAM = ['_iC1Pooi2UA','AMVy2zPNLso','mock3_a2_2026'];
      const path = window.location.pathname;
      if (HAS_EXAM.some(id => path.includes('/' + id + '/'))) {
        document.getElementById('exam-link').style.display = 'inline-block';
      }
    })();
  </script>

  <!-- Mini player -->
  <div class="player-box">
    <div class="mini-player-row">
      <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <div class="progress-container" id="progress-container" style="flex:1">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="ab-marker a-marker" id="a-marker" style="display:none"></div>
        <div class="ab-marker b-marker" id="b-marker" style="display:none"></div>
        <div class="ab-region" id="ab-region" style="display:none"></div>
        <div class="time-display" id="time-display">0:00 / 0:00</div>
      </div>
      <div class="speed-control">
        <button class="speed-btn" data-spd="0.6" onclick="setSpeed(0.6)">0.6×</button>
        <button class="speed-btn" data-spd="0.75" onclick="setSpeed(0.75)">0.75×</button>
        <button class="speed-btn" data-spd="0.85" onclick="setSpeed(0.85)">0.85×</button>
        <button class="speed-btn active" data-spd="1" onclick="setSpeed(1.0)">1×</button>
        <button class="speed-btn" data-spd="1.15" onclick="setSpeed(1.15)">1.15×</button>
      </div>
    </div>
    <!-- Collapsible controls -->
    <div class="extra-controls" id="extra-controls" style="display:none">
      <div class="controls">

        <button class="ctrl-btn" id="set-b-btn" onclick="setB()">B</button>

        <button class="ctrl-btn" onclick="clearAB()">✕</button>
        <button class="ctrl-btn" onclick="skipBack()">-3s</button>
        <span style="font-size:11px;color:var(--dim);margin-left:4px">A:<span id="a-time">—</span> B:<span id="b-time">—</span> 🔁<span id="loop-count">0</span></span>
      </div>
    </div>
    <div class="player-actions">

      <button class="pa-btn" onclick="prevSentence()">⏮</button>
      <button class="pa-btn" onclick="nextSentence()">⏭</button>
      <span id="progress-text" style="font-size:10px;color:var(--dim);margin-left:auto;font-weight:600">0/0</span>
    </div>
  </div>
  <div class="progress-summary" id="progress-summary" style="display:none">
    <div class="bar"><div class="bar-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dialogue')">📖 對話</button>
    <button class="tab" onclick="switchTab('bookmarks')">🔖 書籤 <span id="bookmark-count"></span></button>
    <button class="tab" onclick="switchTab('review')">🔄 複習</button>
    <button class="tab" onclick="switchTab('quiz')">📝 測驗</button>
    <button class="tab" onclick="switchTab('vocab')">📚 詞彙</button>

anslation": "嘿，Johan。", "analysis": {"words_hard": [{"nl": "Johan", "zh": "人名", "level": "A1"}], "frame": "Hé, Johan. | 嘿，Johan", "stressed": ["Hé"], "reductions": [], "trap": "人名在聽力中要注意辨識"}}, {"start": 69.96, "end": 71.86, "text": "Ken jij nog iemand die hier wil komen werken?", "translation": "你還認識想來這裡工作的人嗎？", "analysis": {"words_hard": [{"nl": "Ken", "zh": "認識", "level": "A2"}, {"nl": "jij", "zh": "你", "level": "A2"}, {"nl": "werken", "zh": "工作", "level": "A2"}], "frame": "Ken jij nog iemand die hier wil komen werken? | 你還認識有人想在這裡工作嗎", "stressed": ["jij", "werken"], "reductions": [], "trap": "jij 與 jij 的強調要清楚，句中問句很常見"}}, {"start": 72.86, "end": 73.42, "text": "Wat voor iemand?", "translation": "是什麼樣的人？", "analysis": {"words_hard": [{"nl": "Wat", "zh": "什麼", "level": "A1"}], "frame": "Wat voor iemand? | 什麼樣的人？", "stressed": ["Wat"], "reductions": [], "trap": null}}, {"start": 74.1, "end": 76.7, "text": "Nou ja, oud of jong. Maakt niet uit.", "translation": "嗯，老的或年輕的都可以，沒關係。", "analysis": {"words_hard": [{"nl": "oud", "zh": "年長的", "level": "A2"}], "frame": "Nou ja, oud of jong. Maakt niet uit. | 也好，老的或年輕的。無所謂", "stressed": ["oud", "jongen", "Maakt"], "reductions": [], "trap": "Maakt niet uit 表示沒有偏好"}}, {"start": 77.7, "end": 79.62, "text": "En hij hoeft ook geen ervaring te hebben.", "translation": "而且他也不需要有經驗。", "analysis": {"words_hard": [{"nl": "ervaring", "zh": "經驗", "level": "A2"}], "frame": "En hij hoeft ook geen ervaring te hebben. | 他也不需要經驗", "stressed": ["ervaring"], "reductions": [], "trap": null}}, {"start": 79.62, "end": 80.84, "text": "Maar hij is wel een goed student.", "translation": "但他必須是一個好學生。", "analysis": {"words_hard": [{"nl": "goede", "zh": "好、優秀的", "level": "A2"}, {"nl": "student", "zh": "學生", "level": "A2"}], "frame": "Maar hij is wel een goed student. | 但他確實是個好學生", "stressed": ["wel", "goede"], "reductions": [], "trap": null}}, {"start": 80.44, "end": 81.9, "text": "Iemand die vroeg op kan staan.", "translation": "要能早起的人。", "analysis": {"words_hard": [{"nl": "Iemand", "zh": "某人", "level": "A2"}], "frame": "Iemand die vroeg op kan staan. | 能早起的某人", "stressed": ["Iemand", "vroeg"], "reductions": [], "trap": "Iemand 是泛指，注意語境"}}, {"start": 82.76, "end": 85.74, "text": "Nou, mijn neef Lars misschien. Hoe vroeg moet hij dan beginnen?", "translation": "嗯，我的表弟拉斯也許吧。他要幾點開始呢？", "analysis": {"words_hard": [{"nl": "neef", "zh": "表兄弟/表姊妹", "level": "A2"}, {"nl": "waarschijnlijk", "zh": "大概，可能", "level": "A2"}], "frame": "Hoe vroeg ... hij dan beginnen? | 問某人需要多早開始", "stressed": ["nou", "beginnen"], "reductions": [], "trap": null}}, {"start": 86.4, "end": 88.62, "text": "Nou ja, ik begin altijd al om vijf uur.", "translation": "嗯，我總是五點就開始。", "analysis": {"words_hard": [{"nl": "begin", "zh": "開始", "level": "A2"}, {"nl": "veel", "zh": "常常，總是", "level": "A2"}], "frame": "Nou ja, ik begin altijd al om ... | 說明固定習慣", "stressed": ["altijd", "om 5 uur"], "reductions": [], "trap": null}}, {"start": 89.14, "end": 90.84, "text": "Maar dat hoeft Lars nog niet, hoor.", "translation": "不過拉斯還不需要這麼早啦。", "analysis": {"words_hard": [{"nl": "hoeven", "zh": "不必，無需", "level": "A2"}], "frame": "Maar dat hoeft Lars nog niet, hoor | 表示尚未需要", "stressed": ["nog", "niet"], "reductions": [], "trap": null}}, {"start": 91.44, "end": 92.54, "text": "Hij moet dan om zes uur.", "translation": "他要六點開始。", "analysis": {"words_hard": [{"nl": "moet", "zh": "必須", "level": "A2"}], "frame": "Hij moet dan om ... | 記錄必須的時間", "stressed": ["moet", "om zes uur"], "reductions": [], "trap": null}}, {"start": 93.86, "end": 96.86, "text": "En dan is hij rond twaalf uur klaar.", "translation": "然後他大約十二點就會結束。", "analysis": {"words_hard": [{"nl": "klaar", "zh": "完成，準備好", "level": "A2"}], "frame": "En dan is hij rond ... klaar | 表示完成到某時間點", "stressed": ["rond twaalf uur", "klaar"], "reductions": [], "trap": null}}, {"start": 97.58, "end": 99.34, "text": "Of heel soms om één uur.", "translation": "有時候會到一點。", "analysis": {"words_hard": [{"nl": "soms", "zh": "有時候", "level": "A2"}, {"nl": "één", "zh": "一點鐘", "level": "A2"}], "frame": "Of heel soms om ... | 表示偶爾在某時間", "stressed": ["om één uur"], "reductions": [], "trap": null}}, {"start": 100.42, "end": 101.52, "text": "Ik zal hem eens vragen.", "translation": "我去問問他。", "analysis": {"words_hard": [{"nl": "vraag", "zh": "問，請求", "level": "A2"}, {"nl": "eens", "zh": "一次", "level": "A2"}], "frame": "Ik zal hem eens vragen | 我會試著問他", "stressed": ["eens"], "reductions": [], "trap": null}}, {"start": 102.46, "end": 104.28, "text": "Laat hem maar even bellen naar Esther.", "translation": "讓他打電話給艾絲特吧。", "analysis": {"words_hard": [{"nl": "laten", "zh": "讓、讓他...", "level": "A2"}, {"nl": "bellen", "zh": "打電話", "level": "A2"}], "frame": "Laat hem maar even bellen naar ... | 讓他打電話給某人", "stressed": ["even", "bellen"], "reductions": [], "trap": null}}, {"start": 114.66, "end": 116.14, "text": "Olaf, mag ik iets vragen?", "translation": "奧拉夫，我可以問你一件事嗎？", "analysis": {"words_hard": [{"nl": "mag", "zh": "可以，能", "level": "A2"}, {"nl": "iets", "zh": "某事", "level": "A2"}], "frame": "Olaf, mag ik iets vragen? | 請求 permission", "stressed": ["mag", "iets"], "reductions": [], "trap": null}}, {"start": 116.9, "end": 117.56, "text": "Natuurlijk.", "translation": "當然可以。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 118.6, "end": 122.88, "text": "Volgende les, maandag, moeten we die opdracht inleveren.", "translation": "下次課程，星期一，我們要交那個作業。", "analysis": {"words_hard": [{"nl": "volgende", "zh": "下次的，下周的", "level": "A2"}, {"nl": "les", "zh": "課程", "level": "A2"}, {"nl": "inleveren", "zh": "交上，提交", "level": "A2"}], "frame": "Volgende les, maandag, moeten we die opdracht inleveren. | 下一節課（週一）要把作業交上", "stressed": ["volgende", "inleveren"], "reductions": [], "trap": null}}, {"start": 123.5, "end": 126.08, "text": "Maar ik ga dit weekend weg, dus dat lukt me niet.", "translation": "不過我這個週末要出門，所以我來不及。", "analysis": {"words_hard": [{"nl": "weekend", "zh": "週末", "level": "A2"}, {"nl": "lukken", "zh": "成功", "level": "A2"}], "frame": "Maar ik ga dit weekend weg, dus dat lukt me niet. | 這週末我要離開，這就做不到", "stressed": ["weekend", "niet"], "reductions": [], "trap": null}}, {"start": 126.7, "end": 128.96, "text": "Mag ik de opdracht ook vrijdag inleveren?", "translation": "我可以星期五交作業嗎？", "analysis": {"words_hard": [{"nl": "op", "zh": "在（時間）", "level": "A2"}, {"nl": "inleveren", "zh": "交上", "level": "A2"}], "frame": "Mag ik de opdracht ook vrijdag inleveren? | 我可以週五也把作業交上嗎", "stressed": ["inleveren", "vrijdag"], "reductions": [], "trap": null}}, {"start": 129.88, "end": 131.48, "text": "Dat is wel wat laat.", "translation": "這樣有點晚喔。", "analysis": {"words_hard": [{"nl": "laat", "zh": "晚", "level": "A2"}, {"nl": "wel", "zh": "還是", "level": "A2"}], "frame": "Dat is wel wat laat | 那有點晚", "stressed": ["laat", "wel"], "reductions": [], "trap": null}}, {"start": 132.56, "end": 133.4, "text": "Woensdag anders?", "translation": "星期三怎麼樣？", "analysis": {"words_hard": [{"nl": "woensdag", "zh": "星期三", "level": "A2"}], "frame": "Woensdag anders? | 星期三要不然呢", "stressed": ["Woensdag"], "reductions": [], "trap": null}}, {"start": 135.06, "end": 136.48, "text": "Ja, dat lukt ook wel.", "translation": "嗯，這樣也可以。", "analysis": {"words_hard": [{"nl": "lukt", "zh": "成功/行得通", "level": "A2"}], "frame": "Ja ... ook wel. | 反应＋肯定的程度", "stressed": ["wel"], "reductions": [], "trap": "wel 常与 lukt 搭配表示勉强可以"}}, {"start": 137.08, "end": 137.98, "text": "Oké, mooi.", "translation": "好的，太好了。", "analysis": {"words_hard": [], "frame": "Oké, mooi. | 表示同意/滿意的簡短回應", "stressed": ["Oké", "mooi"], "reductions": [], "trap": null}}, {"start": 138.56, "end": 140.64, "text": "Wil je de opdracht dan mailen?", "translation": "那你可以把作業寄給我嗎？", "analysis": {"words_hard": [{"nl": "opdracht", "zh": "作業/任務", "level": "A2"}, {"nl": "mailen", "zh": "寄信", "level": "A2"}], "frame": "Wil je de ... dan ...? | 要不要把 ... 发邮件", "stressed": ["dan"], "reductions": [], "trap": "dan 常作條件/結果連接，后面通常是動作的選擇"}}, {"start": 141.88, "end": 143.16, "text": "Op woensdag werk ik thuis.", "translation": "星期三我在家工作。", "analysis": {"words_hard": [], "frame": "Op woensdag werk ik thuis. | 我在禮拜三在家工作", "stressed": ["woensdag"], "reductions": [], "trap": null}}, {"start": 144.26, "end": 146.7, "text": "Ik kan hem dus niet op school uit mijn postvakje halen.", "translation": "所以我不能在學校從我的郵箱拿到。", "analysis": {"words_hard": [{"nl": "postvakje", "zh": "信箱格", "level": "A2"}], "frame": "Ik kan hem dus niet op school uit mijn postvakje halen. | 我因此不能在學校從我的信箱拿出來", "stressed": ["dus"], "reductions": [], "trap": "dus 表示因果或因此的原因與結果連接"}}, {"start": 147.46, "end": 149.92, "text": "En met de post naar mijn huis sturen duurt wel lang.", "translation": "而且寄到我家也要花很久。", "analysis": {"words_hard": [{"nl": "post", "zh": "郵件/信件", "level": "A2"}], "frame": "En met de post naar mijn huis sturen duurt wel lang. | 寄信到家裡通常時間長", "stressed": ["duurt wel lang"], "reductions": [], "trap": "duurt wel lang 表示時間感延長，注意 wel 強化語氣"}}, {"start": 152.7, "end": 153.2, "text": "Oké.", "translation": "好的。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 159.92, "end": 162.64, "text": "Welkom bij voicemail van Teleworks.", "translation": "歡迎來到Teleworks的語音信箱。", "analysis": {"words_hard": [{"nl": "voicemail", "zh": "語音信箱", "level": "A2"}], "frame": "Welkom bij voicemail van Teleworks. | 歡迎致電 Teleworks 的語音信箱", "stressed": ["Welkom"], "reductions": [], "trap": null}}, {"start": 163.48, "end": 165.72, "text": "U heeft één nieuw bericht.", "translation": "您有一條新消息。", "analysis": {"words_hard": [{"nl": "bericht", "zh": "訊息", "level": "A2"}], "frame": "U heeft één nieuw bericht. | 您有一則新訊息", "stressed": ["één", "nieuw"], "reductions": [], "trap": "nieuwe 訊息常在通知語境出現，注意数字 één 與 nieuw 的重音"}}, {"start": 167.76, "end": 169.78, "text": "Hoi, Shanti, met George.", "translation": "嗨，香蒂，我是喬治。", "analysis": {"words_hard": [{"nl": "Shanti", "zh": "人名不列入", "level": "A2"}], "frame": "", "stressed": [], "reductions": [], "trap": "無明顯觸發點，直接聽即可"}}, {"start": 171.44, "end": 173.52, "text": "Morgen is toch die bijeenkomst in Amsterdam?", "translation": "明天不是在阿姆斯特丹有那個會議嗎？", "analysis": {"words_hard": [{"nl": "bijeenkomst", "zh": "聚會/會議", "level": "A2"}], "frame": "Morgen is toch die bijeenkomst in Amsterdam? | 明天在阿姆斯特丹的那個聚會？", "stressed": ["morgen", "toch"], "reductions": [], "trap": "morgen 是未來時間，toch 表示語氣上的肯定與確認"}}, {"start": 174.76, "end": 176.94, "text": "Ik zou je nog bellen over het samenreizen.", "translation": "我還想打電話跟你聊聊一起搭車的事。", "analysis": {"words_hard": [{"nl": "samenreizen", "zh": "同車/共乘", "level": "A2"}], "frame": "Ik zou je nog bellen over het samenreizen. | 我還會打電話給你討論共乘", "stressed": ["nog", "samenreizen"], "reductions": [], "trap": "nog 表示未完成的意向； samenreizen 是合併動詞"}}, {"start": 178.5, "end": 180.76, "text": "Mijn kaart voor het openbaar vervoer heb ik niet meer.", "translation": "我已經沒有公共交通的票了。", "analysis": {"words_hard": [{"nl": "kaart", "zh": "票/卡", "level": "A2"}], "frame": "Mijn kaart voor het openbaar vervoer heb ik niet meer. | 我不再有公交通行卡", "stressed": ["kaart"], "reductions": [], "trap": null}}, {"start": 181.06, "end": 183.06, "text": "En zonder kaart kan ik niet met de trein reizen.", "translation": "沒有票我就不能搭火車。", "analysis": {"words_hard": [{"nl": "zonder", "zh": "沒有", "level": "A2"}], "frame": "En zonder kaart kan ik niet met de trein reizen. | 沒有卡就不能搭火車", "stressed": ["zonder", "kan"], "reductions": [], "trap": "zonder 表示缺乏，後面的 kan 是能力或允許的否定"}}, {"start": 183.88, "end": 186.16, "text": "Maar we kunnen wel met de auto van het werk.", "translation": "不過我們可以用公司的車。", "analysis": {"words_hard": [{"nl": "werken", "zh": "工作", "level": "A2"}], "frame": "Maar we kunnen wel met de auto van het werk. | 但我們可以用公司提供的車子去/自公司車", "stressed": ["wel"], "reductions": [], "trap": "wel 常與 maar 形成對比/轉折"}}, {"start": 187.74, "end": 189.78, "text": "De bijeenkomst begint om acht uur.", "translation": "會議八點開始。", "analysis": {"words_hard": [], "frame": "om ... uur | 時間表達：幾點開始", "stressed": ["acht"], "reductions": [], "trap": null}}, {"start": 191.22, "end": 195.68, "text": "Ik haal je om half zes bij jou thuis op.", "translation": "我六點半在你家接你。", "analysis": {"words_hard": [{"nl": "ophalen", "zh": "接人", "level": "A2"}], "frame": "Ik haal je om ... bij jou thuis op | 我要在...接你", "stressed": ["half zes"], "reductions": [{"written": "haal je", "spoken": "haalje"}], "trap": "half zes = 5:30 不是 6:30！half + 數字 = 該數字前的半小時"}}, {"start": 196.56, "end": 201.24, "text": "Dat is misschien wel vroeg, maar dan hebben we genoeg tijd om de auto te parkeren.", "translation": "這也許有點早，不過這樣我們有足夠的時間停車。", "analysis": {"words_hard": [{"nl": "toch", "zh": "仍然", "level": "A2"}], "frame": "Dat is ... wel ... , maar dan hebben we ... | 轉折＋條件情況", "stressed": ["wel", "maar"], "reductions": [], "trap": "wel 在這裡強調對比，後面才是關鍵"}}, {"start": 202.18, "end": 203.58, "text": "Het kan soms zo druk zijn.", "translation": "有時候真的會很忙。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 206.8, "end": 208.12, "text": "Dat was het, geloof ik.", "translation": "我想就這樣吧。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 208.94, "end": 213.72, "text": "Oh ja, wil je nog even een berichtje sturen met je straat- en huisnummer?", "translation": "喔對，能不能再發個訊息給我你的街道和門牌號碼？", "analysis": {"words_hard": [{"nl": "berichtje", "zh": "簡訊", "level": "A2"}], "frame": "Oh ja, wil je nog even een berichtje sturen met ...? | 需要再發簡訊", "stressed": ["berichtje"], "reductions": [], "trap": "Niets"}}, {"start": 214.68, "end": 216.48, "text": "Ik weet het niet meer zo precies.", "translation": "我有點不太記得了。", "analysis": {"words_hard": [{"nl": "precies", "zh": "精確的", "level": "A2"}], "frame": "Ik weet het niet meer zo ... | 不太確定", "stressed": ["niet"], "reductions": [], "trap": "niet + meer 可能混淆"}}, {"start": 218.04, "end": 218.72, "text": "Ik lees het wel.", "translation": "我會看一下的。", "analysis": {"words_hard": [{"nl": "lees", "zh": "讀/看", "level": "A2"}], "frame": "Ik lees het wel | 我會看看/讀一下", "stressed": ["lees"], "reductions": [], "trap": null}}, {"start": 220.36, "end": 220.74, "text": "Dag.", "translation": "掰掰。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 227.74, "end": 229.84, "text": "Lees eerst de vraag.", "translation": "先讀一下問題。", "analysis": {"words_hard": [{"nl": "vraag", "zh": "問題", "level": "A2"}], "frame": "Lees eerst de vraag | 先讀問題", "stressed": ["vraag"], "reductions": [], "trap": null}}, {"start": 233.26, "end": 234.14, "text": "Mevrouw. Ja.", "translation": "女士。對。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 234.98, "end": 236.14, "text": "Mag ik iets vragen? Natuurlijk.", "translation": "我可以問一下嗎？當然可以。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 236.84, "end": 238.14, "text": "Waar zijn de...", "translation": "...在哪裡？", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 243.6, "end": 244.9, "text": "Mevrouw. Ja.", "translation": "女士。對。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 245.72, "end": 246.94, "text": "Mag ik iets vragen? Natuurlijk.", "translation": "我可以問一下嗎？當然可以。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 248.1, "end": 249.3, "text": "Waar zijn de paskamers?", "translation": "試衣間在哪裡？", "analysis": {"words_hard": [], "frame": "Waar ...? | 要問位置/場所", "stressed": ["waar"], "reductions": [], "trap": null}}, {"start": 249.78, "end": 252.52, "text": "De paskamers zijn daar, tegenover de kassa.", "translation": "試衣間在那邊，對著收銀台。", "analysis": {"words_hard": [], "frame": "De paskamers zijn daar, tegenover de kassa. | 對面/位置描述", "stressed": ["daar", "tegenover"], "reductions": [], "trap": null}}, {"start": 252.38, "end": 254.32, "text": "Oh ja, dank u.", "translation": "喔，謝謝你。", "analysis": {"words_hard": [{"nl": "dank u", "zh": "謝謝您", "level": "A2"}], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 254.28, "end": 257.88, "text": "Oh, en als de broek niet past, dan roept u mij maar.", "translation": "喔，如果褲子不合適，就叫我一聲。", "analysis": {"words_hard": [], "frame": "Oh, en als ... niet past, dan ... mij maar. | 如果不合適就請告訴我/叫我做某事", "stressed": ["past", "maar"], "reductions": [], "trap": "maar 後面通常才是決定性的回覆/要求"}}, {"start": 257.76, "end": 259.96, "text": "Dan pak ik een andere maat voor u. Is goed.", "translation": "我會幫你拿一個其他的尺寸。好的。", "analysis": {"words_hard": [{"nl": "maat", "zh": "尺寸/號碼", "level": "A1"}], "frame": "Dan pak ik een andere maat voor u. | 換另一個尺寸", "stressed": ["Dan", "maat"], "reductions": [], "trap": null}}, {"start": 267.2, "end": 270.44, "text": "En? Lukt het?", "translation": "那怎麼樣？順利嗎？", "analysis": {"words_hard": [], "frame": "En? Lukt het? | 願不願意/成功與否的確認", "stressed": ["En", "Lukt"], "reductions": [], "trap": null}}, {"start": 270.88, "end": 271.24, "text": "Ja.", "translation": "是的。", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 274.54, "end": 276.22, "text": "Maar hij zit niet zo lekker.", "translation": "不過穿起來不太舒服。", "analysis": {"words_hard": [], "frame": "Maar hij zit niet zo lekker. | 觸感/穿著是否舒服", "stressed": ["Niet", "lekker"], "reductions": [], "trap": null}}, {"start": 279.9, "end": 281.84, "text": "Nee, hij is gewoon te groot.", "translation": "不，這就是太大了。", "analysis": {"words_hard": [], "frame": "Nee, hij is gewoon te groot. | 尺寸太大/過大", "stressed": ["te", "groot"], "reductions": [], "trap": null}}, {"start": 282.92, "end": 283.66, "text": "Welke maat is dit?", "translation": "這是什麼尺寸？", "analysis": {"words_hard": [], "frame": "Welke maat is dit? | 這個是什麼尺寸", "stressed": ["Welke"], "reductions": [], "trap": null}}, {"start": 286.24, "end": 287.2, "text": "Maat 52.", "translation": "52號。", "analysis": {"words_hard": [{"nl": "maat 52", "zh": "52號尺寸", "level": "A2"}], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 288.28, "end": 290.8, "text": "Ik zal een kleinere maat broek voor u pakken.", "translation": "我會幫你拿一條小一點的褲子。", "analysis": {"words_hard": [{"nl": "kleinere", "zh": "較小的", "level": "A2"}], "frame": "Ik zal een kleinere maat broek voor u pakken. | 拿更小的尺碼給你", "stressed": ["kleinere"], "reductions": [], "trap": null}}, {"start": 292.12, "end": 293.9, "text": "Maat 50 zou goed moeten zijn.", "translation": "50號應該就可以了。", "analysis": {"words_hard": [{"nl": "Maat 50", "zh": "50號尺寸", "level": "A2"}], "frame": "", "stressed": ["50"], "reductions": [], "trap": null}}, {"start": 293.52, "end": 297.74, "text": "Oh, en die broek kunt u zo aan mij geven.", "translation": "喔，這條褲子你可以直接給我。", "analysis": {"words_hard": [], "frame": "Oh, en die broek kunt u zo aan mij geven. | 直接給我那條褲子", "stressed": ["Oh", "gegeven"], "reductions": [], "trap": null}}, {"start": 298.26, "end": 299.3, "text": "Dan leg ik hem wel terug.", "translation": "那我就把它放回去。", "analysis": {"words_hard": [], "frame": "Dan leg ik hem wel terug. | 我就把它放回去", "stressed": ["Dan", "terug"], "reductions": [], "trap": null}}, {"start": 299.86, "end": 302.0, "text": "Oké. Oké?", "translation": "好的。好嗎？", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 309.9, "end": 312.76, "text": "Welkom bij voicemail van Teleworks.", "translation": "歡迎來到 Teleworks 的語音信箱。", "analysis": {"words_hard": [{"nl": " voicemail", "zh": "語音信箱", "level": "A2"}], "frame": "Welkom bij ... | 歡迎話語/開場招呼", "stressed": [], "reductions": [], "trap": null}}, {"start": 313.52, "end": 315.84, "text": "U heeft één nieuw bericht.", "translation": "你有一則新訊息。", "analysis": {"words_hard": [{"nl": "bericht", "zh": "訊息", "level": "A2"}], "frame": "U heeft één nieuw ... | 有一條新訊息", "stressed": [" één "], "reductions": [], "trap": null}}, {"start": 317.26, "end": 318.96, "text": "Hoi Ellen, Steve hier.", "translation": "嗨，艾倫，我是史蒂夫。", "analysis": {"words_hard": [{"nl": "Steve", "zh": "斯蒂夫（人名）", "level": "A2"}], "frame": "Hoi ..., ... hier. | 打招呼＋自我介紹", "stressed": [], "reductions": [], "trap": null}}, {"start": 320.32, "end": 321.68, "text": "Jammer dat je er vandaag niet was.", "translation": "真可惜你今天沒來。", "analysis": {"words_hard": [], "frame": "", "stressed": ["dat"], "reductions": [], "trap": "Jammer dat 你 er vandaag niet was -> 較常聽出現的結構是 'Jammer dat ...'，要注意 'dat' 後的動作或狀況"}}, {"start": 321.24, "end": 324.0, "text": "Hopelijk ben je snel weer beter.", "translation": "希望你快點好起來。", "analysis": {"words_hard": [{"nl": "hopelijk", "zh": "希望", "level": "A2"}], "frame": "Hopelijk ben je ... | 希望你快點好轉", "stressed": ["hopelijk"], "reductions": [], "trap": null}}, {"start": 325.74, "end": 327.36, "text": "Je hebt een interessante les gemist.", "translation": "你錯過了一堂有趣的課。", "analysis": {"words_hard": [{"nl": "gemist", "zh": "错过", "level": "A2"}], "frame": "Je hebt een ... les gemist | 你錯過了一節課", "stressed": ["gemist"], "reductions": [], "trap": null}}, {"start": 328.16, "end": 332.28, "text": "We hebben geleerd hoe we verschillende soorten brood voor de feestdagen kunnen maken.", "translation": "我們學了怎麼做不同種類的節日麵包。", "analysis": {"words_hard": [{"nl": "feestdagen", "zh": "節日", "level": "A2"}], "frame": "We hebben geleerd hoe we verschillende soorten brood voor de ... kunnen maken | 我們學過為節日做麵包", "stressed": [], "reductions": [], "trap": null}}, {"start": 333.46, "end": 336.08, "text": "We hebben een kerstbrood en een suikerbrood leren maken.", "translation": "我們學會了怎麼做聖誕麵包和糖麵包。", "analysis": {"words_hard": [{"nl": "kerstbrood", "zh": "聖誕麵包", "level": "A2"}], "frame": "We hebben een ... en een ... leren maken | 我們學會做聖誕麵包與糖霜麵包", "stressed": ["kerstbrood", "suikerbrood"], "reductions": [], "trap": null}}, {"start": 336.74, "end": 337.26, "text": "Echt leuk.", "translation": "真的很好玩。", "analysis": {"words_hard": [], "frame": "", "stressed": ["leuk"], "reductions": [], "trap": "Echt leuk. 常見用於簡短的正面反應，需聽出語氣"}}, {"start": 338.28, "end": 341.36, "text": "Maar ik bel om het huiswerk door te geven.", "translation": "不過我打電話來是要告訴你作業。", "analysis": {"words_hard": [{"nl": "bel", "zh": "打電話/致電", "level": "A2"}], "frame": "Maar ik bel om ... door te geven | 但我打電話是為了把作業交上去", "stressed": ["bel", "door"], "reductions": [], "trap": null}}, {"start": 343.92, "end": 347.66, "text": "Voor de toets rekenen moeten we hoofdstuk 6 leren.", "translation": "對於數學考試，我們需要學第六章。", "analysis": {"words_hard": [{"nl": "toets", "zh": "考課/測驗", "level": "A2"}], "frame": "Voor de ... rekenen moeten we hoofdstuk 6 leren | 於是數學測驗/考課需要學習第6章", "stressed": ["toets"], "reductions": [], "trap": null}}, {"start": 348.74, "end": 354.38, "text": "En we moeten oefening 1 en 2 van hoofdstuk 7 maken voor Nederlands.", "translation": "還有我們要做第七章的練習題 1 和 2，關於荷蘭文。", "analysis": {"words_hard": [{"nl": "oefening", "zh": "練習題", "level": "A2"}, {"nl": "hoofdstuk", "zh": "章節", "level": "A2"}], "frame": "En we moeten oefening 1 en 2 van hoofdstuk 7 maken | 我們需要做第7章的練習題1和2", "stressed": ["oefening", "hoofdstuk"], "reductions": [], "trap": null}}, {"start": 356.98, "end": 359.84, "text": "Voor maatschappijleer moeten we een tekst uit de krant kiezen.", "translation": "在社會學課上，我們要選一篇報紙上的文章。", "analysis": {"words_hard": [{"nl": "maatschappijleer", "zh": "公民教育", "level": "A2"}], "frame": "Voor ... moeten we een tekst uit de krant kiezen | 公民教育科需要選一篇報紙文章", "stressed": ["maatschappijleer"], "reductions": [], "trap": null}}, {"start": 361.56, "end": 364.54, "text": "Dat wordt het onderwerp van de presentatie die we moeten maken.", "translation": "那會是我們要做的報告主題。", "analysis": {"words_hard": [{"nl": "onderwerp", "zh": "主題", "level": "A2"}], "frame": "Dat wordt het ... van de presentatie die we moeten maken | 這將是我們必須製作的簡報主題", "stressed": ["onderwerp"], "reductions": [], "trap": null}}, {"start": 367.16, "end": 368.4, "text": "Nou, wetenschap.", "translation": "好吧，科學。", "analysis": {"words_hard": [], "frame": "Nou, ... | 問候或承接語氣的開場", "stressed": [], "reductions": [], "trap": "此句很短，聽者要抓語氣轉折的開始"}}, {"start": 368.86, "end": 370.0, "text": "En we bellen nog wel.", "translation": "我們會再打電話的。", "analysis": {"words_hard": [], "frame": "En we bellen nog wel | 進一步的動作，仍會打電話", "stressed": ["nog"], "reductions": [], "trap": "nòg 表示額外行動，注意語調轉折"}}, {"start": 370.84, "end": 371.76, "text": "Oh, oh, oh ja.", "translation": "哦，哦，哦，對了。", "analysis": {"words_hard": [], "frame": "Oh, oh, oh ja | 感嘆+肯定", "stressed": ["ja"], "reductions": [], "trap": "重讀 ja 表示肯定反應"}}, {"start": 373.04, "end": 375.86, "text": "Die tekst uit de krant moet je meenemen naar school.", "translation": "那篇報紙上的文章你要帶去學校。", "analysis": {"words_hard": [{"nl": "meenemen", "zh": "帶去", "level": "A2"}], "frame": "Die tekst uit de krant moet je meenemen naar school | 將某物帶去某地的指示", "stressed": ["moet"], "reductions": [], "trap": "moet 表示必須，跟想像的指示語氣有關"}}, {"start": 376.7, "end": 378.88, "text": "Niet vergeten, hè.", "translation": "別忘了，喔。", "analysis": {"words_hard": [], "frame": "Niet vergeten, hè | 否定動作後的提醒", "stressed": ["Niet", "vergeten"], "reductions": [], "trap": "Remember 要注意否定開頭往往接提醒"}}, {"start": 379.0, "end": 379.42, "text": "Doeg!", "translation": "掰掰！", "analysis": {"words_hard": [], "frame": "Doeg! | 再見的告別", "stressed": [], "reductions": [], "trap": null}}, {"start": 383.48, "end": 384.08, "text": "Goedemiddag.", "translation": "午安。", "analysis": {"words_hard": [], "frame": "Goedemiddag. | 正式問候語再見", "stressed": [], "reductions": [], "trap": null}}, {"start": 385.0, "end": 385.0, "text": "", "translation": "", "analysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 386.42, "end": 387.76, "text": "Ik heb een probleem.", "translation": "我有個問題。", "analysis": {"words_hard": [{"nl": "probleem", "zh": "問題", "level": "A2"}], "frame": "Ik heb een probleem | 我有一個問題（自己感受）", "stressed": ["probleem"], "reductions": [], "trap": "此句為自我擁有問題的表述，聽者要聽清主語"}}, {"start": 388.38, "end": 389.66, "text": "Ik heb geen pinpas meer.", "translation": "我沒有提款卡了。", "analysis": {"words_hard": [{"nl": "pinpas", "zh": "信用卡/自動取款卡"}], "frame": "Ik heb geen pinpas meer | 失去/沒有 pinpas", "stressed": ["geen"], "reductions": [], "trap": "geen 搭配 meer 表示已不再有"}}, {"start": 390.6, "end": 391.86, "text": "Wat is er met uw pinpas gebeurd?", "translation": "你的提款卡發生了什麼事？", "analysis": {"words_hard": [{"nl": "pinpas", "zh": "提款卡"}], "frame": "Wat is er met uw pinpas gebeurd? | pinpas 的發生情況/出了什麼事", "stressed": ["gebeurd"], "reductions": [], "trap": "gebeurd 關注事件發生"}}, {"start": 392.62, "end": 394.6, "text": "Is hij gestolen of niet meer geldig?", "translation": "是被偷了還是過期了？", "analysis": {"words_hard": [], "frame": "Is hij gestolen of niet meer geldig? | 是不是 偷的，或 不再有效", "stressed": ["gestolen", "geldig"], "reductions": [], "trap": "niet meer gelddig 時常連結為何失效"}}, {"start": 394.38, "end": 396.5, "text": "Nee, ik ben hem kwijt.", "translation": "不，我把它弄丟了。", "analysis": {"words_hard": [], "frame": "Nee, ik ben hem kwijt | 不， 我丟了它", "stressed": [" kwijt "], "reductions": [], "trap": "kwijt 常見盜失表達，需分辨情境"}}, {"start": 397.14, "end": 398.36, "text": "Oh, wanneer is dat gebeurd?", "translation": "哦，什麼時候發生的？", "analysis": {"words_hard": [], "frame": "Oh, wanneer is dat gebeurd? | 問何時發生", "stressed": ["Wanneer"], "reductions": [], "trap": "на 聽出時序轉折點"}}, {"start": 399.12, "end": 402.52, "text": "Gisteren ging ik boodschappen doen, maar toen was hij weg.", "translation": "昨天我去買東西，但那時候它就不見了。", "analysis": {"words_hard": [{"nl": "boodschappen", "zh": "雜貨/採买"}, {"nl": "weg", "zh": "不見/走路的路"}], "frame": "Gisteren ging ik boodschappen doen, maar toen was hij weg | 昨天去買菜，但它卻不見", "stressed": ["Gisteren", "weg"], "reductions": [], "trap": "Gisteren 具時間點； maar 表轉折"}}, {"start": 402.1, "end": 406.68, "text": "Ik denk dus de dag voor gisteren.", "translation": "我想是前天。", "analysis": {"words_hard": [{"nl": "denken", "zh": "認為/想", "level": "A2"}], "frame": "Ik denk ... de dag ...? | 想到某日的想法", "stressed": ["denk", "dag"], "reductions": [{"written": "denk dus", "spoken": "denk dus"}], "trap": "dood-simple pattern: 'Ik denk dus ...' 但 dunno"}}, {"start": 408.02, "end": 409.86, "text": "Maar ik kon pas vandaag hierheen komen.", "translation": "不過我今天才可以來這裡。", "analysis": {"words_hard": [{"nl": "kon", "zh": "能夠", "level": "A2"}], "frame": "Maar ik kon pas ... hierheen komen | 只能今天才來/才剛能到此地", "stressed": ["pas", "hierheen"], "reductions": [], "trap": "pas 後面通常接時間點，表示遲到或剛能做到"}}, {"start": 410.92, "end": 413.3, "text": "Oké, heeft u uw pinpas al geblokkeerd?", "translation": "好的，您已經把您的提款卡封鎖了嗎？", "analysis": {"words_hard": [{"nl": "pinpas", "zh": "提款卡", "level": "A2"}], "frame": "Heeft u uw ... al geblokkeerd? | 是否已經鎖住/停用", "stressed": ["al"], "reductions": [], "trap": "al geblokkeerd 表示動作已完成"}}, {"start": 414.22, "end": 415.48, "text": "Dan krijgt u per post een nieuwe.", "translation": "那您會收到一張新的卡片，會寄到您家。", "analysis": {"words_hard": [{"nl": "post", "zh": "郵寄", "level": "A2"}], "frame": "Dan krijgt u per ... een nieuwe | 之後會寄一張新的", "stressed": ["per", "nieuw"], "reductions": [], "trap": "per post 常見搭配，表示透過郵寄"}}, {"start": 415.48, "end": 417.0, "text": "Ja, heb ik gedaan.", "translation": "是的，我已經做了。", "analysis": {"words_hard": [{"nl": "gedaan", "zh": "做完/完成", "level": "A2"}], "frame": "", "stressed": ["gedaan"], "reductions": [], "trap": null}}, {"start": 417.84, "end": 419.66, "text": "Goed, dan is alles geregeld.", "translation": "好的，那一切都搞定了。", "analysis": {"words_hard": [{"nl": "geregeld", "zh": "已安排好/已處理", "level": "A2"}], "frame": "Goed, dan is alles ... | 好的，一切已經處理好", "stressed": ["alles"], "reductions": [], "trap": "alles geregeld 常見在結語提醒狀態"}}, {"start": 420.66, "end": 423.72, "text": "U kunt weer geld opnemen als u uw nieuwe pas heeft.", "translation": "當您拿到新的卡片後，就可以再提款了。", "analysis": {"words_hard": [{"nl": "passen", "zh": "提款/取款", "level": "A2"}], "frame": "U kunt weer geld opnemen als u uw ... heeft | 你可以再提款，只要你有你的新卡", "stressed": ["opgenomen", "heeft"], "reductions": [], "trap": "has/have 的位置要注意，has 的變化在 heeft"}}, {"start": 434.3, "end": 437.32, "text": "Goedemorgen en welkom bij tv-programma De Praktijk.", "translation": "早安，歡迎來到電視節目《實務》。", "analysis": {"words_hard": [{"nl": "Goedemorgen", "zh": "早安", "level": "A1"}], "frame": "Goedemorgen en welkom bij ... | 歡迎收看節目", "stressed": ["welkom"], "reductions": [], "trap": "programma 常見聽到；介係詞 bij 不同含義"}}, {"start": 438.08, "end": 439.66, "text": "Vandaag kijken wij mee met Bram.", "translation": "今天我們要跟著布拉姆一起看看。", "analysis": {"words_hard": [{"nl": "kijken", "zh": "看看/觀察", "level": "A2"}], "frame": "Vandaag kijken wij mee met ... | 今天我們一起看看與某人相關的畫面/合作", "stressed": ["Vandaag"], "reductions": [], "trap": "Vandaag 常在今天的新聞/節目開場"}}, {"start": 439.5, "end": 441.54, "text": "Hij loopt stage als medewerker groen.", "translation": "他在做綠化工作實習生。", "analysis": {"words_hard": [{"nl": "stage", "zh": "實習", "level": "A2"}], "frame": "Hij loopt stage als medewerker groen | 他在當綠化部門的實習生", "stressed": ["stage"], "reductions": [], "trap": "stage 作為實習的固定說法"}}, {"start": 442.62, "end": 443.88, "text": "Bram, wat ga je vandaag doen?", "translation": "布拉姆，今天你要做什麼？", "analysis": {"words_hard": [{"nl": "ga", "zh": "去/做", "level": "A2"}], "frame": "Bram, wat ga je vandaag doen? | Bram 今天要做什麼", "stressed": ["ga", "doen"], "reductions": [], "trap": "ga 有未來義，聽清安排"}}, {"start": 444.48, "end": 445.98, "text": "Vandaag gaan we een boom weghalen.", "translation": "今天我們要把一棵樹移走。", "analysis": {"words_hard": [{"nl": "boom", "zh": "樹", "level": "A2"}], "frame": "Vandaag gaan we een boom ... | 今天要移除一棵樹", "stressed": ["boom"], "reductions": [], "trap": "weghalen 常見搭配"}}, {"start": 446.48, "end": 448.4, "text": "En wat doe jij nog meer tijdens je stage?", "translation": "那你在實習期間還做些什麼呢？", "analysis": {"words_hard": [{"nl": "jij", "zh": "你", "level": "A2"}], "frame": "En wat doe jij nog meer tijdens je stage? | 你在實習期間還做些什麼", "stressed": ["jij", "meer"], "reductions": [], "trap": "nog meer 在問其他內容時常見"}}, {"start": 449.26, "end": 453.54, "text": "Soms moeten we het gras maaien of bloemen neerzetten, maar vandaag dus niet.", "translation": "有時我們需要割草或種花，但今天就不需要了。", "analysis": {"words_hard": [{"nl": "gras", "zh": "草", "level": "A2"}, {"nl": "maaien", "zh": "割草", "level": "A2"}, {"nl": "bloemen", "zh": "花", "level": "A2"}], "frame": "Soms moeten we het gras maaien of bloemen neerzetten, maar vandaag dus niet. | 有時需要做的事，但今天不做", "stressed": ["niet", "maar"], "reductions": [], "trap": "maar vandaag dus niet 強調與前述的對比"}}, {"start": 453.96, "end": 456.96, "text": "En wat vind je nou het allerleukste om te doen tijdens je stage?", "translation": "那你覺得在實習期間最有趣的事情是什麼？", "analysis": {"words_hard": [{"nl": "allerleukste", "zh": "最喜歡的", "level": "A2"}], "frame": "En wat vind je nou het allerleukste om te doen tijdens je stage? | 在實習期間最喜歡做的事是什麼", "stressed": ["allerleukste"], "reductions": [], "trap": "allerleukste 是複合比較級，聽清楚"}}, {"start": 457.62, "end": 459.3, "text": "Het buitenwerken vind ik heel fijn.", "translation": "我覺得在外面工作很舒服。", "analysis": {"words_hard": [{"nl": "buitenwerken", "zh": "戶外工作", "level": "A2"}], "frame": "", "stressed": ["fijn"], "reductions": [], "trap": null}}, {"start": 460.02, "end": 462.2, "text": "En het samenwerken met collega's ook.", "translation": "跟同事一起合作也很棒。", "analysis": {"words_hard": [{"nl": "samenwerken", "zh": "合作", "level": "A2"}], "frame": "", "stressed": ["ook"], "reductions": [], "trap": null}}, {"start": 462.66, "end": 465.18, "text": "Maar het leukste vind ik het werken in een team.", "translation": "不過我覺得最有趣的是團隊合作。", "analysis": {"words_hard": [{"nl": "leukste", "zh": "最有趣的", "level": "A2"}], "frame": "Maar ... vind ik ... | 否定/轉折後接個人評價", "stressed": ["leukste"], "reductions": [], "trap": "leukste 作為形容詞最高級，聽不清時易混淆"}}, {"start": 465.76, "end": 467.74, "text": "En Wim Egge is jouw baas, toch?", "translation": "你的老闆是溫·埃格，對吧？", "analysis": {"words_hard": [{"nl": "baas", "zh": "老闆", "level": "A2"}], "frame": "", "stressed": ["toch"], "reductions": [], "trap": null}}, {"start": 468.32, "end": 468.88, "text": "Ja, dat klopt.", "translation": "是的，沒錯。", "analysis": {"words_hard": [], "frame": "", "stressed": ["klopt"], "reductions": [], "trap": "Ja 的回答常接著說 klop t/ klopt 可能指肯定"}}, {"start": 469.96, "end": 470.14, "text": "Wim.", "translation": "溫。", "analysis": {"words_hard": [{"nl": "Wim", "zh": "人名", "level": "A2"}], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 473.58, "end": 475.22, "text": "Wim, hoe vind je dat Bram het doet?", "translation": "溫，你覺得布拉姆做得怎麼樣？", "analysis": {"words_hard": [{"nl": "vinden", "zh": "覺得", "level": "A2"}], "frame": "", "stressed": ["vind"], "reductions": [], "trap": null}}, {"start": 476.58, "end": 480.66, "text": "Heel goed. Hij werkt goed in een team en hij doet zijn werk heel goed.", "translation": "非常好。他在團隊中表現得很好，工作也做得很棒。", "analysis": {"words_hard": [{"nl": "team", "zh": "團隊", "level": "A2"}, {"nl": "werkt", "zh": "工作", "level": "A2"}], "frame": "", "stressed": ["Heel", "goed"], "reductions": [], "trap": null}}, {"start": 481.52, "end": 484.42, "text": "Alleen nog tijd op zijn werk komen, dat vind je nog wel een beetje moeilijk, hè?", "translation": "唯一還是有點難的是準時到工作，對吧？", "analysis": {"words_hard": [{"nl": "tijd", "zh": "時間", "level": "A2"}], "frame": "", "stressed": ["moeilijk"], "reductions": [], "trap": "‘hè?’ 常聽成加強語氣，確認對方是否懂"}}, {"start": 485.06, "end": 487.62, "text": "Ja, dat klopt. Ik moet vroeger opstaan.", "translation": "是的，沒錯。我需要早點起床。", "analysis": {"words_hard": [{"nl": "opstaan", "zh": "起床", "level": "A2"}], "frame": "", "stressed": ["vroeger"], "reductions": [], "trap": null}}, {"start": 489.6, "end": 493.64, "text": "Heel veel succes jullie samen nog en dank je wel voor dit interview.", "translation": "祝你們一起順利，謝謝你接受這次訪問。", "analysis": {"words_hard": [{"nl": "samen", "zh": "一起", "level": "A2"}, {"nl": "interview", "zh": "訪談", "level": "A2"}], "frame": "", "stressed": ["veel", alysis": {"words_hard": [], "frame": "", "stressed": [], "reductions": [], "trap": null}}, {"start": 533.36, "end": 539.74, "text": "Ik zou vandaag om negen uur in de winkel zijn, maar het wordt later. Half twaalf.", "translation": "我本來今天九點要到店裡，但會晚一點。大概十一點半。", "analysis": {"words_hard": [{"nl": "winkel", "zh": "商店", "level": "A2"}, {"nl": "Half twaalf", "zh": "十一點半", "level": "A2"}], "frame": "Ik zou vandaag om ... in de ... zijn, maar het wordt later. ... | 提醒時間與變動", "stressed": ["half twaalf"], "reductions": [], "trap": "Half twaalf 常被聽成 half één 的混淆，留意是十一點半"}}, {"start": 540.3, "end": 542.0, "text": "Dus wil je wat doorgeven?", "translation": "所以你想要傳達什麼嗎？", "analysis": {"words_hard": [], "frame": "", "stressed": ["Dus"], "reductions": [], "trap": null}}, {"start": 541.66, "end": 549.42, "text": "Nou, vandaag komt Myrthe voor het eerst, dus help haar allemaal een beetje mee.", "translation": "嗯，今天Myrthe第一次來，所以大家都幫她一下。", "analysis": {"words_hard": [{"nl": "voor het eerst", "zh": "第一次", "level": "A2"}, {"nl": "mee", "zh": "一起", "level": "A2"}], "frame": "Nou, vandaag komt ... voor het eerst, dus help haar allemaal een beetje mee. | 第一次到來，請一起協助", "stressed": ["eerste"], "reductions": [], "trap": null}}, {"start": 549.42, "end": 555.68, "text": "Ze komt om tien uur. Laat jij Myrthe zien waar alles staat en zo?", "translation": "她十點會來。你可以帶Myrthe去看看所有東西在哪裡嗎？", "analysis": {"words_hard": [{"nl": "Laat jij Myrthe zien waar alles staat", "zh": "讓她看到一切在哪裡", "level": "A2"}], "frame": "Ze komt om tien uur. Laat jij Myrthe zien waar alles staat en zo? | 指示地點、再確認", "stressed": ["om tien uur", "zo"], "reductions": [], "trap": null}}, {"start": 555.24, "end": 559.34, "text": "En vraag dan aan Emma of ze wil uitleggen hoe de kassa werkt.", "translation": "然後問Emma她可不可以解釋一下收銀機怎麼用。", "analysis": {"words_hard": [{"nl": "uitleggen", "zh": "解釋", "level": "A2"}], "frame": "En vraag dan aan Emma of ze wil uitleggen hoe de kassa werkt. | 請某人解說/說明", "stressed": ["uitgelegd", "uitleggen"], " const VIDEO_ID = location.pathname.split('/').filter(Boolean).pop() || 'default';
const STORE_KEY = `lph_${VIDEO_ID}`;
function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; } }
function saveStore(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
let store = loadStore(); // { practiced: [idx,...], bookmarks: [idx,...], theme: 'dark' }
if (!store.practiced) store.practiced = [];
if (!store.bookmarks) store.bookmarks = [];

function renderAnalysisPanel(s) {
  const a = s.analysis;
  if (!a) return '';
  // Defensive: GPT sometimes returns string instead of array, or string instead of object
  const asArr = (x) => Array.isArray(x) ? x : (x == null ? [] : [x]);
  const lvColor = { A1:'#4ade80', A2:'#5eead4', B1:'#fb923c', B2:'#f87171' };
  const words = asArr(a.words_hard)
    .map(w => typeof w === 'string' ? { nl: w, zh: '', level: '' } : w)
    .filter(w => w && w.nl)
    .map(w => {
      const c = lvColor[w.level] || '#9ca3af';
      return `<span class="ana-word" style="background:${c}22;border-color:${c}66"
        title="${escapeHtml(w.level||'')}">
        <b>${escapeHtml(w.nl)}</b>
        <span class="ana-zh">${escapeHtml(w.zh||'')}</span>
        <span class="ana-lv" style="color:${c}">${escapeHtml(w.level||'')}</span>
      </span>`;
    }).join('');
  const stressed = asArr(a.stressed).filter(w => typeof w === 'string' && w).map(w =>
    `<span class="ana-stress">${escapeHtml(w)}</span>`).join('');
  const reductions = asArr(a.reductions).filter(r => r && typeof r === 'object' && r.written).map(r =>
    `<div class="ana-red"><span class="ana-red-w">${escapeHtml(r.written)}</span>
      <span class="ana-red-arr">→</span>
      <span class="ana-red-s">${escapeHtml(r.spoken)}</span></div>`).join('');
  // Support both new `frame` and legacy `grammar` field
  const frameText = a.frame || a.grammar || '';
  const trapText = (typeof a.trap === 'string' && a.trap.length > 3) ? a.trap : '';
  // No content at all → return empty so the parent button hides too
  if (!words && !frameText && !stressed && !reductions && !trapText) return '';
  return `<div class="line-analysis" onclick="event.stopPropagation()">
    ${words ? `<div class="ana-sec"><span class="ana-lbl">📚 生字</span>${words}</div>` : ''}
    ${frameText ? `<div class="ana-sec"><span class="ana-lbl">🎯 句框</span><span class="ana-text">${escapeHtml(frameText)}</span></div>` : ''}
    ${stressed ? `<div class="ana-sec"><span class="ana-lbl">🔔 重讀</span>${stressed}<span class="ana-hint">  ← 講者會強調，耳朵警鈴</span></div>` : ''}
    ${reductions ? `<div class="ana-sec"><span class="ana-lbl">🔊 連音</span>${reductions}</div>` : ''}
    ${trapText ? `<div class="ana-sec ana-trap"><span class="ana-lbl">⚠️ 陷阱</span><span class="ana-text">${escapeHtml(trapText)}</span></div>` : ''}
  </div>`;
}
function toggleAnalysis(idx) {
