<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>EXAMEN A2 luisteren 2026 inburgering! PART 2 - met ANTWOORDEN! #nederlandsleren — 荷蘭文練習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root, [data-theme="dark"] {
    --bg: #050510; --card: rgba(255,255,255,0.04); --card-solid: #14142a;
    --glass-border: rgba(255,255,255,0.08);
    --accent: #ff3b5c; --accent2: #7c5cfc;
    --text: #f2f2f7; --muted: #a0a0b8; --dim: #606078;
    --green: #34d399; --orange: #fb923c; --blue: #60a5fa;
    --r: 16px;
  }
  [data-theme="light"] {
    --bg: #f8f8fc; --card: rgba(0,0,0,0.03); --card-solid: #fff;
    --glass-border: rgba(0,0,0,0.08);
    --accent: #e63550; --accent2: #6c4de6;
    --text: #1a1a2e; --muted: #666680; --dim: #999;
    --green: #0d9668; --orange: #d97706; --blue: #2563eb;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 24px; }

  /* Header - compact */
  header { display: flex; align-items: center; gap: 10px; padding: 8px 0 6px; }
  header h1 { font-size: 13px; font-weight: 600; flex: 1; line-height: 1.3; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Mini player row */
  .mini-player-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .mini-player-row .progress-container { height: 32px; border-radius: 8px; }
  .mini-player-row .play-btn { min-width: 40px; padding: 8px; font-size: 14px; }

  /* Player actions */
  .player-actions { display: flex; gap: 4px; align-items: center; }
  .pa-btn {
    background: none; border: 1px solid var(--glass-border); color: var(--dim);
    padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600;
    transition: all 0.2s;
  }
  .pa-btn:active { transform: scale(0.92); color: var(--text); }

  /* Extra controls (collapsible) */
  .extra-controls { padding: 8px 0 4px; }
  .extra-controls .controls { gap: 4px; margin-bottom: 0; }
  .extra-controls .ctrl-btn { padding: 5px 10px; font-size: 11px; }

  /* Progress in header */
  .progress-summary { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .progress-summary .bar { flex: 1; height: 3px; background: var(--glass-border); border-radius: 2px; overflow: hidden; max-width: 120px; }
  .progress-summary .bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

  /* Player */
  .player-box {
    background: var(--card); border: 1px solid var(--glass-border);
    border-radius: var(--r); padding: 16px; margin-bottom: 12px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .progress-container { position: relative; height: 40px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 12px; cursor: pointer; overflow: hidden; }
  [data-theme="light"] .progress-container { background: rgba(0,0,0,0.04); }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); width: 0%; border-radius: 10px; transition: width 0.1s linear; }
  .ab-marker { position: absolute; top: 0; width: 2px; height: 100%; z-index: 2; }
  .ab-marker.a-marker { background: var(--green); }
  .ab-marker.b-marker { background: var(--orange); }
  .ab-region { position: absolute; top: 0; height: 100%; background: rgba(52,211,153,0.12); z-index: 1; }
  .segment-marker { position: absolute; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.08); z-index: 1; pointer-events: none; }
  .time-display { position: absolute; bottom: 6px; right: 10px; font-size: 11px; color: var(--muted); z-index: 3; font-weight: 500; font-variant-numeric: tabular-nums; }

  .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .ctrl-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--text);
    padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all 0.2s; backdrop-filter: blur(10px);
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ctrl-btn.play-btn {
    background: var(--green); color: #000; font-weight: 800; min-width: 52px;
    border: none; box-shadow: 0 2px 12px rgba(52,211,153,0.3);
  }
  .ctrl-btn.play-btn:active { transform: scale(0.92); }
  .speed-control { display: flex; align-items: center; gap: 3px; margin-left: auto; }
  .speed-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--muted);
    padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.2s;
  }
  .speed-btn:active { transform: scale(0.92); }
  .speed-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .ab-info { display: flex; gap: 12px; font-size: 12px; color: var(--dim); font-weight: 500; }
  .ab-info span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.green { background: var(--green); }
  .dot.orange { background: var(--orange); }
  .sentence-nav { display: flex; gap: 4px; align-items: center; margin-left: auto; }
  .nav-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--text);
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .nav-btn:active { transform: scale(0.9); }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 12px; background: var(--card); border-radius: 12px; padding: 3px; border: 1px solid var(--glass-border); }
  .tab {
    flex: 1; background: none; border: none; color: var(--dim); padding: 8px 8px;
    cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 10px;
    transition: all 0.25s;
  }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(255,59,92,0.3); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Mode bar */
  .mode-bar { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; }
  .mode-bar::-webkit-scrollbar { display: none; }
  .mode-btn {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--glass-border);
    color: var(--muted); padding: 6px 14px; border-radius: 100px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all 0.2s;
  }
  .mode-btn:active { transform: scale(0.95); }
  .mode-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .mode-btn.echo-btn { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); color: var(--green); }
  .mode-btn.echo-btn:active { background: var(--green); color: #000; }

  /* Dialogue */
  .dialogue-box {
    background: var(--card); border: 1px solid var(--glass-border);
    border-radius: var(--r); padding: 8px; max-height: 60vh; overflow-y: auto; scroll-behavior: smooth;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .dialogue-box::-webkit-scrollbar { width: 3px; }
  .dialogue-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .dialogue-line {
    padding: 10px 12px; border-radius: 12px; margin-bottom: 2px; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    line-height: 1.65; font-size: 14px; display: flex; align-items: flex-start; gap: 6px;
  }
  .dialogue-line:active { transform: scale(0.98); }
  .dialogue-line:hover { background: rgba(255,255,255,0.04); }
  [data-theme="light"] .dialogue-line:hover { background: rgba(0,0,0,0.03); }
  .dialogue-line.highlight {
    background: rgba(255,59,92,0.08); border-left: 3px solid var(--accent);
    padding-left: 9px;
  }
  .line-text { flex: 1; }
  .line-zh { font-size: 12px; color: var(--dim); margin-top: 3px; display: none; line-height: 1.5; }
  .show-zh .line-zh { display: block; }

  .explain-btn, .bookmark-btn, .line-repeat-btn, .rec-btn {
    background: none; border: none; color: var(--dim); font-size: 14px;
    padding: 2px; cursor: pointer; opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
  }
  .dialogue-line:hover .explain-btn,
  .dialogue-line:hover .bookmark-btn,
  .dialogue-line:hover .line-repeat-btn,
  .dialogue-line:hover .rec-btn { opacity: 0.5; }
  .explain-btn:hover, .bookmark-btn:hover, .line-repeat-btn:hover, .rec-btn:hover { opacity: 1 !important; }
  .bookmark-btn.bookmarked { opacity: 1 !important; color: var(--orange); }
  .rec-btn.recording { opacity: 1 !important; color: var(--accent); animation: recPulse 0.8s ease-in-out infinite; }
  @keyframes recPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.2); } }

  /* Recording result */
  .rec-result {
    margin-top: 6px; padding: 8px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    font-size: 12px; animation: slideUp 0.3s ease;
  }
  .rec-result .rec-score { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .rec-result .rec-score.good { color: var(--green); }
  .rec-result .rec-score.ok { color: var(--orange); }
  .rec-result .rec-score.bad { color: var(--accent); }
  .rec-result .rec-you { color: var(--muted); margin-bottom: 4px; }
  .rec-result .rec-diff { line-height: 1.8; }
  .rec-result .rec-diff .match { color: var(--green); }
  .rec-result .rec-diff .miss { color: var(--accent); text-decoration: line-through; }
  .rec-result .rec-diff .extra { color: var(--orange); font-style: italic; }
  .rec-playback { display: flex; gap: 6px; margin-top: 6px; }
  .rec-play-btn { background: var(--card); border: 1px solid var(--glass-border); color: var(--text); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .rec-play-btn:active { transform: scale(0.95); }

  /* Dictation mode */
  .dictation-mode .line-text { filter: blur(6px); transition: filter 0.3s; user-select: none; }
  .dictation-mode .line-zh { display: none !important; }
  .dictation-mode .dialogue-line:hover .line-text,
  .dictation-mode .dialogue-line.revealed .line-text { filter: none; }

  /* Quiz */
  .quiz-box { background: var(--card); border: 1px solid var(--glass-border); border-radius: var(--r); padding: 16px; }
  .question { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--glass-border); }
  .question:last-child { border-bottom: none; }
  .question h4 { margin-bottom: 4px; font-size: 14px; font-weight: 700; }
  .question .q-native { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  .option {
    display: block; width: 100%; text-align: left;
    background: var(--card); border: 1.5px solid var(--glass-border); color: var(--text);
    padding: 12px 14px; border-radius: 12px; margin-bottom: 6px; cursor: pointer;
    font-size: 14px; transition: all 0.2s;
  }
  .option:active { transform: scale(0.98); }
  .option.correct { border-color: var(--green); background: rgba(52,211,153,0.1); }
  .option.wrong { border-color: var(--accent); background: rgba(255,59,92,0.1); }
  .option.disabled { pointer-events: none; opacity: 0.6; }
  .score-bar { margin-top: 16px; padding: 14px; background: var(--card); border: 1px solid var(--glass-border); border-radius: 12px; text-align: center; font-size: 14px; font-weight: 700; display: none; }

  /* Vocab */
  .vocab-box { background: var(--card); border: 1px solid var(--glass-border); border-radius: var(--r); padding: 12px 16px; }
  .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
  .vocab-item:last-child { border-bottom: none; }
  .vocab-word { font-weight: 700; color: var(--green); }
  .vocab-meaning { color: var(--muted); font-size: 13px; }

  /* Echo overlay */
  .echo-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,16,0.96); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px;
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  }
  .echo-overlay.active { display: flex; }
  .echo-phase { font-size: 1.3em; font-weight: 700; text-align: center; min-height: 2em; }
  .echo-phase .emoji { font-size: 2.2em; display: block; margin-bottom: 10px; }
  .echo-phase .label { color: var(--green); font-size: 0.65em; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; }
  .echo-sentence {
    font-size: 15px; text-align: center; max-width: 500px; line-height: 1.8;
    padding: 20px 24px; background: rgba(255,255,255,0.04); border-radius: var(--r);
    border: 1px solid var(--glass-border); min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .echo-sentence .nl { color: var(--text); font-weight: 500; }
  .echo-sentence .zh { color: var(--dim); font-size: 13px; margin-top: 8px; }
  .echo-progress-ring { width: 120px; height: 120px; position: relative; }
  .echo-progress-ring svg { transform: rotate(-90deg); }
  .echo-progress-ring circle { fill: none; stroke-width: 3; }
  .echo-ring-bg { stroke: rgba(255,255,255,0.06); }
  .echo-ring-fg { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
  .echo-ring-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2em; font-weight: 800; }
  .echo-controls { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; width: 100%; max-width: 360px; }
  .echo-row { display: flex; gap: 6px; justify-content: center; }
  .echo-ctrl {
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.2s; text-align: center;
  }
  .echo-ctrl:active { transform: scale(0.95); }
  .echo-ctrl.primary { background: var(--green); color: #000; font-weight: 800; border: none; box-shadow: 0 4px 16px rgba(52,211,153,0.3); }
  .echo-actions { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
  .echo-action { background: none; border: 1px solid var(--glass-border); color: var(--dim); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .echo-action:active { transform: scale(0.95); color: var(--text); }
  .echo-settings { display: flex; gap: 14px; align-items: center; color: var(--dim); font-size: 12px; margin-top: 10px; font-weight: 500; }
  .echo-settings label { display: flex; align-items: center; gap: 6px; }
  .echo-settings input[type=range] { width: 50px; accent-color: var(--green); }
  .echo-counter { color: var(--dim); font-size: 12px; font-weight: 600; }

  /* AI Explain panel — bottom sheet */
  .explain-backdrop {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 149;
  }
  .explain-backdrop.open { display: block; }
  .explain-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-solid, #14142a); border-top: none;
    border-radius: 20px 20px 0 0;
    padding: 12px 20px 20px; padding-bottom: max(20px, env(safe-area-inset-bottom));
    z-index: 150; max-height: 55vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .explain-panel.open { transform: translateY(0); }
  .explain-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 12px; }
  [data-theme="light"] .explain-handle { background: rgba(0,0,0,0.15); }
  [data-theme="light"] .explain-panel { background: #fff; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
  .explain-close { position: absolute; top: 8px; right: 12px; background: none; border: none; color: var(--muted); font-size: 1.2em; cursor: pointer; }
  .explain-original { font-size: 1.05em; font-weight: 600; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #333; }
  [data-theme="light"] .explain-original { border-bottom-color: #ddd; }
  .explain-loading { color: var(--muted); font-size: 0.9em; }
  .explain-content { font-size: 0.9em; line-height: 1.8; }
  .explain-content h4 { color: var(--accent); font-size: 0.85em; margin-top: 10px; margin-bottom: 4px; }
  .explain-content .word-item { display: inline-block; background: rgba(78,204,163,0.1); border: 1px solid rgba(78,204,163,0.3); padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 0.85em; }
  .explain-content .pron-tip { background: rgba(245,166,35,0.1); border-left: 3px solid var(--orange); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0; font-size: 0.85em; }
  .explain-content .grammar-note { background: rgba(91,155,213,0.1); border-left: 3px solid var(--blue, #5b9bd5); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0; font-size: 0.85em; }
  .explain-btn { background: none; border: 1px solid #444; color: var(--muted); font-size: 0.7em; padding: 2px 6px; border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .dialogue-line:hover .explain-btn { opacity: 0.6; }
  .explain-btn:hover { opacity: 1 !important; border-color: var(--blue, #5b9bd5); color: var(--blue, #5b9bd5); }

  /* API key modal */
  .apikey-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
  .apikey-modal.open { display: flex; }
  .apikey-box { background: var(--card); border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; }
  .apikey-box h3 { margin-bottom: 8px; font-size: 1em; }
  .apikey-box p { color: var(--muted); font-size: 0.85em; margin-bottom: 12px; }
  .apikey-box input { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 6px; background: #111; color: var(--text); font-size: 0.9em; margin-bottom: 10px; }
  [data-theme="light"] .apikey-box input { background: #f0eeea; border-color: #ccc; }
  .apikey-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .apikey-box button { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9em; border: 1px solid #444; background: none; color: var(--text); }
  .apikey-box button.primary { background: var(--green); color: #000; border: none; font-weight: 700; }

  /* Difficulty badge */
  .diff-badge { font-size: 0.6em; padding: 1px 5px; border-radius: 3px; font-weight: 700; margin-left: 4px; vertical-align: middle; }
  .diff-easy { background: rgba(78,204,163,0.2); color: var(--green); }
  .diff-medium { background: rgba(245,166,35,0.2); color: var(--orange); }
  .diff-hard { background: rgba(233,69,96,0.2); color: var(--accent); }

  /* Review card */
  .review-card { background: var(--card); border: 1.5px solid #333; border-radius: 10px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
  .review-card:hover { border-color: var(--accent); }
  .review-card .rc-text { font-size: 1em; margin-bottom: 6px; }
  .review-card .rc-meta { font-size: 0.75em; color: var(--muted); display: flex; gap: 8px; }
  .review-card .rc-btns { display: flex; gap: 6px; margin-top: 8px; }
  .review-card .rc-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid #444; background: none; color: var(--text); cursor: pointer; font-size: 0.8em; }
  .review-card .rc-btn:hover { border-color: var(--accent); }
  .review-card .rc-btn.easy { border-color: var(--green); color: var(--green); }
  .review-card .rc-btn.hard { border-color: var(--accent); color: var(--accent); }

  /* Light theme overrides */
  [data-theme="light"] .dialogue-line:hover { background: #e8e6e0; }
  [data-theme="light"] .dialogue-line.highlight { background: rgba(214,58,80,0.1); }
  [data-theme="light"] .option { background: #f0eeea; border-color: #ddd; }
  [data-theme="light"] .progress-container { background: #ddd; }
  [data-theme="light"] .speed-btn { background: #eee; border-color: #ccc; color: #666; }
  [data-theme="light"] .speed-btn.active { background: var(--accent2); color: #fff; }
  [data-theme="light"] .mode-btn { background: #eee; border-color: #ccc; color: #666; }
  [data-theme="light"] .mode-btn.active { background: var(--accent2); color: #fff; }
  [data-theme="light"] .echo-overlay { background: rgba(255,255,255,0.95); }

些人可以在我們這裡從事清潔、安全警衛及生產工作。", "start": 564.32, "end": 568.0}, {"text": "Voor de schoonmaak en productie moet u Nederlands spreken op A2-niveau.", "translation": "從事清潔和生產的職務，您需要有A2級的荷蘭語能力。", "start": 568.0, "end": 571.36}, {"text": "Voor de beveiliging op B1-niveau.", "translation": "警衛工作則要求B1級的荷蘭語能力。", "start": 582.88, "end": 588.72}, {"text": "Ook is het fijn als u ervaring heeft met het werk, maar dat hoeft niet.", "translation": "如果您有工作經驗會更好，但這不是必要條件。", "start": 588.72, "end": 592.68}, {"text": "U kunt bij ons ook een avondopleiding volgen tot leidinggevende.", "translation": "您也可以在我們這裡參加晚間主管培訓課程。", "start": 592.68, "end": 597.72}, {"text": "Deze opleiding duurt 4 maanden.", "translation": "該培訓課程為期4個月。", "start": 597.72, "end": 601.24}, {"text": "U leert bijvoorbeeld een werkplanning maken of werkroosters bijhouden.", "translation": "例如您將學習如何製作工作計畫或管理工作排班表。", "start": 602.32, "end": 609.76}, {"text": "Tijdens uw opleiding loopt u ook stage. U oefent dan wat u heeft geleerd.", "translation": "培訓期間您也會實習，練習您所學的內容。", "start": 609.76, "end": 614.76}, {"text": "Deze stage duurt 2 maanden, dus de opleiding duurt in totaal 4 maanden.", "translation": "實習期為2個月，因此整個培訓課程總共4個月。", "start": 614.76, "end": 620.44}, {"text": "Na de opleiding kunt u aan het werk als leidinggevende.", "translation": "培訓結束後，您可以擔任主管的工作。", "start": 620.44, "end": 623.6}, {"text": "Heeft u interesse in deze opleiding? Geeft u dat dan aan bij uw kennismakingsgesprek.", "translation": "若您對該培訓有興趣，請於認識會面時通知我們。", "start": 623.6, "end": 629.36}, {"text": "Tot ziens bij het gesprek.", "translation": "會面時見。", "start": 629.36, "end": 632.04}, {"text": "Hoelang duurt de opleiding tot leidinggevende? 2 maanden, 4 maanden, een half jaar?", "translation": "主管培訓課程要多久？2個月、4個月，還是半年？", "start": 632.04, "end": 635.4}, {"text": "Roman heeft een bericht op zijn voicemail van Erik.", "translation": "Roman的語音信箱有Erik的留言。", "start": 635.4, "end": 638.72}, {"text": "Lees eerst de vraag, luister daarna naar de tekst.", "translati ion": "塞車消息就到此為止。", "start": 1627.56, "end": 1631.52}, {"text": "Waarom staat er een file op de snelweg A4 bij Rotterdam?", "translation": "為什麼鹿特丹的A4高速公路有塞車？", "start": 1631.68, "end": 1638.32}, {"text": "Er wordt aan de weg gewerkt.", "translation": "路上正在施工。", "start": 1638.32, "end": 1641.36}, {"text": "Er is een ongeluk gebeurd met drie auto's.", "translation": "發生了一起涉及三輛車的事故。", "start": 1641.36, "end": 1644.36}, {"text": "Er staat een kapotte vrachtwagen.", "translation": "有一輛壞掉的貨車停在路上。", "start": 1644.36, "end": 1647.36}, {"text": "Mario luistert naar de radio.", "translation": "馬里奧正在聽收音機。", "start": 1650.2, "end": 1655.56}, {"text": "Hij hoort een bericht over files.", "translation": "他聽到有關塞車的消息。", "start": 1655.56, "end": 1659.52}, {"text": "Lees eerst de vraag, luister daarna naar de tekst en de informatie.", "translation": "請先閱讀問題，然後聆聽文本和資訊。", "start": 1659.52, "end": 1662.0}, {"text": "En dan nu de files op de snelweg A2 tussen Amsterdam en Utrecht staan 5 km.", "translation": "現在，阿姆斯特丹和烏得勒支之間的A2高速公路上有5公里的塞車。", "start": 1670.8, "end": 1677.12}, {"text": "File, de oorzaak is een ongeluk met drie auto's.", "translation": "塞車的原因是一場涉及三輛車的事故。", "start": 1677.12, "end": 1680.36}, {"text": "Bij Rotterdam, op de snelweg A4 naar Delft, staat een kapotte vrachtwagen.", "translation": "在鹿特丹，通往代爾夫特的A4高速公路上有一輛壞掉的貨車。", "start": 1680.36, "end": 1683.04}, {"text": "Daarom staat er nu een file van 4 km.", "translation": "因此現在有4公里的塞車。", "start": 1683.04, "end": 1687.64}, {"text": "Over een half uur zal het verkeer weer kunnen doorrijden.", "translation": "半小時後交通將能恢復通行。", "start": 1687.64, "end": 1691.0}, {"text": "De laatste file staat op de A50 bij Apeldoorn.", "translation": "最後一個塞車地點在阿珀爾多倫的A50高速公路上。", "start": 1691.0, "end": 1696.36}, {"text": "Daar is een vrachtwagen met eieren omgevallen.", "translation": "那裡有一輛裝滿雞蛋的貨車翻覆了。", "start": 1696.36, "end": 1700.32}, {"text": "De vrachtwagen en de eieren liggen op de weg.", "translation": "貨車和雞蛋散落在路上。", "start": 1700.32, "end": 1704.88}, {"text": "De weg wordt nu schoongemaakt.", "translation": "道路目前正在清理中。", "start": 1704.88, "end": 1709.24}, {"text": "Er staat een file van 10 km.", "translation": "現場有10公里的塞車。", "start": 1709.24, "end": 1714.44}, {"text": "Tenslotte nog een bericht voor mensen die met de trein reizen tussen de stations Arnhem en Utrecht.", "translation": "最後有一則針對搭火車在阿納姆和烏得勒支站間旅客的消息。", "start": 1714.44, "end": 1718.52}, {"text": "Rijden geen treinen.", "translation": "該路段沒有列車行駛。", "start": 1718.52, "end": 1721.56}, {"text": "U kunt met de NS-bussen reizen.", "translation": "您可以搭乘NS巴士出行。", "start": 1721.56, "end": 1726.32}, {"text": "Tot zover de files.", "translation": "塞車消息就到此為止。", "start": 1726.32, "end": 1731.12}, {"text": "Mario wil met de trein van Arnhem naar Utrecht.", "translation": "馬里奧想要搭火車從阿納姆去烏得勒支。", "start": 1731.12, "end": 1734.6}, {"text": "Wat kan hij het beste doen?", "translation": "他最好怎麼做？", "start": 1734.6, "end": 1739.52}, {"text": "Met een taxi reizen?", "translation": "搭計程車？", "start": 1739.72, "end": 1746.8}, {"text": "Via Apeldoorn reizen?", "translation": "經阿珀爾多倫轉乘？", "start": 1746.8, "end": 1750.8}, {"text": "Reizen met de NS-bus?", "translation": "搭NS巴士？", "start": 1750.8, "end": 1754.0}, {"text": "Sofia heeft een nieuwe baan.", "translation": "索菲亞有一份新工作。", "start": 1758.32, "end": 1765.12}, {"text": "Lees eerst de vraag, kijk daarna naar de tekst.", "translation": "請先閱讀問題，再查看文本。", "start": 1765.12, "end": 1770.04}, {"text": "Nou eh, je eerste dag.", "translation": "嗯，這是你的第一天。", "start": 1778.52, "end": 1786.0}, {"text": "Een belangrijke regel is dat de telefoon altijd voorgaat.", "translation": "一項重要規則是電話永遠優先。", "start": 1786.0, "end": 1788.36}, {"text": "Dus ook al ben je nog zo druk, maakt niet uit.", "translation": "所以即使你再忙也沒關係。", "start": 1788.36, "end": 1792.08}, {"text": "Je neemt hem altijd op als iemand de directeur wil spreken.", "translation": "如果有人要找主管，你一定要接電話。", "start": 1792.08, "end": 1797.12}, {"text": "Dan verbind je niet meteen door.", "translation": "接起來後不要馬上轉接。", "start": 1797.12, "end": 1801.28}, {"text": "Je kijkt dan eerst in zijn agenda.", "translation": "你得先查主管的行事曆。", "start": 1801.28, "end": 1806.76}, {"text": "Ook vraag je waar het over gaat.", "translation": "然後問清楚對方的事情內容。", "start": 1806.76, "end": 1809.2}, {"text": "Als hij dan tijd heeft, dan toets je een één.", "translation": "如果主管有時間，你再按「1」鈕。", "start": 1809.2, "end": 1813.8}, {"text": "Toetst dan de vier. Als Eveline pauze heeft, dan moet je ook voor haar de telefoon doen, eh, opnemen enzo. Dan schrijf je de naam op van de BG en dan zeg je dat Eveline terugbelt.", "translation": "按下四號。如果 Eveline 休息時，你也得幫她接電話，嗯，接聽之類的。然後你寫下聯絡人的名字，接著告訴對方 Eveline 會回電。", "start": 1813.8, "end": 1819.24}, {"text": "Telefoon doen, eh, opnemen enzo. Dan schrijf je de naam op van de BG en dan zeg je dat Eveline terugbelt. Vergeet ook niet het...", "translation": "接電話，嗯，接聽之類的。然後你寫下聯絡人的名字，接著告訴對方 Eveline 會回電。別忘了電話號碼...", "start": 1819.24, "end": 1824.2}, {"text": "Telefoonnummer. Iemand belt voor de directeur. Wat moet Sofia als eerste doen?", "translation": "有人打電話給主任。Sofia 首先應該做什麼？", "start": 1824.2, "end": 1826.24}, {"text": "Een É toetsen, een vier toetsen, in zijn agenda kijken naar Eveline.", "translation": "按 É 鍵，再按四鍵，查看他行事曆裡有沒有 Eveline 的時間。", "start": 1826.24, "end": 1830.6}, {"text": "Doorverbinden. Sofia heeft een nieuwe baan.", "translation": "轉接電話。Sofia 有新工作了。", "start": 1830.6, "end": 1836.36}, {"text": "Lees eerst de vraag, kijk daarna naar de video.", "translation": "先讀問題，然後再看影片。", "start": 1836.36, "end": 1841.8}, {"text": "Nou eh, je eerste dag, een belangrijke regel is dat de telefoon altijd voorgaat.", "translation": "嗯，你的第一天，一條重要規則是電話永遠優先處理。", "start": 1841.8, "end": 1846.76}, {"text": "Dus ook al ben je nog zo druk, maakt niet uit. Je neemt hem altijd op als iemand de directeur wil spreken.", "translation": "所以即使你再忙都沒關係，只要有人想找主任，你都要接電話。", "start": 1851.56, "end": 1859.32}, {"text": "Dan verbind je niet meteen door, je kijkt dan eerst in zijn agenda.", "translation": "不要馬上幫他轉接，要先查看他的行事曆。", "start": 1859.32, "end": 1863.08}, {"text": "Ook vraag je waar het over gaat. Als hij dan tijd heeft, dan toets je een één.", "translation": "也要問電話內容。如果他有時間，就按 1。", "start": 1870.72, "end": 1877.56}, {"text": "Als er iemand belt voor de afdeling inkoop, die kun je dan meteen doorverbinden.", "translation": "有人打給採購部的電話，你可以直接幫忙轉接。", "start": 1877.56, "end": 1880.6}, {"text": "Je toetst dan de vier. Als Eveline pauze heeft, dan moet je ook voor haar de telefoon doen, eh, opnemen enzo.", "translation": "你按下四鍵。如果 Eveline 休息中，你也要幫她接電話，嗯，接聽之類的。", "start": 1880.6, "end": 1886.6}, {"text": "Dan schrijf je de naam op van de BG en dan zeg je dat Eveline terugbelt. Vergeet ook niet het telefoonnummer.", "translation": "然後你寫下聯絡人的名字，接著告訴對方 Eveline 會回電。別忘了電話號碼。", "start": 1886.6, "end": 1889.48}, {"text": "Iemand belt voor de afdeling inkoop. Wat moet Sofia doen?", "translation": "有人打給採購部。Sofia 應該怎麼做？", "start": 1889.48, "end": 1892.76}, {"text": "Een É toetsen, een vier toetsen, in de agenda kijken, vragen waar het over gaat.", "translation": "按 É 鍵，再按四鍵，再查看行事曆，問電話內容。", "start": 1892.76, "end": 1897.96}, {"text": "Sofia heeft een nieuwe baan. Lees eerst de vraag, kijk daarna naar de video.", "translation": "Sofia 有新工作。先讀問題，再看影片。", "start": 1897.96, "end": 1903.2}, {"text": "Nou eh, je eerste dag, een belangrijke regel is dat de telefoon altijd voorgaat.", "translation": "嗯，你的第一天，一條重要規則是電話永遠優先處理。", "start": 1903.2, "end": 1906.96}, {"text": "Dus ook al ben je nog zo druk, maakt niet uit. Je neemt hem altijd op als iemand de directeur wil spreken.", "translation": "所以即使再忙都沒關係，只要有人想找主任，你都要接電話。", "start": 1906.96, "end": 1912.48}, {"text": "Dan verbind je niet meteen door, je kijkt dan eerst in zijn agenda.", "translation": "不要馬上轉接，要先查看行事曆。", "start": 1912.48, "end": 1917.56}, {"text": "Ook vraag je waar het over gaat. Als hij dan tijd heeft, dan toets je een één.", "translation": "也要問電話內容。如果有時間，就按 1。", "start": 1917.56, "end": 1922.48}, {"text": "Als er iemand belt voor de afdeling inkoop, die kun je dan meteen doorverbinden.", "translation": "有人打給採購部的電話，你可以直接幫忙轉接。", "start": 1922.48, "end": 1924.88}, {"text": "Je toetst dan de vier. Als Eveline pauze heeft, dan moet je ook voor haar de telefoon doen, eh, opnemen enzo.", "translation": "你按下四鍵。如果 Eveline 休息時，你也要幫她接電話，嗯，接聽之類的。", "start": 1924.88, "end": 1930.4}, {"text": "Dan schrijf je de naam op van de BG en dan zeg je dat Eveline terugbelt. Vergeet ook niet het telefoonnummer.", "translation": "然後你寫下聯絡人的名字，接著告訴對方 Eveline 會回電。別忘了電話號碼。", "start": 1930.4, "end": 1935.24}, {"text": "Eveline heeft pauze en Sofia neemt haar telefoon op. Wat moet ze doen?", "translation": "Eveline 正在休息，Sofia 接她的電話。她應該怎麼做？", "start": 1935.24, "end": 1939.36}, {"text": "De naam en het nummer opschrijven, doorgeven wanneer Eveline terug is.", "translation": "寫下名字和電話號碼，並在 Eveline 回來時告知。", "start": 1942.36, "end": 1951.36}, {"text": "Doorverbinden met de directeur, vragen waar het over gaat.", "translation": "轉接給主任，並詢問電話內容。", "start": 1951.36, "end": 1953.88}, {"text": "Nika volgt een cursus Nederlands.", "translation": "Nika 正在上荷蘭語課程。", "start": 1961.4, "end": 1968.44}, {"text": "Een medecursist heeft een bericht ingesproken op haar voicemail.", "translation": "同學錄了一則語音訊息到她的語音信箱。", "start": 1968.44, "end": 1971.44}, {"text": "Nika luistert naar het bericht.", "translation": "Nika 正在聽這則訊息。", "start": 1971.44, "end": 1977.28}, {"text": "Lees eerst de vraag, luister daarna naar de tekst.", "translation": "先讀問題，再聽文本。", "start": 1977.28, "end": 1980.32}, {"text": "Ha Nika, met Marcus. Ik eh, ik bel even over onze groepsopdracht.", "translation": "嗨 Nika，我是 Marcus。我嗯，我打電話是關於我們的團體作業。", "start": 1980.32, "end": 1983.6}, {"text": "Die moeten we dus volgende week, eh, maandag...", "translation": "我們下週一必須完成...", "start": 1983.6, "end": 1988.8}, {"text": "heeft dan toets je een één als er iemand belt voor de afdeling inkoop die kun je", "translation": "", "start": 1988.8, // ── Persistence ──
const VIDEO_ID = location.pathname.split('/').filter(Boolean).pop() || 'default';
const STORE_KEY = `lph_${VIDEO_ID}`;
function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; } }
function saveStore(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
let store = loadStore(); // { practiced: [idx,...], bookmarks: [idx,...], theme: 'dark' }
if (!store.practiced) store.practiced = [];
if (!store.bookmarks) store.bookmarks = [];

function renderDialogue() {
  const box = document.getElementById('dialogue-box');
  box.innerHTML = segments.map((s, i) => {
    const zh = s.translation || '';
    const isBookmarked = store.bookmarks.includes(i);
    return `<div class="dialogue-line" data-idx="${i}" onclick="jumpToLine(${i})">
      <span class="line-text">${escapeHtml(s.text)}${zh ? `<div class="line-zh">${escapeHtml(zh)}</div>` : ''}</span>
      <button class="rec-btn" id="rec-${i}" onclick="event.stopPropagation();toggleRec(${i})" title="錄音比對">🎙️</button>
      <button class="explain-btn" onclick="event.stopPropagation();explainLine(${i})" title="AI 解析">💡</button>
      <button class="bookmark-btn ${isBookmarked ? 'bookmarked' : ''}" onclick="event.stopPropagation();toggleBookmark(${i})" title="書籤">🔖</button>
      <button class="line-repeat-btn" onclick="event.stopPropagation();loopLine(${i})" title="單句Loop / Shift+點兩句=多句Loop">🔁</button>
    </div>`;
  }).join('');
  applyModes();
  renderSegmentMarkers();
  updateProgress();
}

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function applyModes() {
  const box = document.getElementById('dialogue-box');
  box.classList.toggle('show-zh', showZh);
  box.classList.toggle('dictation-mode', dictationMode);
}
function toggleZh() { showZh = !showZh; document.getElementById('zh-toggle').classList.toggle('active', showZh); applyModes(); }
function toggleDictation() {
  dictationMode = !dictationMode;
  document.getElementById('dictation-toggle').classList.toggle('active', dictationMode);
  document.querySelectorAll('.dialogue-line.revealed').forEach(l => l.classList.remove('revealed'));
  applyModes();
}

function jumpToLine(idx) {
  setActiveDialogueLine(idx);
  if (dictationMode) { const lines = document.querySelectorAll('.dialogue-line'); if(lines[idx]) lines[idx].classList.add('revealed'); }
  const s = segments[idx];
  if (!s) return;

  // iOS: audio might not have duration yet, but we can still seek and play
  audio.currentTime = s.start;
  audio.play().then(() => setPlayButton(true)).catch(() => {
    // iOS first-play might fail — try again on next user tap
    setPlayButton(false);
  });
  updateProgressUI();
}

let loopRangeStart = null; // for multi-line loop selection

function loopLine(idx) {
  const s = segments[idx]; if (!s) return;

  // Multi-line loop: first click sets start, second click sets end
  if (loopRangeStart !== null && loopRangeStart !== idx) {
    const from = Math.min(loopRangeStart, idx);
    const to = Math.max(loopRangeStart, idx);
    pointA = segments[from].start;
    pointB = segments[to].end;
    loopEnabled = true; loopCount = 0;
    document.getElementById('loop-btn').classList.add('active');
    document.getElementById('set-a-btn').classList.add('active');
    document.getElementById('set-b-btn').classList.add('active');
    syncABLabels();
    audio.currentTime = pointA;
    updateProgressUI();
    audio.play().then(() => setPlayButton(true)).catch(() => {});
    // Highlight range
    const lines = document.querySelectorAll('.dialogue-line');
    lines.forEach((l, i) => l.classList.toggle('highlight', i >= from && i <= to));
    loopRangeStart = null;
    return;
  }

  // Single click: if no range active, start range OR single loop
  // Hold shift for range mode
  if (window._shiftHeld) {
    loopRangeStart = idx;
    // Visual feedback
    const lines = document.querySelectorAll('.dialogue-line');
    lines[idx].style.boxShadow = 'inset 3px 0 0 var(--green), inset -3px 0 0 var(--green)';
    return;
  }

  // Toggle: if already looping this line, cancel and show feedback
  if (loopEnabled && Math.abs(pointA - s.start) < 0.5 && Math.abs(pointB - s.end) < 0.5) {
    clearAB();
    // Reset all loop button styles
    document.querySelectorAll('.line-repeat-btn').forEach(b => { b.style.color = ''; b.style.opacity = ''; });
    return;
  }

  // Default: single line loop
  pointA = s.start; pointB = s.end;
  loopEnabled = true; loopCount = 0;
  document.getElementById('loop-btn').classList.add('active');
  document.getElementById('set-a-btn').classList.add('active');
  document.getElementById('set-b-btn').classList.add('active');
  syncABLabels();
  audio.currentTime = s.start;
  updateProgressUI();
  audio.play().then(() => setPlayButton(true)).catch(() => {});
  setActiveDialogueLine(idx);
  // Visual feedback on the 🔁 button
  const btns = document.querySelectorAll('.line-repeat-btn');
  btns.forEach(b => { b.style.color = ''; b.style.opacity = ''; });
  if (btns[idx]) { btns[idx].style.color = 'var(--accent)'; btns[idx].style.opacity = '1'; }
}

// rAF-based sync for smooth scrolling + reliable loop
function syncLoop() {
  if (!audio.paused) {
    updateProgressUI();
    // AB Loop check (more reliable than timeupdate)
    if (loopEnabled && pointA !== null && pointB !== null) {
      const a = Math.min(pointA, pointB), b = Math.max(pointA, pointB);
      if (audio.currentTime >= b) {
        audio.currentTime = a;
        loopCount++;
        document.getElementById('loop-count').textContent = loopCount;
      }
    }
  }
  requestAnimationFrame(syncLoop);
}

// ── Echo Method (flicker-free engine) ──
let echoState = { active: false, lineIdx: 0, phase: 'idle', timers: [], animId: null, cycleId: 0 };

function echoClearAll() {
  echoState.timers.forEach(t => clearTimeout(t));
  echoState.timers = [];
  if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }
  audio.pause();
  audio.volume = 1;
}

function openEcho() {
  if (!segments.length) return;
  echoClearAll();
  echoState.active = true;
  echoState.lineIdx = activeLineIndex || 0;
  echoState.phase = 'idle';
  document.getElementById('echo-overlay').classList.add('active');
  setPlayButton(false);
  updateEchoUI();
  document.getElementById('echo-pause').oninput = function() { document.getElementById('echo-pause-label').textContent = this.value+'s'; };
  document.getElementById('echo-repeat').oninput = function() { document.getElementById('echo-repeat-label').textContent = this.value+'s'; };
}

function closeEcho() {
  echoClearAll();
  echoState.active = false;
  echoState.phase = 'idle';
  document.getElementById('echo-overlay').classList.remove('active');
}

function updateEchoUI() {
  const s = segments[echoState.lineIdx];
  document.getElementById('echo-counter').textContent = `第 ${echoState.lineIdx + 1} / ${segments.length} 句`;
  document.getElementById('echo-sentence').innerHTML = s
    ? `<div><div class="nl">${escapeHtml(s.text)}</div>${s.translation ? `<div class="zh">${escapeHtml(s.translation)}</div>` : ''}</div>`
    : '';
}

function setEchoPhase(phase, emoji, text) {
  echoState.phase = phase;
  document.getElementById('echo-phase').innerHTML = `<span class="emoji">${emoji}</span><div>${text}</div><div class="label">${phase.toUpperCase()}</div>`;
}

function setEchoRing(p, l) {
  document.getElementById('echo-ring-fg').style.strokeDashoffset = 339.3 * (1 - p);
  document.getElementById('echo-ring-label').textContent = l;
}

// Smooth ring animation using requestAnimationFrame
function animateRing(startTime, duration, label, cycleId, onDone) {
  function step() {
    if (!echoState.active || ecleState_cycleId !== cycleId) return;
    const elapsed = Date.now() - startTime;
    const progress = Math.min(1, elapsed / duration);
    setEchoRing(progress, label);
    if (progress < 1) {
      echoState.animId = requestAnimationFrame(step);
    } else if (onDone) {
      onDone();
    }
  }
  // Use a closure variable to track the cycle
  const ecleState_cycleId = cycleId;
  echoState.animId = requestAnimationFrame(step);
}

let echoLoopMode = false;
function toggleEchoLoop() {
  echoLoopMode = !echoLoopMode;
  const btn = document.getElementById('echo-loop-btn');
  if (btn) {
    btn.style.background = echoLoopMode ? 'var(--orange)' : 'none';
    btn.style.color = echoLoopMode ? '#000' : 'var(--orange)';
  }
}

let echoPaused = false;
function toggleEchoPause() {
  echoPaused = !echoPaused;
  const btn = document.getElementById('echo-pause-btn');
  if (echoPaused) {
    audio.pause();
    echoState.timers.forEach(t => clearTimeout(t));
    echoState.timers = [];
    if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }
    echoState.cycleId++; // kill all running callbacks
    btn.textContent = '▶ 繼續';
    setEchoPhase('pause', '⏸', '已暫停');
  } else {
    btn.textContent = '⏸ 暫停';
    echoRunCycle(echoState.lineIdx);
  }
}

function echoBookmark() {
  toggleBookmark(echoState.lineIdx);
}
function echoExplain() {
  explainLine(echoState.lineIdx);
}
function echoRecToggle() {
  const btn = document.getElementById('echo-rec-btn');
  if (recState.recording) {
    stopRec();
    btn.textContent = '🎙️ 錄音';
    btn.style.color = '';
    btn.style.borderColor = '';
  } else {
    // Pause echo first
    if (!echoPaused) toggleEchoPause();
    audio.pause();
    startRec(echoState.lineIdx).then(() => {
      btn.textContent = '⏹ 停止';
      btn.style.color = 'var(--accent)';
      btn.style.borderColor = 'var(--accent)';
    }).catch(() => {
      alert('無法存取麥克風');
    });
  }
}

function echoPrev() {
  echoClearAll();
  echoState.lineIdx = Math.max(0, echoState.lineIdx - 1);
  updateEchoUI();
  echoRunCycle(echoState.lineIdx);
}

function echoNext() { echoPaused = false; document.getElementById('echo-pause-btn').textContent = '⏸ 暫停'; echoClearAll(); echoRunCycle(echoState.lineIdx); }
function echoReplay() { echoClearAll(); echoRunCycle(echoState.lineIdx); }
function echoSkip() {
  echoClearAll();
  echoState.lineIdx = Math.min(segments.length - 1, echoState.lineIdx + 1);
  updateEchoUI();
  echoRunCycle(echoState.lineIdx);
}

function echoRunCycle(idx) {
  if (!echoState.active) return;
  echoClearAll();

  const cycleId = ++echoState.cycleId;  // unique ID to cancel stale callbacks
  echoState.lineIdx = idx;
  updateEchoUI();
  setActiveDialogueLine(idx);

  const s = segments[idx];
  if (!s) return;

  const pauseDur = parseFloat(document.getElementById('echo-pause').value) * 1000;
  const repeatDur = parseFloat(document.getElementById('echo-repeat').value) * 1000;
  const listenDur = (s.end - s.start) * 1000 / audio.playbackRate;

  // ── Phase 1: LISTEN ──
  setEchoPhase('listen', '🎧', '仔細聽這句話');
  setEchoRing(0, '🎧');
  audio.volume = 1;
  audio.currentTime = s.start;
  audio.play().catch(() => {});

  const t0 = Date.now();
  animateRing(t0, listenDur, '🎧', cycleId, null);

  // Wait for audio to actually reach s.end (not setTimeout which can be inaccurate)
  function waitForEnd(callback) {
    function check() {
      if (cycleId !== echoState.cycleId) return;
      if (audio.currentTime >= s.end - 0.05 || audio.paused) { callback(); return; }
      requestAnimationFrame(check);
    }
    // Also set a safety timeout (listenDur + 1s buffer)
    const safetyTimer = setTimeout(() => { if (cycleId === echoState.cycleId) callback(); }, listenDur + 1000);
    echoState.timers.push(safetyTimer);
    check();
  }

  waitForEnd(() => {
    if (cycleId !== echoState.cycleId) return;
    if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }
    audio.pause();
    setEchoRing(1, '🎧');

    // ── Phase 2: ECHO ──
    setEchoPhase('echo', '🧠', '在腦中迴想剛才的聲音...');
    setEchoRing(0, '🧠');

    const t1 = Date.now();
    animateRing(t1, pauseDur, '🧠', cycleId, null);

    const timer2 = setTimeout(() => {
      if (cycleId !== echoState.cycleId) return;
      if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }

      // ── Phase 3: REPEAT (no audio replay — speak from memory!) ──
      setEchoPhase('repeat', '🗣️', '大聲跟著說！');
      setEchoRing(0, '🗣️');
      // Recording during repeat phase — only if mic already granted
      if (recState.stream) { startRec(idx).catch(() => {}); }

      const t2 = Date.now();
      animateRing(t2, repeatDur, '🗣️', cycleId, null);

      const timer3 = setTimeout(() => {
        if (cycleId !== echoState.cycleId) return;
        if (echoState.animId) { cancelAnimationFrame(echoState.animId); echoState.animId = null; }
        audio.pause();
        audio.volume = 1;
        // Stop recording
        if (recState.recording) stopRec();

        // ── Done or auto-next or loop ──
        if (echoLoopMode) {
          setEchoPhase('listen', '🔄', '再來一次...');
          setEchoRing(1, '🔄');
          const timer4 = setTimeout(() => {
            if (cycleId !== echoState.cycleId) return;
            echoRunCycle(idx); // same sentence again
          }, 800);
          echoState.timers.push(timer4);
        } else if (document.getElementById('echo-auto').checked && idx < segments.length - 1) {
          setEchoPhase('listen', '✅', '很好！下一句...');
          setEchoRing(1, '✅');
          const timer4 = setTimeout(() => {
            if (cycleId !== echoState.cycleId) return;
            echoRunCycle(idx + 1);
          }, 1000);
          echoState.timers.push(timer4);
        } else if (idx >= segments.length - 1) {
          setEchoPhase('done', '🎉', '全部完成！太棒了！');
          setEchoRing(1, '🎉');
        } else {
          setEchoPhase('pause', '⏸', '準備好按「下一句」');
          setEchoRing(1, '⏸');
        }
      }, repeatDur);
      echoState.timers.push(timer3);
    }, pauseDur);
    echoState.timers.push(timer2);
  });
}

// ── Keyboard ──
// Track shift key for multi-line loop
window._shiftHeld = false;
document.addEventListener('keydown', function(e) { if(e.key==='Shift') window._shiftHeld = true; });
document.addEventListener('keyup', function(e) { if(e.key==='Shift') window._shiftHeld = false; });

document.addEventListener('keydown', function(e) {
  if(e.target.tagName==='INPUT') return;
  switch(e.code) {
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'KeyA': setA(); break; case 'KeyB': setB(); break;
    case 'KeyL': toggleLoop(); break; case 'KeyC': clearAB(); break;
    case 'ArrowLeft': e.shiftKey ? prevSentence() : (audio.currentTime = Math.max(0, audio.currentTime-3)); break;
    case 'ArrowRight': e.shiftKey ? nextSentence() : (audio.currentTime = Math.min(audio.duration, audio.currentTime+3)); break;
    case 'KeyZ': toggleZh(); break; case 'KeyD': toggleDictation(); break;
    case 'KeyE': openEcho(); break; case 'Escape': closeEcho(); break;
  }
});

function fmt(s) { if(!s||isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }

// ── Bookmarks ──
function toggleBookmark(idx) {
  const i = store.bookmarks.indexOf(idx);
  if (i >= 0) store.bookmarks.splice(i, 1);
  else store.bookmarks.push(idx);
  store.bookmarks.sort((a, b) => a - b);
  saveStore(store);

// ── Spaced Repetition ──
// store.srs = { idx: { interval: days, nextReview: timestamp, ease: 1-3 } }
if (!store.srs) store.srs = {};

function rateSentence(idx, rating) {
  // rating: 'easy' (3), 'ok' (2), 'hard' (1)
  const ease = rating === 'easy' ? 3 : rating === 'ok' ? 2 : 1;
  const prev = store.srs[idx] || { interval: 0, ease: 2 };
  let newInterval;
  if (ease === 1) newInterval = 1; // hard: review tomorrow
  else if (ease === 2) newInterval = Math.max(1, Math.round(prev.interval * 1.5) || 1); // ok: 1.5x
  else newInterval = Math.max(2, Math.round(prev.interval * 2.5) || 2); // easy: 2.5x

  store.srs[idx] = {
    interval: newInterval,
    nextReview: Date.now() + newInterval * 86400000,
    ease: ease,
    lastReview: Date.now(),
  };
  saveStore(store);
  renderReview();
}

function getDueForReview() {
  const now = Date.now();
  const due = [];
  // Practiced but not yet in SRS → due now
  store.practiced.forEach(idx => {
    if (!store.srs[idx]) due.push({ idx, reason: 'new' });
  });
  // In SRS and due
  Object.entries(store.srs).forEach(([idx, data]) => {
    if (data.nextReview <= now) due.push({ idx: parseInt(idx), reason: 'due' });
  });
  // Bookmarked always available
  store.bookmarks.forEach(idx => {
    if (!due.find(d => d.idx === idx)) due.push({ idx, reason: 'bookmarked' });
  });
  return due.slice(0, 20); // Max 20
}

function renderReview() {
  const box = document.getElementById('review-box');
  const due = getDueForReview();
  if (!due.length) {
    box.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted)"><div style="font-size:2em;margin-bottom:8px">🎉</div>沒有待複習的句子！<br><span style="font-size:0.85em">先練習一些句子，它們會自動進入複習排程</span></div>';
    return;
  }
  box.innerHTML = due.map(d => {
    const s = segments[d.idx];
    if (!s) return '';
    const srsData = store.srs[d.idx];
    const interval = srsData ? `${srsData.interval}天後複習` : '首次複習';
    const label = d.reason === 'bookmarked' ? '🔖' : d.reason === 'new' ? '🆕' : '🔄';
    return `<div class="review-card" onclick="jumpToLine(${d.idx})">
      <div class="rc-text">${escapeHtml(s.text)}</div>
      <div class="rc-meta">
        <span>${label} ${interval}</span>
        <span>${fmt(s.start)}</span>
      </div>
      <div class="rc-btns">
        <button class="rc-btn hard" onclick="event.stopPropagation();rateSentence(${d.idx},'hard')">😵 困難</button>
        <button class="rc-btn" onclick="event.stopPropagation();rateSentence(${d.idx},'ok')">🙂 還行</button>
        <button class="rc-btn easy" onclick="event.stopPropagation();rateSentence(${d.idx},'easy')">😎 簡單</button>
      </div>
    </div>`;
  }).join('');
}

// ── Difficulty estimation ──
function estimateDifficulty(text) {
  if (!text) return 'medium';
  const wordCount = text.split(/\s+/).length;
  const avgWordLen = text.replace(/\s+/g, '').length / wordCount;
  if (wordCount <= 4 && avgWordLen <= 5) return 'easy';
  if (wordCount >= 12 || avgWordLen >= 8) return 'hard';
  return 'medium';
}

// ── Recording & Pronunciation Scoring ──
let recState = { recording: false, mediaRec: null, chunks: [], lineIdx: null, stream: null };

async function toggleRec(idx) {
  if (recState.recording && recState.lineIdx === idx) {
    stopRec();
    return;
  }
  if (recState.recording) stopRec();
  startRec(idx);
}

async function startRec(idx) {
  try {
    // Check if getUserMedia is available
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('此裝置不支援錄音功能');
      return;
    }

    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    recState.stream = stream;
    recState.chunks = [];
    recState.lineIdx = idx;

    // Find supported mime type for this device
    let mimeType = '';
    const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/aac', 'audio/wav'];
    for (const t of types) {
      if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
    }

    const mediaRec = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    recState.mediaRec = mediaRec;

    mediaRec.ondataavailable = (e) => { if (e.data.size > 0) recState.chunks.push(e.data); };
    mediaRec.onstop = () => processRecording(idx);

    mediaRec.start(100); // collect data every 100ms for better compatibility
    recState.recording = true;

    // Visual feedback
    const btn = document.getElementById(`rec-${idx}`);
    if (btn) btn.classList.add('recording');

    // Auto-stop after segment duration + 3s buffer
    const s = segments[idx];
    const maxDur = s ? (s.end - s.start) * 1000 + 3000 : 8000;
    setTimeout(() => { if (recState.recording && recState.lineIdx === idx) stopRec(); }, maxDur);

    // Play the sentence first, then user repeats
    audio.pause();

  } catch (err) {
    alert('無法存取麥克風。請允許麥克風權限。');
  }
}

function stopRec() {
  if (recState.mediaRec && recState.recording) {
    recState.mediaRec.stop();
    recState.recording = false;
    if (recState.stream) {
      recState.stream.getTracks().forEach(t => t.stop());
      recState.stream = null;
    }
    const btn = document.getElementById(`rec-${recState.lineIdx}`);
    if (btn) btn.classList.remove('recording');
  }
}

async function processRecording(idx) {
  const s = segments[idx];
  if (!s) return;

  const blob = new Blob(recState.chunks, { type: 'audio/webm' });
  const recUrl = URL.createObjectURL(blob);

  // Show "analyzing..." under the line
  const line = document.querySelectorAll('.dialogue-line')[idx];
  let resultDiv = line.querySelector('.rec-result');
  if (!resultDiv) {
    resultDiv = document.createElement('div');
    resultDiv.className = 'rec-result';
    line.querySelector('.line-text').appendChild(resultDiv);
  }
  resultDiv.innerHTML = '<div style="color:var(--muted)">🎙️ 分析中...</div>';

  // Send to Whisper for transcription
  const apiKey = getApiKey();
  if (!apiKey) {
    resultDiv.innerHTML = `
      <div class="rec-playback">
        <button class="rec-play-btn" onclick="new Audio('${recUrl}').play()">▶ 播放你的錄音</button>
      </div>
      <div style="color:var(--dim);margin-top:4px">設定 API Key 即可獲得發音評分</div>`;
    return;
  }

  try {
    // Convert webm to form data
    const formData = new FormData();
    const ext = blob.type.includes('mp4') ? 'mp4' : blob.type.includes('webm') ? 'webm' : 'wav';
    formData.append('file', blob, `recording.${ext}`);
    formData.append('model', 'whisper-1');
    formData.append('response_format', 'text');

    // Use XMLHttpRequest for iOS compatibility
    const userText = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://api.openai.com/v1/audio/transcriptions');
      xhr.setRequestHeader('Authorization', `Bearer ${apiKey}`);
      xhr.onload = () => resolve(xhr.responseText.trim());
      xhr.onerror = () => reject(new Error(`Whisper API error (${xhr.status})`));
      xhr.send(formData);
    });
    const originalText = s.text.trim();

    // Compare and score
    const { score, diffHtml } = compareTexts(originalText, userText);
    const scoreClass = score >= 80 ? 'good' : score >= 50 ? 'ok' : 'bad';
    const emoji = score >= 80 ? '🎉' : score >= 50 ? '👍' : '💪';

    resultDiv.innerHTML = `
      <div class="rec-score ${scoreClass}">${emoji} ${score}%</div>
      <div class="rec-you">你說的：${escapeHtml(userText)}</div>
      <div class="rec-diff">${diffHtml}</div>
      <div class="rec-playback">
        <button class="rec-play-btn" onclick="new Audio('${recUrl}').play()">▶ 你的版本</button>
        <button class="rec-play-btn" onclick="jumpToLine(${idx})">▶ 原版</button>
        <button class="rec-play-btn" onclick="toggleRec(${idx})">🎙️ 再試一次</button>
      </div>`;

    // Save score to store
    if (!store.recScores) store.recScores = {};
    store.recScores[idx] = { score, userText, date: Date.now() };
    saveStore(store);

  } catch (err) {
    resultDiv.innerHTML = `
      <div style="color:var(--accent)">❌ ${err.message}</div>
      <div class="rec-playback">
        <button class="rec-play-btn" onclick="new Audio('${recUrl}').play()">▶ 播放你的錄音</button>
      </div>`;
  }
}

function compareTexts(original, spoken) {
  // Normalize: lowercase, remove punctuation
  const norm = (t) => t.toLowerCase().replace(/[.,!?;:'"()（）。？！、，\-]/g, '').replace(/\s+/g, ' ').trim();
  const origWords = norm(original).split(' ');
  const userWords = norm(spoken).split(' ');

  // Simple word-level comparison using LCS
  const lcs = [];
  const m = origWords.length, n = userWords.length;
  const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (origWords[i-1] === userWords[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
      else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }

  // Backtrack to find matches
  const matched = new Set();
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (origWords[i-1] === userWords[j-1]) { matched.add(i-1); i--; j--; }
    else if (dp[i-1][j] > dp[i][j-1]) i--;
    else j--;
  }

  const score = m > 0 ? Math.round(matched.size / m * 100) : 0;

  // Build diff HTML
  const diffHtml = origWords.map((w, idx) =>
    matched.has(idx)
      ? `<span class="match">${escapeHtml(w)}</span>`
      : `<span class="miss">${escapeHtml(w)}</span>`
  ).join(' ');

  return { score, diffHtml };
}

「${s.text}」

請提供（用 HTML 格式，不要 markdown）：
1. <h4>📝 逐字翻譯</h4> — 每個詞的意思，用 <span class="word-item">詞 = 意思</span> 格式

保持簡潔，每點 1-2 句就好。直接回 HTML，不要包 \`\`\`。`;

  // Use XMLHttpRequest for better iOS WKWebView compatibility
  const xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.openai.com/v1/chat/completions');
  xhr.setRequestHeader('Authorization', `Bearer ${apiKey}`);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {

async function showExamResults() {
  if (examState.timerInterval) clearInterval(examState.timerInterval);
  const elapsed = Math.floor((Date.now() - examState.startTime) / 1000);
  const total = examState.questions.length;

  // Score each recording with Whisper
  let totalScore = 0;
  let results = [];
  const apiKey = getApiKey();

  document.getElementById('exam-content').innerHTML = '<div class="exam-instruction">📊 正在評分...</div>';

  for (const rec of examState.recordings) {
    const s = segments[rec.idx];
    let score = 0;
    let userText = '（未錄音）';

    if (apiKey && rec.blob) {
      try {
        const formData = new FormData();
        const ext2 = rec.blob.type.includes('mp4') ? 'mp4' : rec.blob.type.includes('webm') ? 'webm' : 'wav';
        formData.append('file', rec.blob, `recording.${ext2}`);
        formData.append('model', 'whisper-1');
        formData.append('response_format', 'text');
        const resp = await fetch('https://api.openai.com/v1/audio/transcriptions', {
          method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}` }, body: formData
        });
        userText = (await resp.text()).trim();
        const result = compareTexts(s.text, userText);
        score = result.score;
      } catch(e) { score = 0; }
    }
    totalScore += score;
    results.push({ original: s.text, userText, score, url: rec.url });
  }

  const avg = total > 0 ? Math.round(totalScore / total) : 0;
  const cls = avg >= 80 ? 'good' : avg >= 50 ? 'ok' : 'bad';
  const emoji = avg >= 80 ? '🎉' : avg >= 50 ? '👍' : '💪';

  document.getElementById('exam-content').innerHTML = `
    <div class="exam-result">
      <div class="big ${cls}">${emoji} ${avg}%</div>
      <div style="color:var(--muted);margin-bottom:4px">${total} 題 · ${Math.floor(elapsed/60)}分${elapsed%60}秒</div>
      <div class="exam-result-list">
        ${results.map((r, i) => `<div class="exam-result-item">
          <span class="eri-score" style="color:${r.score>=80?'var(--green)':r.score>=50?'var(--orange)':'var(--accent)'}">${r.score}%</span>
          ${escapeHtml(r.original.substring(0, 40))}...
          <br><span style="color:var(--dim);font-size:11px">你：${escapeHtml(r.userText.substring(0, 50))}</span>
          ${r.url ? `<br><button class="rec-play-btn" onclick="new Audio('${r.url}').play()" style="margin-top:4px">▶ 播放</button>` : ''}
        </div>`).join('')}
      </div>
      <div class="exam-actions" style="margin-top:16px;justify-content:center">
        <button class="exam-action" onclick="closeExam()">返回</button>
        <button class="exam-action primary" onclick="closeExam();openExamMode()">再考一次</button>
      </div>
    </div>`;
}

// ── Daily Challenge ──
const DAILY_KEY = `lph_daily_${VIDEO_ID}`;
function getDailyState() {
  const today = new Date().toISOString().split('T')[0];
  try {
    const s = JSON.parse(localStorage.getItem(DAILY_KEY) || '{}');
    if (s.date !== today) return { date: today, sentences: [], completed: 0, streak: s.streak || 0, lastDate: s.date };
    return s;
  } catch(e) { return { date: today, sentences: [], completed: 0, streak: 0 }; }
}
function saveDailyState(s) { localStorage.setItem(DAILY_KEY, JSON.stringify(s)); }

function openDailyChallenge() {
  let state = getDailyState();
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

  // Calculate streak
  if (state.lastDate === yesterday && state.date === today && state.completed === 0) {
    // Continuing streak from yesterday
  } else if (state.date !== today) {
    if (state.lastDate === yesterday) { /* streak continues */ }
    else { state.streak = 0; }
  }

  // Pick 5 sentences for today (seeded by date for consistency)
  if (!state.sentences.length) {
    const seed = today.split('-').join('');
    let rng = parseInt(seed) % 10000;
    const pool = segments.map((s, i) => i).filter(i => segments[i].text.length > 15);
    const picked = [];
    for (let i = 0; i < Math.min(5, pool.length); i++) {
      rng = (rng * 1103515245 + 12345) & 0x7fffffff;
      const idx = pool.splice(rng % pool.length, 1)[0];
      picked.push(idx);
    }
    state.sentences = picked;
    state.completed = 0;
    state.date = today;
    saveDailyState(state);
  }

  document.getElementById('daily-overlay').classList.add('active');
  document.getElementById('daily-streak').textContent = state.streak > 0 ? `🔥 連續 ${state.streak} 天` : '開始你的連續紀錄！';

  if (state.completed >= state.sentences.length) {
    showDailyComplete(state);
  } else {
    showDailyQuestion(state);
  }
}

function showDailyQuestion(state) {
  // Progress dots
  document.getElementById('daily-progress').innerHTML = state.sentences.map((_, i) =>
    `<div class="daily-dot ${i < state.completed ? 'done' : i === state.completed ? 'current' : ''}"></div>`
  ).join('');

  const idx = state.sentences[state.completed];
  const s = segments[idx];

  // Play sentence
  audio.currentTime = s.start;
  audio.volume = 1;
  audio.playbackRate = 1.0;
  audio.play().catch(() => {});
  const checkEnd = () => { if (audio.currentTime >= s.end) { audio.pause(); return; } if (document.getElementById('daily-overlay').classList.contains('active')) requestAnimationFrame(checkEnd); };
  checkEnd();

  document.getElementById('daily-content').innerHTML = `
    <div class="daily-sentence">
      ${escapeHtml(s.text)}
      ${s.translation ? `<div class="daily-translation">${escapeHtml(s.translation)}</div>` : ''}
    </div>
    <div style="font-size:13px;color:var(--muted)">聽完後，大聲跟著說</div>
    <div class="daily-btns">
      <button class="daily-btn" onclick="dailyReplay(${idx})">🔊 再聽</button>
      <button class="daily-btn" onclick="dailyRec(${idx})">🎙️ 錄音</button>
      <button class="daily-btn primary" onclick="dailyNext()">✅ 完成</button>
    </div>
    <div id="daily-rec-result"></div>
  `;
}

function dailyReplay(idx) {
  const s = segments[idx];
  audio.currentTime = s.start;
  audio.play().catch(() => {});
  const checkEnd = () => { if (audio.currentTime >= s.end) { audio.pause(); return; } requestAnimationFrame(checkEnd); };
  checkEnd();
}

function dailyRec(idx) {
  toggleRec(idx);
}

function dailyNext() {
  let state = getDailyState();
  state.completed++;
  if (state.completed >= state.sentences.length) {
    state.streak = (state.streak || 0) + 1;
  }
  saveDailyState(state);

  if (state.completed >= state.sentences.length) {
    showDailyComplete(state);
  } else {
    showDailyQuestion(state);
  }
}

function showDailyComplete(state) {
  document.getElementById('daily-progress').innerHTML = state.sentences.map(() =>
    '<div class="daily-dot done"></div>'
  ).join('');

  document.getElementById('daily-content').innerHTML = `
    <div class="daily-complete">
      <div class="big-emoji">🎉</div>
      <h2>今日挑戰完成！</h2>
      <div style="color:var(--orange);font-size:18px;font-weight:800;margin-bottom:16px">🔥 ${state.streak} 天連續</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:24px">明天回來繼續保持紀錄</div>
      <button class="daily-btn primary" onclick="closeDailyChallenge()">完成 ✨</button>
    </div>
  `;
}

function closeDailyChallenge() {
  audio.pause();
  document.getElementById('daily-overlay').classList.remove('active');
}

// ── Spreken Exam Trainer ──
let sprekenState = { active: false, questions: [], current: 0, timer: null, recUrl: null };

function openSprekenMode() {
  // Find question segments (contain '?') and pair with next answer segments
  const questions = [];
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    const text = s.text;
    // Detect question patterns
    if (text.includes('?') && !text.includes('voorbeeld') && s.end - s.start > 1.5) {
      // Find the context (previous segment might have "Kijk naar" or setup)
      let context = '';
      if (i > 0 && (segments[i-1].text.includes('Kijk naar') || segments[i-1].text.includes('plaatje') || segments[i-1].text.length < 40)) {
        context = segments[i-1].text;
      }
      // Find the answer (next non-question segment after a gap)
      let answer = '';
      let answerIdx = i + 1;
      while (answerIdx < segments.length && answerIdx <= i + 3) {
        const gap = segments[answerIdx].start - s.end;
        if (gap > 10 && !segments[answerIdx].text.includes('?')) {
          // This is likely the answer after the pause
          answer = segments[answerIdx].text;
          if (answerIdx + 1 < segments.length && segments[answerIdx + 1].start - segments[answerIdx].end < 3) {
            answer += ' ' + segments[answerIdx + 1].text;
          }
          break;
        }
        answerIdx++;
      }
      questions.push({
        idx: i,
        question: text,
        questionZh: s.translation || '',
        context: context,
        answer: answer,
        answerStart: answerIdx < segments.length ? segments[answerIdx].start : null,
        answerEnd: answerIdx + 1 < segments.length ? segments[answerIdx + 1].end : (answerIdx < segments.length ? segments[answerIdx].end : null),
        start: s.start,
        end: s.end,
        hasImage: context.includes('plaatje') || context.includes('Kijk'),
      });
    }
  }

  if (!questions.length) {
    alert('這個影片沒有偵測到口說考試題目');
    return;
  }

  sprekenState = { active: true, questions, current: 0, timer: null, recUrl: null };
  document.getElementById('spreken-overlay').classList.add('active');
  showSprekenQuestion();
}

function closeSpreken() {
  sprekenState.active = false;
  if (sprekenState.timer) clearInterval(sprekenState.timer);
  if (recState.recording) stopRec();
  audio.pause();
  document.getElementById('spreken-overlay').classList.remove('active');
}

function showSprekenQuestion() {
  const q = sprekenState.questions[sprekenState.current];
  const total = sprekenState.questions.length;
  document.getElementById('spreken-num').textContent = `🗣️ 題 ${sprekenState.current + 1} / ${total}`;

  const body = document.getElementById('spreken-body');
  body.innerHTML = `
    <div class="spreken-phase">🎧 聽題目</div>
    <div class="spreken-question">
      ${q.context ? `<div style="color:var(--dim);font-size:13px;margin-bottom:8px">${escapeHtml(q.context)}</div>` : ''}
      ${escapeHtml(q.question)}
      <div class="q-zh">${escapeHtml(q.questionZh)}</div>
      ${q.hasImage ? '<div style="color:var(--orange);font-size:12px;margin-top:6px">📷 此題有圖片（請參考原始影片）</div>' : ''}
    </div>
    <div class="spreken-btns">
      <button class="spreken-btn" onclick="sprekenPlayQuestion()">🔊 再聽一次</button>
      <button class="spreken-btn primary" onclick="sprekenStartAnswer()">🎙️ 開始回答（30秒）</button>
    </div>
  `;

  // Play the question
  audio.currentTime = q.start;
  audio.volume = 1;
  audio.playbackRate = 1.0;
  audio.play().catch(() => {});
  const checkEnd = () => { if (audio.currentTime >= q.end) { audio.pause(); return; } if (sprekenState.active) requestAnimationFrame(checkEnd); };
  checkEnd();
}

function sprekenPlayQuestion() {
  const q = sprekenState.questions[sprekenState.current];
  audio.currentTime = q.start;
  audio.play().catch(() => {});
  const checkEnd = () => { if (audio.currentTime >= q.end) { audio.pause(); return; } requestAnimationFrame(checkEnd); };
  checkEnd();
}

function sprekenStartAnswer() {
  const q = sprekenState.questions[sprekenState.current];
  const body = document.getElementById('spreken-body');
  let timeLeft = 30;

  body.innerHTML = `
    <div class="spreken-phase">🎙️ 請回答</div>
    <div class="spreken-question" style="border-color:var(--blue)">
      ${escapeHtml(q.question)}
    </div>
    <div class="spreken-timer-ring">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle class="spreken-timer-bg" cx="50" cy="50" r="44" />
        <circle class="spreken-timer-fg" id="spreken-ring" cx="50" cy="50" r="44" stroke-dasharray="276.5" stroke-dashoffset="0" />
      </svg>
      <div class="spreken-timer-label" id="spreken-countdown">30</div>
    </div>
    <div class="spreken-rec-indicator">🔴 錄音中...</div>
    <button class="spreken-btn" onclick="sprekenStopAnswer()">⏹ 結束回答</button>
  `;

  // Start recording
  startRec(q.idx).catch(() => {});

  // Start countdown
  sprekenState.timer = setInterval(() => {
    timeLeft--;
    document.getElementById('spreken-countdown').textContent = timeLeft;
    document.getElementById('spreken-ring').style.strokeDashoffset = 276.5 * (1 - timeLeft / 30);
    if (timeLeft <= 0) {
      sprekenStopAnswer();
    }
  }, 1000);
}

function sprekenStopAnswer() {
  if (sprekenState.timer) { clearInterval(sprekenState.timer); sprekenState.timer = null; }
  if (recState.recording) stopRec();

  // Save recording URL
  setTimeout(() => {
    if (recState.chunks.length) {
      const blob = new Blob(recState.chunks, { type: recState.mediaRec?.mimeType || 'audio/webm' });
      sprekenState.recUrl = URL.createObjectURL(blob);
    }
    showSprekenResult();
  }, 500);
}

function showSprekenResult() {
  const q = sprekenState.questions[sprekenState.current];
  const total = sprekenState.questions.length;
  const body = document.getElementById('spreken-body');

  body.innerHTML = `
    <div class="spreken-phase">📝 對照答案</div>
    <div class="spreken-question">
      ${escapeHtml(q.question)}
    </div>
    ${q.answer ? `<div class="spreken-answer">
      <h4>✅ 範例答案</h4>
      ${escapeHtml(q.answer)}
    </div>` : ''}
    <div class="spreken-btns">
      ${sprekenState.recUrl ? `<button class="spreken-btn" onclick="new Audio('${sprekenState.recUrl}').play()">▶ 你的回答</button>` : ''}
      ${q.answerStart ? `<button class="spreken-btn" onclick="sprekenPlayAnswer()">▶ 聽範例</button>` : ''}
      <button class="spreken-btn" onclick="showSprekenQuestion()">🔄 重做此題</button>
      ${sprekenState.current < total - 1
        ? `<button class="spreken-btn primary" onclick="sprekenNext()">下一題 →</button>`
        : `<button class="spreken-btn primary" onclick="closeSpreken()">✅ 完成！</button>`
      }
    </div>
  `;
}

function sprekenPlayAnswer() {
  const q = sprekenState.questions[sprekenState.current];
  if (q.answerStart) {
    audio.currentTime = q.answerStart;
    audio.play().catch(() => {});
    if (q.answerEnd) {
      const checkEnd = () => { if (audio.currentTime >= q.answerEnd) { audio.pause(); return; } requestAnimationFrame(checkEnd); };
      checkEnd();
    }
  }
}

function sprekenNext() {
  sprekenState.current++;
  sprekenState.recUrl = null;
  showSprekenQuestion();
}

// ── Wake Lock (keep screen on during practice) ──
let wakeLock = null;
async function toggleWakeLock() {
  if (wakeLock) {
    wakeLock.release(); wakeLock = null;
    document.getElementById('wake-btn')?.classList.remove('active');
  } else {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wake-btn')?.classList.add('active');
      wakeLock.addEventListener('release', () => { wakeLock = null; document.getElementById('wake-btn')?.classList.remove('active'); });
    } catch(e) {}
  }
}
// Auto wake lock when playing
audio.addEventListener('play', async () => {
  if (!wakeLock) try { wakeLock = await navigator.wakeLock.request('screen'); document.getElementById('wake-btn')?.classList.add('active'); } catch(e) {}
});
audio.addEventListener('pause', () => {
  if (wakeLock && !document.getElementById('wake-btn')?.classList.contains('manual')) { wakeLock.release(); wakeLock = null; document.getElementById('wake-btn')?.classList.remove('active'); }
});

// ── Swipe gestures for prev/next sentence ──
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 2) {
    if (dx < 0) nextSentence();
    else prevSentence();
  }
}, { passive: true });

// ── Auto-scroll to current sentence on first play ──
let firstPlay = true;
audio.addEventListener('play', () => {
  if (firstPlay && activeLineIndex !== null) {
    const line = document.querySelectorAll('.dialogue-line')[activeLineIndex];
    if (line) line.scrollIntoView({ behavior: 'smooth', block: 'center' });
    firstPlay = false;
  }
});

// ── Looked-up sentences ──
function renderLooked() {
  const box = document.getElementById('looked-box');
  const keys = Object.keys(explainCache).map(Number).sort((a,b) => a - b);
  document.getElementById('looked-count').textContent = keys.length ? `(${keys.length})` : '';
  if (!keys.length) {
    box.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">還沒有查過的句子。點對話旁的 💡 查詢。</p>';
    return;
  }
  box.innerHTML = keys.map(function(idx) {
    var s = segments[idx];
    if (!s) return '';
    var cached = explainCache[idx];
    return '<div style="background:var(--card);border:1px solid var(--glass-border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer" onclick="this.querySelector(\'.looked-detail\').style.display=this.querySelector(\'.looked-detail\').style.display===\'none\'?\'block\':\'none\'">' +
      '<div style="font-size:14px;font-weight:600;line-height:1.6">' + escapeHtml(s.text) + '</div>' +
      (s.translation ? '<div style="font-size:12px;color:var(--dim);margin-top:2px">' + escapeHtml(s.translation) + '</div>' : '') +
      '<div style="font-size:11px;color:var(--muted);margin-top:4px">點擊展開解析</div>' +
      '<div class="looked-detail" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--glass-border);font-size:13px;line-height:1.8">' + cached + '</div>' +
      '</div>';
  }).join('');
}

// Override switchTab to also render looked
var _origSwitchTab = switchTab;
switchTab = function(tab) { _origSwitchTab(tab); if (tab === 'looked') renderLooked(); };

loadTheme();
init();
updateBookmarkCount();
renderBookmarks();
renderReview();
</script>
