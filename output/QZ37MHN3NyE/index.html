48號，在公車上。一位乘客跟司機說話。請聽。", "start": 2338.22, "end": 2343.52}, {"text": "Excuseer meneer, ik moet naar het gemeentehuis. Waar moet ik uitstappen?", "translation": "不好意思，先生，我要去市公所。我要在哪裡下車？", "start": 2345.14, "end": 2349.04}, {"text": "Aan de volgende halte, mevrouw. Dank u.", "translation": "下一站，下車，女士。謝謝。", "start": 2349.04, "end": 2353.86}, {"text": "Excuseer meneer, ik moet naar het ziekenhuis. Waar moet ik uitstappen? Aan de laatste halte, mevrouw. Dank u.", "translation": "不好意思，先生，我要去醫院。我要在哪裡下車？在最後一站，下車，女士。謝謝。", "start": 2355.48, "end": 2364.04}, {"text": "49, ik werk als vuilnisman.", "translation": "49號，我是清潔工。", "start": 2367.46, "end": 2370.04}, {"text": "Luister en lees mee in je boek hoofdstuk 10.", "translation": "聽和念你書本第十課。", "start": 2370.98, "end": 2374.38}, {"text": "Ik ben Boris. Ik woon al zes jaar in België, in Oostende.", "translation": "我叫Boris。我在比利時東德年住了六年。", "start": 2375.18, "end": 2379.44}, {"text": "Ik kom uit Rusland, uit Moskou. Ik mis mijn vaderland wel, maar ik woon ook graag in Oostende.", "translation": "我來自俄羅斯，莫斯科。我很想念祖國，但我也很喜歡住在東德年。", "start": 2380.6, "end": 2387.6}, {"text": "Ik vind Oostende een leuke stad.", "translation": "我覺得東德年是一座很棒的城市。", "start": 2388.96, "end": 2391.06}, {"text": "Oostende ligt aan de zee. Dat vind ik plezant. Je kan gaan wandelen op het strand.", "translation": "東德年靠近海邊。我覺得很愉快。你可以在沙灘上散步。", "start": 2392.62, "end": 2399.08}, {"text": "In de zomer kan je gaan zwemmen in de zee.", "translation": "夏天你可以去海裡游泳。", "start": 2403.93, "end": 2409.05}, {"text": "Dat doe ik graag. Ik spreek al tamelijk goed Nederlands.", "translation": "我喜歡這樣做。我荷蘭語說得相當不錯了。", "start": 2410.14, "end": 2415.95}, {"text": "Maar ik vind Nederlands wel een moeilijke taal. En de mensen spreken zo snel.", "translation": "但是我覺得荷蘭語很難。人們講話太快了。", "start": 2417.2, "end": 2421.14}, {"text": "Ik begrijp het niet altijd. Dat vind ik niet zo plezant.", "translation": "我不總是聽得懂。我覺得那不太愉快。", "start": 2422.7, "end": 2427.76}, {"text": "Ik werk als vuilnisman. Ik doe dat niet zo graag.", "translation": "我當清潔工。我不太喜歡這樣做。", "start": 2427.76, "end": 2431.51}, {"text": "Het is zwaar werk. Ik wil graag ander werk.", "translation": "這工作很辛苦。我想找別的工作。", "start": 2433.01, "end": 2434.82}, {"text": "Ik wil werken als schoonmaker.", "translation": "我想當清潔工。", "start": 2436.66, "end": 2441.14}, {"text": "Mijn vrouw Anna is op vakantie naar Moskou. Ik ben jaloers.", "translation": "我的妻子Anna去莫斯科度假了。我好羨慕。", "start": 2442.24, "end": 2446.2}, {"text": "Ik wil ook graag op vakantie. En ik mis Anna.", "translation": "我也想度假。我很想念Anna。", "start": 2447.45, "end": 2450.18}, {"text": "Nog drie weken. En dan komt ze terug.", "translation": "還有三個星期。然後她就回來了。", "start": 2451.57, "end": 2453.55}, {"text": "Oh, dat is nog lang.", "translation": "喔，那還很久。", "start": 2458.49, "end": 2462.66}, {"text": "Luister. Dag mevrouw. Mag ik iets vragen?", "translation": "請聽。您好，女士。我可以問您件事嗎？", "start": 2463.14, "end": 2467.91}, {"text": "Zeker. Waar is de lift? Daar. Op het einde van de gang links.", "translation": "當然。電梯在哪裡？那裡，在走廊盡頭左邊。", "start": 2469.78, "end": 2474.39}, {"text": "Dag mevrouw. Mag ik iets vragen? Ja. Waar is het toilet?", "translation": "您好，女士。我可以問您件事嗎？是的。洗手間在哪裡？", "start": 2474.82, "end": 2477.53}, {"text": "De eerste gang links aan de rechterkant.", "translation": "第一條走廊，左邊靠右的位置。", "start": 2479.34, "end": 2484.05}, {"text": "Beneden. Naast de receptie. Dank u.", "translation": "在樓下。接待處旁邊。謝謝您。", "start": 2484.61, "end": 2487.09}, {"text": "Dag mevrouw. Mag ik iets vragen? Zeker.", "translation": "您好女士。我可以問您一個問題嗎？當然可以。", "start": 2489.57, "end": 2492.76}, {"text": "Waar is kamer 425? Op de vierde verdieping rechts.", "translation": "425號房在哪裡？在第四層樓的右側。", "start": 2493.24, "end": 2498.97}, {"text": "Dag mevrouw. Mag ik iets vragen? Zeker. Waar is lokaal 3.2?", "translation": "您好女士。我可以問一個問題嗎？當然可以。3.2教室在哪裡？", "start": 2501.82, "end": 2507.39}, {"text": "Op de derde verdieping links.", "translation": "在第三層樓的左側。", "start": 2507.88, "end": 2510.24}, {"text": "51. Mag het raam open? Luister.", "translation": "51。能開窗戶嗎？聽著。", "start": 2512.78, "end": 2518.11}, {"text": "Ik heb het warm. Mag het raam open? Zeker.", "translation": "我很熱。能開窗戶嗎？當然可以。", "start": 2518.11, "end": 2521.82}, {"text": "Ik heb het warm. Mag de deur open? Ja. Doe maar.", "translation": "我很熱。能開門嗎？是的，請開。", "start": 2523.97, "end": 2528.36}, {"text": "Ik heb het koud. Mag het raam dicht? Natuurlijk. Doe maar.", "translation": "我很冷。能關窗戶嗎？當然，請關。", "start": 2530.8, "end": 2535.09}, {"text": "Ik heb het koud. Mag de verwarming aan? Ja. Natuurlijk.", "translation": "我很冷。能開暖氣嗎？是的，當然可以。", "start": 2537.86, "end": 2542.11}, {"text": "Mag het licht aan? Ja. Doe maar.", "translation": "燈能開嗎？是的，請開。", "start": 2543.91, "end": 2546.93}, {"text": "Mag het licht uit? Ja.", "translation": "燈能關嗎？是的。", "start": 2549.32, "end": 2551.51}, {"text": "Ik heb het verschrikkelijk warm. Mag de verwarming uit?", "translation": "我非常熱。暖氣能關嗎？", "start": 2553.59, "end": 2556.8}, {"text": "Ja. Doe maar. 52. Ik ben bevallen.", "translation": "是的，請關。52。我生產了。", "start": 2557.24, "end": 2562.84}, {"text": "Luister en lees mee in je boek Hoofdstuk 11.", "translation": "聽著，並跟著你的書一起閱讀第11章。", "start": 2563.97, "end": 2567.26}, {"text": "Ik ben Juliet Wemba. Ik woon in Oostende in flat Floris.", "translation": "我是Juliet Wemba。我住在奧斯坦德，住在Floris公寓。", "start": 2568.88, "end": 2573.45}, {"text": "Ik woon daar samen met mijn man en mijn kinderen.", "translation": "我和我的丈夫及孩子們一起住在那裡。", "start": 2574.89, "end": 2577.39}, {"text": "Thomas en ik komen uit Congo. We wonen al 25 jaar in België.", "translation": "Thomas和我來自剛果。我們已在比利時住了25年。", "start": 2579.11, "end": 2584.61}, {"text": "De eerste dag was het heel koud. Het sneeuwde.", "translation": "第一天非常冷，下雪了。", "start": 2585.89, "end": 2589.47}, {"text": "Ja, dat is lang geleden. Nu hebben we al vier kinderen.", "translation": "是的，那是很久以前的事了。現在我們已經有四個孩子。", "start": 2590.7, "end": 2594.59}, {"text": "Ik lig in het ziekenhuis. Ik ben pas bevallen van mijn vierde kind.", "translation": "我躺在醫院。我剛生了第四個孩子。", "start": 2596.34, "end": 2601.2}, {"text": "Het is een dochter, Rosa. De bevalling is goed gegaan.", "translation": "是一個女兒，叫Rosa。生產很順利。", "start": 2602.55, "end": 2607.53}, {"text": "Maar ik ben wel moe. Rosa huilt veel ’s nachts.", "translation": "但我很累。Rosa晚上哭得很多。", "start": 2608.38, "end": 2612.28}, {"text": "En dan word ik ook wakker. Maar ja, dat is normaal, hè?", "translation": "然後我也會醒來。但這很正常，對吧？", "start": 2613.43, "end": 2617.41}, {"text": "Ik ben blij dat ik een paar dagen niet thuis ben. Ik kan hier beter rusten dan thuis.", "translation": "我很高興能離家幾天。我在這裡比在家裡休息得更好。", "start": 2618.76, "end": 2624.28}, {"text": "Thuis moet ik altijd werken. Boodschappen doen.", "translation": "在家裡我總是得工作。買菜。", "start": 2625.14, "end": 2629.34}, {"text": "Afwassen. De was en de strijk doen. Opruimen.", "translation": "洗碗。洗衣和燙衣服。整理。", "start": 2631.03, "end": 2635.01}, {"text": "Poetsen. De kinderen helpen met hun huiswerk. Ik ben altijd bezig.", "translation": "打掃。幫孩子們做功課。我總是很忙。", "start": 2635.97, "end": 2641.28}, {"text": "Mijn kinderen helpen soms wel. Maar ik moet het dan eerst een paar keer vragen.", "translation": "我的孩子有時會幫忙，但我得先叫他們好幾次。", "start": 2642.72, "end": 2647.7}, {"text": "Idris, wil jij eten maken? Levi, wil jij de vuilzakken buiten zetten?", "translation": "Idris，你想做飯嗎？Levi，你想把垃圾袋拿出去嗎？", "start": 2648.95, "end": 2654.14}, {"text": "Sarah, wil jij afwassen?", "translation": "Sarah，你想洗碗嗎？", "start": 2654.86, "end": 2656.88}, {"text": "Nu moet hij thuis al het werk doen. Ik lig hier de hele dag in bed.", "translation": "現在他得在家做所有的工作。我一整天都躺在床上。", "start": 2660.11, "end": 2665.78}, {"text": "Gelukkig heeft hij een paar dagen verlof.", "translation": "幸好他有幾天假期。", "start": 2666.89, "end": 2669.24}, {"text": "Luister. Zegt u het maar, mevrouw. Eén kilo tomaten, alstublieft.", "translation": "聽著。請說，女士。請給我一公斤番茄。", "start": 2673.57, "end": 2678.7}, {"text": "Anders nog iets? Ja, één komkommer.", "translation": "還要別的嗎？是的，一條小黃瓜。", "start": 2678.7, "end": 2681.7}, {"text": "Anders nog iets? Nee, dat is alles.", "translation": "還要別的嗎？不，這就是全部了。", "start": 2683.26, "end": 2685.91}, {"text": "En voor u, mevrouw? Een krop sla, alstublieft.", "translation": "女士，您要什麼？請給我一顆萵苣。", "start": 2687.97, "end": 2691.34}, {"text": "Zo. Anders nog iets? Nee, dat is alles.", "translation": "這樣。還要別的嗎？不，這就是全部了。", "start": 2691.95, "end": 2695.34}, {"text": "Dat is 95 centaal, alstublieft. Ja, meneer?", "translation": "總共是95仙。是的，先生？", "start": 2695.95, "end": 2701.26}, {"text": "Mag ik een kilo peren? Een kilo peren.", "translation": "我可以買一公斤梨子嗎？一公斤梨子。", "start": 2702.01, "end": 2705.2}, {"text": "Dat zal het zijn. Nee, ook nog drie kiwi’s.", "translation": "應該這樣。不要了，還有三顆奇異果。", "start": 2705.51, "end": 2709.84}, {"text": "Drie kiwi’s. Anders nog iets? Nee, dat is alles.", "translation": "三顆奇異果。還要別的嗎？不，這就是全部了。", "start": 2710.43, "end": 2715.55}, {"text": "Dat is 3,15 euro samen, alstublieft.", "translation": "總共是3.15歐元，請。", "start": 2716.11, "end": 2718.45}, {"text": "En voor u, meneer? 250 gram jonge kaas, alstublieft.", "translation": "先生，您要什麼？請給我250克年輕起司。", "start": 2721.14, "end": 2725.61}, {"text": "Anders nog iets? Ja, 300 gram salami.", "translation": "還要別的嗎？是的，300克薩拉米香腸。", "start": 2726.55, "end": 2730.34}, {"text": "Anders nog iets? Nee, dat is alles.", "translation": "還要別的嗎？不，這就是全部了。", "start": 2731.26, "end": 2734.43}, {"text": "Hoeveel is het? Dat is 6,30 euro samen, alstublieft.", "translation": "多少錢？總共6.30歐元，請。", "start": 2735.22, "end": 2740.34}, {"text": "Alstublieft. En 3,70 euro terug.", "translation": "給您。找您3.70歐元。", "start": 2741.39, "end": 2744.43}, {"text": "Bedankt en tot ziens.", "translation": "謝謝您，再見。", "start": 2745.26, "end": 2746.72}, {"text": "54. Ga je mee? Luister.", "translation": "54。你要一起去嗎？聽著。", "start": 2749.68, "end": 2753.16}, {"text": "Ik ga iets drinken. Ga je mee? Waar?", "translation": "我要去喝點東西。你要一起去嗎？在哪裡？", "start": 2755.01, "end": 2758.24}, {"text": "Beneden, in de cafetaria. Ja, dat is goed.", "translation": "在樓下的咖啡廳。是的，沒問題。", "start": 2758.95, "end": 2762.88}, {"text": "Ik ga zondag wandelen. Ga je mee? Ja, plezant. Hoe laat?", "translation": "我星期天要去散步。你要一起去嗎？是的，很有趣。幾點？", "start": 2764.93, "end": 2770.57}, {"text": "Om twee uur. Dat is goed. Waar?", "translation": "兩點。好的。在哪裡？", "start": 2770.89, "end": 2774.11}, {"text": "In het park. Oké, tot zondag.", "translation": "在公園。好，星期天見。", "start": 2774.47, "end": 2777.55}, {"text": "Tot dan. Ik ga zaterdag winkelen. Ga je mee?", "translation": "到時見。我星期六要去購物。你要一起去嗎？", "start": 2778.09, "end": 2783.95}, {"text": "Ja, leuk. Hoe laat? Om elf uur.", "translation": "是的，很好玩。幾點？十一點。", "start": 2784.57, "end": 2788.03}, {"text": "Waar? In de Nieuwstraat. Oké, tot zaterdag.", "translation": "哪裡？在Nieuwstraat街。好，星期六見。", "start": 2788.8, "end": 2791.89}, {"text": "Dag. Ik ga voetballen. Ga je mee?", "translation": "你好。我去踢足球。你要一起去嗎？", "start": 2791.89, "end": 2797.38}, {"text": "Ja, graag. Wanneer? Vanmiddag. Hoe laat?", "translation": "是的，樂意。什麼時候？今天下午。幾點？", "start": 2797.99, "end": 2802.07}, {"text": "Om vier uur. Waar? Op het strand.", "translation": "四點。在哪裡？海灘上。", "start": 2802.7, "end": 2805.95}, {"text": "Oké, tot straks. Tot straks.", "translation": "好，待會見。待會見。", "start": 2806.93, "end": 2809.43}, {"text": "55. Ik werk in het gemeentehuis.", "translation": "55歲。我在市政廳工作。", "start": 2812.66, "end": 2815.8}, {"text": "Luister en lees mee in je boek, hoofdstuk 12.", "translation": "請聽並跟著你的書第12章閱讀。", "start": 2816.78, "end": 2820.18}, {"text": "Ik ben Thomas Wemba.", "translation": "我是Thomas Wemba。", "start": 2821.2, "end": 2822.7}, {"text": "Ik ben geboren in Congo, maar ik heb nu de Belgische nationaliteit.", "translation": "我出生在剛果，但我現在是比利時國籍。", "start": 2823.99, "end": 2828.57}, {"text": "Ik ben getrouwd met Juliet.", "translation": "我和Juliet結婚了。", "start": 2830.14, "end": 2831.3}, {"text": "Ik woon met mijn vrouw en mijn kinderen op de tweede verdieping in Flat Floris.", "translation": "我和我的妻子及孩子們住在Floris大樓的二樓。", "start": 2832.47, "end": 2836.45}, {"text": "Ik werk in het gemeentehuis. Ik werk aan het loket.", "translation": "我在市政廳工作。我在服務櫃台工作。", "start": 2838.3, "end": 2842.24}, {"text": "Ik doe mijn werk graag. Ik heb veel contact met mensen.", "translation": "我喜歡我的工作。我和人們有很多接觸。", "start": 2843.82, "end": 2848.05}, {"text": "Vorige week is Rosa geboren, ons vierde kind.", "translation": "上週Rosa出生了，我們的第四個孩子。", "start": 2849.45, "end": 2852.97}, {"text": "Een prachtige baby. Ik ben echt blij.", "translation": "一個漂亮的寶寶。我真的很高興。", "start": 2854.14, "end": 2857.26}, {"text": "Maar het is wel druk. Met vier kinderen in een klein appartement.", "translation": "但是很忙。四個孩子住在一個小公寓裡。", "start": 2858.22, "end": 2862.05}, {"text": "Ik ben altijd heel moe 's avonds. Misschien is ons appartement te klein.", "translation": "我晚上總是很累。也許我們的公寓太小了。", "start": 2863.01, "end": 2868.7}, {"text": "Misschien moeten we verhuizen. We willen graag in een huis wonen.", "translation": "也許我們應該搬家。我們想住在一棟房子裡。", "start": 2869.82, "end": 2873.43}, {"text": "Maar dat is duur. Zesenvijftig.", "translation": "但是那很貴。五十六。", "start": 2874.66, "end": 2879.68}, {"text": "Wil je het salon stofzuigen? Luister.", "translation": "你能吸客廳的灰塵嗎？聽我說。", "start": 2880.66, "end": 2883.57}, {"text": "Wil je het salon stofzuigen? Oké, geen probleem.", "translation": "你能吸客廳的灰塵嗎？好，沒問題。", "start": 2885.51, "end": 2889.24}, {"text": "Wil je de tafel dekken? Natuurlijk. Wil je de badkamer poetsen?", "translation": "你能擺餐桌嗎？當然。你能打掃浴室嗎？", "start": 2891.89, "end": 2897.89}, {"text": "Jazeker. Wil je de kleren in de kast leggen?", "translation": "當然。你能把衣服放進櫃子嗎？", "start": 2898.55, "end": 2903.38}, {"text": "Oké, geen probleem. Wil je je kamer opruimen?", "translation": "好，沒問題。你能整理你的房間嗎？", "start": 2904.16, "end": 2909.64}, {"text": "Ik heb geen tijd. Wil je je kamer opruimen?", "translation": "我沒時間。你能整理你的房間嗎？", "start": 2910.32, "end": 2913.95}, {"text": "Ik heb geen tijd. Ruim je kamer op.", "translation": "我沒時間。整理你的房間。", "start": 2914.88, "end": 2918.16}, {"text": "Oké, ik doe het al. Wil je de afwas doen?", "translation": "好，我馬上做。你能洗碗嗎？", "start": 2918.76, "end": 2924.01}, {"text": "Ik doe dat niet graag. Wil je de afwas doen?", "translation": "我不太喜歡洗碗。你能洗碗嗎？", "start": 2924.88, "end": 2927.95}, {"text": "Ik doe dat niet graag. Doe de afwas.", "translation": "我不太喜歡洗碗。洗碗。", "start": 2929.07, "end": 2932.74}, {"text": "Oké, ik doe het al.", "translation": "好，我馬上做。", "start": 2933.57, "end": 2935.07}, {"text": "Wil je de vuilzakken buiten zetten? Ik heb geen goesting.", "translation": "你能把垃圾袋拿出去嗎？我不想做。", "start": 2938.05, "end": 2941.14}, {"text": "Wil je de vuilzakken buiten zetten? Ik heb geen goesting.", "translation": "你能把垃圾袋拿出去嗎？我不想做。", "start": 2942.41, "end": 2945.91}, {"text": "Zet de vuilzakken buiten. Oké, ik doe het al.", "translation": "把垃圾袋拿出去。好，我馬上做。", "start": 2946.78, "end": 2949.95}, {"text": "Wil je de boeken in de kast doen? Ik vind dat niet plezant.", "translation": "你能把書放回書櫃嗎？我覺得不喜歡那樣做。", "start": 2952.45, "end": 2956.24}, {"text": "Wil je de boeken in de kast doen? Ik vind dat niet plezant.", "translation": "你能把書放回書櫃嗎？我覺得不喜歡那樣做。", "start": 2957.45, "end": 2961.38}, {"text": "Doe de boeken in de kast. Oké, ik doe het al.", "translation": "把書放進書櫃。好，我馬上做。", "start": 2962.16, "end": 2964.95}, {"text": "57. Sarah Wemba", "translation": "57歲。Sarah Wemba。", "start": 2969.43, "end": 2972.66}, {"text": "Luister en lees mee in je boek, hoofdstuk 13.", "translation": "請聽並跟著你的書第13章閱讀。", "start": 2972.66, "end": 2975.66}, {"text": "Luister en lees mee in je boek, hoofdstuk 13. Ik ben Sarah Wemba. Ik heb twee broers en één zusje.", "translation": "請聽並跟著你的書第13章閱讀。我是Sarah Wemba。我有兩個兄弟和一個妹妹。", "start": 2975.66, "end": 2981.51}, {"text": "Rosa is de jongste. Zij is pas geboren.", "translation": "Rosa是最小的。她剛出生。", "start": 2982.76, "end": 2986.01}, {"text": "Idris is de oudste. Hij is 19 jaar.", "translation": "Idris是最大的。他19歲。", "start": 2987.24, "end": 2990.43}, {"text": "Hij is altijd lief voor mij. Levi is de tweede.", "translation": "他對我總是很溫柔。Levi是第二個。", "start": 2991.51, "end": 2995.64}, {"text": "Hij is 15 jaar. Ik ben Dennis. 1 00:49:59,987 --> 00:50:02,647 Ik ben de derde.", "translation": "他15歲。我是Dennis。 1 00:49:59,987 --> 00:50:02,647 我是第三個。", "start": 2996.39, "end": 2999.91}, {"text": "Ik maak dikwijls ruzie met Levi. Ik wil graag een film zien op tv.", "translation": "我經常和Levi吵架。我想看電視電影。", "start": 3005.19, "end": 3010.41}, {"text": "Levi wil graag voetbal zien. Ik wil op de computer.", "translation": "Levi想看足球。我想用電腦。", "start": 3011.29, "end": 3015.09}, {"text": "Levi wil ook op de computer. Ik heb veel vriendinnen.", "translation": "Levi也想用電腦。我有很多女朋友。", "start": 3015.99, "end": 3020.63}, {"text": "Anne, Lotte, Lisa, Marie.", "translation": "Anne、Lotte、Lisa、Marie。", "start": 3021.81, "end": 3024.77}, {"text": "Wij spreken elke woensdag namiddag af. We doen dan altijd leuke dingen.", "translation": "我們每個星期三下午約會。我們總是做很有趣的事。", "start": 3026.35, "end": 3031.51}, {"text": "We kijken in modebladen. We kijken samen naar een film op tv.", "translation": "我們看時尚雜誌。我們一起看電視電影。", "start": 3032.47, "end": 3036.03}, {"text": "We spelen op de computer. We luisteren naar muziek.", "translation": "我們玩電腦。我們聽音樂。", "start": 3036.79, "end": 3039.99}, {"text": "We babbelen en we lachen altijd veel. Als het mooi weer is, gaan we naar buiten.", "translation": "我們聊天且總是笑很多。如果天氣很好，我們會到外面去。", "start": 3040.81, "end": 3046.51}, {"text": "We spelen met de bal of we liggen op het strand.", "translation": "我們玩球或躺在海灘上。", "start": 3047.55, "end": 3049.87}, {"text": "Volgende zaterdag is Lisa jarig. Zij wordt dertien jaar.", "translation": "下星期六Lisa生日。她將滿十三歲。", "start": 3051.57, "end": 3055.79}, {"text": "Zij geeft een feest. Ik ga er natuurlijk naartoe.", "translation": "她要辦派對。我當然會去。", "start": 3056.55, "end": 3060.37}, {"text": "Het wordt leuk, denk ik. Morgen ga ik een cadeautje kopen.", "translation": "我覺得會很有趣。明天我要去買禮物。", "start": 3061.47, "end": 3065.83}, {"text": "Lisa luistert graag naar muziek. Ik ga een cd van Madonna kopen.", "translation": "Lisa喜歡聽音樂。我會買瑪丹娜的CD。", "start": 3067.15, "end": 3071.97}, {"text": "58, ga je mee? Luister. Ik ga een handtas kopen.", "translation": "58，你要一起去嗎？聽著。我會買手提包。", "start": 3074.83, "end": 3079.81}, {"text": "Ga je mee? Ja, dat is goed. Ik ga een broek kopen. Ga je mee?", "translation": "你一起去嗎？是的，沒問題。我會買褲子。你一起去嗎？", "start": 3080.29, "end": 3086.05}, {"text": "Oké. Ik ga nieuwe schoenen kopen. Ga je mee?", "translation": "好。我會買新鞋子。你一起去嗎？", "start": 3087.41, "end": 3091.65}, {"text": "Ja, plezant.", "translation": "是的，很有趣。", "start": 3091.71, "end": 3093.31}, {"text": "59, wanneer spreken we af? Luister.", "translation": "59，我們什麼時候約？聽著。", "start": 3097.97, "end": 3101.07}, {"text": "Wanneer spreken we af? Woensdag om vier uur?", "translation": "我們什麼時候約？星期三四點？", "start": 3102.67, "end": 3105.89}, {"text": "Dat is goed. Wanneer spreken we af?", "translation": "好啊。我們什麼時候約？", "start": 3106.77, "end": 3111.07}, {"text": "Maandagvoormiddag? Sorry, dat is moeilijk.", "translation": "星期一上午？抱歉，那很難。", "start": 3113.29, "end": 3116.51}, {"text": "Wanneer spreken we af? Donderdagnamiddag om drie uur?", "translation": "我們什麼時候約？星期四下午三點？", "start": 3118.81, "end": 3123.23}, {"text": "Dat is moeilijk. Vier uur? Dat is perfect.", "translation": "那很難。四點？那很完美。", "start": 3124.21, "end": 3128.07}, {"text": "60, ik ga een jas kopen. Ga je mee?", "translation": "60，我要買外套。你一起去嗎？", "start": 3130.03, "end": 3133.53}, {"text": "Luister. Ik ga een jas kopen. Ga je mee?", "translation": "聽著。我會買外套。你一起去嗎？", "start": 3134.61, "end": 3138.25}, {"text": "Oké. Wanneer spreken we af?", "translation": "好啊。我們什麼時候約？", "start": 3138.25, "end": 3141.45}, {"text": "Dinsdagnamiddag om twee uur? Dat is goed. Waar?", "translation": "星期二下午兩點？好啊。哪裡？", "start": 3143.23, "end": 3147.67}, {"text": "Bij mij thuis?", "translation": "在我家嗎？", "start": 3148.43, "end": 3149.39}, {"text": "Oké. Dinsdagnamiddag om twee uur bij jou thuis.", "translation": "好。星期二下午兩點在你家。", "start": 3151.23, "end": 3155.09}, {"text": "61, ik zoek zwarte schoenen. Luister.", "translation": "61，我找黑色鞋子。聽著。", "start": 3158.11, "end": 3161.43}, {"text": "Kan ik u helpen? Ik zoek zwarte schoenen.", "translation": "我可以幫你嗎？我找黑色鞋子。", "start": 3163.31, "end": 3166.41}, {"text": "Welke maat? 39.", "translation": "什麼尺寸？39。", "start": 3166.41, "end": 3169.57}, {"text": "Kan ik u helpen? Ik zoek laarzen.", "translation": "我可以幫你嗎？我找長靴。", "start": 3170.89, "end": 3173.97}, {"text": "Welke maat? 41. Mag ik eens passen?", "translation": "什麼尺寸？41。我可以試穿嗎？", "start": 3174.65, "end": 3178.51}, {"text": "Natuurlijk, doe maar. Passen ze? Ja, ze passen.", "translation": "當然，請試穿。合適嗎？是的，很合適。", "start": 3179.45, "end": 3183.41}, {"text": "Kan ik u helpen? Ik zoek sportschoenen. Hebt u maat 41?", "translation": "我可以幫你嗎？我找運動鞋。你有41號嗎？", "start": 3186.55, "end": 3190.41}, {"text": "Ja, hier staan de sportschoenen in maat 41.", "translation": "有，這裡有41號的運動鞋。", "start": 3191.33, "end": 3194.81}, {"text": "Mag ik eens passen? Natuurlijk, doe maar. Passen ze?", "translation": "我可以試穿嗎？當然，請試穿。合適嗎？", "start": 3194.81, "end": 3199.31}, {"text": "Nee, ze zijn te breed.", "translation": "不，太寬了。", "start": 3199.85, "end": 3201.55}, {"text": "62, ik zoek een rok. Luister. Kan ik u helpen?", "translation": "62，我找裙子。聽著。我可以幫你嗎？", "start": 3204.55, "end": 3209.27}, {"text": "Ik zoek een rok. Mag ik eens passen? Ja, natuurlijk. Past hij?", "translation": "我找裙子。我可以試穿嗎？當然。合身嗎？", "start": 3209.73, "end": 3215.35}, {"text": "Ja, perfect. Kan ik u helpen?", "translation": "是的，非常合適。我可以幫你嗎？", "start": 3216.03, "end": 3220.95}, {"text": "Ik zoek een trui. Mag ik eens rondkijken?", "translation": "我找毛衣。我可以看看嗎？", "start": 3220.95, "end": 3224.11}, {"text": "Natuurlijk. Mag ik eens passen? Ja, natuurlijk. Past hij?", "translation": "當然。我可以試穿嗎？當然。合身嗎？", "start": 3224.45, "end": 3229.99}, {"text": "Nee, hij is te smal. Kan ik u helpen?", "translation": "不，太窄了。我可以幫你嗎？", "start": 3230.81, "end": 3236.25}, {"text": "Ik zoek een broek. Welke maat? 42. Mag ik eens passen?", "translation": "我找褲子。什麼尺寸？42。我可以試穿嗎？", "start": 3236.85, "end": 3242.79}, {"text": "Ja, natuurlijk. Past ze?", "translation": "當然。合適嗎？", "start": 3243.27, "end": 3246.43}, {"text": "Nee, ze is te kort.", "translation": "不，太短了。", "start": 3247.35, "end": 3249.13}, {"text": "Mag ik eens passen? Jazeker. Waar is de paskamer?", "translation": "我可以試穿嗎？當然。試衣間在哪裡？", "start": 3252.13, "end": 3257.15}, {"text": "Daar in de hoek. Past het? Nee, het is te lang.", "translation": "在那個角落。合身嗎？不，太長了。", "start": 3257.79, "end": 3263.33}, {"text": "63, past de rok? Luister.", "translation": "63，那裙子合適嗎？聽著。", "start": 3268.75, "end": 3271.35}, {"text": "Excuseer mevrouw, waar hangen de rokken? Hier, naast de broeken.", "translation": "抱歉，女士，裙子掛在哪裡？這裡，在褲子旁邊。", "start": 3272.69, "end": 3277.85}, {"text": "Hebt u deze rok in maat 40? Ik zal eens kijken.", "translation": "您有這件40號的裙子嗎？我來看看。", "start": 3278.55, "end": 3283.71}, {"text": "Hier hebt u een maatje 40. Hoeveel kost de rok?", "translation": "這裡有一件40號的。這裙子多少錢？", "start": 3285.01, "end": 3288.33}, {"text": "Die kost 29 euro. Mag ik eens passen?", "translation": "這個29歐元。我可以試穿嗎？", "start": 3288.99, "end": 3292.83}, {"text": "Natuurlijk. Waar is de paskamer? Daar, aan het einde van deze rij.", "translation": "當然。試衣間在哪裡？就在這排的盡頭。", "start": 3293.25, "end": 3297.93}, {"text": "Past hij? Hij is te klein. Hebt u deze rok in maat 42?", "translation": "合適嗎？太小了。您有42號的這件裙子嗎？", "start": 3300.01, "end": 3304.73}, {"text": "Jazeker. Ik ga hem voor u halen.", "translation": "當然有。我去幫您拿。", "start": 3305.39, "end": 3307.79}, {"text": "Alsjeblieft mevrouw, maat 42. Is deze maat goed?", "translation": "給您，女士，42號。這尺寸合適嗎？", "start": 3309.53, "end": 3314.79}, {"text": "Ja, de maat is goed. De rok past. En ik vind hem mooi.", "translation": "是的，尺寸合適。裙子很合身。我也覺得漂亮。", "start": 3315.61, "end": 3319.79}, {"text": "Waar kan ik betalen? De kassa is vooraan in de winkel.", "translation": "我在哪裡可以付款？收銀台在店鋪前方。", "start": 3320.63, "end": 3323.91}, {"text": "Dank u wel. 64 Irma roddelt.", "translation": "謝謝你。64 伊爾瑪八卦。", "start": 3324.61, "end": 3328.37}, {"text": "Luister en lees mee in je boek hoofdstuk 14.", "translation": "聽著，一起讀你書的第14章。", "start": 3329.53, "end": 3332.79}, {"text": "Ik ben Irma Petit.", "translation": "我是伊爾瑪．佩蒂。", "start": 3333.97, "end": 3335.97}, {"text": "Ik woon samen met mijn man Louis in flat Floris op de derde verdieping.", "translation": "我和我丈夫路易斯住在佛羅里斯大樓三樓的公寓裡。", "start": 3337.67, "end": 3342.49}, {"text": "Wij wonen graag in flat Floris. We wonen dicht bij de zee.", "translation": "我們喜歡住在佛羅里斯大樓。我們住得很靠近海邊。", "start": 3344.01, "end": 3348.87}, {"text": "Dat is gezond. We hebben vroeger lang in Brussel gewoond.", "translation": "那很健康。我們以前在布魯塞爾住了很久。", "start": 3349.73, "end": 3354.49}, {"text": "In Brussel wonen is niet gezond. Zoveel auto's.", "translation": "住在布魯塞爾不健康。那裡有太多車輛。", "start": 3355.93, "end": 3359.73}, {"text": "Er wonen veel mensen in flat Floris.", "translation": "佛羅里斯大樓住了很多人。", "start": 3361.25, "end": 3364.97}, {"text": "Boven ons woont Monique met haar zoon Sander en haar dochter Sophie.", "translation": "我們樓上住著莫妮克和她的兒子桑德、女兒蘇菲。", "start": 3366.69, "end": 3371.81}, {"text": "Monique is gescheiden. Ik vind scheiden niet goed.", "translation": "莫妮克離婚了。我覺得離婚不好。", "start": 3373.67, "end": 3377.65}, {"text": "Dat is niet goed voor de kinderen.", "translation": "那對孩子不好。", "start": 3378.99, "end": 3380.79}, {"text": "Louis zegt: Irma, je mag je niet bemoeien met andere mensen.", "translation": "路易斯說，伊爾瑪，你不可以干涉別人的事。", "start": 3381.93, "end": 3386.45}, {"text": "Op de eerste verdieping woont Natalia.", "translation": "一樓住著娜塔莉亞。", "start": 3387.95, "end": 3391.83}, {"text": "En naast Natalia woont Fouad. Ik vind dat niet goed.", "translation": "娜塔莉亞隔壁住著福阿德。我覺得這不好。", "start": 3393.47, "end": 3399.03}, {"text": "Twee jonge mensen naast elkaar.", "translation": "兩個年輕人住在一起。", "start": 3400.03, "end": 3401.53}, {"text": "Maar Louis zegt: Irma, je mag je niet bemoeien met andere mensen.", "translation": "但路易斯說，伊爾瑪，你不可以干涉別人的事。", "start": 3402.99, "end": 3407.85}, {"text": "Ik denk dat Natalia verliefd is op Fouad.", "translation": "我想娜塔莉亞愛上福阿德了。", "start": 3409.69, "end": 3415.17}, {"text": "En Fouad op Natalia. Ik denk dat.", "translation": "福阿德也愛娜塔莉亞。我是這麼想的。", "start": 3416.33, "end": 3421.09}, {"text": "Het zijn toch allebei jonge mensen. En wat heb ik gezien?", "translation": "他們畢竟都是年輕人。我看到了什麼？", "start": 3422.35, "end": 3426.53}, {"text": "Fouad heeft bij Natalia aangebeld. En wat heb ik gehoord?", "translation": "福阿德按了娜塔莉亞的門鈴。我聽到了什麼？", "start": 3428.25, "end": 3434.05}, {"text": "Kom binnen, Fouad. En wil je iets drinken?", "translation": "請進，福阿德。要喝點什麼嗎？", "start": 3435.25, "end": 3439.25}, {"text": "Ja ja, dat heb ik gehoord.", "translation": "是的，是的，我聽到了。", "start": 3439.87, "end": 3442.55}, {"text": "Vijfenzestig, in het station. Luister.", "translation": "65，在車站。聽著。", "start": 3446.19, "end": 3449.63}, {"text": "Waar kan ik iets drinken? In de cafetaria, naast de ingang.", "translation": "我在哪裡可以喝點東西？在咖啡廳，入口旁邊。", "start": 3450.89, "end": 3455.43}, {"text": "Waar kan ik een krant kopen? In de krantenwinkel, naast de trap.", "translation": "我在哪裡可以買報紙？在報刊店，樓梯旁邊。", "start": 3458.07, "end": 3462.85}, {"text": "Waar kan ik een ticket kopen, alsjeblieft? Daar, aan het loket.", "translation": "請問我在哪裡可以買票？在售票窗口那裡。", "start": 3465.63, "end": 3469.37}, {"text": "Of hier, aan de automaat.", "translation": "或者這裡，售票自動機。", "start": 3470.09, "end": 3471.79}, {"text": "Waar kan ik informatie vragen, alsjeblieft?", "translation": "請問我在哪裡可以問資訊？在10號窗口。請問我在哪裡可以兌換錢？", "start": 3474.11, "end": 3477.13}, {"text": "Daar, aan loket 10. Waar kan ik geld wisselen, alsjeblieft?", "translation": "我不知道。我可以在這裡吸煙嗎？", "start": 3477.63, "end": 3483.63}, {"text": "Ik weet het niet. Mag ik hier roken?", "translation": "不行，車站內不允許吸煙。", "start": 3484.47, "end": 3489.11}, {"text": "Nee, dat mag niet in het station.", "translation": "我可以坐這裡嗎？當然可以。", "start": 3489.79, "end": 3491.77}, {"text": "Mag ik hier zitten, alsjeblieft? Natuurlijk.", "translation": "66，請來一張去那慕爾的車票。聽著。", "start": 3495.11, "end": 3497.97}, {"text": "Zesenzestig, een ticket naar Namen, alsjeblieft. Luister.", "translation": "布魯日，來回票，請。", "start": 3500.67, "end": 3505.15}, {"text": "Brugge, heen en terug, alsjeblieft.", "translation": "七歐元四十。請。謝謝。", "start": 3506.67, "end": 3508.47}, {"text": "Dat is zeven euro veertig. Alsjeblieft. Dank u.", "translation": "布蘭肯貝赫，請，一張老年票。單程？", "start": 3509.43, "end": 3513.43}, {"text": "Blankenberge, alsjeblieft, een ticket voor senioren. Enkel?", "translation": "不，來回票。多少錢？", "start": 3516.57, "end": 3520.83}, {"text": "Nee, heen en terug. Hoeveel is dat?", "translation": "五歐元二十。哇，好便宜。", "start": 3521.17, "end": 3524.23}, {"text": "Vijf euro twintig. Amai, dat is goedkoop.", "translation": "請給我一張布魯塞爾週末票。", "start": 3525.21, "end": 3528.51}, {"text": "Een weekendticket Brussel, alsjeblieft.", "translation": "", "start": 3530.13, "end": 3533.79}, {"text": "Zestien euro twintig. Kan ik met Bancontact betalen?", "translation": "十六歐元二十。請問可以用Bancontact付款嗎？", "start": 3535.31, "end": 3538.75}, {"text": "Geen probleem. Zaventem enkel, alsjeblieft.", "translation": "沒問題。只有Zaventem，謝謝。", "start": 3539.73, "end": 3545.09}, {"text": "Wolvertem? Nee, Zaventem. Dat is negentien euro dertig.", "translation": "Wolvertem？不，是Zaventem。那是十九歐元三十。", "start": 3546.19, "end": 3551.79}, {"text": "Alsjeblieft. Bedankt en goede reis.", "translation": "請。謝謝，祝您旅途愉快。", "start": 3552.43, "end": 3555.41}, {"text": "Excuseer, mag ik iets vragen? Ja, vraag maar.", "translation": "抱歉，我可以問你一件事嗎？可以，請問。", "start": 3558.51, "end": 3563.21}, {"text": "Hoeveel kost een ticket naar Namen, alsjeblieft? Enkel?", "translation": "請問到Namen的車票多少錢？單程嗎？", "start": 3563.89, "end": 3567.39}, {"text": "Ja. Negentien euro veertig.", "translation": "是的。十九歐元四十。", "start": 3567.93, "end": 3571.35}, {"text": "Bedankt voor de informatie. Graag gedaan.", "translation": "謝謝您的資訊。不客氣。", "start": 3572.19, "end": 3575.05}, {"text": "Zevenenzestig, waar vertrekt de trein naar Antwerpen? Luister.", "translation": "六十七，前往Antwerpen的火車在哪裡發車？聽著。", "start": 3577.45, "end": 3581.75}, {"text": "Excuseer, hoe laat is er een trein naar Brussel?", "translation": "抱歉，去Brussel的火車幾點？", "start": 3583.13, "end": 3586.21}, {"text": "Over vijf minuten, mevrouw. En op welk spoor? Spoor zes.", "translation": "五分鐘後，女士。在哪個月台？六號月台。", "start": 3586.83, "end": 3590.61}, {"text": "Bedankt. Excuseer, mag ik iets vragen?", "translation": "謝謝。抱歉，我可以問一件事嗎？", "start": 3591.11, "end": 3595.73}, {"text": "Natuurlijk. Waar vertrekt de trein naar Antwerpen? Spoor vier.", "translation": "當然。去Antwerpen的火車在哪裡發車？四號月台。", "start": 3596.63, "end": 3599.65}, {"text": "Spoor tien? Nee, spoor vier.", "translation": "十號月台？不，是四號月台。", "start": 3601.3, "end": 3604.62}, {"text": "Ah, vier. Dankuwel.", "translation": "啊，四號。謝謝您。", "start": 3604.88, "end": 3606.96}, {"text": "Sorry, vertrekt hier de trein naar Brugge?", "translation": "抱歉，這裡發車的是去Brugge的火車嗎？", "start": 3611.74, "end": 3614.84}, {"text": "Nee, dat is op spoor vijf. Haast u, daar komt de trein al.", "translation": "不，是五號月台。請快點，火車來了。", "start": 3615.54, "end": 3620.68}, {"text": "Oké, bedankt.", "translation": "好的，謝謝。", "start": 3620.86, "end": 3622.6}, {"text": "68. Louis Petit.", "translation": "68。Louis Petit。", "start": 3625.52, "end": 3627.56}, {"text": "Luister en lees mee in je boek, hoofdstuk 15.", "translation": "請聽並跟著你的書，第十五章閱讀。", "start": 3628.16, "end": 3632.26}, {"text": "Ik ben Louis Petit.", "translation": "我是Louis Petit。", "start": 3634.3, "end": 3635.36}, {"text": "Ik woon samen met mevrouw Irma op de derde verdieping van Flap Floris.", "translation": "我和Irma女士一起住在Flap Floris三樓。", "start": 3637.18, "end": 3641.14}, {"text": "We zijn gisteren naar een feest geweest. Het feest van Guido en Julia.", "translation": "我們昨天去參加了一個派對。Guido和Julia的派對。", "start": 3642.52, "end": 3647.04}, {"text": "Guido en Julia zijn vijftig jaar getrouwd. Daarom hebben ze een feest gegeven.", "translation": "Guido和Julia結婚五十年了。所以他們辦了派對。", "start": 3649.08, "end": 3654.72}, {"text": "Ik heb veel met vrienden van vroeger gepraat. Met vrienden praten vind ik heel leuk.", "translation": "我跟以前的朋友聊了很多。我很喜歡跟朋友聊天。", "start": 3656.46, "end": 3662.24}, {"text": "We hebben over de Belgische politiek gepraat.", "translation": "我們聊了比利時的政治。", "start": 3663.96, "end": 3666.46}, {"text": "En ook over voetbal en over kaarten,", "translation": "也聊了足球和打牌，", "start": 3668.02, "end": 3670.9}, {"text": "biljarten en een pintje drinken.", "translation": "撞球和喝一杯啤酒。", "start": 3671.62, "end": 3674.24}, {"text": "En natuurlijk ook over de vrouwen.", "translation": "當然還聊了女人。", "start": 3675.4, "end": 3677.74}, {"text": "Ik vind Irma een hele lieve vrouw. Maar ze praat te veel.", "translation": "我覺得Irma是個很可愛的女人。但她話太多了。", "start": 3679.34, "end": 3684.3}, {"text": "En ze bemoeit zich te veel met andere mensen.", "translation": "而且她太多管閒事了。", "start": 3686.02, "end": 3688.16}, {"text": "Ze vertelt van alles over onze familie aan andere mensen.", "translation": "她會把我們家族的事情告訴別人。", "start": 3690.0, "end": 3693.56}, {"text": "Dat vind ik niet plezant. Soms ben ik dan kwaad op Irma.", "translation": "我不喜歡這樣。有時候我會對Irma生氣。", "start": 3694.94, "end": 3700.28}, {"text": "69. Carla Peters zoekt een appartement.", "translation": "69。Carla Peters找公寓。", "start": 3702.66, "end": 3706.18}, {"text": "Luister. Appartement 1.", "translation": "聽。公寓1。", "start": 3706.96, "end": 3710.32}, {"text": "Met Stevens. Goeiedag meneer, met Carla Peters.", "translation": "我是Stevens。您好，我是Carla Peters。", "start": 3710.32, "end": 3714.9}, {"text": "Ik bel voor het appartement in de Boomstraat. Is dat nog te huur?", "translation": "我打電話是關於Boomstraat的公寓。還在出租嗎？", "start": 3715.7, "end": 3720.1}, {"text": "Jazeker. Hoeveel kost het? 300 euro, mevrouw.", "translation": "當然。多少錢？三百歐元，女士。", "start": 3720.36, "end": 3725.0}, {"text": "En hoeveel slaapkamers zijn er? Eén slaapkamer.", "translation": "有多少間臥室？一間臥室。", "start": 3725.86, "end": 3729.56}, {"text": "Is er een aparte badkamer? Een douche met wc, ja.", "translation": "有獨立浴室嗎？有淋浴間和馬桶。", "start": 3730.74, "end": 3735.34}, {"text": "En is er een aparte keuken? Nee, de keuken is in de woonkamer.", "translation": "有獨立廚房嗎？沒有，廚房在客廳裡。", "start": 3736.3, "end": 3742.02}, {"text": "Sorry, ik wil een aparte keuken. Geen probleem, mevrouw. Prettig weekend nog.", "translation": "抱歉，我想要獨立廚房。沒問題，女士。祝您週末愉快。", "start": 3742.98, "end": 3748.5}, {"text": "Goeiedag. Appartement 2.", "translation": "您好。公寓2。", "start": 3749.1, "end": 3752.96}, {"text": "Met Somers. Goeiedag meneer, met Carla Peters.", "translation": "我是Somers。您好，我是Carla Peters。", "start": 3754.68, "end": 3758.58}, {"text": "Ik bel voor het appartement in de Vogelstraat. Is dat nog te huur?", "translation": "我打電話是關於Vogelstraat的公寓。還在出租嗎？", "start": 3759.38, "end": 3763.5}, {"text": "Jazeker. Hoeveel slaapkamers zijn er?", "translation": "當然。有多少間臥室？", "start": 3763.92, "end": 3767.38}, {"text": "Drie slaapkamers. Is er een aparte keuken?", "translation": "三間臥室。有獨立廚房嗎？", "start": 3767.38, "end": 3771.84}, {"text": "Jawel, een mooi ingerichte keuken met alle comfort.", "translation": "有的，有一個設備齊全且舒適的廚房。", "start": 3772.76, "end": 3776.34}, {"text": "En is er een aparte badkamer?", "translation": "有獨立浴室嗎？", "start": 3777.2, "end": 3779.18}, {"text": "Ja, met ligbad, douche, twee lavabo's en een wc.", "translation": "有，配有浴缸、淋浴、兩個洗臉台和一個馬桶。", "start": 3780.12, "end": 3785.16}, {"text": "Hoeveel kost het? 700 euro, mevrouw.", "translation": "多少錢？700歐元，女士。", "start": 3786.18, "end": 3789.48}, {"text": "Oei, sorry, het is te duur. Geen probleem, mevrouw.", "translation": "哎呀，抱歉，太貴了。沒問題，女士。", "start": 3790.5, "end": 3793.96}, {"text": "Bedankt voor de informatie. Goeiedag. Dag.", "translation": "謝謝您的資訊。再見。再見。", "start": 3794.58, "end": 3798.38}, {"text": "Appartement 3. Met Storms. Goeiedag meneer, met Carla Peters.", "translation": "3號公寓。由Storms管理。您好，先生，我是Carla Peters。", "start": 3800.94, "end": 3806.6}, {"text": "Ik bel voor het appartement in de Hondstraat. Is dat nog te huur?", "translation": "我打電話是關於Hondstraat的公寓。還有空租嗎？", "start": 3807.34, "end": 3811.24}, {"text": "Jazeker. Hoeveel kost het appartement? 500 euro, mevrouw.", "translation": "當然。公寓多少錢？500歐元，女士。", "start": 3811.68, "end": 3816.96}, {"text": "En hoeveel slaapkamers zijn er? Twee slaapkamers.", "translation": "有幾間臥室？兩間臥室。", "start": 3817.36, "end": 3821.22}, {"text": "Is er een aparte keuken? Ja, er is een kleine ingerichte keuken.", "translation": "有獨立廚房嗎？有，有一個小型設備齊全的廚房。", "start": 3822.08, "end": 3827.16}, {"text": "En is er een aparte badkamer?", "translation": "有獨立浴室嗎？", "start": 3827.58, "end": 3829.34}, {"text": "Een mooie badkamer met douche, wc en een lavabo.", "translation": "有漂亮的浴室，裡面有淋浴、馬桶和洗臉盆。", "start": 3830.16, "end": 3834.88}, {"text": "En er is nog plaats om een wasmachine te zetten. Mag ik eens komen kijken?", "translation": "還有地方放洗衣機。可以來看房嗎？", "start": 3835.4, "end": 3840.52}, {"text": "Ja, natuurlijk. Wanneer kunt u? Kan ik vandaag komen?", "translation": "可以，當然。您什麼時候方便？我今天可以來嗎？", "start": 3841.2, "end": 3845.68}, {"text": "Dat is moeilijk. Kunt u morgen? Ik kan morgen voor middag.", "translation": "那有點困難。您明天可以嗎？我明天下午可以。", "start": 3846.48, "end": 3851.32}, {"text": "Tien uur?", "translation": "十點？", "start": 3851.32, "end": 3852.86}, {"text": "Dat is goed. Morgen tien uur in de Hondstraat.", "translation": "好啊。明天十點，在Hondstraat。", "start": 3853.56, "end": 3857.5}, {"text": "Wat is het huisnummer? Zeventwintig. Bedankt. Tot morgen.", "translation": "房號是多少？27號。謝謝。明天見。", "start": 3858.42, "end": 3862.9}, {"text": "Zeventig. Ik heb als poetsvrouw gewerkt. Luister.", "translation": "70號。我曾當過清潔工。請聽我說。", "start": 3865.68, "end": 3870.02}, {"text": "Welk werk hebt u al gedaan? Ik heb als poetsvrouw gewerkt.", "translation": "您做過什麼工作？我當過清潔工。", "start": 3872.66, "end": 3876.12}, {"text": "Waar? Bij Levanto. Welk werk hebt u al gedaan?", "translation": "在哪裡？在Levanto。您做過什麼工作？", "start": 3877.16, "end": 3882.0}, {"text": "Ik heb als mechanicien gewerkt. Waar? In de haven.", "translation": "我做過機械師。在哪裡？在港口。", "start": 3883.14, "end": 3887.46}, {"text": "Hebt u al als kok gewerkt? Nee, nog nooit.", "translation": "您當過廚師嗎？沒有，從沒。", "start": 3889.24, "end": 3893.44}, {"text": "Hebt u al als arbeidster gewerkt? Ja, in een koekjesfabriek.", "translation": "您當過工人嗎？有，在一家餅乾工廠。", "start": 3896.0, "end": 3900.58}, {"text": "Wat moest u daar doen? Koekjes inpakken.", "translation": "您那裡做什麼？包裝餅乾。", "start": 3900.92, "end": 3903.48}, {"text": "Hebt u al in België gewerkt? Nee, nog nooit.", "translation": "您在比利時工作過嗎？沒有，從沒。", "start": 3907.18, "end": 3911.5}, {"text": "Hebt u al in België gewerkt? Ja, in een tomatenserre.", "translation": "您在比利時工作過嗎？有，在蕃茄溫室。", "start": 3915.12, "end": 3919.68}, {"text": "Enenzeventig. Is het een voltijdse job? Luister.", "translation": "72號。這是全職工作嗎？請聽。", "start": 3920.46, "end": 3924.64}, {"text": "Is het een voltijdse job? Ja, achtendertig uur per week.", "translation": "是全職工作嗎？是，每週三十八小時。", "start": 3926.46, "end": 3931.38}, {"text": "Zijn het vaste uren? Ja, elke dag van acht tot half vijf.", "translation": "工作時間固定嗎？是，每天八點到四點半。", "start": 3932.18, "end": 3937.76}, {"text": "Is het een vast contract? Ja.", "translation": "是固定合約嗎？是。", "start": 3938.8, "end": 3941.84}, {"text": "Is het een voltijdse job? Nee, deeltijds, vijfentwintig uur per week.", "translation": "是全職工作嗎？不，是兼職，每週二十五小時。", "start": 3943.86, "end": 3949.24}, {"text": "En zijn het vaste uren? Nee, het zijn flexibele uren.", "translation": "工作時間固定嗎？不，是彈性時間。", "start": 3949.86, "end": 3953.84}, {"text": "De ene week is het 's morgens en de andere week is het 's namiddags.", "translation": "一週早上上班，下一週下午上班。", "start": 3954.34, "end": 3958.2}, {"text": "Is het een vast contract? Ja, het is een vaste job.", "translation": "是固定合約嗎？是，這是固定工作。", "start": 3959.28, "end": 3962.28}, {"text": "Is het een voltijdse job? Nee, halftijds, negentien uur per week.", "translation": "是全職工作嗎？不，是半職，每週十九小時。", "start": 3965.16, "end": 3970.84}, {"text": "En zijn het vaste uren?", "translation": "工作時間固定嗎？", "start": 3971.44, "end": 3972.94}, {"text": "Ja, van maandag tot vrijdag, van negen uur tot kwart voor twaalf.", "translation": "是，週一到週五，九點到十一點四十五分。", "start": 3973.64, "end": 3978.64}, {"text": "Is het een vast contract? Nee, het is een interimcontract, voor tien weken.", "translation": "是固定合約嗎？不，是臨時合約，為期十週。", "start": 3979.98, "end": 3985.22}, {"text": "72. Ik ben José.", "translation": "72號。我是José。", "start": 3988.42, "end": 3990.46}, {"text": "Luister en lees mee in je boek, hoofdstuk 16.", "translation": "請邊聽邊在書裡閱讀，第16章。", "start": 3991.8, "end": 3995.18}, {"text": "Ik ben José Ramirez.", "translation": "我是José Ramirez。", "start": 3997.58, "end": 3999.72}, {"text": "Ik ben twee jaar geleden uit Argentinië naar België gekomen.", "translation": "兩年前我從阿根廷來到比利時。", "start": 4000.82, "end": 4003.92}, {"text": "In het begin was het heel moeilijk, maar nu heb ik hier al veel vrienden.", "translation": "剛開始很難，但現在我已經交了很多朋友。", "start": 4005.32, "end": 4010.04}, {"text": "En ik spreek al heel goed Nederlands.", "translation": "而且我的荷蘭語說得很好。", "start": 4010.56, "end": 4012.78}, {"text": "Ik heb twee jaar in Brugge gewoond.", "translation": "我在布魯日住了兩年。", "start": 4014.12, "end": 4016.68}, {"text": "Brugge is een leuke, mooie stad, maar ik mis de zee daar.", "translation": "布魯日是個可愛、美麗的城市，但我很想念那裡的大海。", "start": 4018.28, "end": 4023.24}, {"text": "In Argentinië heb ik altijd dicht bij het strand gewoond.", "translation": "在阿根廷我總是住在靠近海灘的地方。", "start": 4024.6, "end": 4027.82}, {"text": "De zee was op vijftig meter van mijn huis. Zalig!", "translation": "海就在我家五十公尺外。太棒了！", "start": 4029.2, "end": 4032.92}, {"text": "Dus ik ben in België ook naar de zee verhuisd.", "translation": "所以我在比利時也搬到靠海的地方。", "start": 4033.98, "end": 4037.04}, {"text": "En nu woon ik in Oostende, aan de zee.", "translation": "現在我住在奧斯坦德，靠近海邊。", "start": 4037.3, "end": 4041.24}, {"text": "Ik woon hier graag. Ik zoek hier werk.", "translation": "我喜歡住在這裡。我正在找工作。", "start": 4041.24, "end": 4045.12}, {"text": "Ik woon in Flat Floris. Daar heb ik al een paar mensen gezien.", "translation": "我住在佛洛里斯公寓。我已經看過幾個人了。", "start": 4046.66, "end": 4051.16}, {"text": "Irma en Louis Petit heb ik de eerste keer gezien in het station.", "translation": "我第一次在車站見過伊爾瑪和路易·佩蒂。", "start": 4052.5, "end": 4056.2}, {"text": "Heel toevallig. Monique heb ik ook al gezien.", "translation": "真巧。我也見過莫妮克。", "start": 4057.04, "end": 4061.58}, {"text": "Een sympathieke vrouw. Ze heeft me gezegd waar alle winkels zijn.", "translation": "一位讓人喜歡的女士。她告訴我所有商店的位置。", "start": 4061.92, "end": 4066.44}, {"text": "Ze is heel vriendelijk. En dan Natalia.", "translation": "她很親切。還有娜塔莉亞。", "start": 4067.5, "end": 4072.04}, {"text": "Ja, Natalia, wat moet ik over Natalia zeggen?", "translation": "是的，娜塔莉亞，我該說什麼關於娜塔莉亞呢？", "start": 4073.04, "end": 4076.68}, {"text": "Ze is mooi. Ze heeft prachtige blauwe ogen.", "translation": "她很美。她有漂亮的藍眼睛。", "start": 4077.8, "end": 4081.8}, {"text": "En mooi blond haar. Ik heb haar vandaag gezien in de gang.", "translation": "還有美麗的金髮。我今天在走廊見過她。", "start": 4081.8, "end": 4087.42}, {"text": "Oh la la!", "translation": "喔啦啦！", "start": 4087.92, "end": 4088.6}, {"text": "Ben jij slecht gezind? Luister.", "translation": "你心情不好嗎？聽著。", "start": 4093.06, "end": 4097.24}, {"text": "Ben jij kwaad? Nee. Ben jij moe?", "translation": "你生氣了嗎？不。你累了嗎？", "start": 4098.54, "end": 4103.14}, {"text": "Ja, ik heb de hele dag gewerkt. Ben jij ziek?", "translation": "是的，我工作了一整天。你生病了嗎？", "start": 4104.34, "end": 4109.88}, {"text": "Een beetje. Ik ben verkouden.", "translation": "有一點。我感冒了。", "start": 4110.64, "end": 4112.6}, {"text": "Ben jij slecht gezind? Ja, heel slecht. Heel slecht gezind.", "translation": "你心情不好嗎？是的，非常不好。心情很差。", "start": 4116.16, "end": 4119.78}, {"text": "Wat vind jij van José?", "translation": "你覺得何塞怎麼樣？", "start": 4123.08, "end": 4126.26}, {"text": "Luister. Wat vind jij van José?", "translation": "聽著，你覺得何塞怎麼樣？", "start": 4127.16, "end": 4131.28}, {"text": "Ik vind hem sympathiek.", "translation": "我覺得他很和藹。", "start": 4131.76, "end": 4133.46}, {"text": "Wat vind jij van die man? Ik vind hem interessant.", "translation": "你覺得那個男人怎麼樣？我覺得他很有趣。", "start": 4136.58, "end": 4140.5}, {"text": "Wat vind jij van Patrick? Ik vind hem niet zo sympathiek.", "translation": "你覺得帕特里克怎麼樣？我覺得他不太和藹。", "start": 4143.18, "end": 4147.96}, {"text": "Wat vind jij van Natalia? Ik vind haar mooi.", "translation": "你覺得娜塔莉亞怎麼樣？我覺得她很漂亮。", "start": 4150.64, "end": 4154.74}, {"text": "Wat vind jij van die vrouw? Ik vind haar sympathiek.", "translation": "你覺得那個女人怎麼樣？我覺得她很親切。", "start": 4157.48, "end": 4161.06}, {"text": "Wat vind jij van Maria? Ik vind haar niet zo lief.", "translation": "你覺得瑪麗亞怎麼樣？我覺得她不太可愛。", "start": 4163.8, "end": 4167.64}, {"text": "Spreek ik met de elektricien? Luister.", "translation": "我是在和電工講話嗎？聽著。", "start": 4168.76, "end": 4172.62}, {"text": "Met Verlet. Met Linda Benoit. Spreek ik met de elektricien?", "translation": "我是維爾雷。是琳達·布諾伊。請問我是在和電工講話嗎？", "start": 4174.44, "end": 4179.62}, {"text": "Ja. Ik heb een probleem. Er is geen elektriciteit.", "translation": "是的。我有個問題，沒有電。", "start": 4180.14, "end": 4184.26}, {"text": "Kunt u komen? Geen probleem. Het is dringend, zeker?", "translation": "您能來嗎？沒問題。很急嗎？", "start": 4185.26, "end": 4188.76}, {"text": "Ja. Wanneer kunt u komen? Ik kan straks komen.", "translation": "是的。您什麼時候能來？我稍後可以來。", "start": 4189.26, "end": 4193.06}, {"text": "Hoe laat? Rond vier uur. Dat is prima.", "translation": "幾點？大約四點。那很好。", "start": 4193.8, "end": 4197.36}, {"text": "Wat is het adres juist? Boomstraat 23 in Oostende.", "translation": "地址是什麼？奧斯坦德，楊樹街23號。", "start": 4198.58, "end": 4199.9}, {"text": "En het telefoonnummer?", "translation": "電話號碼是？", "start": 4203.86, "end": 4204.7}, {"text": "04678712", "translation": "04678712", "start": 4205.2, "end": 4210.08}, {"text": "Kunt u dat nog eens herhalen?", "translation": "您能再說一遍嗎？", "start": 4210.08, "end": 4213.72}, {"text": "04678712", "translation": "04678712", "start": 4214.88, "end": 4221.7}, {"text": "Ik ben zo gelukkig!", "translation": "我好幸福！", "start": 4221.7, "end": 4226.92}, {"text": "Luister en lees mee in je boek, hoofdstuk 17.", "translation": "聽著，在你的書中一起閱讀第17章。", "start": 4226.92, "end": 4231.5}, {"text": "Ik ben zo gelukkig!", "translation": "我好幸福！", "start": 4232.74, "end": 4235.0}, {"text": "Ik ben gisterenavond met José naar een leuk café geweest.", "translation": "我昨天晚上和何塞一起去了很棒的咖啡廳。", "start": 4235.84, "end": 4239.38}, {"text": "Het was fantastisch! In het begin was ik heel zenuwachtig,", "translation": "那真是太棒了！一開始我非常緊張，", "start": 4240.2, "end": 4244.94}, {"text": "maar dan hebben we gebabbeld over Flat Floris en toen was ik niet meer nerveus.", "translation": "但後來我們聊了佛洛里斯公寓，然後我不再緊張了。", "start": 4245.66, "end": 4250.66}, {"text": "We hebben veel gepraat en we hebben heel veel gelachen.", "translation": "我們聊了很多，也笑了很多。", "start": 4251.64, "end": 4255.0}, {"text": "Daarna hebben we op het strand gewandeld. Dat was zo romantisch!", "translation": "之後我們在海灘散步。那真浪漫！", "start": 4256.04, "end": 4260.9}, {"text": "Hij heeft me zijn sjaal gegeven, want ik had het koud.", "translation": "他把他的圍巾給我，因為我很冷。", "start": 4261.76, "end": 4264.24}, {"text": "En toen heeft hij zijn arm rond mijn schouder gelegd.", "translation": "然後他把手搭在我的肩膀上。", "start": 4265.04, "end": 4268.46}, {"text": "Amai! Ik had het direct weer warm. Ik ben echt verliefd!", "translation": "哇！我立刻感覺暖和了。我真的戀愛了！", "start": 4268.9, "end": 4274.18}, {"text": "En weet je wat? Hij is ook verliefd op mij!", "translation": "你知道嗎？他也愛上我了！", "start": 4274.62, "end": 4277.48}, {"text": "Ik ben zo gelukkig! We passen heel goed samen.", "translation": "我好幸福！我們很合拍。", "start": 4279.08, "end": 4283.32}, {"text": "We hebben dezelfde interesses.", "translation": "我們有相同的興趣。", "start": 4283.32, "end": 4286.06}, {"text": "We gaan morgen samen naar een film kijken. Ik mag kiezen welke film.", "translation": "我們明天一起去看一場電影。我可以選電影。", "start": 4287.48, "end": 4291.78}, {"text": "En volgende zondag gaan we wandelen. En dan gaan we 's avonds eten in een restaurant.", "translation": "下星期天我們去散步，然後晚上在餐廳吃飯。", "start": 4292.84, "end": 4298.82}, {"text": "Ik wil graag elke minuut bij hem zijn, maar dat kan natuurlijk niet. Ik moet ook werken.", "translation": "我想每一分鐘都和他在一起，但那當然不可能。我也得工作。", "start": 4300.06, "end": 4305.54}, {"text": "Misschien wil hij wel mee naar het personeelsfeest.", "translation": "也許他會想一起去員工派對。", "start": 4306.9, "end": 4310.1}, {"text": "Dat ga ik hem vragen, als ik durf.", "translation": "我會問他的，如果我敢的話。", "start": 4311.14, "end": 4314.3}, {"text": "77. Ik wil niet.", "translation": "77。我不想。", "start": 4316.32, "end": 4318.32}, {"text": "Dit is een gedicht. Het is om te luisteren. Luister.", "translation": "這是一首詩。是用來聆聽的。聽吧。", "start": 4319.64, "end": 4323.7}, {"text": "Ik wil niet meer.", "translation": "我不想再這樣了。", "start": 4324.62, "end": 4327.86}, {"text": "Ik wil geen handjes geven. Ik wil niet zeggen elke keer,", "translation": "我不想握手。我不想每次都說，", "start": 4328.6, "end": 4332.86}, {"text": "Jawel mevrouw, jawel meneer. Nee, nooit meer in mijn leven.", "translation": "是的女士，是的先生。不，我一輩子都不要再這樣。", "start": 4333.66, "end": 4338.06}, {"text": "Ik hou mijn handen op mijn rug en ik zeg lekker niks terug.", "translation": "我把手放在背後，我什麼也不回應。", "start": 4339.08, "end": 4342.84}, {"text": "Ik wil alleen maar snoepen en ik wil geen tandjes poetsen.", "translation": "我只想吃糖果，也不想刷牙。", "start": 4344.0, "end": 4347.62}, {"text": "Ik wil heel hard springen in een plas en dan mijn tong uitsteken", "translation": "我想很用力地跳進水坑，然後伸出我的舌頭，", "start": 4348.94, "end": 4353.46}, {"text": "en morsen op mijn nieuwe jas. En ik wil alles wat niet mag.", "translation": "弄髒我的新外套。我想做所有不被允許的事。", "start": 4353.58, "end": 4358.66}, {"text": "De hele dag. De hele dag. En ik wil ook niet met de juffrouw mee.", "translation": "一整天。一整天。我也不想跟老師走。", "start": 4359.12, "end": 4365.0}, {"text": "En ik wil altijd heel hard roepen, nee.", "translation": "我也總是想大聲喊，不。", "start": 4365.8, "end": 4368.88}, {"text": "78. Wiskunde is moeilijk.", "translation": "78。數學很難。", "start": 4370.96, "end": 4373.48}, {"text": "Luister en lees mee in je boek, hoofdstuk 18.", "translation": "聽著，並跟著你的書讀，第18章。", "start": 4374.34, "end": 4377.72}, {"text": "Ik ben Sarah Wemba. Ik woon met mijn broers,", "translation": "我叫Sarah Wemba。我和我的兄弟們住在一起，", "start": 4378.12, "end": 4382.66}, {"text": "mijn kleine zusje en mijn ouders in Oostende.", "translation": "我的小妹妹和我的父母住在奧斯坦德。", "start": 4383.16, "end": 4386.32}, {"text": "Wij wonen in een appartement. Het appartement is klein.", "translation": "我們住在一間公寓。公寓很小。", "start": 4387.48, "end": 4391.7}, {"text": "Ik ga elke dag naar school. Frans vind ik plezant.", "translation": "我每天去學校。我覺得法語很有趣。", "start": 4392.96, "end": 4396.74}, {"text": "Ik schrijf graag en ik lees graag in het Frans.", "translation": "我喜歡寫作，也喜歡用法語閱讀。", "start": 4397.86, "end": 4401.14}, {"text": "Maar wiskunde vind ik stom. Ik kan dat niet goed.", "translation": "但我覺得數學很煩。我不擅長。", "start": 4402.18, "end": 4405.8}, {"text": "Het is heel moeilijk en dan word ik zenuwachtig.", "translation": "它很難，然後我會變得緊張。", "start": 4406.74, "end": 4409.82}, {"text": "Ik maak ook niet graag huiswerk.", "translation": "我也不喜歡做作業。", "start": 4410.76, "end": 4412.48}, {"text": "Ik praat graag met mijn vriendinnen.", "translation": "我喜歡和我的朋友聊天。", "start": 4414.34, "end": 4417.34}, {"text": "Ik zing graag. Ik kijk graag in tijdschriften.", "translation": "我喜歡唱歌，也喜歡看雜誌。", "start": 4417.54, "end": 4421.08}, {"text": "Maar zwemmen vind ik niet plezant.", "translation": "但我覺得游泳不好玩。", "start": 4421.58, "end": 4423.78}];

function renderAnalysisPanel(s) {
  const a = s.analysis;
  if (!a) return '';
  // Defensive: GPT sometimes returns string instead of array, or string instead of object
  const asArr = (x) => Array.isArray(x) ? x : (x == null ? [] : [x]);
  const lvColor = { A1:'#4ade80', A2:'#5eead4', B1:'#fb923c', B2:'#f87171' };
  const words = asArr(a.words_hard)
    .map(w => typeof w === 'string' ? { nl: w, zh: '', level: '' } : w)
    .filter(w => w && w.nl)
    .map(w => {
      const c = lvColor[w.level] || '#9ca3af';
      return `<span class="ana-word" style="background:${c}22;border-color:${c}66"
        title="${escapeHtml(w.level||'')}">
        <b>${escapeHtml(w.nl)}</b>
        <span class="ana-zh">${escapeHtml(w.zh||'')}</span>
        <span class="ana-lv" style="color:${c}">${escapeHtml(w.level||'')}</span>
      </span>`;
    }).join('');
  const stressed = asArr(a.stressed).filter(w => typeof w === 'string' && w).map(w =>
    `<span class="ana-stress">${escapeHtml(w)}</span>`).join('');
  const reductions = asArr(a.reductions).filter(r => r && typeof r === 'object' && r.written).map(r =>
    `<div class="ana-red"><span class="ana-red-w">${escapeHtml(r.written)}</span>
      <span class="ana-red-arr">→</span>
      <span class="ana-red-s">${escapeHtml(r.spoken)}</span></div>`).join('');
  // Support both new `frame` and legacy `grammar` field
  const frameText = a.frame || a.grammar || '';
  const trapText = (typeof a.trap === 'string' && a.trap.length > 3) ? a.trap : '';
  // No content at all → return empty so the parent button hides too
  if (!words && !frameText && !stressed && !reductions && !trapText) return '';
  return `<div class="line-analysis" onclick="event.stopPropagation()">
    ${words ? `<div class="ana-sec"><span class="ana-lbl">📚 生字</span>${words}</div>` : ''}
    ${frameText ? `<div class="ana-sec"><span class="ana-lbl">🎯 句框</span><span class="ana-text">${escapeHtml(frameText)}</span></div>` : ''}
    ${stressed ? `<div class="ana-sec"><span class="ana-lbl">🔔 重讀</span>${stressed}<span class="ana-hint">  ← 講者會強調，耳朵警鈴</span></div>` : ''}
    ${reductions ? `<div class="ana-sec"><span class="ana-lbl">🔊 連音</span>${reductions}</div>` : ''}
    ${trapText ? `<div class="ana-sec ana-trap"><span class="ana-lbl">⚠️ 陷阱</span><span class="ana-text">${escapeHtml(trapText)}</span></div>` : ''}
  </div>`;
}

function renderDialogue() {

function escapeHtml(t) { return String(t == null ? '' : t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Answer-key highlight (rule-based, NO GPT) ──
// Only mark words that bear EXAM ANSWERS — not function words / scope flippers.
// A2 inburgering luisteren = WH-questions → answers live in: places, names, numbers,
// times, days. Highlighting "niet/wel/maar/daarna" is noise that hurts more than helps.

// Common Dutch words that often appear at sentence start (capitalized) but are
// NOT proper nouns. Used to avoid false positives in proper-noun detection.
const DUTCH_SENTENCE_INITIAL = new Set([
  // Pronouns / articles / demonstratives
  'ik','jij','je','u','hij','zij','ze','wij','we','jullie','men',
  'die','dit','dat','deze','wie','wat','welke','iemand','niemand','iets','niets',
  'de','het','een','er','daar','hier',
  // Question words
  'hoe','waar','wanneer','waarom',
  // Common verbs (imperative or question-initial position)
  'kijk','lees','kom','komt','ga','gaat','zit','sta','doe','doet',
  'zoek','zoekt','vind','vindt','wil','wilt','kan','kun','kunt',
  'mag','moet','heb','hebt','heeft','ben','bent','is','zijn','was','waren',
  'word','wordt','worden','maak','maakt','denk','denkt','spreek','spreekt',
  'pas','past','eet','eten','drink','drinkt','help','helpt','geef','geeft',
  'neem','neemt','zet','breng','brengt','laat','laten','let','blijf','blijft',
  'hoor','hoort','zie','ziet','zeg','zegt','vraag','vraagt','luister','luistert',
  'praat','praten','werk','werkt','leer','leert','schrijf','speel','speelt',
  // Adverbs / connectives at sentence start
  'dan','nu','toen','soms','altijd','vaak','morgen','gisteren','vandaag',
  'straks','dadelijk','meteen','later','vroeger','eerst','daarna','eindelijk',
  'maar','ook','wel','al','nog','pas','toch','niet','geen','alleen',
  // Conjunctions / fillers
  'als','want','omdat','dus','en','of','nou','oh','hee','hoi','hallo','tot',
  'ja','nee','sorry','bedankt','dank','oké','okay','ok','natuurlijk',
  'misschien','prima','tuurlijk','goedemorgen','goedemiddag','goedenavond',
  // Prepositions (can appear sentence-initial: "Op zaterdag...", "In Amsterdam...")
  'op','in','voor','van','met','aan','naar','over','door','tegen','tussen',
  'boven','onder','achter','na','tot','bij','om','uit','zonder','behalve',
  // Common quantity / qualifier words (rarely answer-bearing)
  'veel','weinig','genoeg','elk','elke','iedere','sommige','allemaal','samen',
  'goed','beter','best','lekker','mooi','leuk','jammer','helaas',
  // Common content verbs sometimes capitalized at start
  'mooi','snel','langzaam','rustig','duidelijk',
]);

const DAYS = new Set([
  'maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag',
]);

const TIME_UNITS = new Set([
  'uur','euro','cent','jaar','jaren','maand','maanden','week','weken',
  'dag','dagen','minuut','minuten','seconde','seconden','keer','procent',
]);

const NUMBER_WORDS = new Set([
  'nul','een','twee','drie','vier','vijf','zes','zeven','acht','negen','tien',
  'elf','twaalf','dertien','veertien','vijftien','zestien','zeventien','achttien','negentien',
  'twintig','dertig','veertig','vijftig','zestig','zeventig','tachtig','negentig',
  'honderd','duizend','miljoen',
]);

const PROPER_NOUN_INITIAL_RE = /^[A-ZÄÖÜÉÈÊËÁÀÂÅÆÇÍÌÎÏÑÓÒÔØÚÙÛŸ]/;

// Lowercase utility ignoring trailing punctuation
const tokLower = s => String(s || '').toLowerCase().replace(/[.,!?;:'"()]+$/, '');
const tokClean = s => String(s || '').replace(/[.,!?;:'"()]+$/, '');

function highlightAnswerKeys(text) {
  if (!text) return '';
  // Answer-key (yellow) highlighting removed — wasn't useful and distracted from
  // active listening. Return the plain sentence; the rest of this function is dead.
  return escapeHtml(text);
  // Tokenize: keep whitespace + punctuation as separate tokens, but DO NOT split
  // on `.` or `,` when surrounded by digits (so "12,50" stays one token).
  const tokens = String(text).split(/(\s+|[!?;:"'()“”]|(?<!\d)[.,]|[.,](?!\d))/).filter(t => t !== '');
  const out = [];
  for (let i = 0; i < tokens.length; i++) {
    const tok = tokens[i];
    if (/^\s+$/.test(tok) || /^[!?;:"'()“”]$/.test(tok) || tok === '.' || tok === ',') {
      out.push(escapeHtml(tok));
      continue;
    }
    const lower = tokLower(tok);
    const clean = tokClean(tok);
    let isKey = false;

    // 1. Pure digit token: 5, 12, 12,50, 1.50
    if (/^\d+([.,]\d+)?$/.test(clean)) isKey = true;
    // 2. Day of week
    else if (DAYS.has(lower)) isKey = true;
    // 3. Time unit (only when adjacent to a number)
    else if (TIME_UNITS.has(lower)) {
      let j = i - 1;
      while (j >= 0 && /^\s+$/.test(tokens[j])) j--;
      const prev = j >= 0 ? tokLower(tokens[j]) : '';
      if (/^\d/.test(prev) || NUMBER_WORDS.has(prev)) isKey = true;
    }
    // 4. half / kwart (when followed by number → time expression)
    else if (lower === 'half' || lower === 'kwart') {
      let j = i + 1;
      while (j < tokens.length && /^\s+$/.test(tokens[j])) j++;
      const next = j < tokens.length ? tokLower(tokens[j]) : '';
      if (NUMBER_WORDS.has(next) || /^\d/.test(next)) isKey = true;
    }
    // 5. Spelled-out number (een/twee/...) when part of a time/quantity:
    //    preceded by half/kwart, OR followed by time unit
    else if (NUMBER_WORDS.has(lower)) {
      let j = i - 1;
      while (j >= 0 && /^\s+$/.test(tokens[j])) j--;
      const prev = j >= 0 ? tokLower(tokens[j]) : '';
      let k = i + 1;
      while (k < tokens.length && /^\s+$/.test(tokens[k])) k++;
      const next = k < tokens.length ? tokLower(tokens[k]) : '';
      if (prev === 'half' || prev === 'kwart') isKey = true;
      else if (TIME_UNITS.has(next)) isKey = true;
    }
    // 6. Proper nouns: capitalized, not "Ik", not a common sentence-initial word
    else if (PROPER_NOUN_INITIAL_RE.test(tok) && lower !== 'ik'
             && !DUTCH_SENTENCE_INITIAL.has(lower)) {
      isKey = true;
    }

    if (isKey) out.push(`<mark class="line-stress">${escapeHtml(tok)}</mark>`);
    else out.push(escapeHtml(tok));
  }
  return out.join('');
}

// Answer-key highlight toggle — new key (forces fresh default for all users).

function jumpToLine(idx) {
  setActiveDialogueLine(idx);
  if (dictationMode) { const lines = document.querySelectorAll('.dialogue-line'); if(lines[idx]) lines[idx].classList.add('revealed'); }
  const s = segments[idx];
  if (!s) return;

  // iOS: audio might not have duration yet, but we can still seek and play
  audio.currentTime = s.start;
  audio.play().then(() => setPlayButton(true)).catch(() => {
    // iOS first-play might fail — try again on next user tap
    setPlayButton(false);
  });
  updateProgressUI();
}

let loopRangeStart = null; // for multi-line loop selection

function loopLine(idx) {
  const s = segments[idx]; if (!s) return;

  // Multi-line loop: first click sets start, second click sets end
  if (loopRangeStart !== null && loopRangeStart !== idx) {
    const from = Math.min(loopRangeStart, idx);
    const to = Math.max(loopRangeStart, idx);
    pointA = segments[from].start;
    pointB = segments[to].end;
    loopEnabled = true; loopCount = 0;
    document.getElementById('loop-btn').classList.add('active');
    document.getElementById('set-a-btn').classList.add('active');
    document.getElementById('set-b-btn').classList.add('active');
    syncABLabels();
    audio.currentTime = pointA;
    updateProgressUI();
    audio.play().then(() => setPlayButton(true)).catch(() => {});
    // Highlight range
    const lines = document.querySelectorAll('.dialogue-line');
    lines.forEach((l, i) => l.classList.toggle('highlight', i >= from && i <= to));
    loopRangeStart = null;
    return;
  }

  // Single click: if no range active, start range OR single loop
  // Hold shift for range mode
  if (window._shiftHeld) {
    loopRangeStart = idx;
    // Visual feedback
    const lines = document.querySelectorAll('.dialogue-line');
    lines[idx].style.boxShadow = 'inset 3px 0 0 var(--green), inset -3px 0 0 var(--green)';
    return;
  }

  // Toggle: if already looping this line, cancel and show feedback
  if (loopEnabled && Math.abs(pointA - s.start) < 0.5 && Math.abs(pointB - s.end) < 0.5) {
    clearAB();
    // Reset all loop button styles
    document.querySelectorAll('.line-repeat-btn').forEach(b => { b.style.color = ''; b.style.opacity = ''; });
    return;
  }

  // Default: single line loop
  pointA = s.start; pointB = s.end;
  loopEnabled = true; loopCount = 0;
  document.getElementById('loop-btn').classList.add('active');
  document.getElementById('set-a-btn').classList.add('active');
  document.getElementById('set-b-btn').classList.add('active');
  syncABLabels();
  audio.currentTime = s.start;
  updateProgressUI();
  audio.play().then(() => setPlayButton(true)).catch(() => {});
  setActiveDialogueLine(idx);
  // Visual feedback on the 🔁 button
  const btns = document.querySelectorAll('.line-repeat-btn');
  btns.forEach(b => { b.style.color = ''; b.style.opacity = ''; });
  if (btns[idx]) { btns[idx].style.color = 'var(--accent)'; btns[idx].style.opacity = '1'; }
}

// ── Multi-line Loop (separate from single 🔁) ──
let multiLoopMode = false;
let multiLoopFirst = null;

}

// Hook into line clicks for multi-loop
var _origJumpToLine2 = jumpToLine;
jumpToLine = function(idx) {
  if (multiLoopMode) {
    var btn = document.getElementById('multi-loop-btn');
    if (multiLoopFirst === null) {
      // First click — highlight it clearly
      multiLoopFirst = idx;
      btn.textContent = '📌 選第2句...';
      var lines = document.querySelectorAll('.dialogue-line');
      lines.forEach(function(l) { l.style.background = ''; l.style.borderLeft = ''; });
      if (lines[idx]) {
        lines[idx].style.background = 'rgba(52,211,153,0.15)';
        lines[idx].style.borderLeft = '4px solid var(--green)';
        lines[idx].scrollIntoView({behavior:'smooth', block:'center'});
      }
    } else {
      // Second click — highlight entire range
      var from = Math.min(multiLoopFirst, idx);
      var to = Math.max(multiLoopFirst, idx);
      pointA = segments[from].start;
      pointB = segments[to].end;
      loopEnabled = true;
      loopCount = 0;
      document.getElementById('loop-btn').classList.add('active');
      syncABLabels();
      audio.currentTime = pointA;
      audio.play().then(function() { setPlayButton(true); }).catch(function() {});
      // Highlight ALL lines in range with green
      var allLines = document.querySelectorAll('.dialogue-line');
      allLines.forEach(function(l, i) {
        if (i >= from && i <= to) {
          l.style.background = 'rgba(52,211,153,0.12)';
          l.style.borderLeft = '4px solid var(--green)';
        } else {
          l.style.background = '';
          l.style.borderLeft = '';
        }
      });
      // Exit multi-loop mode
      multiLoopMode = false;
      multiLoopFirst = null;
      btn.style.background = '';
      btn.style.color = '';
      btn.textContent = '📌 多句';
    }
    return;
  }
  _origJumpToLine2(idx);
};

function prevSentence() { jumpToLine(Math.max(0, (activeLineIndex || 0) - 1)); }
function nextSentence() { jumpToLine(Math.min(segments.length - 1, (activeLineIndex || 0) + 1)); }

// ── Inline auto-shadow: hands-free 跟讀 mode ──
// Plays current sentence → pauses sentence_duration × 1.0 (your turn to repeat) →
// next sentence. Stays in dialogue view, no modal. Tap again to stop.
let shadowState = { active: false, timer: null, idx: 0 };
function shadowSettings() {
  return {
    pauseRatio: parseFloat(localStorage.getItem('lph_shadow_ratio') || '1.0'),
    repeatOnce: localStorage.getItem('lph_shadow_repeat') === '1',
  };
}
function toggleShadow() {
  if (shadowState.active) { stopShadow(); return; }
  shadowState.active = true;
  shadowState.idx = activeLineIndex || 0;
  const btn = document.getElementById('shadow-btn');
  if (btn) { btn.textContent = '⏹ 停止跟讀'; btn.style.background = 'rgba(255,59,92,0.2)'; btn.style.color = '#fda4af'; }
  playShadowSentence();
}
function stopShadow() {
  shadowState.active = false;
  if (shadowState.timer) { clearTimeout(shadowState.timer); shadowState.timer = null; }
  audio.pause();
  setPlayButton(false);
  const btn = document.getElementById('shadow-btn');
  if (btn) { btn.textContent = '🔁 跟讀'; btn.style.background = 'rgba(15,118,110,0.15)'; btn.style.color = '#5eead4'; }
}
function playShadowSentence(replaying) {
  if (!shadowState.active) return;
  const i = shadowState.idx;
  if (i >= segments.length) { stopShadow(); return; }
  const s = segments[i];
  setActiveDialogueLine(i);
  audio.currentTime = s.start;
  audio.play().then(() => setPlayButton(true)).catch(() => {});
  // Wall-clock duration depends on current playback speed
  // (at 0.6×, a 3-second sentence takes 5 seconds to actually play)
  const playMs = (s.end - s.start) * 1000 / (audio.playbackRate || 1);
  // For the user-repeat pause, use the slowed duration too — so you have
  // matched time to repeat regardless of speed setting
  shadowState.timer = setTimeout(() => {
    if (!shadowState.active) return;
    audio.pause();
    setPlayButton(false);
    const { pauseRatio, repeatOnce } = shadowSettings();
    const pauseMs = Math.max(playMs * pauseRatio, 1500);
    shadowState.timer = setTimeout(() => {
      if (!shadowState.active) return;
      if (repeatOnce && !replaying) {
        playShadowSentence(true);
      } else {
        shadowState.idx += 1;
        playShadowSentence(false);
      }
    }, pauseMs);
  }, playMs + 100);  // small buffer so the last word isn't clipped
}

function setActiveDialogueLine(idx) {
  document.querySelectorAll('.dialogue-line').forEach(l => l.classList.remove('highlight'));
  const line = document.querySelectorAll('.dialogue-line')[idx];
  if (!line) return;
  line.classList.add('highlight');
  activeLineIndex = idx;
  const box = document.getElementById('dialogue-box');
  const boxRect = box.getBoundingClientRect();
  const lineRect = line.getBoundingClientRect();
  if (lineRect.top < boxRect.top || lineRect.bottom > boxRect.bottom) line.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderSegmentMarkers() {
  document.querySelectorAll('.segment-marker').forEach(m => m.remove());
  if (!segments.length || !isFinite(audio.duration)) return;
  const container = document.getElementById('progress-container');
  segments.slice(1).forEach(s => {
    const marker = document.createElement('div');
    marker.className = 'segment-marker';
    marker.style.left = `${(s.start / audio.duration) * 100}%`;
    container.appendChild(marker);
  });
}

// ── Quiz ──
function renderQuiz() {
  const box = document.getElementById('quiz-box');
  if (!questions.length) { box.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">此影片暫無測驗題</p>'; return; }
  window._quizState = { total: questions.length, answered: 0, correct: 0 };
  box.innerHTML = questions.map((q, qi) => {
    const opts = (q.options || []).map((opt, oi) => {
      const letter = String.fromCharCode(65 + oi);
      return `<button class="option" data-q="${qi}" data-correct="${opt === q.answer}" onclick="checkAnswer(this,${qi})">${letter}. ${opt}</button>`;
    }).join('');
    const native = q.question_native ? `<div class="q-native">${q.question_native}</div>` : '';
    return `<div class="question" id="q-${qi}"><h4>❓ ${q.question}</h4>${native}${opts}</div>`;
  }).join('');
}
function checkAnswer(btn, qi) {
  const q = document.getElementById(`q-${qi}`);
  q.querySelectorAll('.option').forEach(o => { o.classList.add('disabled'); if(o.dataset.correct==='true') o.classList.add('correct'); });
  if (btn.dataset.correct !== 'true') btn.classList.add('wrong');
  const st = window._quizState; st.answered++; if(btn.dataset.correct==='true') st.correct++;
  if (st.answered === st.total) {
    const pct = Math.round(st.correct / st.total * 100);
    const bar = document.getElementById('score-bar');
    bar.textContent = `🏆 ${st.correct}/${st.total} (${pct}%)`; bar.style.display = 'block';
    bar.style.color = pct >= 70 ? 'var(--green)' : 'var(--orange)';
  }
}

function renderVocab() {
  const box = document.getElementById('vocab-box');
  if (!vocabulary.length) { box.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">此影片暫無詞彙表</p>'; return; }
  box.innerHTML = vocabulary.map(v => `<div class="vocab-item"><span class="vocab-word">${escapeHtml(v.word)}</span><span class="vocab-meaning">${escapeHtml(v.meaning)}</span></div>`).join('');
}

// ── Audio Controls ──
function togglePlay() { if(audio.paused) audio.play().then(()=>setPlayButton(true)).catch(()=>setPlayButton(false)); else { audio.pause(); setPlayButton(false); } }
function setPlayButton(p) { document.getElementById('play-btn').textContent = p ? '⏸' : '▶'; }
