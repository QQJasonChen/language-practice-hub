<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>luisteren examen 2021 — 荷蘭文練習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root, [data-theme="dark"] {
    --bg: #050510; --card: rgba(255,255,255,0.04); --card-solid: #14142a;
    --glass-border: rgba(255,255,255,0.08);
    --accent: #ff3b5c; --accent2: #7c5cfc;
    --text: #f2f2f7; --muted: #a0a0b8; --dim: #606078;
    --green: #34d399; --orange: #fb923c; --blue: #60a5fa;
    --r: 16px;
  }
  [data-theme="light"] {
    --bg: #f8f8fc; --card: rgba(0,0,0,0.03); --card-solid: #fff;
    --glass-border: rgba(0,0,0,0.08);
    --accent: #e63550; --accent2: #6c4de6;
    --text: #1a1a2e; --muted: #666680; --dim: #999;
    --green: #0d9668; --orange: #d97706; --blue: #2563eb;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 24px; }

  /* Header - compact */
  header { display: flex; align-items: center; gap: 10px; padding: 8px 0 6px; }
  header h1 { font-size: 13px; font-weight: 600; flex: 1; line-height: 1.3; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Mini player row */
  .mini-player-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .mini-player-row .progress-container { height: 32px; border-radius: 8px; }
  .mini-player-row .play-btn { min-width: 40px; padding: 8px; font-size: 14px; }

  /* Player actions */
  .player-actions { display: flex; gap: 4px; align-items: center; }
  .pa-btn {
    background: none; border: 1px solid var(--glass-border); color: var(--dim);
    padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600;
    transition: all 0.2s;
  }
  .pa-btn:active { transform: scale(0.92); color: var(--text); }

  /* Extra controls (collapsible) */
  .extra-controls { padding: 8px 0 4px; }
  .extra-controls .controls { gap: 4px; margin-bottom: 0; }
  .extra-controls .ctrl-btn { padding: 5px 10px; font-size: 11px; }

  /* Progress in header */
  .progress-summary { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .progress-summary .bar { flex: 1; height: 3px; background: var(--glass-border); border-radius: 2px; overflow: hidden; max-width: 120px; }
  .progress-summary .bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

  /* Player */
  .player-box {
    background: var(--card); border: 1px solid var(--glass-border);
    border-radius: var(--r); padding: 16px; margin-bottom: 12px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .progress-container { position: relative; height: 40px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 12px; cursor: pointer; overflow: hidden; }
  [data-theme="light"] .progress-container { background: rgba(0,0,0,0.04); }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); width: 0%; border-radius: 10px; transition: width 0.1s linear; }
  .ab-marker { position: absolute; top: 0; width: 2px; height: 100%; z-index: 2; }
  .ab-marker.a-marker { background: var(--green); }
  .ab-marker.b-marker { background: var(--orange); }
  .ab-region { position: absolute; top: 0; height: 100%; background: rgba(52,211,153,0.12); z-index: 1; }
  .segment-marker { position: absolute; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.08); z-index: 1; pointer-events: none; }
  .time-display { position: absolute; bottom: 6px; right: 10px; font-size: 11px; color: var(--muted); z-index: 3; font-weight: 500; font-variant-numeric: tabular-nums; }

  .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .ctrl-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--text);
    padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all 0.2s; backdrop-filter: blur(10px);
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ctrl-btn.play-btn {
    background: var(--green); color: #000; font-weight: 800; min-width: 52px;
    border: none; box-shadow: 0 2px 12px rgba(52,211,153,0.3);
  }
  .ctrl-btn.play-btn:active { transform: scale(0.92); }
  .speed-control { display: flex; align-items: center; gap: 3px; margin-left: auto; }
  .speed-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--muted);
    padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.2s;
  }
  .speed-btn:active { transform: scale(0.92); }
  .speed-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .ab-info { display: flex; gap: 12px; font-size: 12px; color: var(--dim); font-weight: 500; }
  .ab-info span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.green { background: var(--green); }
  .dot.orange { background: var(--orange); }
  .sentence-nav { display: flex; gap: 4px; align-items: center; margin-left: auto; }
  .nav-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--text);
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .nav-btn:active { transform: scale(0.9); }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 12px; background: var(--card); border-radius: 12px; padding: 3px; border: 1px solid var(--glass-border); }
  .tab {
    flex: 1; background: none; border: none; color: var(--dim); padding: 8px 8px;
    cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 10px;
    transition: all 0.25s;
  }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(255,59,92,0.3); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Mode bar */
  .mode-bar { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; }
  .mode-bar::-webkit-scrollbar { display: none; }
  .mode-btn {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--glass-border);
    color: var(--muted); padding: 6px 14px; border-radius: 100px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all 0.2s;
  }
  .mode-btn:active { transform: scale(0.95); }
  .mode-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .mode-btn.echo-btn { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); color: var(--green); }
  .mode-btn.echo-btn:active { background: var(--green); color: #000; }

  /* Dialogue */
  .dialogue-box {
    background: var(--card); border: 1px solid var(--glass-border);
    border-radius: var(--r); padding: 8px; max-height: 60vh; overflow-y: auto; scroll-behavior: smooth;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .dialogue-box::-webkit-scrollbar { width: 3px; }
  .dialogue-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .dialogue-line {
    padding: 10px 12px; border-radius: 12px; margin-bottom: 2px; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    line-height: 1.65; font-size: 14px; display: flex; align-items: flex-start; gap: 6px;
    flex-wrap: wrap;  /* analysis panel can wrap to new row below text + buttons */
  }
  .dialogue-line:active { transform: scale(0.98); }
  .dialogue-line:hover { background: rgba(255,255,255,0.04); }
  [data-theme="light"] .dialogue-line:hover { background: rgba(0,0,0,0.03); }
  /* Karaoke: line currently being played (driven by syncLoop / updateKaraoke) */
  .dialogue-line { scroll-margin-top: 80px; scroll-margin-bottom: 140px; border-left: 3px solid transparent; transition: border-color .15s, background .15s; }
  .dialogue-line.playing { background: rgba(245,158,11,0.14); border-left-color: #f59e0b; }
  .dialogue-line.playing .line-text { color: #fed7aa; font-weight: 600; }
  [data-theme="light"] .dialogue-line.playing { background: rgba(245,158,11,0.16); }
  [data-theme="light"] .dialogue-line.playing .line-text { color: #78350f; }
  .dialogue-line.highlight {
    background: rgba(255,59,92,0.08); border-left: 3px solid var(--accent);
    padding-left: 9px;
  }
  .line-text { flex: 1; }
  /* Answer-key highlight (proper nouns, numbers, days, time) — ON by default,
     toggled via .show-stress on dialogue-box. Tap 🎯 答題線索 to disable. */
  .line-stress { background: none; color: inherit; padding: 0; border-radius: 0; font-weight: inherit; }
  .show-stress .line-stress { background: #fde047; color: #18181b;
    padding: 1px 5px; border-radius: 3px; font-weight: 800;
    box-shadow: 0 0 0 1px rgba(253,224,71,0.6); }
  [data-theme="light"] .show-stress .line-stress { background: #fde047; color: #18181b; }
  .line-zh { font-size: 12px; color: var(--dim); margin-top: 3px; display: none; line-height: 1.5; }
  .show-zh .line-zh { display: block; }

  .explain-btn, .bookmark-btn, .line-repeat-btn, .rec-btn, .ana-btn {
    background: none; border: none; color: var(--dim); font-size: 14px;
    padding: 2px; cursor: pointer; opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
  }
  .dialogue-line:hover .explain-btn,
  .dialogue-line:hover .bookmark-btn,
  .dialogue-line:hover .line-repeat-btn,
  .dialogue-line:hover .rec-btn,
  .dialogue-line:hover .ana-btn { opacity: 0.5; }
  .explain-btn:hover, .bookmark-btn:hover, .line-repeat-btn:hover, .rec-btn:hover, .ana-btn:hover { opacity: 1 !important; }
  /* On touch devices (no hover), keep all inline buttons visible by default */
  @media (hover: none) {
    .explain-btn, .bookmark-btn, .line-repeat-btn, .rec-btn, .ana-btn { opacity: 0.55; }
    .ana-btn { color: #5eead4; opacity: 0.85; }  /* extra emphasis — newest feature */
  }
  .bookmark-btn.bookmarked { opacity: 1 !important; color: var(--orange); }
  .rec-btn.recording { opacity: 1 !important; color: var(--accent); animation: recPulse 0.8s ease-in-out infinite; }
  @keyframes recPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.2); } }

  /* Per-sentence analysis panel — collapses by default, expands on 🔬 click */
  .line-analysis { display: none; width: 100%; flex-basis: 100%; order: 99;
    margin: 8px 0 4px; padding: 10px 12px; background: rgba(94,234,212,0.05);
    border-left: 3px solid #5eead4; border-radius: 6px; font-size: 12.5px; line-height: 1.55; }
  .dialogue-line.show-analysis .line-analysis { display: block; }
  .dialogue-line.show-analysis .ana-btn { opacity: 1 !important; color: #5eead4; }
  .ana-sec { margin: 4px 0; }
  .ana-lbl { display: inline-block; color: #5eead4; font-weight: 800; font-size: 11px;
    min-width: 56px; margin-right: 6px; }
  .ana-text { color: var(--text2); }
  .ana-word { display: inline-block; padding: 2px 7px; margin: 2px 4px 2px 0;
    border: 1px solid; border-radius: 4px; font-size: 11.5px; }
  .ana-word b { font-weight: 700; }
  .ana-word .ana-zh { color: var(--text2); margin-left: 5px; font-size: 11px; }
  .ana-word .ana-lv { margin-left: 5px; font-size: 9.5px; font-weight: 700; }
  .ana-red { display: inline-flex; align-items: center; padding: 2px 7px; margin: 2px 4px 2px 0;
    background: rgba(255,255,255,0.04); border-radius: 4px; font-size: 11.5px; }
  .ana-red-w { color: var(--text2); }
  .ana-red-arr { margin: 0 6px; color: var(--dim); }
  .ana-red-s { color: var(--orange); font-weight: 700; font-family: ui-monospace, Menlo, monospace; }
  .ana-stress { display: inline-block; padding: 2px 8px; margin: 2px 4px 2px 0;
    background: rgba(253,224,71,0.15); color: #fde047; border: 1px solid #fde04766;
    border-radius: 4px; font-size: 12px; font-weight: 800;
    font-family: ui-monospace, Menlo, monospace; }
  .ana-hint { color: var(--dim); font-size: 11px; margin-left: 6px; font-style: italic; }
  .ana-trap { background: rgba(251,146,60,0.08); border-radius: 4px; padding: 6px 8px; margin-top: 4px; }
  .ana-trap .ana-lbl { color: var(--orange); }

  /* Recording result */
  .rec-result {
    margin-top: 6px; padding: 8px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    font-size: 12px; animation: slideUp 0.3s ease;
  }
  .rec-result .rec-score { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .rec-result .rec-score.good { color: var(--green); }
  .rec-result .rec-score.ok { color: var(--orange); }
  .rec-result .rec-score.bad { color: var(--accent); }
  .rec-result .rec-you { color: var(--muted); margin-bottom: 4px; }
  .rec-result .rec-diff { line-height: 1.8; }
  .rec-result .rec-diff .match { color: var(--green); }
  .rec-result .rec-diff .miss { color: var(--accent); text-decoration: line-through; }
  .rec-result .rec-diff .extra { color: var(--orange); font-style: italic; }
  .rec-playback { display: flex; gap: 6px; margin-top: 6px; }
  .rec-play-btn { background: var(--card); border: 1px solid var(--glass-border); color: var(--text); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .rec-play-btn:active { transform: scale(0.95); }

  /* Dictation mode */
  .dictation-mode .line-text { filter: blur(6px); transition: filter 0.3s; user-select: none; }
  .dictation-mode .line-zh { display: none !important; }
  .dictation-mode .dialogue-line:hover .line-text,
  .dictation-mode .dialogue-line.revealed .line-text { filter: none; }

  /* Quiz */
  .quiz-box { background: var(--card); border: 1px solid var(--glass-border); border-radius: var(--r); padding: 16px; }
  .question { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--glass-border); }
  .question:last-child { border-bottom: none; }
  .question h4 { margin-bottom: 4px; font-size: 14px; font-weight: 700; }
  .question .q-native { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  .option {
    display: block; width: 100%; text-align: left;
    background: var(--card); border: 1.5px solid var(--glass-border); color: var(--text);
    padding: 12px 14px; border-radius: 12px; margin-bottom: 6px; cursor: pointer;
    font-size: 14px; transition: all 0.2s;
  }
  .option:active { transform: scale(0.98); }
  .option.correct { border-color: var(--green); background: rgba(52,211,153,0.1); }
  .option.wrong { border-color: var(--accent); background: rgba(255,59,92,0.1); }
  .option.disabled { pointer-events: none; opacity: 0.6; }
  .score-bar { margin-top: 16px; padding: 14px; background: var(--card); border: 1px solid var(--glass-border); border-radius: 12px; text-align: center; font-size: 14px; font-weight: 700; display: none; }

  /* Vocab */
  .vocab-box { background: var(--card); border: 1px solid var(--glass-border); border-radius: var(--r); padding: 12px 16px; }
  .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
  .vocab-item:last-child { border-bottom: none; }
  .vocab-word { font-weight: 700; color: var(--green); }
  .vocab-meaning { color: var(--muted); font-size: 13px; }

  /* Echo overlay */
  .echo-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,16,0.96); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px;
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  }
  .echo-overlay.active { display: flex; }
  .echo-phase { font-size: 1.3em; font-weight: 700; text-align: center; min-height: 2em; }
  .echo-phase .emoji { font-size: 2.2em; display: block; margin-bottom: 10px; }
  .echo-phase .label { color: var(--green); font-size: 0.65em; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; }
  .echo-sentence {
    font-size: 15px; text-align: center; max-width: 500px; line-height: 1.8;
    padding: 20px 24px; background: rgba(255,255,255,0.04); border-radius: var(--r);
    border: 1px solid var(--glass-border); min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .echo-sentence .nl { color: var(--text); font-weight: 500; }
  .echo-sentence .zh { color: var(--dim); font-size: 13px; margin-top: 8px; }
  .echo-progress-ring { width: 120px; height: 120px; position: relative; }
  .echo-progress-ring svg { transform: rotate(-90deg); }
  .echo-progress-ring circle { fill: none; stroke-width: 3; }
  .echo-ring-bg { stroke: rgba(255,255,255,0.06); }
  .echo-ring-fg { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
  .echo-ring-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2em; font-weight: 800; }
  .echo-controls { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; width: 100%; max-width: 360px; }
  .echo-row { display: flex; gap: 6px; justify-content: center; }
  .echo-ctrl {
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.2s; text-align: center;
  }
  .echo-ctrl:active { transform: scale(0.95); }
  .echo-ctrl.primary { background: var(--green); color: #000; font-weight: 800; border: none; box-shadow: 0 4px 16px rgba(52,211,153,0.3); }
  .echo-actions { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
  .echo-action { background: none; border: 1px solid var(--glass-border); color: var(--dim); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .echo-action:active { transform: scale(0.95); color: var(--text); }
  .echo-settings { display: flex; gap: 14px; align-items: center; color: var(--dim); font-size: 12px; margin-top: 10px; font-weight: 500; }
  .echo-settings label { display: flex; align-items: center; gap: 6px; }
  .echo-settings input[type=range] { width: 50px; accent-color: var(--green); }
  .echo-counter { color: var(--dim); font-size: 12px; font-weight: 600; }

  /* AI Explain panel — bottom sheet */
  .explain-backdrop {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 149;
  }
  .explain-backdrop.open { display: block; }
  .explain-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-solid, #14142a); border-top: none;
    border-radius: 20px 20px 0 0;
    padding: 12px 20px 20px; padding-bottom: max(20px, env(safe-area-inset-bottom));
    z-index: 150; max-height: 55vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .explain-panel.open { transform: translateY(0); }
  .explain-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 12px; }
  [data-theme="light"] .explain-handle { background: rgba(0,0,0,0.15); }
  [data-theme="light"] .explain-panel { background: #fff; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
  .explain-close { position: absolute; top: 8px; right: 12px; background: none; border: none; color: var(--muted); font-size: 1.2em; cursor: pointer; }
  .explain-original { font-size: 1.05em; font-weight: 600; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #333; }
  [data-theme="light"] .explain-original { border-bottom-color: #ddd; }
  .explain-loading { color: var(--muted); font-size: 0.9em; }
  .explain-content { font-size: 0.9em; line-height: 1.8; }
  .explain-content h4 { color: var(--accent); font-size: 0.85em; margin-top: 10px; margin-bottom: 4px; }
  .explain-content .word-item { display: inline-block; background: rgba(78,204,163,0.1); border: 1px solid rgba(78,204,163,0.3); padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 0.85em; }
  .explain-content .pron-tip { background: rgba(245,166,35,0.1); border-left: 3px solid var(--orange); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0; font-size: 0.85em; }
  .explain-content .grammar-note { background: rgba(91,155,213,0.1); border-left: 3px solid var(--blue, #5b9bd5); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0; font-size: 0.85em; }
  .explain-btn { background: none; border: 1px solid #444; color: var(--muted); font-size: 0.7em; padding: 2px 6px; border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .dialogue-line:hover .explain-btn { opacity: 0.6; }

  /* API key modal */

  /* Light theme overrides */

  /* Bookmark */

  /* Back button */
  .back-btn { position: fixed; top: 10px; left: 10px; background: var(--card); border: 1px solid #333; color: var(--text); padding: 6px 14px; border-radius: 8px; font-size: 0.85em; z-index: 50; text-decoration: none; transition: all 0.2s; }

  /* Theme toggle */
  .theme-toggle { position: fixed; top: 10px; right: 10px; background: var(--card); border: 1px solid #333; color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.1em; z-index: 50; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }

  /* Progress bar in header */

  /* Spreken exam trainer */
  .spreken-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:185; flex-direction:column;

    overflow-y:auto;
  }
  .spreken-overlay.active { display:flex; }
  .spreken-header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; }
  .spreken-header .sq-num { font-size:14px; font-weight:700; color:var(--blue); }
  .spreken-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .spreken-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center; padding:10px; }

  .spreken-timer-ring { width:100px; height:100px; position:relative; }

  .spreken-answer { width:100%; max-width:500px; padding:16px; background:var(--card); border:1px solid var(--glass-border); border-radius:12px; text-align:left; font-size:14px; line-height:1.7; }
  .spreken-answer h4 { color:var(--green); margin-bottom:6px; font-size:13px; }
  .spreken-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .spreken-btn { background:var(--card); border:1px solid var(--glass-border); color:var(--text); padding:10px 18px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .spreken-btn:active { transform:scale(0.95); }
  .spreken-btn.primary { background:var(--blue); color:#fff; border:none; }
  .spreken-phase { font-size:14px; color:var(--muted); font-weight:600; }

  /* Screen wake lock indicator */
  .wake-lock-btn { position: fixed; top: 10px; right: 52px; background: var(--card); border: 1px solid var(--glass-border); color: var(--dim); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 14px; z-index: 50; display: flex; align-items: center; justify-content: center; }
  .wake-lock-btn.active { color: var(--green); border-color: var(--green); }

  /* Smooth page transitions */
  .container { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Exam simulation mode */
  .exam-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:180; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }
  .exam-overlay.active { display:flex; }
  .exam-header { display:flex; justify-content:space-between; align-items:center; padding:16px 0; }
  .exam-header .timer { font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--accent); }
  .exam-header .eq-count { font-size:13px; color:var(--muted); font-weight:600; }
  .exam-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .exam-question {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:24px; padding:20px;
  }
  .exam-sentence { font-size:18px; font-weight:600; line-height:1.8; max-width:500px;
    padding:24px; background:var(--card); border:1px solid var(--glass-border);
    border-radius:16px; }
  .exam-instruction { font-size:13px; color:var(--muted); }
  .exam-rec-btn {
    width:80px; height:80px; border-radius:50%; border:none; font-size:28px;
    cursor:pointer; transition:all 0.2s;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; box-shadow:0 4px 20px rgba(255,59,92,0.4);
  }
  .exam-rec-btn:active { transform:scale(0.9); }
  .exam-rec-btn.recording { background:var(--accent); animation:recPulse 0.8s infinite; }
  .exam-actions { display:flex; gap:10px; }
  .exam-action { background:var(--card); border:1px solid var(--glass-border); color:var(--text);
    padding:10px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .exam-action:active { transform:scale(0.95); }
  .exam-action.primary { background:var(--green); color:#000; border:none; }
  .exam-result { text-align:center; padding:20px; }
  .exam-result .big { font-size:48px; font-weight:900; margin-bottom:8px; }
  .exam-result .big.good { color:var(--green); }
  .exam-result .big.ok { color:var(--orange); }
  .exam-result .big.bad { color:var(--accent); }
  .exam-result-list { text-align:left; max-height:40vh; overflow-y:auto; margin-top:16px; }
  .exam-result-item { padding:10px 12px; border-radius:10px; margin-bottom:6px; background:var(--card); border:1px solid var(--glass-border); font-size:13px; }
  .exam-result-item .eri-score { font-weight:700; margin-right:8px; }

  /* Connected-speech trap notebook */
  .trap-btn { background:none; border:none; cursor:pointer; font-size:15px; opacity:0; transition:opacity .15s; }
  .dialogue-line:hover .trap-btn { opacity:0.5; }
  .trap-btn.trapped { opacity:1 !important; filter:drop-shadow(0 0 4px var(--orange)); }
  .trap-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:185; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }
  .trap-overlay.active { display:flex; }
  .trap-header { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:16px 0; }
  .trap-header h2 { font-size:17px; font-weight:800; flex:1; }
  .trap-header .th-due { font-size:13px; color:var(--orange); font-weight:700; }
  .trap-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .trap-body { flex:1; overflow-y:auto; padding-bottom:20px; }
  .trap-empty { text-align:center; padding:40px 20px; color:var(--muted); line-height:1.7; }
  .trap-empty .big { font-size:2.4em; margin-bottom:10px; }
  .trap-list-item { display:flex; align-items:center; gap:10px; padding:12px; background:var(--card); border:1px solid var(--glass-border); border-radius:12px; margin-bottom:8px; }
  .tli-text { flex:1; font-size:14px; line-height:1.5; }
  .tli-meta { font-size:11px; color:var(--muted); margin-top:3px; }
  .tli-x { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; flex-shrink:0; }
  .trap-start { width:100%; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,var(--orange),var(--accent)); color:#fff; font-size:16px; font-weight:800; cursor:pointer; margin:6px 0 18px; }
  .trap-start:active { transform:scale(0.98); }
  .trap-start:disabled { opacity:0.45; cursor:default; filter:grayscale(0.5); }
  .trap-drill { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:22px; padding:20px 0; }
  .td-prompt { font-size:13px; color:var(--muted); letter-spacing:0.5px; }
  .td-replay { width:90px; height:90px; border-radius:50%; border:none; font-size:34px; cursor:pointer; color:#fff; background:linear-gradient(135deg,var(--orange),var(--accent)); box-shadow:0 4px 24px rgba(251,146,60,0.4); }
  .td-replay:active { transform:scale(0.92); }
  .td-loopbadge { font-size:12px; color:var(--orange); font-weight:700; min-height:1em; }
  .td-answer { font-size:18px; font-weight:600; line-height:1.7; max-width:520px; padding:20px; background:var(--card); border:1px solid var(--glass-border); border-radius:16px; transition:filter .25s; }
  .td-answer.hidden { filter:blur(10px); user-select:none; }

  .td-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .td-btn, .td-reveal { padding:12px 22px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; border:1px solid var(--glass-border); background:var(--card); color:var(--text); }
  .td-btn:active, .td-reveal:active { transform:scale(0.95); }
  .td-btn.again { border-color:var(--accent); color:var(--accent); }
  .td-btn.got { background:var(--green); color:#000; border:none; }

  /* Daily challenge */
  .daily-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:175; flex-direction:column;

  }
  .daily-overlay.active { display:flex; }
  .daily-header { text-align:center; padding:20px 0; }
  .daily-header .flame { font-size:48px; margin-bottom:8px; }
  .daily-header h2 { font-size:20px; font-weight:800; margin-bottom:4px; }
  .daily-header .streak { color:var(--orange); font-size:14px; font-weight:700; }

  .daily-card {

    gap:20px; padding:20px; text-align:center;
  }
  .daily-sentence { font-size:17px; font-weight:600; line-height:1.8; max-width:480px;

    padding:10px 18px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .daily-btn:active { transform:scale(0.95); }
  .daily-btn.primary { background:var(--green); color:#000; border:none; }
  .daily-complete { text-align:center; padding:40px; }

  /* Touch-friendly: bigger tap targets on mobile */
  @media (max-width: 600px) {
    .controls { gap: 6px; }

<body>
<button class="wake-lock-btn" id="wake-btn" onclick="toggleWakeLock()" title="螢幕常亮">☀️</button>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="container">
  <!-- Compact top bar -->
  <header>
    <a href="../../index.html" style="color:var(--muted);text-decoration:none;font-size:13px;font-weight:600">← 返回</a>
    <h1>luisteren examen 2021</h1>
    <a href="exam.html" id="exam-link" style="display:none;padding:6px 12px;background:#9f1239;color:#fff;border-radius:6px;font-size:13px;text-decoration:none;font-weight:600;white-space:nowrap">📝 模擬考冊 →</a>
  </header>
  <script>
    // Show "go to exam.html" button only for videos that have one (mocks 1/2/3...)
    (function(){
      const HAS_EXAM = ['_iC1Pooi2UA','AMVy2zPNLso','mock3_a2_2026'];
      const path = window.location.pathname;
      if (HAS_EXAM.some(id => path.includes('/' + id + '/'))) {
        document.getElementById('exam-link').style.display = 'inline-block';
      }
    })();
  </script>

  <!-- Mini player -->

      <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <div class="progress-container" id="progress-container" style="flex:1">

        <div class="ab-marker b-marker" id="b-marker" style="display:none"></div>

      </div>
      <div class="speed-control">
        <button class="speed-btn" data-spd="0.6" onclick="setSpeed(0.6)">0.6×</button>
        <button class="speed-btn" data-spd="0.75" onclick="setSpeed(0.75)">0.75×</button>
        <button class="speed-btn" data-spd="0.85" onclick="setSpeed(0.85)">0.85×</button>
        <button class="speed-btn active" data-spd="1" onclick="setSpeed(1.0)">1×</button>

    </div>
  </div>
  <div class="progress-summary" id="progress-summary" style="display:none">
    <div class="bar"><div class="bar-fill" id="progress-fill" style="width:0%"></div></div>

: 321.96}, {"text": "14. Dag Rosa. Goedenavond.", "translation": "14. 嗨，Rosa。晚上好。", "start": 326.04, "end": 328.92}, {"text": "Kom binnen. Ga zitten. Dank je.", "translation": "進來。請坐。謝謝。", "start": 330.1, "end": 333.04}, {"text": "Wil je iets drinken? Appelsap? Sinaasappelsap? Thee?", "translation": "你想喝點什麼嗎？蘋果汁？柳橙汁？茶？", "start": 333.98, "end": 339.42}, {"text": "Thee graag. Alles goed? Prima. Ik ga naar de Nederlandse les.", "translation": "我要茶。你一切都好嗎？很好。我去荷蘭語課。", "start": 340.28, "end": 346.06}, {"text": "Waar? In Open School. Wanneer? Op maandag en woensdag.", "translation": "哪裡？在 Open School。什麼時候？週一和週三。", "start": 346.7, "end": 351.94}, {"text": "En hoe laat is de les? Om negen uur. Succes!", "translation": "課是幾點？九點。祝你好運！", "start": 352.7, "end": 356.5}, {"text": "Dank je. 14. Aan de bushalten. Luister!", "translation": "謝謝。14. 在公車站。聽著！", "start": 357.22, "end": 361.88}, {"text": "Excuseer mevrouw, mag ik iets vragen? Ja? Waar stopt de bus naar het station alsjeblieft?", "translation": "抱歉，女士，我可以問您一個問題嗎？是嗎？請問去車站的公車在哪裡停？", "start": 363.02, "end": 368.9}, {"text": "Hier. Dank u.", "translation": "這裡。謝謝您。", "start": 369.26, "end": 370.82}, {"text": "Excuseer meneer, mag ik iets vragen? Ja?", "translation": "抱歉，先生，我可以問您一個問題嗎？是嗎？", "start": 373.66, "end": 376.28}, {"text": "Waar stopt de bus naar het station alsjeblieft?", "translation": "請問去車站的公車在哪裡停？", "start": 376.28, "end": 379.9}, {"text": "Aan het park. Dank u wel. 15.", "translation": "在公園旁。非常感謝。15。", "start": 380.54, "end": 385.72}, {"text": "Ik ben Natalia. Luister mee in je boek hoofdstuk 4.", "translation": "我是 Natalia。請跟著你的書第四課聽。", "start": 386.66, "end": 392.4}, {"text": "Hallo, ik ben Natalia. Ik ben 28 jaar.", "translation": "你好，我是 Natalia。我28歲。", "start": 394.62, "end": 398.68}, {"text": "Ik werk in een schoenwinkel in Oostende.", "translation": "我在奧斯坦德的一家鞋店工作。", "start": 399.64, "end": 402.24}, {"text": "Ik woon ook in Oostende, in flat Floris in de Bloemestraat.", "translation": "我也住在奧斯坦德，住在 Bloemestraat 的 Floris 公寓。", "start": 402.24, "end": 408.08}, {"text": "Ik woon in een appartement. Ik ben niet getrouwd en ik heb geen kinderen.", "translation": "我住在一間公寓裡。我沒結婚，也沒有小孩。", "start": 409.18, "end": 414.24}, {"text": "Ik woon alleen. Dat is spijtig. Maar ik heb wel een kat.", "translation": "我一個人住。那很可惜。但我有一隻貓。", "start": 415.44, "end": 420.26}, {"text": "Ze heet Minoes. Ze drinkt water.", "translation": "牠叫 Minoes。牠喝水。", "start": 421.18, "end": 423.54}, {"text": "En ik koop blikjes eten voor de kat in de supermarkt.", "translation": "我在超市買罐裝貓食給貓。", "start": 424.38, "end": 427.9}, {"text": "Vandaag ga ik naar het gemeentehuis. Ik haal mijn identiteitskaart.", "translation": "今天我要去市政廳。我去拿我的身份證。", "start": 429.24, "end": 434.3}, {"text": "De foto is niet mooi. Dat is ook spijtig.", "translation": "照片不好看。這也很可惜。", "start": 435.48, "end": 439.22}, {"text": "16. Bent u getrouwd? Luister.", "translation": "16. 您結婚了嗎？聽著。", "start": 443.24, "end": 446.46}, {"text": "Bent u getrouwd? Ja. Bent u getrouwd?", "translation": "您結婚了嗎？是的。您結婚了嗎？", "start": 447.84, "end": 452.5}, {"text": "Nee, ik woon alleen. Ben jij getrouwd?", "translation": "沒有，我一個人住。你結婚了嗎？", "start": 453.12, "end": 457.44}, {"text": "Nee, ik ben gescheiden.", "translation": "沒有，我離婚了。", "start": 458.18, "end": 460.12}, {"text": "Nee, ik ben niet getrouwd. Ik woon samen met mijn vriend.", "translation": "沒有，我沒結婚。我和我的男友同居。", "start": 463.88, "end": 467.76}, {"text": "Luister. Ja, twee.", "translation": "聽著。是的，兩個。", "start": 472.42, "end": 477.88}, {"text": "Nee. Hebt u kinderen?", "translation": "沒有。您有小孩嗎？", "start": 481.48, "end": 486.16}, {"text": "Ja. En u? Ik heb geen kinderen.", "translation": "有。那你呢？我沒有小孩。", "start": 486.66, "end": 489.48}, {"text": "Heb jij kinderen?", "translation": "你有小孩嗎？", "start": 491.62, "end": 492.88}, {"text": "Ja. Ik heb een zoon en een dochter. En jij?", "translation": "有。我有一個兒子和一個女兒。你呢？", "start": 493.32, "end": 498.02}, {"text": "Ik heb drie dochters. Heb jij kinderen?", "translation": "我有三個女兒。你有小孩嗎？", "start": 498.46, "end": 502.92}, {"text": "Ja, vier zonen. En jij? Ik heb geen kinderen.", "translation": "有，四個兒子。你呢？我沒有小孩。", "start": 503.62, "end": 507.9}, {"text": "18. Spreekt u Nederlands? Luister.", "translation": "18. 您會說荷蘭語嗎？聽著。", "start": 510.42, "end": 513.76}, {"text": "Spreekt u Nederlands? Een beetje. Ik ben Ahmed.", "translation": "您會說荷蘭語嗎？一點點。我是 Ahmed。", "start": 514.88, "end": 518.72}, {"text": "Ik ben Anna. Aangenaam. Aangenaam.", "translation": "我是 Anna。很高興認識你。很高興認識你。", "start": 519.2, "end": 523.38}, {"text": "Dag, ik ben Carlos. Ik kom uit Chili.", "translation": "你好，我是 Carlos。我來自智利。", "start": 524.7, "end": 528.12}, {"text": "Ik ben Marie. Ik kom uit Congo. Aangenaam.", "translation": "我是 Marie。我來自剛果。很高興認識你。", "start": 529.24, "end": 533.3}, {"text": "Aangenaam. Hallo, ik ben Ahmed. Wie ben jij?", "translation": "很高興認識你。你好，我是 Ahmed。你是誰？", "start": 534.44, "end": 539.66}, {"text": "Ik ben Marie. Waar woon jij? In Oostende. En jij?", "translation": "我是 Marie。你住在哪裡？在奧斯坦德。你呢？", "start": 540.2, "end": 544.76}, {"text": "Ik ook. Hallo, ik ben Anna. Hoe heet jij?", "translation": "我也是。你好，我是 Anna。你叫什麼名字？", "start": 545.36, "end": 551.3}, {"text": "Carlos Riviera. Waar woon jij? In Oostende. En jij?", "translation": "Carlos Rivera。你住在哪裡？在奧斯坦德。你呢？", "start": 551.7, "end": 556.58}, {"text": "In Blankenberge. Woon jij in Brugge?", "translation": "在布蘭肯貝爾赫。你住在布魯日嗎？", "start": 556.9, "end": 561.74}, {"text": "Nee, ik woon in Oostende. Wat is je adres?", "translation": "不，我住在奧斯坦德。你的地址是什麼？", "start": 562.52, "end": 565.86}, {"text": "Vredestraat 90 in Oostende.", "translation": "奧斯坦德Vredestraat 90號。", "start": 566.8, "end": 569.08}, {"text": "Hoe heet jij? Ik ben Fouad Benalla.", "translation": "你叫什麼名字？我是Fouad Benalla。", "start": 572.24, "end": 575.36}, {"text": "Wat is je adres? Cairostraat 2, 8400 Oostende.", "translation": "你的地址是什麼？Cairostraat 2號，8400奧斯坦德。", "start": 576.2, "end": 581.58}, {"text": "Hoe lang ben jij in België? Twee jaar. En jij?", "translation": "你在比利時多久了？兩年。你呢？", "start": 584.42, "end": 587.76}, {"text": "Vijf maanden. Hoe lang ben jij in België?", "translation": "五個月。你在比利時多久了？", "start": 588.64, "end": 594.5}, {"text": "Zes maanden. En jij? Eén jaar. Negentien. Welke taal spreek jij?", "translation": "六個月。你呢？一年。十九歲。你說什麼語言？", "start": 595.48, "end": 599.16}, {"text": "Luister! Welke taal spreek jij?", "translation": "聽著！你說什麼語言？", "start": 602.62, "end": 605.84}, {"text": "Frans. En jij? Ik spreek Arabisch.", "translation": "法語。你呢？我說阿拉伯語。", "start": 606.58, "end": 609.98}, {"text": "Welke taal spreek jij? Spaans. En jij?", "translation": "你說什麼語言？西班牙語。你呢？", "start": 612.56, "end": 616.32}, {"text": "Portugees. En een beetje Engels. Welke taal spreek jij?", "translation": "葡萄牙語。還有一點點英文。你說什麼語言？", "start": 617.0, "end": 622.52}, {"text": "Arabisch. En jij?", "translation": "阿拉伯語。你呢？", "start": 623.78, "end": 625.44}, {"text": "Nederlands. Frans. Engels. En een beetje Duits.", "translation": "荷蘭語、法語、英語，還有一點點德語。", "start": 626.26, "end": 631.36}, {"text": "Twintig. Telefoneren naar open school. Luister!", "translation": "二十。打電話到開放學校。聽著！", "start": 633.58, "end": 638.3}, {"text": "Goeiemorgen, open school. Goeiedag mevrouw met Ahmed Bekrini.", "translation": "早安，開放學校。您好，女士，我是Ahmed Bekrini。", "start": 641.72, "end": 647.06}, {"text": "Ik kom niet naar school vandaag. Ik ben ziek. En wie is uw lerares?", "translation": "我今天不去學校，我生病了。您的老師是誰？", "start": 648.26, "end": 652.72}, {"text": "Isabelle Wouters. Wanneer komt u terug? Overmorgen.", "translation": "Isabelle Wouters。您什麼時候回來？後天。", "start": 653.72, "end": 658.1}, {"text": "Oké meneer, ik heb het genoteerd. Dank u wel, mevrouw. Dag.", "translation": "好的先生，我已經記下來了。謝謝您，女士。再見。", "start": 658.46, "end": 662.86}, {"text": "Dag. En eenentwintig. Iets bestellen in de cafetaria. Luister!", "translation": "再見。二十一。到自助餐廳點餐。聽著！", "start": 663.5, "end": 669.5}, {"text": "Dag meneer. Mag ik een koffie met melk en suiker?", "translation": "先生您好。我可以要一杯加牛奶和糖的咖啡嗎？", "start": 670.56, "end": 674.1}, {"text": "Ja, natuurlijk. Alsjeblieft.", "translation": "可以，當然。這是給您的。", "start": 674.36, "end": 677.68}, {"text": "Dat is dan twee euro. Alsjeblieft.", "translation": "那是兩歐元。給您。", "start": 678.86, "end": 682.08}, {"text": "Dank u. Dank u.", "translation": "謝謝。謝謝您。", "start": 683.32, "end": 684.9}, {"text": "Meneer, mag ik een fruitsap en een wafel, alsjeblieft?", "translation": "先生，我可以要一杯水果汁和一個鬆餅嗎？", "start": 686.54, "end": 690.0}, {"text": "Geen probleem, alsjeblieft. Dat is twee euro zeventig, alsjeblieft.", "translation": "沒問題，給您。這是兩歐元七十分，請。", "start": 690.84, "end": 694.98}, {"text": "Alsjeblieft, drie euro. En dertig cent terug, alsjeblieft.", "translation": "給您，三歐元。找您三十歐分，請收好。", "start": 695.94, "end": 700.48}, {"text": "Mag ik een limonade, alsjeblieft? Sorry, ik heb geen limonade.", "translation": "我可以要一杯檸檬水嗎？抱歉，我沒有檸檬水。", "start": 704.2, "end": 709.1}, {"text": "Een glas water dan. Alsjeblieft. Hoeveel is het?", "translation": "那我要一杯水。給您。多少錢？", "start": 709.68, "end": 713.94}, {"text": "Vijftig cent. Alsjeblieft.", "translation": "五十歐分。給您。", "start": 714.68, "end": 717.66}, {"text": "Tweeëntwintig. Pak Zee gaat naar school.", "translation": "二十二。Pak Zee去上學。", "start": 720.28, "end": 722.98}, {"text": "Luister en lees mee in je boek hoofdstuk vijf.", "translation": "聽，並跟著課本第五章一起讀。", "start": 723.84, "end": 727.26}, {"text": "Ik ben Pak Zee. Ik ben geboren in Bangkok. Dat is in Thailand.", "translation": "我是Pak Zee，我出生在曼谷，那是在泰國。", "start": 729.14, "end": 734.14}, {"text": "Ik ben zevenenveertig jaar. Ik spreek Thai.", "translation": "我四十七歲。我說泰語。", "start": 735.56, "end": 739.46}, {"text": "Ik spreek nog geen Nederlands. Ik volg Nederlandse les in open school. Ik ga met de tram naar school.", "translation": "我還不會說荷蘭語。我在開放學校上荷蘭語課。我搭電車去學校。", "start": 740.96, "end": 747.82}, {"text": "Mijn lerares heet Maaike. Zij is heel vriendelijk.", "translation": "我的老師叫Maaike。她非常友善。", "start": 749.32, "end": 753.24}, {"text": "In de pauze ga ik naar de cafetaria.", "translation": "課間休息我去自助餐廳。", "start": 754.36, "end": 756.68}, {"text": "Ik drink thee. Ik praat met andere cursisten.", "translation": "我喝茶，和其他學員聊天。", "start": 757.88, "end": 761.24}, {"text": "Na de les ga ik naar de supermarkt.", "translation": "下課後我去超市。", "start": 762.3, "end": 763.76}, {"text": "Ik koop daar een pen, een potlood, een schrift, een gom en een kaft.", "translation": "我買一支筆、一支鉛筆、一個筆記本、一塊橡皮擦和一個文件夾。", "start": 764.94, "end": 770.64}, {"text": "Dat kost zeven euro vijftig. Dat is veel.", "translation": "那花了七歐元五十。這很多。", "start": 771.74, "end": 775.26}, {"text": "'s Avonds blijf ik thuis. Ik speel met mijn kinderen. Ik studeer Nederlands en ik kijk tv.", "translation": "晚上我待在家裡。我和孩子們玩。我學習荷蘭語，也看電視。", "start": 775.26, "end": 781.26}, {"text": "Drieëntwintig. Wat eet jij 's morgens? Luister.", "translation": "二十三。你早上吃什麼？聽著。", "start": 784.98, "end": 788.86}, {"text": "Wat eet jij 's morgens? Brood met confituur. Wat eet jij 's morgens?", "translation": "你早上吃什麼？塗果醬的麵包。你早上吃什麼？", "start": 790.76, "end": 795.48}, {"text": "Niks. Wat eet jij 's middags?", "translation": "沒吃東西。你中午吃什麼？", "start": 796.48, "end": 800.04}, {"text": "Soep met brood. En jij? Pasta.", "translation": "湯和麵包。你呢？義大利麵。", "start": 800.8, "end": 805.96}, {"text": "Wat eet jij 's avonds? Rijst met groenten. Wat eet jij 's avonds?", "translation": "你晚上吃什麼？飯配蔬菜。你晚上吃什麼？", "start": 806.12, "end": 810.44}, {"text": "Aardappelen met vlees. Wat drink jij 's morgens?", "translation": "馬鈴薯配肉。你早上喝什麼？", "start": 811.3, "end": 815.32}, {"text": "Thee. En 's middags? Fruitsap. En 's avonds?", "translation": "茶。中午喝什麼？果汁。晚上呢？", "start": 815.86, "end": 820.1}, {"text": "Rode wijn.", "translation": "紅酒。", "start": 820.86, "end": 821.48}, {"text": "Vierentwintig. Eet jij 's middags soep? Luister.", "translation": "二十四。你中午吃湯嗎？聽著。", "start": 824.34, "end": 827.86}, {"text": "Eet jij 's middags soep? Ja. En jij?", "translation": "你中午吃湯嗎？是的。你呢？", "start": 830.08, "end": 833.1}, {"text": "Ik ook. Drink jij 's middags koffie?", "translation": "我也是。你中午喝咖啡嗎？", "start": 834.2, "end": 839.48}, {"text": "Ja. En jij? Ik niet.", "translation": "是的。你呢？我不喝。", "start": 839.9, "end": 842.64}, {"text": "Eet jij 's morgens brood? Nee. Ik eet yoghurt. En jij?", "translation": "你早上吃麵包嗎？不。我吃優格。你呢？", "start": 845.86, "end": 850.5}, {"text": "Ik eet niets. Ik drink alleen koffie.", "translation": "我不吃東西。我只喝咖啡。", "start": 851.56, "end": 854.46}, {"text": "Eet jij 's avonds brood? Nee. Ik eet rijst. En jij?", "translation": "你晚上吃麵包嗎？不。我吃飯。你呢？", "start": 857.28, "end": 861.78}, {"text": "Ik eet aardappelen. Drink jij 's avonds koffie?", "translation": "我吃馬鈴薯。你晚上喝咖啡嗎？", "start": 862.48, "end": 868.08}, {"text": "Nee. Ik drink thee. En jij?", "translation": "不。我喝茶。你呢？", "start": 868.9, "end": 872.04}, {"text": "Ik drink wijn.", "translation": "我喝酒。", "start": 872.58, "end": 873.88}, {"text": "Vijfentwintig. Heb jij een tv? Luister.", "translation": "二十五。你有電視嗎？聽著。", "start": 876.16, "end": 879.68}, {"text": "Heb jij een tv? Ja. En jij? Ik ook.", "translation": "你有電視嗎？有。你呢？我也有。", "start": 881.6, "end": 885.72}, {"text": "Heb jij een gsm? Ja. En jij?", "translation": "你有手機嗎？有。你呢？", "start": 888.04, "end": 891.1}, {"text": "Ik ook. Heb jij een fiets?", "translation": "我也有。你有腳踏車嗎？", "start": 892.18, "end": 895.78}, {"text": "Ja. En jij? Ik niet. Heb jij een auto?", "translation": "有。你呢？我沒有。你有車嗎？", "start": 896.36, "end": 900.92}, {"text": "Nee. En jij? Ik ook niet.", "translation": "沒有。你呢？我也沒有。", "start": 901.94, "end": 904.7}, {"text": "Heb jij een computer? Nee. En jij? Ik wel.", "translation": "你有電腦嗎？沒有。你呢？我有。", "start": 907.46, "end": 911.04}, {"text": "Zesentwintig. Wat is je naam? Luister.", "translation": "二十六。你叫什麼名字？聽著。", "start": 913.08, "end": 917.32}, {"text": "Wat is je naam? Fatima Boukhrini.", "translation": "你叫什麼名字？Fatima Boukhrini。", "start": 918.28, "end": 922.04}, {"text": "Waar woon jij? In Oostende. Wat is je adres?", "translation": "你住在哪裡？在奧斯坦德。你的地址是？", "start": 923.56, "end": 928.7}, {"text": "Zeelaan 50, 8400 Oostende.", "translation": "Zeelaan 50, 8400 Oostende。", "start": 929.7, "end": 933.04}, {"text": "Ben jij getrouwd? Ja. Heb je kinderen?", "translation": "你結婚了嗎？是的。你有小孩嗎？", "start": 935.38, "end": 939.2}, {"text": "Ja. Drie. Hoe gaat het?", "translation": "有。三個。你好嗎？", "start": 939.2, "end": 943.74}, {"text": "Prima. Uit welk land kom jij?", "translation": "很好。你來自哪個國家？", "start": 944.56, "end": 948.1}, {"text": "Uit Marokko. Hoe lang ben je in België?", "translation": "來自摩洛哥。你在比利時多久了？", "start": 949.08, "end": 952.86}, {"text": "Vijf jaar. Waar ben je geboren?", "translation": "五年。你在哪裡出生？", "start": 953.76, "end": 957.6}, {"text": "In Casablanca. Hoe oud ben jij?", "translation": "在卡薩布蘭卡。你幾歲了？", "start": 958.66, "end": 962.66}, {"text": "Vijfendertig jaar. Wat is je telefoonnummer?", "translation": "三十五歲。你的電話號碼是？", "start": 963.82, "end": 967.54}, {"text": "04727258", "translation": "04727258。", "start": 968.22, "end": 974.1}, {"text": "58. Hoe kom jij naar school?", "translation": "58。你怎麼去學校？", "start": 974.1, "end": 978.1}, {"text": "Te voet. Zevenentwintig. Heb jij kinderen? Luister.", "translation": "走路。二十七。你有小孩嗎？聽著。", "start": 979.04, "end": 984.84}, {"text": "Heb jij kinderen? Ja. Ik heb een zoon.", "translation": "你有小孩嗎？有。我有一個兒子。", "start": 987.16, "end": 990.32}, {"text": "Hoe oud is hij? Drie jaar. En hoe heet hij?", "translation": "他幾歲？三歲。他叫什麼名字？", "start": 991.16, "end": 994.94}, {"text": "Milo. Heb jij kinderen?", "translation": "Milo。你有小孩嗎？", "start": 995.54, "end": 1000.14}, {"text": "Ja. Twee. Jongens of meisjes?", "translation": "有。兩個。男孩還是女孩？", "start": 1000.36, "end": 1004.2}, {"text": "Een jongen en een meisje. Hoe oud zijn ze?", "translation": "一個男孩和一個女孩。他們幾歲？", "start": 1004.86, "end": 1007.86}, {"text": "Zeven en vijf. En hoe heten ze? Malik en Lisa.", "translation": "七歲和五歲。他們叫什麼名字？Malik 和 Lisa。", "start": 1008.64, "end": 1013.02}, {"text": "Heb jij kinderen? Ja. Twee.", "translation": "你有小孩嗎？有。兩個。", "start": 1014.64, "end": 1017.66}, {"text": "Jongens of meisjes? Twee jongens. Hoe heten ze?", "translation": "男孩還是女孩？兩個男孩。他們叫什麼名字？", "start": 1018.6, "end": 1021.84}, {"text": "Albert en Alain. En hoe oud zijn ze?", "translation": "Albert 和 Alain。他們幾歲？", "start": 1022.4, "end": 1025.5}, {"text": "Zes en twee. Heb jij kinderen?", "translation": "六歲和兩歲。你有小孩嗎？", "start": 1025.5, "end": 1030.8}, {"text": "Ja. Drie. Jongens of meisjes?", "translation": "有。三個。男孩還是女孩？", "start": 1031.32, "end": 1034.36}, {"text": "Twee jongens en een meisje. Hoe oud zijn ze? Negen, acht en drie.", "translation": "兩個男孩和一個女孩。他們幾歲？九歲、八歲和三歲。", "start": 1035.14, "end": 1039.98}, {"text": "En hoe heten ze? Suzanne, Omar en Osman.", "translation": "他們叫什麼名字？Suzanne、Omar 和 Osman。", "start": 1040.6, "end": 1044.12}, {"text": "Achttwintig. Hebt u telefoon?", "translation": "二十八。您有電話嗎？", "start": 1048.62, "end": 1050.86}, {"text": "Luister en schrijf de telefoonnummers op.", "translation": "聽著，並寫下電話號碼。", "start": 1051.98, "end": 1054.76}, {"text": "Hebt u telefoon? Ja.", "translation": "您有電話嗎？有。", "start": 1055.5, "end": 1058.36}, {"text": "032357476", "translation": "032357476。", "start": 1059.38, "end": 1065.7}, {"text": "0323574", "translation": "0323574。", "start": 1067.44, "end": 1072.9}, {"text": "Ja. Oké.", "translation": "是的。好。", "start": 1072.9, "end": 1076.84}, {"text": "Hebt u een telefoon? Ja.", "translation": "您有電話嗎？有。", "start": 1079.06, "end": 1081.36}, {"text": "059300060.", "translation": "059300060。", "start": 1082.68, "end": 1086.96}, {"text": "0-59-30-00-60?", "translation": "0-59-30-00-60？", "start": 1089.02, "end": 1094.4}, {"text": "Bedankt. Hebt u een telefoon? Ja.", "translation": "謝謝。您有電話嗎？有。", "start": 1096.22, "end": 1101.46}, {"text": "016311336.", "translation": "016311336。", "start": 1102.64, "end": 1107.96}, {"text": "0163113.", "translation": "0163113。", "start": 1108.96, "end": 1114.48}, {"text": "Oké.", "translation": "好。", "start": 1114.48, "end": 1119.0}, {"text": "Hebt u een telefoon? Ja.", "translation": "您有電話嗎？有。", "start": 1119.76, "end": 1121.54}, {"text": "0495385883.", "translation": "0495385883。", "start": 1122.62, "end": 1128.78}, {"text": "Wat blieft u?", "translation": "請問？", "start": 1130.26, "end": 1130.72}, {"text": "04953858.", "translation": "04953858。", "start": 1130.72, "end": 1138.28}, {"text": "Oké. Bedankt.", "translation": "好。謝謝。", "start": 1138.28, "end": 1142.6}, {"text": "Hebt u een telefoon? Nee, maar mijn broer heeft een telefoon.", "translation": "您有電話嗎？沒有，但我哥哥有電話。", "start": 1145.52, "end": 1150.32}, {"text": "Ah, dat is goed. En wat is het nummer van uw broer?", "translation": "啊，那很好。您哥哥的號碼是什麼？", "start": 1150.5, "end": 1153.88}, {"text": "04863290.", "translation": "04863290。", "start": 1153.88, "end": 1160.84}, {"text": "Oké. Bedankt.", "translation": "好。謝謝。", "start": 1160.84, "end": 1165.06}, {"text": "Hebt u een telefoon? Ja. Mag ik het nummer?", "translation": "您有電話嗎？有。我可以要號碼嗎？", "start": 1167.84, "end": 1171.1}, {"text": "0-4-72-52-01-30.", "translation": "0-4-72-52-01-30。", "start": 1171.96, "end": 1177.88}, {"text": "04725201.", "translation": "04725201。", "start": 1179.08, "end": 1184.46}, {"text": "Ja, dat is het. Oké. Bedankt.", "translation": "是的，就是這個。好。謝謝。", "start": 1184.46, "end": 1188.86}, {"text": "Hebt u een gsm? Ja. Mag ik het nummer?", "translation": "您有手機嗎？有。我可以要號碼嗎？", "start": 1190.88, "end": 1193.94}, {"text": "0-4-98-56-20-46.", "translation": "0-4-98-56-20-46。", "start": 1193.94, "end": 1199.5}, {"text": "Wat blieft u?", "translation": "請問？", "start": 1208.23, "end": 1212.23}, {"text": "0498562046. Oké, bedankt.", "translation": "0498562046。好，謝謝。", "start": 1218.63, "end": 1222.59}, {"text": "Het is maandag, vier uur.", "translation": "現在是星期一，四點。", "start": 1223.75, "end": 1227.69}, {"text": "Sophie gaat naar de zwemtraining. Het is de eerste training vandaag.", "translation": "蘇菲去游泳訓練。今天是第一次訓練。", "start": 1227.69, "end": 1231.91}, {"text": "Sophie is een beetje zenuwachtig. Ze gaat met de bus.", "translation": "蘇菲有一點緊張。她搭公車去。", "start": 1233.03, "end": 1238.03}, {"text": "Bij de ingang van het zwembad staat haar vriendin Leentje. Ze gaat ook naar de training.", "translation": "在游泳池入口處站著她的朋友蓮蓮。她也要去訓練。", "start": 1238.89, "end": 1242.11}, {"text": "Dat is gezellig. Sophie doet haar kleren uit.", "translation": "真熱鬧。蘇菲脫下她的衣服。", "start": 1243.09, "end": 1246.61}, {"text": "Ze doet haar badpak aan. De leraar is heel vriendelijk.", "translation": "她穿上泳衣。教練非常親切。", "start": 1247.83, "end": 1251.31}, {"text": "Hij zegt: spring in het zwembad en zwem vijftig meter.", "translation": "他說：跳進游泳池，游五十公尺。", "start": 1252.59, "end": 1256.69}, {"text": "Hij zegt: heel goed, Leentje. Prima, Sophie!", "translation": "他說：很好，蓮蓮。很好，蘇菲！", "start": 1258.13, "end": 1261.83}, {"text": "Sophie en Leentje springen, duiken en zwemmen een heel uur lang.", "translation": "蘇菲和蓮蓮跳水、潛水並游泳一整個小時。", "start": 1262.71, "end": 1265.95}, {"text": "Dat is plezant. Om vijf uur is de les gedaan.", "translation": "真愉快。五點課程結束。", "start": 1267.13, "end": 1270.99}, {"text": "Dat is spijtig, want Leentje en Sophie zwemmen heel graag.", "translation": "真可惜，因為蓮蓮和蘇菲都很喜歡游泳。", "start": 1272.47, "end": 1277.25}, {"text": "Sophie gaat naar de kleedcabine. Ze wil zich afdrogen, maar ze heeft geen handdoek.", "translation": "蘇菲去更衣室。她想擦乾，但沒有毛巾。", "start": 1278.05, "end": 1282.05}, {"text": "Ze is haar handdoek vergeten. Oh nee! Wat nu?", "translation": "她忘了帶毛巾。喔，不！怎麼辦？", "start": 1282.89, "end": 1286.17}, {"text": "Gelukkig is ze niet alleen. Ze roept naar Leentje.", "translation": "幸好她不是獨自一人。她喊蓮蓮。", "start": 1286.79, "end": 1292.67}, {"text": "Leentje geeft haar een handdoek. En Sophie droogt zich af met de natte handdoek.", "translation": "蓮蓮給她毛巾。蘇菲用濕毛巾擦乾自己。", "start": 1300.65, "end": 1302.31}, {"text": "Koud vandaag, hè?", "translation": "今天很冷，對吧？", "start": 1302.91, "end": 1307.05}, {"text": "Ja, het is maar vijf graden en het sneeuwt.", "translation": "是的，才五度，而且還下雪。", "start": 1308.45, "end": 1310.87}, {"text": "Mooi weer vandaag.", "translation": "今天天氣很好。", "start": 1311.47, "end": 1314.55}, {"text": "Ja, de zon schijnt en het is warm.", "translation": "是的，陽光普照，天氣很暖和。", "start": 1317.87, "end": 1321.37}, {"text": "Pa, het regent.", "translation": "爸，下雨了。", "start": 1321.93, "end": 1326.05}, {"text": "Wat een weer! Regen, regen en nog eens regen.", "translation": "真是天氣啊！雨，一直下雨。", "start": 1328.79, "end": 1331.15}, {"text": "Veel wind vandaag.", "translation": "今天風很大。", "start": 1331.89, "end": 1334.85}, {"text": "Ja, de bladeren vallen van de bomen.", "translation": "是的，葉子從樹上掉下來。", "start": 1337.83, "end": 1342.31}, {"text": "Het is grijs weer. Het is bewolkt.", "translation": "天氣是灰濛濛的。多雲。", "start": 1343.03, "end": 1344.19}, {"text": "Typisch Belgisch.", "translation": "很典型的比利時天氣。", "start": 1346.83, "end": 1349.33}, {"text": "Luister en kijk naar de familie Petit in hoofdstuk 7 in je boek.", "translation": "聽著並看你書中第七章的Petit家庭。", "start": 1350.07, "end": 1354.97}, {"text": "Hallo, mijn naam is Wouter. Ik ben een jongen van zeven jaar.", "translation": "你好，我叫Wouter。我是一個七歲的男孩。", "start": 1355.49, "end": 1359.15}, {"text": "Ik heb kort bruin haar. Ik heb geen school vandaag.", "translation": "我有短棕色頭髮。我今天沒有上學。", "start": 1359.87, "end": 1362.93}, {"text": "Ik ga bij mijn opa en oma spelen. En weet jullie wat? Het is mijn verjaardag vandaag.", "translation": "我要去我爺爺奶奶家玩。你們知道嗎？今天是我的生日。", "start": 1363.97, "end": 1369.01}, {"text": "Ik stel mijn familie even voor. Mijn mama heet Tina.", "translation": "我來介紹一下我的家人。我的媽媽叫Tina。", "start": 1370.47, "end": 1373.53}, {"text": "Ze heeft halflang haar. Ze is kapster. Mijn papa heet Leo.", "translation": "她有中長髮。她是美髮師。我的爸爸叫Leo。", "start": 1374.23, "end": 1378.85}, {"text": "Hij heeft heel kort zwart haar. Hij is 36 jaar.", "translation": "他的頭髮非常短且是黑色的。他36歲。", "start": 1379.85, "end": 1383.83}, {"text": "Hij is kok. Hij werkt in een restaurant.", "translation": "他是廚師。他在餐廳工作。", "start": 1384.37, "end": 1386.85}, {"text": "Mijn opa en mijn oma zijn de ouders van mijn papa. Oma en opa dragen allebei een bril.", "translation": "我的爺爺奶奶是我爸爸的父母。奶奶和爺爺都戴著眼鏡。", "start": 1388.55, "end": 1393.57}, {"text": "Opa heeft niet veel haar. Hij is een beetje kaal.", "translation": "爺爺頭髮不多，有點禿頭。", "start": 1394.53, "end": 1397.79}, {"text": "Oma en opa spelen heel veel met mij en dat is plezant.", "translation": "奶奶和爺爺經常跟我玩，那很開心。", "start": 1399.11, "end": 1402.03}, {"text": "Ze wonen in een appartement in Oostende. Ik kom graag naar zij, zeker in de zomer.", "translation": "他們住在奧斯坦德的一間公寓。我很喜歡去他們那裡，尤其是夏天。", "start": 1403.39, "end": 1408.35}, {"text": "Ik heb ook een tante en een nonkel. Tante Liesbeth is de zus van mijn papa.", "translation": "我也有一位姑姑和一位叔叔。姑姑Liesbeth是我爸爸的妹妹。", "start": 1409.77, "end": 1413.83}, {"text": "Ze heeft kort haar. Ze is verpleegster. Tante Liesbeth woont samen met mijn nonkel Peter.", "translation": "她有短髮。她是護士。姑姑Liesbeth和我的叔叔Peter一起住。", "start": 1414.85, "end": 1420.51}, {"text": "Nonkel Peter is blind en hij heeft veel krullen.", "translation": "叔叔Peter是盲人，他有很多捲髮。", "start": 1421.43, "end": 1424.15}, {"text": "Nonkel Peter heeft zijn hond Max altijd bij zich. Mijn tante en nonkel hebben twee kinderen.", "translation": "叔叔Peter總是帶著他的狗Max。我姑姑和叔叔有兩個孩子。", "start": 1425.13, "end": 1430.53}, {"text": "Ik heb één neef en één nicht. Jan is één jaar. Hij is nog klein.", "translation": "我有一個表弟和一個表妹。Jan一歲了，他還很小。", "start": 1431.29, "end": 1435.39}, {"text": "En Lisa is drie jaar. Zij is een mooi meisje met blond haar en haar lievelingskleur is groen.", "translation": "而Lisa三歲。她是個漂亮的金髮女孩，她最喜歡的顏色是綠色。", "start": 1436.25, "end": 1441.33}, {"text": "Oh, vanavond komt mijn mama mij halen. En dan gaan we bij tante Liesbeth en nonkel Peter frietjes eten.", "translation": "哦，今晚媽媽會來接我。然後我們要去姑姑Liesbeth和叔叔Peter家吃薯條。", "start": 1442.81, "end": 1448.29}, {"text": "Voor mijn verjaardag. Joepie! Tweeëndertig, ga je mee?", "translation": "為了慶祝我的生日。耶！三十二號，你一起去嗎？", "start": 1448.47, "end": 1453.71}, {"text": "Luister! Ga je mee naar het feest? Natuurlijk!", "translation": "聽著！你去派對嗎？當然！", "start": 1454.73, "end": 1459.13}, {"text": "Ga je mee naar de cinema? Ja, graag!", "translation": "你去看電影嗎？好啊！", "start": 1460.97, "end": 1465.05}, {"text": "Ga je mee naar de bibliotheek? Sorry, ik kan niet.", "translation": "你要一起去圖書館嗎？對不起，我不能。", "start": 1466.41, "end": 1470.59}, {"text": "Ik heb een afspraak. Waar ga je naartoe?", "translation": "我有約。你要去哪裡？", "start": 1471.07, "end": 1475.17}, {"text": "Ik ga naar de mart. Ga je mee? Sorry, ik heb geen goesting.", "translation": "我要去市場。你一起去嗎？抱歉，我不想去。", "start": 1475.77, "end": 1481.15}, {"text": "Waar ga je naartoe? Ik ga naar het park.", "translation": "你要去哪裡？我要去公園。", "start": 1483.95, "end": 1487.05}, {"text": "Ga je mee? Sorry, ik heb geen tijd.", "translation": "你要一起去嗎？抱歉，我沒時間。", "start": 1487.73, "end": 1491.07}, {"text": "Ik moet werken. Drieëndertig, de dansles.", "translation": "我必須工作。三十三號，跳舞課。", "start": 1492.05, "end": 1497.07}, {"text": "Luister en lees mee in je boek, hoofdstuk zeven.", "translation": "聽著並跟著你書中第七章一起讀。", "start": 1497.79, "end": 1501.21}, {"text": "Tina is kapster. Zij werkt in een kapsalon.", "translation": "Tina是美髮師。她在美髮沙龍工作。", "start": 1502.11, "end": 1505.55}, {"text": "Ze werkt op dinsdag, donderdag, vrijdag en zaterdag.", "translation": "她星期二、星期四、星期五和星期六工作。", "start": 1505.55, "end": 1511.37}, {"text": "Ze werkt van tien uur tot vier uur. Tina danst graag.", "translation": "她工作從十點到四點。Tina喜歡跳舞。", "start": 1512.51, "end": 1517.61}, {"text": "Zij gaat op woensdagavond naar de dansles. Ze gaat samen met haar vriendin Katja.", "translation": "她星期三晚上去跳舞課。她和她的朋友Katja一起去。", "start": 1518.95, "end": 1524.43}, {"text": "Zij leert Afrikaans dansen. De les begint om acht uur.", "translation": "她在學非洲舞蹈。課程八點開始。", "start": 1525.89, "end": 1530.79}, {"text": "De les duurt één uur. De leraar heet Damba.", "translation": "課程持續一個小時。老師叫Damba。", "start": 1531.77, "end": 1536.15}, {"text": "Hij komt uit Senegal. Vierendertig, bij de bakker.", "translation": "他來自塞內加爾。三十四號，在麵包店。", "start": 1537.19, "end": 1542.37}, {"text": "Een groot wit. Rond of lang? Lang, alstublieft.", "translation": "一個大白色麵包。圓形還是長條？長條，請。", "start": 1544.87, "end": 1548.59}, {"text": "Twee euro en tien, alstublieft.", "translation": "兩歐元一角，請。", "start": 1549.39, "end": 1551.77}, {"text": "Een klein rond bruin, alstublieft. Gesneden?", "translation": "一個小圓硬麵包，請。要切片嗎？", "start": 1553.27, "end": 1557.07}, {"text": "Ja. Eén euro vijftig, alstublieft.", "translation": "要。一歐五十，請。", "start": 1557.61, "end": 1561.09}, {"text": "Een groot rond wit gesneden, alstublieft.", "translation": "一個大圓白麵包切片，請。", "start": 1563.33, "end": 1566.47}, {"text": "Twee euro en tien, alstublieft.", "translation": "兩歐元一角，請。", "start": 1567.29, "end": 1569.67}, {"text": "Een klein lang bruin gesneden, alstublieft.", "translation": "一個小長條棕色麵包切片，請。", "start": 1571.83, "end": 1575.35}, {"text": "Eén euro vijftig, alstublieft. Een baguette, alstublieft.", "translation": "一歐五十，請。一條法國麵包，請。", "start": 1576.27, "end": 1582.13}, {"text": "Eén euro vijfentwintig, alstublieft.", "translation": "一歐二十五，請。", "start": 1583.17, "end": 1584.73}, {"text": "Tien pistolets, alstublieft. Drie euro, alstublieft.", "translation": "十個小圓麵包，請。三歐元，請。", "start": 1587.79, "end": 1592.39}, {"text": "Drie koffiekoeken, alstublieft. Welke?", "translation": "三個牛角麵包，請。哪幾種？", "start": 1595.17, "end": 1598.51}, {"text": "Eén met appel, één met rozijnen en één met chocolade.", "translation": "一個蘋果口味，一個葡萄乾口味，一個巧克力口味。", "start": 1599.69, "end": 1605.19}, {"text": "Dag meneer, kan ik u helpen? Een groot bruin, alstublieft.", "translation": "您好先生，我可以幫您嗎？一個大棕色麵包，請。", "start": 1608.07, "end": 1612.33}, {"text": "Een lang of een rond? Rond, alstublieft.", "translation": "長條還是圓形？圓形，請。", "start": 1612.91, "end": 1616.05}, {"text": "Gesneden? Ja. Anders nog iets? Vier croissants, alstublieft.", "translation": "切好了嗎？是的。還要別的嗎？請給我四個可頌麵包。", "start": 1616.71, "end": 1622.47}, {"text": "Anders nog iets? Nee, dat is alles.", "translation": "還要別的嗎？不，那就是全部了。", "start": 1622.47, "end": 1626.21}, {"text": "Hoeveel is het? Dat is vijf euro vijfenvijftig samen, alstublieft.", "translation": "多少錢？一共是五歐元五十五分，請。", "start": 1627.41, "end": 1631.63}, {"text": "Alstublieft. En vijfenveertig cent terug. Dag mevrouw.", "translation": "請收好。找您四十五分。再見，女士。", "start": 1633.11, "end": 1637.71}, {"text": "Bedankt en tot ziens, dag. Vijfendertig, waar werk jij?", "translation": "謝謝，再見。再見。三十五歲，你在哪裡工作？", "start": 1638.07, "end": 1642.87}, {"text": "Luister. Dag Hassan, mag ik iets vragen?", "translation": "聽著。哈桑你好，我可以問你一個問題嗎？", "start": 1643.93, "end": 1647.89}, {"text": "Ja, waar werk jij? In een kippenfabriek.", "translation": "是的，你在哪裡工作？在一家養雞場。", "start": 1648.77, "end": 1652.69}, {"text": "Hoe laat moet je beginnen? Om zes uur.", "translation": "你幾點開始工作？六點。", "start": 1653.15, "end": 1656.31}, {"text": "Amai, dat is vroeg. En hoe laat heb je gedaan?", "translation": "哇，好早喔。你幾點下班？", "start": 1657.09, "end": 1660.67}, {"text": "Om vier uur. Hoeveel uur werk je per dag?", "translation": "四點。你每天工作幾小時？", "start": 1661.09, "end": 1664.51}, {"text": "Tien uur. Dat is veel.", "translation": "十小時。很多喔。", "start": 1665.49, "end": 1668.37}, {"text": "Dag Antonio, mag ik iets vragen? Ja.", "translation": "安東尼奧你好，我可以問你一個問題嗎？是的。", "start": 1671.45, "end": 1675.01}, {"text": "Waar werk jij? In een slachthuis. Hoe laat moet je beginnen?", "translation": "你在哪裡工作？在一家屠宰場。你幾點開始工作？", "start": 1676.07, "end": 1680.37}, {"text": "Om half vijf 's morgens. Dat is vroeg.", "translation": "清晨四點半。很早喔。", "start": 1681.09, "end": 1684.09}, {"text": "Hoe laat heb je gedaan? Om half twee. Hoeveel uur werk je per dag?", "translation": "你幾點下班？一點半。你每天工作幾小時？", "start": 1684.87, "end": 1689.91}, {"text": "Negen uur. Amai, dat is veel.", "translation": "九小時。哇，很多啊。", "start": 1690.63, "end": 1693.11}, {"text": "Dag Kadla, hoe gaat het? Goed, ik werk nu.", "translation": "卡德拉你好，最近怎麼樣？很好，我現在在工作。", "start": 1696.37, "end": 1699.75}, {"text": "Waar? In het Hilton Hotel. Hoe laat moet je beginnen?", "translation": "在哪裡？在希爾頓飯店。你幾點開始工作？", "start": 1700.19, "end": 1703.69}, {"text": "Om half acht. Hoe laat moet je dan opstaan? Om half zeven.", "translation": "七點半。那你幾點起床？六點半。", "start": 1704.39, "end": 1708.89}, {"text": "En hoe laat heb je gedaan? Om half vier.", "translation": "你幾點下班？三點半。", "start": 1709.37, "end": 1712.13}, {"text": "Zesendertig, ga je mee? Luister.", "translation": "三十六歲，你要一起去嗎？聽著。", "start": 1713.65, "end": 1717.07}, {"text": "Ga je mee naar het park? Wanneer? Vrijdagmiddag.", "translation": "你要一起去公園嗎？什麼時候？星期五下午。", "start": 1718.39, "end": 1722.43}, {"text": "Nee, ik kan niet. Ik moet werken.", "translation": "不，我不能。我得工作。", "start": 1722.87, "end": 1725.31}, {"text": "Ga je mee naar de discotheek? Ja, natuurlijk. Wanneer?", "translation": "你要一起去夜店嗎？當然。什麼時候？", "start": 1727.07, "end": 1731.51}, {"text": "Zaterdagavond. Waar? Naar de Carré.", "translation": "星期六晚上。在哪裡？到Carré去。", "start": 1732.55, "end": 1735.81}, {"text": "Dat is goed. Hoe laat? Om tien uur.", "translation": "好啊。幾點？十點。", "start": 1736.51, "end": 1740.09}, {"text": "Oké, tot zaterdag. Ga je mee naar de markt?", "translation": "好的，星期六見。你要一起去市場嗎？", "start": 1740.37, "end": 1745.89}, {"text": "Ja, plezant. Wanneer? Morgen om tien uur.", "translation": "好啊，很開心。什麼時候？明天早上十點。", "start": 1746.61, "end": 1750.47}, {"text": "Oké, tot morgen. Tot morgen. Ga je mee wandelen?", "translation": "好的，明天見。明天見。你要一起去散步嗎？", "start": 1750.77, "end": 1756.37}, {"text": "Ja, graag. Waar? In het park.", "translation": "好啊，樂意。在哪裡？在公園。", "start": 1756.89, "end": 1760.01}, {"text": "Oké. Ga je straks mee voetballen?", "translation": "好的。你待會要一起去踢足球嗎？", "start": 1760.01, "end": 1764.37}, {"text": "Ja, graag. Waar? Op het strand?", "translation": "好啊，樂意。在哪裡？海灘？", "start": 1765.05, "end": 1768.05}, {"text": "Oké. Hoe laat? Om half vier. Oké, tot straks.", "translation": "好的。幾點？三點半。好，待會見。", "start": 1768.59, "end": 1773.19}, {"text": "Het is vrijdag. Sander heeft een vrije dag.", "translation": "今天是星期五。桑德有一天假。", "start": 1782.39, "end": 1787.13}, {"text": "Hij moet vandaag niet werken. Hij slaapt lang uit,", "translation": "他今天不用工作。他睡到很晚，", "start": 1787.13, "end": 1791.67}, {"text": "tot elf uur. Hij staat op en neemt een douche.", "translation": "睡到十一點。他起床洗澡。", "start": 1792.17, "end": 1796.03}, {"text": "Hij eet een boterham en hij drinkt een tas koffie.", "translation": "他吃一片麵包，喝一杯咖啡。", "start": 1797.19, "end": 1799.91}, {"text": "Hij leest de krant bij het ontbijt.", "translation": "他早餐時看報紙。", "start": 1804.9, "end": 1806.24}, {"text": "Hij belt naar een vriend.", "translation": "他打電話給朋友。", "start": 1808.04, "end": 1811.74}, {"text": "Dag Jan, met Sander. Ga je mee naar het strand?", "translation": "你好，簡，我是桑德。你要一起去海灘嗎？", "start": 1812.76, "end": 1817.74}, {"text": "O ja, graag! Het is één uur.", "translation": "喔，好啊！現在是一點鐘。", "start": 1819.26, "end": 1821.1}, {"text": "Jan en Sander zijn op het strand.", "translation": "簡和桑德在海灘上。", "start": 1822.1, "end": 1826.5}, {"text": "Het is mooi weer. De zon schijnt. Het is warm.", "translation": "天氣很好。太陽在照耀。很熱。", "start": 1827.88, "end": 1832.7}, {"text": "Jan en Sander spelen voetbal. Ze liggen in de zon.", "translation": "簡和桑德踢足球。他們曬太陽。", "start": 1833.86, "end": 1837.6}, {"text": "Ze zwemmen in de zee. Ze praten over meisjes.", "translation": "他們在海裡游泳。他們聊著女生。", "start": 1838.78, "end": 1840.6}, {"text": "Ze lezen voetbalmagazines.", "translation": "他們看足球雜誌。", "start": 1841.98, "end": 1845.38}, {"text": "Ze drinken een pintje. Mmm, lekker!", "translation": "他們喝一杯啤酒。嗯，好喝！", "start": 1847.58, "end": 1849.36}, {"text": "'s Avonds gaat Sander naar huis.", "translation": "晚上桑德回家。", "start": 1851.0, "end": 1853.92}, {"text": "Zijn rug is rood. Zijn rug doet pijn.", "translation": "他的背部很紅。他的背部痛。", "start": 1853.92, "end": 1857.78}, {"text": "Zijn rug is verbrand van de zon.", "translation": "他的背部被太陽曬傷了。", "start": 1860.72, "end": 1864.0}, {"text": "Dag Suzanne, hoe gaat het? Niet zo goed. Mijn knie doet pijn.", "translation": "嗨，Suzanne，近況如何？不太好。我的膝蓋痛。", "start": 1865.7, "end": 1871.3}, {"text": "Dag Alex, hoe gaat het? Niet zo goed.", "translation": "嗨，Alex，近況如何？不太好。", "start": 1873.52, "end": 1876.66}, {"text": "Wat is er? Ik heb hoofdpijn.", "translation": "怎麼了？我頭痛。", "start": 1877.18, "end": 1879.58}, {"text": "Dag Martha, wat is er? Mijn arm doet pijn.", "translation": "嗨，Martha，怎麼了？我的手臂痛。", "start": 1881.46, "end": 1886.18}, {"text": "Dag Said, wat is er? Ik heb buikpijn.", "translation": "嗨，Said，怎麼了？我肚子痛。", "start": 1888.22, "end": 1891.58}, {"text": "39. Carlos maakt een afspraak met de dokter. Luister!", "translation": "39. Carlos 預約看醫生。請聽！", "start": 1895.02, "end": 1898.88}, {"text": "Met dokter Jacobs. Dag dokter, met Carlos Santos.", "translation": "這是 Jacobs 醫生。嗨，醫生，我是 Carlos Santos。", "start": 1900.3, "end": 1905.06}, {"text": "Dag meneer Santos, wat kan ik voor u doen? Ik ben ziek. Kan ik een afspraak maken?", "translation": "嗨，Santos 先生，我能為您做什麼？我生病了。我可以預約嗎？", "start": 1905.82, "end": 1911.58}, {"text": "Kunt u hier om negen uur zijn? Geen probleem.", "translation": "你九點能來這裡嗎？沒問題。", "start": 1913.08, "end": 1916.58}, {"text": "Oké, negen uur dan. Tot zeven. Oké dokter, tot zeven.", "translation": "好的，那九點見。七點見。好，醫生，七點見。", "start": 1917.12, "end": 1921.94}, {"text": "40. Amina maakt een afspraak met de dokter. Luister!", "translation": "40. Amina 預約看醫生。請聽！", "start": 1924.42, "end": 1928.66}, {"text": "Met dokter Jacobs. Dag dokter, met Amina de Groot. Kan ik een afspraak maken?", "translation": "這是 Jacobs 醫生。嗨，醫生，我是 Amina de Groot。我可以預約嗎？", "start": 1930.04, "end": 1935.96}, {"text": "Vandaag of morgen? Liever vandaag.", "translation": "今天還是明天？我比較想今天。", "start": 1935.96, "end": 1939.08}, {"text": "Ik heb nog een gaatje om kwart over elf.", "translation": "我十一點一刻還有空檔。", "start": 1939.9, "end": 1943.2}, {"text": "Kwart over elf is goed, dokter. Tot kwart over elf, mevrouw de Groot.", "translation": "十一點一刻好，醫生。十一點一刻見，de Groot 女士。", "start": 1943.96, "end": 1948.3}, {"text": "Ja, dag dokter.", "translation": "是的，醫生，您好。", "start": 1948.76, "end": 1950.0}, {"text": "41. Mark maakt een afspraak met de dokter. Luister!", "translation": "41. Mark 預約看醫生。請聽！", "start": 1953.22, "end": 1957.28}, {"text": "Met dokter Jacobs. Dag dokter, met Mark Mast. Ik bel voor een afspraak.", "translation": "這是 Jacobs 醫生。嗨，醫生，我是 Mark Mast。我打電話預約。", "start": 1959.2, "end": 1965.1}, {"text": "Vandaag of morgen? Liever morgen.", "translation": "今天還是明天？我比較想明天。", "start": 1965.1, "end": 1968.26}, {"text": "Oké, morgen is het donderdag om negen uur. Gaat dat?", "translation": "好的，明天星期四九點，可以嗎？", "start": 1969.32, "end": 1974.86}, {"text": "Oké dokter, morgen om negen uur. Tot morgen.", "translation": "好的，醫生，明天九點見。明天見。", "start": 1975.52, "end": 1979.06}, {"text": "Tot morgen, meneer Mast.", "translation": "明天見，Mast 先生。", "start": 1980.0, "end": 1981.22}, {"text": "42. Fatma maakt een afspraak met de dokter. Luister!", "translation": "42. Fatma 預約看醫生。請聽！", "start": 1984.56, "end": 1988.9}, {"text": "Met dokter Jacobs. Goedemorgen.", "translation": "這是 Jacobs 醫生。早安。", "start": 1990.12, "end": 1995.1}, {"text": "Goedemorgen met Fatma Akla.", "translation": "早安，我是 Fatma Akla。", "start": 1996.34, "end": 2001.14}, {"text": "Mijn kind is ziek. Ik bel voor een afspraak.", "translation": "我的孩子生病了。我打電話來預約。", "start": 2002.24, "end": 2003.36}, {"text": "Voor wanneer?", "translation": "什麼時候？", "start": 2004.1, "end": 2009.14}, {"text": "Kan ik vandaag komen?", "translation": "我今天可以來嗎？", "start": 2010.26, "end": 2013.4}, {"text": "Ja, om half tien of om kwart voor tien?", "translation": "可以，半十點或是十點四十五分？", "start": 2014.62, "end": 2019.12}, {"text": "Half tien is goed. Mag ik uw naam nog eens?", "translation": "半十點好。請問您的名字？", "start": 2020.12, "end": 2021.84}, {"text": "Akla. Dank u. Tot straks mevrouw Akla.", "translation": "Akla。謝謝。待會見，Akla 女士。", "start": 2024.26, "end": 2028.04}, {"text": "Ja, tot straks.", "translation": "是的，待會見。", "start": 2031.0, "end": 2032.48}, {"text": "43. Ik ben verkouden. Luister!", "translation": "43. 我感冒了。請聽！", "start": 2032.86, "end": 2037.9}, {"text": "Dag Said, wat is er?", "translation": "嗨，Said，怎麼了？", "start": 2039.58, "end": 2044.08}, {"text": "Oh, ik ben verkouden. Ik moet hoesten.", "translation": "喔，我感冒了，我必須咳嗽。", "start": 2046.8, "end": 2050.36}, {"text": "En ik moet veel niezen. Gezondheid.", "translation": "而且我一直打噴嚏。祝你健康。", "start": 2050.74, "end": 2055.46}, {"text": "Dag Alex, hoe gaat het? Niet zo goed.", "translation": "嗨，Alex，近況如何？不太好。", "start": 2056.14, "end": 2061.46}, {"text": "Wat is er? Ik ben misselijk. Ik moet overgeven.", "translation": "怎麼了？我噁心。我想嘔吐。", "start": 2062.06, "end": 2065.52}, {"text": "Oei, vervelend. Dag Martha, hoe gaat het?", "translation": "哎唷，真糟。嗨，Martha，近況如何？", "start": 2068.02, "end": 2071.52}, {"text": "Goed. Ik ben zwanger. Proficiat.", "translation": "很好。我懷孕了。恭喜。", "start": 2072.18, "end": 2076.84}, {"text": "Oei, wat is er? Ik heb tandpijn.", "translation": "哎唷，怎麼了？我牙痛。", "start": 2077.28, "end": 2081.12}, {"text": "Oei. Maar Stef, wat is er?", "translation": "哎唷。但 Stef，怎麼了？", "start": 2083.24, "end": 2088.38}, {"text": "Ik heb koorts. Zie je het? Je ogen zijn rood.", "translation": "我發燒了。你看到沒？你的眼睛是紅色的。", "start": 2090.0, "end": 2092.46}, {"text": "Wat is er Carlos? Ik heb diarree. Ga maar snel naar de dokter.", "translation": "怎麼了，Carlos？我拉肚子。快去看醫生。", "start": 2093.64, "end": 2096.92}, {"text": "44. Lee Su Han", "translation": "44. Lee Su Han", "start": 2098.18, "end": 2100.4}, {"text": "Luister en lees mee in je boek, hoofdstuk 9.", "translation": "聽著，一起讀你的書，第九章。", "start": 2101.8, "end": 2108.72}, {"text": "Ik lig in bed. Ik slaap.", "translation": "我躺在床上。我在睡覺。", "start": 2109.78, "end": 2117.22}, {"text": "Plots word ik wakker. Wat is dat? Ik hoor iets. Is het een dief?", "translation": "突然醒來。那是什麼？我聽到聲音。是小偷嗎？", "start": 2119.06, "end": 2125.66}, {"text": "Ik sta snel op. Ik ga kijken. Het geluid komt uit de badkamer.", "translation": "我很快起身。我去查看。聲音來自浴室。", "start": 2126.94, "end": 2130.44}, {"text": "Ik ben een beetje bang. Het raam is dicht. Oef, geen dief dus.", "translation": "我有點害怕。窗戶關著。呼，沒小偷。", "start": 2131.98, "end": 2141.68}, {"text": "Ik loop terug door de badkamer. Er ligt een stuk zeep op de grond.", "translation": "我走回浴室。地上有一塊肥皂。", "start": 2142.82, "end": 2147.88}, {"text": "Zeep op de grond, dat is zó dom. Ik stap op de zeep. Ik schuif uit en ik val. Au, dat doet pijn. Mijn knie. Aaiaai. Mijn knie, mijn knie.", "translation": "地上有肥皂，真是太笨了。我踩到肥皂，我滑倒了，我摔倒了。啊，好痛。我的膝蓋。啊哎哎。我的膝蓋，我的膝蓋。", "start": 2149.42, "end": 2167.44}, {"text": "Ik ga opnieuw slapen, ik denk.", "translation": "我想我會再睡一次。", "start": 2168.74, "end": 2172.04}, {"text": "Morgen is die knie weer goed.", "translation": "明天膝蓋又會好。", "start": 2173.32, "end": 2175.44}, {"text": "Kan ik u helpen? Ik zoek informatie over een opleiding. Welke opleiding? Schoonmaker.", "translation": "我可以幫您嗎？我在找一個課程的資訊。什麼課程？清潔工。", "start": 2180.74, "end": 2188.56}, {"text": "Kan ik u helpen? Ik zoek informatie over een opleiding. Welke opleiding? Verzorgende.", "translation": "我可以幫您嗎？我在找一個課程的資訊。什麼課程？照顧者。", "start": 2190.7, "end": 2197.3}, {"text": "Kan ik u helpen? Ik zoek werk. Welk werk? Als poetsvrouw.", "translation": "我可以幫您嗎？我找工作。什麼工作？當清潔婦。", "start": 2199.94, "end": 2204.56}, {"text": "Kan ik u helpen? Ik zoek informatie over de Nederlandse les.", "translation": "我可以幫您嗎？我在找有關荷蘭語課程的資訊。", "start": 2207.28, "end": 2210.94}, {"text": "Dan moet u naar het Huis van het Nederlands.", "translation": "那您應該去荷蘭之家。", "start": 2211.66, "end": 2213.82}, {"text": "Wat is jouw beroep? Luister. Wat is jouw beroep? Ik ben naaister. Wat is jouw beroep? Ik ben vuilnisman.", "translation": "你是做什麼工作的？聽好了。你是做什麼工作的？我是裁縫。你是做什麼工作的？我是清潔工。", "start": 2218.56, "end": 2230.98}, {"text": "Wat is jouw beroep? Ik heb geen beroep. Wat is jouw beroep? Ik ben huisvrouw.", "translation": "你是做什麼工作的？我沒有工作。你是做什麼工作的？我是家庭主婦。", "start": 2233.66, "end": 2241.68}, {"text": "Waar werk jij? Ik werk in een ziekenhuis.", "translation": "你在哪裡工作？我在醫院工作。", "start": 2243.64, "end": 2246.68}, {"text": "Waar werk jij? Ik ben arbeider. Ik werk in een fabriek.", "translation": "你在哪裡工作？我是工人。我在工廠工作。", "start": 2249.62, "end": 2254.18}, {"text": "Waar werk jij? Ik werk niet. Ik volg een opleiding.", "translation": "你在哪裡工作？我不工作。我正在上課。", "start": 2256.92, "end": 2261.1}, {"text": "Waar werk jij? Ik werk niet. Ik ben werkloos.", "translation": "你在哪裡工作？我不工作。我失業了。", "start": 2263.96, "end": 2267.98}, {"text": "Wat is jouw beroep? Ik ben poetsvrouw.", "translation": "你是做什麼工作的？我是清潔婦。", "start": 2269.98, "end": 2272.98}, {"text": "Waar werk jij? In een rusthuis. En jij?", "translation": "你在哪裡工作？在安養院。你呢？", "start": 2274.58, "end": 2277.02}, {"text": "Ik volg een opleiding met zé. Waar? In Antwerpen bij de VDAB.", "translation": "我跟著一個課程學習。哪裡？在安特衛普，VDAB。", "start": 2277.78, "end": 2284.16}, {"text": "Rijdt u naar het ziekenhuis, meneer? Ja.", "translation": "先生，您要去醫院嗎？是的。", "start": 2292.62, "end": 2295.84}, {"text": "Rijdt u naar het centraal station, meneer?", "translation": "先生，您要去中央車站嗎？", "start": 2298.98, "end": 2301.42}, {"text": "Nee, dan moet u bus 21 nemen. Oké, bedankt.", "translation": "不，您要搭21號公車。好的，謝謝。", "start": 2302.7, "end": 2308.36}, {"text": "Rijdt u naar de Grote Markt, meneer? Nee, dan moet u tram 11 nemen.", "translation": "先生，您要去大廣場嗎？不，您要搭11號電車。", "start": 2310.58, "end": 2315.72}, {"text": "Waar komt die daar aan de overkant? Bedankt.", "translation": "那是從對面來的嗎？謝謝。", "start": 2317.06, "end": 2321.94}, {"text": "Pardon meneer, mag ik iets vragen? Jazeker! Welke bus gaat naar het centraal station?", "translation": "不好意思，先生，我可以問個問題嗎？當然！哪輛公車去中央車站？", "start": 2324.04, "end": 2331.0}, {"text": "Bus 12 en bus 21. Danku.", "translation": "12號和21號公車。謝謝。", "start": 2332.28, "end": 2335.56}, {"text": "48, in de bus. Een passagier spreekt met de chauffeur. Luister.", "translation": "
