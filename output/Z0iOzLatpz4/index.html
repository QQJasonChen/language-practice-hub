<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>luisteren examen inburgeren A2 — 荷蘭文練習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root, [data-theme="dark"] {
    --bg: #050510; --card: rgba(255,255,255,0.04); --card-solid: #14142a;
    --glass-border: rgba(255,255,255,0.08);
    --accent: #ff3b5c; --accent2: #7c5cfc;
    --text: #f2f2f7; --muted: #a0a0b8; --dim: #606078;
    --green: #34d399; --orange: #fb923c; --blue: #60a5fa;
    --r: 16px;
  }
  [data-theme="light"] {
    --bg: #f8f8fc; --card: rgba(0,0,0,0.03); --card-solid: #fff;
    --glass-border: rgba(0,0,0,0.08);
    --accent: #e63550; --accent2: #6c4de6;
    --text: #1a1a2e; --muted: #666680; --dim: #999;
    --green: #0d9668; --orange: #d97706; --blue: #2563eb;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
  }
  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 24px; }

  /* Header - compact */
  header { display: flex; align-items: center; gap: 10px; padding: 8px 0 6px; }
  header h1 { font-size: 13px; font-weight: 600; flex: 1; line-height: 1.3; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Mini player row */
  .mini-player-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .mini-player-row .progress-container { height: 32px; border-radius: 8px; }
  .mini-player-row .play-btn { min-width: 40px; padding: 8px; font-size: 14px; }

  /* Player actions */
  .player-actions { display: flex; gap: 4px; align-items: center; }
  .pa-btn {
    background: none; border: 1px solid var(--glass-border); color: var(--dim);
    padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600;
    transition: all 0.2s;
  }
  .pa-btn:active { transform: scale(0.92); color: var(--text); }

  /* Extra controls (collapsible) */
  .extra-controls { padding: 8px 0 4px; }
  .extra-controls .controls { gap: 4px; margin-bottom: 0; }
  .extra-controls .ctrl-btn { padding: 5px 10px; font-size: 11px; }

  /* Progress in header */
  .progress-summary { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .progress-summary .bar { flex: 1; height: 3px; background: var(--glass-border); border-radius: 2px; overflow: hidden; max-width: 120px; }
  .progress-summary .bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

  /* Player */
  .player-box {
    background: var(--card); border: 1px solid var(--glass-border);
    border-radius: var(--r); padding: 16px; margin-bottom: 12px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .progress-container { position: relative; height: 40px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 12px; cursor: pointer; overflow: hidden; }
  [data-theme="light"] .progress-container { background: rgba(0,0,0,0.04); }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); width: 0%; border-radius: 10px; transition: width 0.1s linear; }
  .ab-marker { position: absolute; top: 0; width: 2px; height: 100%; z-index: 2; }
  .ab-marker.a-marker { background: var(--green); }
  .ab-marker.b-marker { background: var(--orange); }
  .ab-region { position: absolute; top: 0; height: 100%; background: rgba(52,211,153,0.12); z-index: 1; }
  .segment-marker { position: absolute; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.08); z-index: 1; pointer-events: none; }
  .time-display { position: absolute; bottom: 6px; right: 10px; font-size: 11px; color: var(--muted); z-index: 3; font-weight: 500; font-variant-numeric: tabular-nums; }

  .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .ctrl-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--text);
    padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all 0.2s; backdrop-filter: blur(10px);
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ctrl-btn.play-btn {
    background: var(--green); color: #000; font-weight: 800; min-width: 52px;
    border: none; box-shadow: 0 2px 12px rgba(52,211,153,0.3);
  }
  .ctrl-btn.play-btn:active { transform: scale(0.92); }
  .speed-control { display: flex; align-items: center; gap: 3px; margin-left: auto; }
  .speed-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--muted);
    padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.2s;
  }
  .speed-btn:active { transform: scale(0.92); }
  .speed-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .ab-info { display: flex; gap: 12px; font-size: 12px; color: var(--dim); font-weight: 500; }
  .ab-info span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.green { background: var(--green); }
  .dot.orange { background: var(--orange); }
  .sentence-nav { display: flex; gap: 4px; align-items: center; margin-left: auto; }
  .nav-btn {
    background: var(--card); border: 1px solid var(--glass-border); color: var(--text);
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .nav-btn:active { transform: scale(0.9); }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 12px; background: var(--card); border-radius: 12px; padding: 3px; border: 1px solid var(--glass-border); }
  .tab {
    flex: 1; background: none; border: none; color: var(--dim); padding: 8px 8px;
    cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 10px;
    transition: all 0.25s;
  }
  .tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(255,59,92,0.3); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Mode bar */
  .mode-bar { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; }
  .mode-bar::-webkit-scrollbar { display: none; }
  .mode-btn {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--glass-border);
    color: var(--muted); padding: 6px 14px; border-radius: 100px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all 0.2s;
  }
  .mode-btn:active { transform: scale(0.95); }
  .mode-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .mode-btn.echo-btn { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); color: var(--green); }
  .mode-btn.echo-btn:active { background: var(--green); color: #000; }

  /* Dialogue */
  .dialogue-box {
    background: var(--card); border: 1px solid var(--glass-border);
    border-radius: var(--r); padding: 8px; max-height: 60vh; overflow-y: auto; scroll-behavior: smooth;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .dialogue-box::-webkit-scrollbar { width: 3px; }
  .dialogue-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .dialogue-line {
    padding: 10px 12px; border-radius: 12px; margin-bottom: 2px; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    line-height: 1.65; font-size: 14px; display: flex; align-items: flex-start; gap: 6px;
    flex-wrap: wrap;  /* analysis panel can wrap to new row below text + buttons */
  }
  .dialogue-line:active { transform: scale(0.98); }
  .dialogue-line:hover { background: rgba(255,255,255,0.04); }
  [data-theme="light"] .dialogue-line:hover { background: rgba(0,0,0,0.03); }
  /* Karaoke: line currently being played (driven by syncLoop / updateKaraoke) */
  .dialogue-line { scroll-margin-top: 80px; scroll-margin-bottom: 140px; border-left: 3px solid transparent; transition: border-color .15s, background .15s; }
  .dialogue-line.playing { background: rgba(245,158,11,0.14); border-left-color: #f59e0b; }
  .dialogue-line.playing .line-text { color: #fed7aa; font-weight: 600; }
  [data-theme="light"] .dialogue-line.playing { background: rgba(245,158,11,0.16); }
  [data-theme="light"] .dialogue-line.playing .line-text { color: #78350f; }
  .dialogue-line.highlight {
    background: rgba(255,59,92,0.08); border-left: 3px solid var(--accent);
    padding-left: 9px;
  }
  .line-text { flex: 1; }
  /* Answer-key highlight (proper nouns, numbers, days, time) — ON by default,
     toggled via .show-stress on dialogue-box. Tap 🎯 答題線索 to disable. */
  .line-stress { background: none; color: inherit; padding: 0; border-radius: 0; font-weight: inherit; }
  .show-stress .line-stress { background: #fde047; color: #18181b;
    padding: 1px 5px; border-radius: 3px; font-weight: 800;
    box-shadow: 0 0 0 1px rgba(253,224,71,0.6); }
  [data-theme="light"] .show-stress .line-stress { background: #fde047; color: #18181b; }
  .line-zh { font-size: 12px; color: var(--dim); margin-top: 3px; display: none; line-height: 1.5; }
  .show-zh .line-zh { display: block; }

  .explain-btn, .bookmark-btn, .line-repeat-btn, .rec-btn, .ana-btn {
    background: none; border: none; color: var(--dim); font-size: 14px;
    padding: 2px; cursor: pointer; opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
  }
  .dialogue-line:hover .explain-btn,
  .dialogue-line:hover .bookmark-btn,
  .dialogue-line:hover .line-repeat-btn,
  .dialogue-line:hover .rec-btn,
  .dialogue-line:hover .ana-btn { opacity: 0.5; }
  .explain-btn:hover, .bookmark-btn:hover, .line-repeat-btn:hover, .rec-btn:hover, .ana-btn:hover { opacity: 1 !important; }
  /* On touch devices (no hover), keep all inline buttons visible by default */
  @media (hover: none) {
    .explain-btn, .bookmark-btn, .line-repeat-btn, .rec-btn, .ana-btn { opacity: 0.55; }
    .ana-btn { color: #5eead4; opacity: 0.85; }  /* extra emphasis — newest feature */
  }
  .bookmark-btn.bookmarked { opacity: 1 !important; color: var(--orange); }
  .rec-btn.recording { opacity: 1 !important; color: var(--accent); animation: recPulse 0.8s ease-in-out infinite; }
  @keyframes recPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.2); } }

  /* Per-sentence analysis panel — collapses by default, expands on 🔬 click */
  .line-analysis { display: none; width: 100%; flex-basis: 100%; order: 99;
    margin: 8px 0 4px; padding: 10px 12px; background: rgba(94,234,212,0.05);
    border-left: 3px solid #5eead4; border-radius: 6px; font-size: 12.5px; line-height: 1.55; }
  .dialogue-line.show-analysis .line-analysis { display: block; }
  .dialogue-line.show-analysis .ana-btn { opacity: 1 !important; color: #5eead4; }
  .ana-sec { margin: 4px 0; }
  .ana-lbl { display: inline-block; color: #5eead4; font-weight: 800; font-size: 11px;
    min-width: 56px; margin-right: 6px; }
  .ana-text { color: var(--text2); }
  .ana-word { display: inline-block; padding: 2px 7px; margin: 2px 4px 2px 0;
    border: 1px solid; border-radius: 4px; font-size: 11.5px; }
  .ana-word b { font-weight: 700; }
  .ana-word .ana-zh { color: var(--text2); margin-left: 5px; font-size: 11px; }
  .ana-word .ana-lv { margin-left: 5px; font-size: 9.5px; font-weight: 700; }
  .ana-red { display: inline-flex; align-items: center; padding: 2px 7px; margin: 2px 4px 2px 0;
    background: rgba(255,255,255,0.04); border-radius: 4px; font-size: 11.5px; }
  .ana-red-w { color: var(--text2); }
  .ana-red-arr { margin: 0 6px; color: var(--dim); }
  .ana-red-s { color: var(--orange); font-weight: 700; font-family: ui-monospace, Menlo, monospace; }
  .ana-stress { display: inline-block; padding: 2px 8px; margin: 2px 4px 2px 0;
    background: rgba(253,224,71,0.15); color: #fde047; border: 1px solid #fde04766;
    border-radius: 4px; font-size: 12px; font-weight: 800;
    font-family: ui-monospace, Menlo, monospace; }
  .ana-hint { color: var(--dim); font-size: 11px; margin-left: 6px; font-style: italic; }
  .ana-trap { background: rgba(251,146,60,0.08); border-radius: 4px; padding: 6px 8px; margin-top: 4px; }
  .ana-trap .ana-lbl { color: var(--orange); }

  /* Recording result */
  .rec-result {
    margin-top: 6px; padding: 8px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    font-size: 12px; animation: slideUp 0.3s ease;
  }
  .rec-result .rec-score { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .rec-result .rec-score.good { color: var(--green); }
  .rec-result .rec-score.ok { color: var(--orange); }
  .rec-result .rec-score.bad { color: var(--accent); }
  .rec-result .rec-you { color: var(--muted); margin-bottom: 4px; }
  .rec-result .rec-diff { line-height: 1.8; }
  .rec-result .rec-diff .match { color: var(--green); }
  .rec-result .rec-diff .miss { color: var(--accent); text-decoration: line-through; }
  .rec-result .rec-diff .extra { color: var(--orange); font-style: italic; }
  .rec-playback { display: flex; gap: 6px; margin-top: 6px; }
  .rec-play-btn { background: var(--card); border: 1px solid var(--glass-border); color: var(--text); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .rec-play-btn:active { transform: scale(0.95); }

  /* Dictation mode */
  .dictation-mode .line-text { filter: blur(6px); transition: filter 0.3s; user-select: none; }
  .dictation-mode .line-zh { display: none !important; }
  .dictation-mode .dialogue-line:hover .line-text,
  .dictation-mode .dialogue-line.revealed .line-text { filter: none; }

  /* Quiz */
  .quiz-box { background: var(--card); border: 1px solid var(--glass-border); border-radius: var(--r); padding: 16px; }
  .question { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--glass-border); }
  .question:last-child { border-bottom: none; }
  .question h4 { margin-bottom: 4px; font-size: 14px; font-weight: 700; }
  .question .q-native { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  .option {
    display: block; width: 100%; text-align: left;
    background: var(--card); border: 1.5px solid var(--glass-border); color: var(--text);
    padding: 12px 14px; border-radius: 12px; margin-bottom: 6px; cursor: pointer;
    font-size: 14px; transition: all 0.2s;
  }
  .option:active { transform: scale(0.98); }
  .option.correct { border-color: var(--green); background: rgba(52,211,153,0.1); }
  .option.wrong { border-color: var(--accent); background: rgba(255,59,92,0.1); }
  .option.disabled { pointer-events: none; opacity: 0.6; }
  .score-bar { margin-top: 16px; padding: 14px; background: var(--card); border: 1px solid var(--glass-border); border-radius: 12px; text-align: center; font-size: 14px; font-weight: 700; display: none; }

  /* Vocab */
  .vocab-box { background: var(--card); border: 1px solid var(--glass-border); border-radius: var(--r); padding: 12px 16px; }
  .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
  .vocab-item:last-child { border-bottom: none; }
  .vocab-word { font-weight: 700; color: var(--green); }
  .vocab-meaning { color: var(--muted); font-size: 13px; }

  /* Echo overlay */
  .echo-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,16,0.96); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px;
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  }
  .echo-overlay.active { display: flex; }
  .echo-phase { font-size: 1.3em; font-weight: 700; text-align: center; min-height: 2em; }
  .echo-phase .emoji { font-size: 2.2em; display: block; margin-bottom: 10px; }
  .echo-phase .label { color: var(--green); font-size: 0.65em; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; }
  .echo-sentence {
    font-size: 15px; text-align: center; max-width: 500px; line-height: 1.8;
    padding: 20px 24px; background: rgba(255,255,255,0.04); border-radius: var(--r);
    border: 1px solid var(--glass-border); min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .echo-sentence .nl { color: var(--text); font-weight: 500; }
  .echo-sentence .zh { color: var(--dim); font-size: 13px; margin-top: 8px; }
  .echo-progress-ring { width: 120px; height: 120px; position: relative; }
  .echo-progress-ring svg { transform: rotate(-90deg); }
  .echo-progress-ring circle { fill: none; stroke-width: 3; }
  .echo-ring-bg { stroke: rgba(255,255,255,0.06); }
  .echo-ring-fg { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
  .echo-ring-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2em; font-weight: 800; }
  .echo-controls { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; width: 100%; max-width: 360px; }
  .echo-row { display: flex; gap: 6px; justify-content: center; }
  .echo-ctrl {
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.2s; text-align: center;
  }
  .echo-ctrl:active { transform: scale(0.95); }
  .echo-ctrl.primary { background: var(--green); color: #000; font-weight: 800; border: none; box-shadow: 0 4px 16px rgba(52,211,153,0.3); }
  .echo-actions { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
  .echo-action { background: none; border: 1px solid var(--glass-border); color: var(--dim); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .echo-action:active { transform: scale(0.95); color: var(--text); }
  .echo-settings { display: flex; gap: 14px; align-items: center; color: var(--dim); font-size: 12px; margin-top: 10px; font-weight: 500; }
  .echo-settings label { display: flex; align-items: center; gap: 6px; }
  .echo-settings input[type=range] { width: 50px; accent-color: var(--green); }
  .echo-counter { color: var(--dim); font-size: 12px; font-weight: 600; }

  /* AI Explain panel — bottom sheet */
  .explain-backdrop {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 149;
  }
  .explain-backdrop.open { display: block; }
  .explain-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-solid, #14142a); border-top: none;
    border-radius: 20px 20px 0 0;
    padding: 12px 20px 20px; padding-bottom: max(20px, env(safe-area-inset-bottom));
    z-index: 150; max-height: 55vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .explain-panel.open { transform: translateY(0); }
  .explain-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 12px; }
  [data-theme="light"] .explain-handle { background: rgba(0,0,0,0.15); }
  [data-theme="light"] .explain-panel { background: #fff; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
  .explain-close { position: absolute; top: 8px; right: 12px; background: none; border: none; color: var(--muted); font-size: 1.2em; cursor: pointer; }
  .explain-original { font-size: 1.05em; font-weight: 600; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #333; }
  [data-theme="light"] .explain-original { border-bottom-color: #ddd; }
  .explain-loading { color: var(--muted); font-size: 0.9em; }
  .explain-content { font-size: 0.9em; line-height: 1.8; }
  .explain-content h4 { color: var(--accent); font-size: 0.85em; margin-top: 10px; margin-bottom: 4px; }
  .explain-content .word-item { display: inline-block; background: rgba(78,204,163,0.1); border: 1px solid rgba(78,204,163,0.3); padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 0.85em; }
  .explain-content .pron-tip { background: rgba(245,166,35,0.1); border-left: 3px solid var(--orange); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0; font-size: 0.85em; }
  .explain-content .grammar-note { background: rgba(91,155,213,0.1); border-left: 3px solid var(--blue, #5b9bd5); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0; font-size: 0.85em; }
  .explain-btn { background: none; border: 1px solid #444; color: var(--muted); font-size: 0.7em; padding: 2px 6px; border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
  .dialogue-line:hover .explain-btn { opacity: 0.6; }

  /* API key modal */
  .apikey-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }

  /* Difficulty badge */

  .review-card .rc-btn:hover { border-color: var(--accent); }

  /* Light theme overrides */
  [data-theme="light"] .dialogue-line:hover { background: #e8e6e0; }

  [data-theme="light"] .echo-sentence { background: #f0eeea; border-color: #ddd; }

  [data-theme="light"] .conn { background: #e8e6e0; border-color: #ccc; }

  /* Bookmark */

  /* Back button */
  .back-btn { position: fixed; top: 10px; left: 10px; background: var(--card); border: 1px solid #333; color: var(--text); padding: 6px 14px; border-radius: 8px; font-size: 0.85em; z-index: 50; text-decoration: none; transition: all 0.2s; }
  .back-btn:hover { border-color: var(--accent); }
  [data-theme="light"] .back-btn { background: #fff; border-color: #ccc; }

  /* Theme toggle */
  .theme-toggle { position: fixed; top: 10px; right: 10px; background: var(--card); border: 1px solid #333; color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.1em; z-index: 50; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }

  /* Progress bar in header */
  .progress-summary { display: flex; gap: 8px; align-items: center; margin-top: 6px; font-size: 0.75em; color: var(--muted); }

  /* Bookmarks tab */
  .bookmark-list { padding: 8px 0; }

  .bookmark-item:hover { background: rgba(255,255,255,0.05); }

  .bookmark-item .bk-time { color: var(--muted); font-size: 0.8em; white-space: nowrap; }
  .bookmark-item .bk-text { flex: 1; }
  .bookmark-item .bk-remove { color: #555; cursor: pointer; font-size: 0.7em; opacity: 0; }

  /* Spreken exam trainer */
  .spreken-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:185; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    overflow-y:auto;
  }
  .spreken-overlay.active { display:flex; }
  .spreken-header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; }
  .spreken-header .sq-num { font-size:14px; font-weight:700; color:var(--blue); }
  .spreken-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .spreken-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center; padding:10px; }
  .spreken-question { font-size:17px; font-weight:600; line-height:1.8; max-width:500px; padding:20px 24px; background:var(--card); border:1px solid var(--glass-border); border-radius:16px; }

  .spreken-timer-ring { width:100px; height:100px; position:relative; }

  .spreken-timer-fg { stroke:var(--blue); stroke-linecap:round; transition:stroke-dashoffset 0.2s; }

  .spreken-rec-indicator { color:var(--accent); font-size:13px; font-weight:600; }
  .spreken-answer { width:100%; max-width:500px; padding:16px; background:var(--card); border:1px solid var(--glass-border); border-radius:12px; text-align:left; font-size:14px; line-height:1.7; }
  .spreken-answer h4 { color:var(--green); margin-bottom:6px; font-size:13px; }
  .spreken-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .spreken-btn { background:var(--card); border:1px solid var(--glass-border); color:var(--text); padding:10px 18px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .spreken-btn:active { transform:scale(0.95); }
  .spreken-btn.primary { background:var(--blue); color:#fff; border:none; }
  .spreken-phase { font-size:14px; color:var(--muted); font-weight:600; }

  /* Screen wake lock indicator */
  .wake-lock-btn { position: fixed; top: 10px; right: 52px; background: var(--card); border: 1px solid var(--glass-border); color: var(--dim); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 14px; z-index: 50; display: flex; align-items: center; justify-content: center; }
  .wake-lock-btn.active { color: var(--green); border-color: var(--green); }

  /* Smooth page transitions */
  .container { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Exam simulation mode */
  .exam-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:180; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }
  .exam-overlay.active { display:flex; }
  .exam-header { display:flex; justify-content:space-between; align-items:center; padding:16px 0; }
  .exam-header .timer { font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--accent); }
  .exam-header .eq-count { font-size:13px; color:var(--muted); font-weight:600; }
  .exam-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .exam-question {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:24px; padding:20px;
  }
  .exam-sentence { font-size:18px; font-weight:600; line-height:1.8; max-width:500px;
    padding:24px; background:var(--card); border:1px solid var(--glass-border);
    border-radius:16px; }
  .exam-instruction { font-size:13px; color:var(--muted); }
  .exam-rec-btn {
    width:80px; height:80px; border-radius:50%; border:none; font-size:28px;
    cursor:pointer; transition:all 0.2s;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; box-shadow:0 4px 20px rgba(255,59,92,0.4);
  }
  .exam-rec-btn:active { transform:scale(0.9); }
  .exam-rec-btn.recording { background:var(--accent); animation:recPulse 0.8s infinite; }
  .exam-actions { display:flex; gap:10px; }
  .exam-action { background:var(--card); border:1px solid var(--glass-border); color:var(--text);
    padding:10px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .exam-action:active { transform:scale(0.95); }
  .exam-action.primary { background:var(--green); color:#000; border:none; }
  .exam-result { text-align:center; padding:20px; }
  .exam-result .big { font-size:48px; font-weight:900; margin-bottom:8px; }
  .exam-result .big.good { color:var(--green); }
  .exam-result .big.ok { color:var(--orange); }
  .exam-result .big.bad { color:var(--accent); }
  .exam-result-list { text-align:left; max-height:40vh; overflow-y:auto; margin-top:16px; }
  .exam-result-item { padding:10px 12px; border-radius:10px; margin-bottom:6px; background:var(--card); border:1px solid var(--glass-border); font-size:13px; }
  .exam-result-item .eri-score { font-weight:700; margin-right:8px; }

  /* Connected-speech trap notebook */
  .trap-btn { background:none; border:none; cursor:pointer; font-size:15px; opacity:0; transition:opacity .15s; }
  .dialogue-line:hover .trap-btn { opacity:0.5; }
  .trap-btn.trapped { opacity:1 !important; filter:drop-shadow(0 0 4px var(--orange)); }
  .trap-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:185; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }
  .trap-overlay.active { display:flex; }
  .trap-header { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:16px 0; }
  .trap-header h2 { font-size:17px; font-weight:800; flex:1; }
  .trap-header .th-due { font-size:13px; color:var(--orange); font-weight:700; }
  .trap-close { background:none; border:1px solid var(--glass-border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .trap-body { flex:1; overflow-y:auto; padding-bottom:20px; }
  .trap-empty { text-align:center; padding:40px 20px; color:var(--muted); line-height:1.7; }
  .trap-empty .big { font-size:2.4em; margin-bottom:10px; }
  .trap-list-item { display:flex; align-items:center; gap:10px; padding:12px; background:var(--card); border:1px solid var(--glass-border); border-radius:12px; margin-bottom:8px; }
  .tli-text { flex:1; font-size:14px; line-height:1.5; }
  .tli-meta { font-size:11px; color:var(--muted); margin-top:3px; }
  .tli-x { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; flex-shrink:0; }
  .trap-start { width:100%; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,var(--orange),var(--accent)); color:#fff; font-size:16px; font-weight:800; cursor:pointer; margin:6px 0 18px; }
  .trap-start:active { transform:scale(0.98); }
  .trap-start:disabled { opacity:0.45; cursor:default; filter:grayscale(0.5); }
  .trap-drill { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:22px; padding:20px 0; }
  .td-prompt { font-size:13px; color:var(--muted); letter-spacing:0.5px; }
  .td-replay { width:90px; height:90px; border-radius:50%; border:none; font-size:34px; cursor:pointer; color:#fff; background:linear-gradient(135deg,var(--orange),var(--accent)); box-shadow:0 4px 24px rgba(251,146,60,0.4); }
  .td-replay:active { transform:scale(0.92); }
  .td-loopbadge { font-size:12px; color:var(--orange); font-weight:700; min-height:1em; }
  .td-answer { font-size:18px; font-weight:600; line-height:1.7; max-width:520px; padding:20px; background:var(--card); border:1px solid var(--glass-border); border-radius:16px; transition:filter .25s; }
  .td-answer.hidden { filter:blur(10px); user-select:none; }
  .td-answer .zh { display:block; font-size:13px; color:var(--muted); margin-top:8px; font-weight:400; }
  .td-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .td-btn, .td-reveal { padding:12px 22px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; border:1px solid var(--glass-border); background:var(--card); color:var(--text); }
  .td-btn:active, .td-reveal:active { transform:scale(0.95); }
  .td-btn.again { border-color:var(--accent); color:var(--accent); }
  .td-btn.got { background:var(--green); color:#000; border:none; }

  /* Daily challenge */
  .daily-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--bg); z-index:175; flex-direction:column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }
  .daily-overlay.active { display:flex; }
  .daily-header { text-align:center; padding:20px 0; }
  .daily-header .flame { font-size:48px; margin-bottom:8px; }
  .daily-header h2 { font-size:20px; font-weight:800; margin-bottom:4px; }
  .daily-header .streak { color:var(--orange); font-size:14px; font-weight:700; }
  .daily-progress { display:flex; gap:6px; justify-content:center; margin:12px 0; }

  .daily-card {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; padding:20px; text-align:center;
  }
  .daily-sentence { font-size:17px; font-weight:600; line-height:1.8; max-width:480px;
    padding:20px 24px; background:var(--card); border:1px solid var(--glass-border);

  .daily-translation { font-size:13px; color:var(--dim); margin-top:6px; }
  .daily-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

    padding:10px 18px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .daily-btn:active { transform:scale(0.95); }
  .daily-btn.primary { background:var(--green); color:#000; border:none; }
  .daily-complete { text-align:center; padding:40px; }

  /* Touch-friendly: bigger tap targets on mobile */
  @media (max-width: 600px) {
    .controls { gap: 6px; }
    .ctrl-btn { padding: 8px 12px; font-size: 0.85em; }

<body>
<button class="wake-lock-btn" id="wake-btn" onclick="toggleWakeLock()" title="螢幕常亮">☀️</button>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="container">
  <!-- Compact top bar -->
  <header>
    <a href="../../index.html" style="color:var(--muted);text-decoration:none;font-size:13px;font-weight:600">← 返回</a>
    <h1>luisteren examen inburgeren A2</h1>
    <a href="exam.html" id="exam-link" style="display:none;padding:6px 12px;background:#9f1239;color:#fff;border-radius:6px;font-size:13px;text-decoration:none;font-weight:600;white-space:nowrap">📝 模擬考冊 →</a>
  </header>
  <script>
    // Show "go to exam.html" button only for videos that have one (mocks 1/2/3...)
    (function(){
      const HAS_EXAM = ['_iC1Pooi2UA','AMVy2zPNLso','mock3_a2_2026'];
      const path = window.location.pathname;
      if (HAS_EXAM.some(id => path.includes('/' + id + '/'))) {
        document.getElementById('exam-link').style.display = 'inline-block';
      }
    })();
  </script>

  <!-- Mini player -->
  <div class="player-box">
    <div class="mini-player-row">
      <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <div class="progress-container" id="progress-container" style="flex:1">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="ab-marker a-marker" id="a-marker" style="display:none"></div>
        <div class="ab-marker b-marker" id="b-marker" style="display:none"></div>
        <div class="ab-region" id="ab-region" style="display:none"></div>
        <div class="time-display" id="time-display">0:00 / 0:00</div>
      </div>
      <div class="speed-control">
        <button class="speed-btn" data-spd="0.6" onclick="setSpeed(0.6)">0.6×</button>
        <button class="speed-btn" data-spd="0.75" onclick="setSpeed(0.75)">0.75×</button>
        <button class="speed-btn" data-spd="0.85" onclick="setSpeed(0.85)">0.85×</button>
        <button class="speed-btn active" data-spd="1" onclick="setSpeed(1.0)">1×</button>
        <button class="speed-btn" data-spd="1.15" onclick="setSpeed(1.15)">1.15×</button>
      </div>
    </div>
    <!-- Collapsible controls -->
    <div class="extra-controls" id="extra-controls" style="display:none">
      <div class="controls">
        <button class="ctrl-btn" id="set-a-btn" onclick="setA()">A</button>
        <button class="ctrl-btn" id="set-b-btn" onclick="setB()">B</button>
        <button class="ctrl-btn" id="loop-btn" onclick="toggleLoop()">🔁</button>
        <button class="ctrl-btn" onclick="clearAB()">✕</button>
        <button class="ctrl-btn" onclick="skipBack()">-3s</button>
        <span style="font-size:11px;color:var(--dim);margin-left:4px">A:<span id="a-time">—</span> B:<span id="b-time">—</span> 🔁<span id="loop-count">0</span></span>
      </div>
    </div>
    <div class="player-actions">
      <button class="pa-btn" onclick="toggleExtraControls()">⚙ AB Loop</button>
      <button class="pa-btn" id="multi-loop-btn" onclick="toggleMultiLoop()" style="display:inline">📌 多句</button>
      <button class="pa-btn" id="shadow-btn" onclick="toggleShadow()" style="background:rgba(15,118,110,0.15);border-color:rgba(15,118,110,0.4);color:#5eead4">🔁 跟讀</button>
      <button class="pa-btn" onclick="prevSentence()">⏮</button>
      <button class="pa-btn" onclick="nextSentence()">⏭</button>
      <span id="progress-text" style="font-size:10px;color:var(--dim);margin-left:auto;font-weight:600">0/0</span>
    </div>
  </div>
  <div class="progress-summary" id="progress-summary" style="display:none">

lgende week starten de nieuwe cursussen. De cursus Nederlands 3 zit bijna vol. Er zijn nog 2 plaatsen.", "translation": "關於新課程的資訊。新課程下週開始。荷蘭語3課程快要滿額了，還有2個名額。", "start": 662.72, "end": 666.9}, {"text": "Komt u om 1 uur naar lokaal 15 als u deze cursus wilt volgen.", "translation": "如果您想上這門課，請於1點到15教室。", "start": 681.28, "end": 688.86}, {"text": "Voor Nederlands 2 maken we een nieuwe groep. Daar zijn nog voldoende plaatsen. U kunt zich hiervoor inschrijven om half 2 in lokaal 5. Einde bericht.", "translation": "我們要為荷蘭語2組成新班，有足夠名額。您可於1點半到5號教室報名。訊息結束。", "start": 688.86, "end": 694.26}, {"text": "Julio wil de cursus Nederlands 3 volgen.", "translation": "胡立歐想報名荷蘭語3課程。", "start": 695.72, "end": 699.92}, {"text": "Waar kan hij zich aanmelden? In lokaal 1.", "translation": "他可以在哪裡報名？在1號教室。", "start": 701.88, "end": 706.14}, {"text": "In lokaal 2, in lokaal 5, in lokaal 15.", "translation": "在2號教室，在5號教室，在15號教室。", "start": 706.14, "end": 714.0}, {"text": "Amina is in het buurthuis.", "translation": "艾米娜正在社區中心。", "start": 717.12, "end": 722.22}, {"text": "De buren van Amina praten met elkaar. Lees eerst de vraag.", "translation": "艾米娜的鄰居們正在聊天。先讀題目，", "start": 723.36, "end": 729.08}, {"text": "Kijk daarna naar de video.", "translation": "再看影片。", "start": 731.86, "end": 741.22}, {"text": "Nou, het is wel onhandig dat onze straat is afgesloten.", "translation": "嗯，我們的街道封閉確實很不方便。", "start": 754.2, "end": 757.98}, {"text": "Ja, dat wel. Maar ja, het is wel goed dat ze de weg weer helemaal mooi maken.", "translation": "是啊，不過他們把路整修得漂亮點也不錯。", "start": 759.9, "end": 766.8}, {"text": "Er zitten zoveel gaten in. Ja, maar er komt nog steeds geen nieuwe verlichting. En ook, ze maken niet eens nieuwe parkeerplaatsen. Ik vind het maar niks hoor, al dat gedoe.", "translation": "路上有很多坑洞，可是還是沒有新的路燈，也沒在增設停車位。我覺得這些麻煩沒什麼好處。", "start": 767.74, "end": 770.54}, {"text": "Gelukkig is het maar tijdelijk. Volgende week gaat de straat weer open.", "translation": "幸好只是暫時的。下週街道會重新開放。", "start": 785.42, "end": 789.0}, {"text": "Nee joh, die straat blijft dicht tot eind volgende maand. Hé!", "translation": "不會喔，那條街會封閉到下個月底，嘿！", "start": 789.68, "end": 793.88}, {"text": "ErzatenzoveelgateninJamaarerkomtnog", "translation": "", "start": 794.64, "end": 798.8}, {"text": "steeds geen nieuwe verlichting. En ook, ze maken niet eens nieuwe parkeerplaatsen. Ik vind het maar", "translation": "", "start": 798.8, "end": 804.52}, {"text": "niks hoor, al dat gedoe. Gelukkig is het maar tijdelijk. Volgende week gaat de straat weer", "translation": "", "start": 804.52, "end": 809.76}, {"text": "openNeejohdiestraatblijftdichttoteindvolgendemaandHé", "translation": "", "start": 809.76, "end": 814.3}, {"text": "Maar dat duurt nog 6 weken. Dat is wel lang, zeg.", "translation": "但是那還要6個星期。這真的很久呢。", "start": 814.96, "end": 819.88}, {"text": "Waarom is de straat van Amina afgesloten om de weg te repareren?", "translation": "為什麼Amina的街道封閉了，是為了修路嗎？", "start": 822.98, "end": 831.54}, {"text": "Om de verlichting te maken.", "translation": "是為了裝設照明。", "start": 833.66, "end": 836.32}, {"text": "Om parkeerplaatsen te maken.", "translation": "是為了建造停車位。", "start": 838.2, "end": 841.38}, {"text": "Amina is in het buurthuis.", "translation": "Amina正在社區中心。", "start": 855.68, "end": 859.38}, {"text": "De buren van Amina praten met elkaar. Lees eerst de vraag.", "translation": "Amina的鄰居們正在聊天。先讀題目。", "start": 861.34, "end": 868.22}, {"text": "Kijk daarna naar de video.", "translation": "接著看影片。", "start": 869.58, "end": 871.32}, {"text": "Nou, het is wel onhandig dat onze straat is afgesloten.", "translation": "嗯，我們街道被封鎖真的很不方便。", "start": 886.48, "end": 890.52}, {"text": "Ja, dat wel. Maar ja, het is wel goed dat ze de weg weer helemaal mooi maken.", "translation": "是啊，但也不錯，他們將路完全修好。", "start": 891.14, "end": 895.38}, {"text": "Er zaten zoveel gaten in, ja, maar er komt nog", "translation": "那裡有好多洞，是啊，但還有", "start": 896.08, "end": 900.3}, {"text": "steeds geen nieuwe verlichting. En ook, ze maken niet eens nieuwe parkeerplaatsen. Nou ja,", "translation": "仍然沒有新的照明。他們甚至沒有建造新的停車位。唉，", "start": 900.3, "end": 905.32}, {"text": "ik vind het maar niks. Al dat gedoe. Gelukkig is het maar tijdelijk. Volgende week gaat de straat", "translation": "我覺得很麻煩。真是煩死人了。幸好只是暫時。下週街道就會", "start": 905.32, "end": 911.0}, {"text": "straat weer open. Nee joh!", "translation": "街道會重新開放。沒啦！", "start": 911.0, "end": 912.36}, {"text": "Die straat blijft dicht tot eind volgende maand. Hé, maar dat duurt nog 6", "translation": "這條街會封閉到下個月底。唉，但那還要", "start": 913.0, "end": 917.84}, {"text": "6 weken. Dat is wel lang, zeg.", "translation": "6個星期。這真的很久呢。", "start": 917.84, "end": 921.3}, {"text": "Wanneer gaat de straat van Amina weer open? Volgende week.", "translation": "Amina的街道什麼時候會重新開放？下週。", "start": 924.74, "end": 932.2}, {"text": "Over een maand.", "translation": "一個月後。", "start": 932.2, "end": 935.86}, {"text": "Over zes weken.", "translation": "六個星期後。", "start": 938.62, "end": 940.14}, {"text": "Roman heeft een bericht op zijn voicemail van Erik. Lees eerst de vraag. Luister daarna", "translation": "Roman的語音信箱收到Erik留言。先讀題目。接著聽文本。", "start": 954.86, "end": 966.34}, {"text": "naar de tekst.", "translation": "聽文本。", "start": 966.34, "end": 967.86}, {"text": "Hé Roman, ja ik had een bericht gestuurd waar het gemeentehuis precies was. Nou je bent er niet", "translation": "嘿Roman，是的，我留了訊息告訴你市政府的確切位置。你不在那裡", "start": 980.66, "end": 987.64}, {"text": "dus ja, ik spreek het wel even in.", "translation": "所以我先留言說明。", "start": 987.94, "end": 989.98}, {"text": "Oké, vanaf jouw huis eerst moet je linksaf. En dan bij", "translation": "好，從你家開始先左轉。然後在", "start": 990.82, "end": 995.22}, {"text": "groene brug ga je naar rechts.", "translation": "綠色橋那裡右轉。", "start": 995.46, "end": 997.52}, {"text": "Dan een stukje rechtdoor en bij de supermarkt ga je rechtsaf.", "translation": "接著直走一段，到超市那裡右轉。", "start": 998.36, "end": 1002.12}, {"text": "Je weet wel hè. Dan zie je aan de rechterkant een groot gebouw. Dat is het nog niet. En daarachter", "translation": "你知道的，對吧？你會看到右手邊有一棟大樓。那還不是。再往後面", "start": 1002.68, "end": 1008.64}, {"text": "staat een blauw gebouw. Dat is het wel.", "translation": "有一棟藍色大樓。那才是。", "start": 1008.64, "end": 1011.34}, {"text": "En daar is links een parkeerplaats voor bezoekers. Maar", "translation": "左邊有訪客停車場。但是", "start": 1011.8, "end": 1016.52}, {"text": "je kunt ook rechts de parkeergarage inrijden.", "translation": "你也可以從右邊停車場入口進去。", "start": 1016.8, "end": 1020.02}, {"text": "Of aan de overkant van de weg parkeren. Maar", "translation": "或是在馬路對面停車。不過", "start": 1020.98, "end": 1023.62}, {"text": "die parkeerplaats voor bezoekers, die is wel het handigste, denk ik.", "translation": "我覺得訪客停車場最方便。", "start": 1023.62, "end": 1027.38}, {"text": "Roman is onderweg naar het gemeentehuis.", "translation": "Roman正在去市政府的路上。", "start": 1031.6, "end": 1035.4}, {"text": "Wat moet hij doen bij de groene brug?", "translation": "他在綠色橋該怎麼走？", "start": 1037.16, "end": 1039.54}, {"text": "Hij moet linksaf. Hij moet rechtsaf.", "translation": "他應該左轉。他應該右轉。", "start": 1042.16, "end": 1048.14}, {"text": "Hij moet rechtdoor. Hij moet parkeren.", "translation": "他應該直走。他要停車。", "start": 1050.34, "end": 1055.74}, {"text": "Roman heeft een bericht op zijn voicemail van Erik.", "translation": "Roman的語音信箱收到Erik留言。", "start": 1072.42, "end": 1077.32}, {"text": "Lees eerst de vraag.", "translation": "先讀題目。", "start": 1079.24, "end": 1080.66}, {"text": "Luister daarna naar de tekst. Hey Roman,", "translation": "接著聽本文。嘿Roman，", "start": 1082.88, "end": 1099.28}, {"text": "Ja ik had een bericht gestuurd waar het gemeentehuis precies was. Nou je bent er niet", "translation": "是的，我留了訊息告訴你市政府的確切位置。你不在那裡", "start": 1099.48, "end": 1105.26}, {"text": "Dus ja, ik spreek het wel even in. Oké, vanaf jouw huis eerst moet je linksaf. En dan bij de", "translation": "所以我先留言說明。好，從你家開始先左轉。然後在", "start": 1105.26, "end": 1113.04}, {"text": "groene brug ga je naar rechts.", "translation": "綠色橋那裡右轉。", "start": 1113.04, "end": 1115.12}, {"text": "Dan een stukje rechtdoor en bij de supermarkt ga je rechtsaf.", "translation": "接著直走一段，到超市那裡右轉。", "start": 1115.88, "end": 1119.76}, {"text": "Je weet wel hè. Dan zie je aan de rechterkant een groot gebouw. Dat is het nog niet. En", "translation": "你知道的，對吧？你會看到右手邊有一棟大樓。那還不是。再", "start": 1120.3, "end": 1125.78}, {"text": "daarachter staat een blauw gebouw. Dat is hem wel.", "translation": "往後面有一棟藍色大樓。那就是。", "start": 1125.78, "end": 1128.82}, {"text": "En daar is links een parkeerplaats voor bezoekers.", "translation": "左邊有訪客停車場。", "start": 1129.42, "end": 1133.38}, {"text": "Maar je kunt ook rechts de parkeergarage inrijden.", "translation": "但是你也可以從右邊停車場入口進去。", "start": 1133.38, "end": 1137.68}, {"text": "Of aan de overkant van de weg parkeren. Maar die parkeerplaats voor bezoekers, die is wel het handigste, denk ik.", "translation": "或是在馬路對面停車。但我覺得訪客停車場最方便。", "start": 1138.86, "end": 1144.84}, {"text": "Roman is onderweg naar het gemeentehuis.", "translation": "Roman正在去市政府的路上。", "start": 1149.08, "end": 1152.86}, {"text": "Wat moet hij doen bij de supermarkt?", "translation": "他在超市該怎麼走？", "start": 1154.74, "end": 1157.1}, {"text": "Hij moet linksaf. Hij moet rechtsaf. Hij moet rechtdoor.", "translation": "他應該左轉。他應該右轉。他應該直走。", "start": 1158.62, "end": 1169.42}, {"text": "Hij moet parkeren.", "translation": "他必須停車。", "start": 1171.78, "end": 1173.16}, {"text": "Roman heeft een bericht op zijn voicemail van Erik.", "translation": "Roman 在語音信箱中有 Erik 留的訊息。", "start": 1189.28, "end": 1194.08}, {"text": "Lees eerst de vraag. 00:19:59,987 --> 00:20:02,087 Daarna naar de tekst.", "translation": "先讀問題。 00:19:59,987 --> 00:20:02,087 接著看內容。", "start": 1196.0, "end": 1197.48}, {"text": "Hey Roman, ja, eh... Had een bericht gestuurd waar het gemeentehuis precies was.", "translation": "嗨 Roman，是的，呃... 我剛剛傳了一則訊息，問市政廳到底在哪裡。", "start": 1214.93, "end": 1220.77}, {"text": "Nou, je bent er niet, dus... Ja, ik spreek het wel even in.", "translation": "嗯，你不在那裡，所以... 好的，我會留言告訴你。", "start": 1220.95, "end": 1224.25}, {"text": "Oké, vanaf jouw huis moet je eerst linksaf.", "translation": "好，從你家出發，先往左轉。", "start": 1224.95, "end": 1228.23}, {"text": "En dan bij de groene brug ga je naar rechts.", "translation": "然後在綠色橋那裡右轉。", "start": 1228.23, "end": 1231.81}, {"text": "Dan een stukje rechtdoor en bij de supermarkt ga je rechtsaf.", "translation": "直走一段路，到超市那裡右轉。", "start": 1232.59, "end": 1236.41}, {"text": "Je weet wel, hè? Dan zie je aan de rechterkant een groot gebouw.", "translation": "你知道的吧？然後你會看到右邊有一棟大樓。", "start": 1237.01, "end": 1240.65}, {"text": "Dat is het nog niet. En daarachter staat een blauw gebouw.", "translation": "那還不是。後面有棟藍色的建築。", "start": 1240.95, "end": 1244.59}, {"text": "Dat is hem wel. En daar is links een parkeerplaats voor bezoekers.", "translation": "那就是了。左邊有一個訪客停車場。", "start": 1244.95, "end": 1250.09}, {"text": "Maar je kunt ook rechts de parkeergarage inrijden.", "translation": "不過你也可以從右邊進停車場。", "start": 1250.61, "end": 1254.35}, {"text": "Of aan de overkant van de weg parkeren.", "translation": "或是在馬路對面停車。", "start": 1255.29, "end": 1257.07}, {"text": "Maar die parkeerplaats voor bezoekers, die is wel het handigste, denk ik.", "translation": "但我覺得訪客停車場比較方便。", "start": 1257.07, "end": 1261.87}, {"text": "Roman is onderweg naar het gemeentehuis.", "translation": "Roman 正在前往市政廳的路上。", "start": 1265.19, "end": 1269.99}, {"text": "Waar kan hij het beste parkeren?", "translation": "他最好停在哪裡？", "start": 1271.71, "end": 1273.77}, {"text": "In de parkeergarage.", "translation": "在停車場裡。", "start": 1275.83, "end": 1278.73}, {"text": "Aan de overkant van de weg.", "translation": "在馬路對面。", "start": 1281.43, "end": 1283.81}, {"text": "Op de parkeerplaats voor bezoekers.", "translation": "在訪客停車場。", "start": 1286.25, "end": 1288.81}, {"text": "Roberto werkt bij een bouwbedrijf.", "translation": "Roberto 在一家建築公司工作。", "start": 1304.37, "end": 1308.23}, {"text": "Een collega belt hem op. Lees eerst de vraag.", "translation": "一位同事打電話給他。先讀問題。", "start": 1309.51, "end": 1315.41}, {"text": "Luister daarna naar de tekst.", "translation": "接著聽內容。", "start": 1316.83, "end": 1318.71}, {"text": "Roberto is aan het werk.", "translation": "Roberto 正在工作。", "start": 1324.35, "end": 1325.11}, {"text": "Hallo Roberto. Peter van Doorn.", "translation": "哈囉 Roberto。Peter van Doorn。", "start": 1330.35, "end": 1333.81}, {"text": "Morgen kom je bij mij werken op de bouw. Daarachter het station.", "translation": "明天你要來我的工地工作。在車站後面。", "start": 1334.37, "end": 1338.91}, {"text": "Morgen. Mario woont vlakbij jou.", "translation": "明天。Mario 住你附近。", "start": 1339.81, "end": 1342.83}, {"text": "Hij haalt jou daar morgen thuis op om kwart over zeven.", "translation": "他明天早上七點十五分會來你家接你。", "start": 1343.17, "end": 1346.75}, {"text": "Je moet ook nog even wat dingetjes ophalen.", "translation": "你還要去拿一些東西。", "start": 1346.75, "end": 1350.07}, {"text": "Ja, kleding bedoel ik dan. Bij Ron in het magazijn. Daar kan je je werkkleding krijgen.", "translation": "是的，我是說衣服。去 Ron 那裡的倉庫。你可以拿工作服。", "start": 1351.21, "end": 1356.27}, {"text": "En werkschoenen. Die hebben we niet in het magazijn.", "translation": "還有工作鞋。那個倉庫沒有工作鞋。", "start": 1356.85, "end": 1360.69}, {"text": "Werkschoenen neem je dus zelf mee. Oké.", "translation": "所以工作鞋你要自己帶。好的。", "start": 1361.29, "end": 1364.99}, {"text": "Leroy heeft nog een helm en een veiligheidsbril voor jou.", "translation": "Leroy 有一頂安全帽和一副護目鏡給你。", "start": 1366.03, "end": 1369.77}, {"text": "O, wacht even. Ik zie Leroy straks nog.", "translation": "哦，等等。我等會還會見到 Leroy。", "start": 1370.27, "end": 1373.51}, {"text": "Dan neem ik je helm en je bril wel voor je mee.", "translation": "到時候我幫你帶安全帽和護目鏡。", "start": 1373.51, "end": 1376.55}, {"text": "Oké. Tot morgen.", "translation": "好，明天見。", "start": 1376.73, "end": 1377.95}, {"text": "Roberto werkt bij een bouwbedrijf.", "translation": "Roberto 在一家建築公司工作。", "start": 1414.23, "end": 1418.43}, {"text": "Een collega belt hem op. Lees eerst de vraag.", "translation": "一位同事打電話給他。先讀問題。", "start": 1419.65, "end": 1425.57}, {"text": "Luister daarna naar de tekst.", "translation": "接著聽內容。", "start": 1426.97, "end": 1428.87}, {"text": "Leroy heeft nog een helm en een veiligheidsbril voor jou.", "translation": "Leroy 有一頂安全帽和一副護目鏡給你。", "start": 1476.03, "end": 1480.09}, {"text": "O, wacht even. Ik zie Leroy straks nog. Dan neem ik je helm en je bril wel voor je mee.", "translation": "哦，等等。我等會還會見到 Leroy。到時候我幫你帶安全帽和護目鏡。", "start": 1480.59, "end": 1486.59}, {"text": "Oké. Tot morgen.", "translation": "好，明天見。", "start": 1487.07, "end": 1487.95}, {"text": "Wil je Roberto zelf meenemen?", "translation": "你要自己帶 Roberto 嗎？", "start": 1493.51, "end": 1495.43}, {"text": "Een veiligheidsbril. Een helm.", "translation": "一副護目鏡。一頂安全帽。", "start": 1498.33, "end": 1502.83}, {"text": "Werkkleding. Werkschoenen.", "translation": "工作服。工作鞋。", "start": 1505.17, "end": 1509.79}, {"text": "Julia doet een koksopleiding.", "translation": "Julia 在念廚師課程。", "start": 1525.65, "end": 1529.07}, {"text": "Haar medecursisten Mira en Chris praten over de examens.", "translation": "她的同學 Mira 和 Chris 在討論考試。", "start": 1530.97, "end": 1536.13}, {"text": "Lees eerst de vraag. Kijk daarna naar de video.", "translation": "先讀問題。然後看影片。", "start": 1537.71, "end": 1541.95}, {"text": "Wat een drukke tijd, hè, met al die examens. Vijf in totaal.", "translation": "真忙啊，有那麼多考試。總共有五科。", "start": 1559.01, "end": 1563.51}, {"text": "Ja, volgende week hebben we alleen al drie examens.", "translation": "是啊，下週我們就有三科考試。", "start": 1564.71, "end": 1568.93}, {"text": "En de week daarna twee. Ik weet echt niet hoe ik dat allemaal moet leren.", "translation": "再下一週有兩科。我真的不知道怎麼準備那麼多。", "start": 1569.57, "end": 1573.93}, {"text": "Nou, weet je, zorg dat je eerst een goede planning maakt.", "translation": "嗯，你知道嗎，先確保你做好一個好的計劃。", "start": 1574.81, "end": 1578.29}, {"text": "Dat helpt voor mij altijd heel goed. Ja, dat is misschien wel handig, ja.", "translation": "那對我來說總是非常有幫助。是啊，這可能會很方便，是的。", "start": 1579.11, "end": 1583.49}, {"text": "En als ik je dan nog een tip mag geven, dan ga gewoon leren in de bus en in de trein.", "translation": "如果我還可以給你一個建議，那就是就在公車和火車上學習。", "start": 1584.05, "end": 1589.07}, {"text": "Ik bedoel, die tijd ben je toch aan het wachten. Dan kan je heel veel extra doen.", "translation": "我意思是，那時候你反正是在等待。那你可以做很多額外的事情。", "start": 1589.95, "end": 1593.25}, {"text": "Vooral als je zo vaak vertraging hebt. Dat is de goeie, zeg. Dat ga ik doen.", "translation": "尤其是當你經常遇到延誤。這個建議真不錯，我會去做的。", "start": 1594.49, "end": 1600.11}, {"text": "Hoeveel examens heeft Julia volgende week?", "translation": "茱莉亞下週有多少場考試？", "start": 1602.83, "end": 1606.07}, {"text": "Twee. Vijf.", "translation": "兩場。五場。", "start": 1609.07, "end": 1614.43}, {"text": "Julia doet een koksopleiding.", "translation": "茱莉亞正在學廚師課程。", "start": 1628.85, "end": 1631.63}, {"text": "Haar medecursisten Mira en Chris praten over de examens.", "translation": "她的同學米拉和克里斯正在談論考試。", "start": 1633.57, "end": 1639.39}, {"text": "Lees eerst de vraag. Kijk daarna naar de video.", "translation": "先讀題目，再看影片。", "start": 1639.39, "end": 1644.67}, {"text": "Wat een drukke tijd, hè, met al die examens.", "translation": "考試真的是很忙碌的時候，對吧？", "start": 1661.23, "end": 1664.39}, {"text": "Vijf in totaal.", "translation": "總共有五場。", "start": 1665.53, "end": 1666.15}, {"text": "Ja, volgende week hebben we alleen al drie examens.", "translation": "是啊，下週我們光是有三場考試。", "start": 1667.39, "end": 1671.61}, {"text": "En de week daarna twee. Ik weet echt niet hoe ik dat allemaal moet leren.", "translation": "再下週還有兩場。我真的不知道該怎麼學完那些。", "start": 1672.27, "end": 1676.59}, {"text": "Nou, weet je, zorg dat je eerst een goede planning maakt.", "translation": "嗯，你知道嗎，先確保你做好一個好的計劃。", "start": 1677.51, "end": 1680.97}, {"text": "Dat helpt voor mij altijd heel goed. Ja, dat is misschien wel handig, ja.", "translation": "那對我來說總是非常有幫助。是啊，這可能會很方便，是的。", "start": 1681.83, "end": 1686.45}, {"text": "En als ik je dan nog een tip mag geven, dan ga gewoon leren in de bus en in de trein.", "translation": "如果我還可以給你一個建議，那就是就在公車和火車上學習。", "start": 1686.99, "end": 1691.73}, {"text": "Ik bedoel, die tijd ben je toch aan het wachten. Dan kan je heel veel extra doen.", "translation": "我意思是，那時候你反正是在等待。那你可以做很多額外的事情。", "start": 1692.43, "end": 1696.23}, {"text": "Vooral als je zo vaak vertraging hebt. Dat is een goeie, zeg. Dat ga ik doen.", "translation": "尤其是當你經常遇到延誤。這個建議真不錯，我會去做的。", "start": 1697.17, "end": 1702.81}, {"text": "Julia luistert naar het gesprek.", "translation": "茱莉亞在聆聽這段對話。", "start": 1705.19, "end": 1708.37}, {"text": "Welke tip geeft Chris als eerste aan Mira?", "translation": "克里斯首先給米拉的建議是什麼？", "start": 1709.95, "end": 1714.27}, {"text": "Ga extra veel leren.", "translation": "多多學習。", "start": 1716.29, "end": 1719.29}, {"text": "Leer in de bus en in de trein.", "translation": "在公車和火車上學習。", "start": 1720.75, "end": 1725.07}, {"text": "Maak een planning.", "translation": "做一個計劃。", "start": 1727.93, "end": 1730.65}, {"text": "Julia doet een koksopleiding.", "translation": "茱莉亞正在學廚師課程。", "start": 1744.69, "end": 1747.47}, {"text": "Haar medecursisten Mira en Chris praten over de examens.", "translation": "她的同學米拉和克里斯正在談論考試。", "start": 1748.47, "end": 1754.47}, {"text": "Lees eerst de vraag. Kijk daarna naar de video.", "translation": "先讀題目，再看影片。", "start": 1756.19, "end": 1760.47}, {"text": "Tja, wat een drukke tijd, hè, met al die examens. Vijf in totaal.", "translation": "唉，考試真的好忙碌啊，五場總共。", "start": 1776.25, "end": 1782.03}, {"text": "Ja, volgende week hebben we alleen al drie examens.", "translation": "是啊，下週我們光是有三場考試。", "start": 1783.21, "end": 1787.47}, {"text": "En de week daarna twee. Ik weet echt niet hoe ik dat allemaal moet leren.", "translation": "再下週還有兩場。我真的不知道該怎麼學完那些。", "start": 1787.47, "end": 1792.51}, {"text": "Nou, weet je, zorg dat je eerst een goede planning maakt.", "translation": "嗯，你知道嗎，先確保你做好一個好的計劃。", "start": 1793.43, "end": 1796.87}, {"text": "Dat helpt voor mij altijd heel goed. Ja, dat is misschien wel handig, ja.", "translation": "那對我來說總是非常有幫助。是啊，這可能會很方便，是的。", "start": 1797.69, "end": 1799.13}, {"text": "En als ik je dan nog een tip mag geven, dan ga gewoon leren in de bus en in de trein.", "translation": "如果我還可以給你一個建議，那就是就在公車和火車上學習。", "start": 1802.92, "end": 1807.58}, {"text": "Ik bedoel, die tijd ben je toch aan het wachten. Dan kan je heel veel extra doen.", "translation": "我意思是，那時候你反正是在等待。那你可以做很多額外的事情。", "start": 1808.34, "end": 1812.06}, {"text": "Vooral als je zo vaak vertraging hebt. Dat is een goeie zeg, dat ga ik doen.", "translation": "尤其是當你經常遇到延誤。這個建議真不錯，我會去做的。", "start": 1813.02, "end": 1818.64}, {"text": "Julia luistert naar het gesprek.", "translation": "茱莉亞在聆聽這段對話。", "start": 1821.38, "end": 1823.7}, {"text": "Wat zegt Chris over vertraging?", "translation": "克里斯說了什麼關於延誤的事？", "start": 1825.06, "end": 1828.02}, {"text": "Dan heb je extra tijd om te leren.", "translation": "那你就有額外的時間學習。", "start": 1829.96, "end": 1833.56}, {"text": "Dan heb je minder tijd om te leren.", "translation": "那你就有比較少的時間學習。", "start": 1835.88, "end": 1838.98}, {"text": "Dat je vaker vertraging hebt met de bus.", "translation": "就是你公車經常會延誤。", "start": 1840.86, "end": 1844.48}, {"text": "Dat je vaker vertraging hebt met de trein.", "translation": "就是你火車經常會延誤。", "start": 1847.24, "end": 1850.46}, {"text": "John is op zijn werk.", "translation": "約翰正在工作。", "start": 1867.94, "end": 1870.18}, {"text": "Het kopieerapparaat doet het niet meer.", "translation": "影印機壞了。", "start": 1872.0, "end": 1874.86}, {"text": "Suzanne legt uit wat hij moet doen.", "translation": "蘇珊說明他應該怎麼做。", "start": 1877.26, "end": 1879.62}, {"text": "Lees eerst de vraag, kijk daarna naar de video.", "translation": "先讀題目，再看影片。", "start": 1881.72, "end": 1885.58}, {"text": "Oh, John, is hij weer kapot? Hij zit waarschijnlijk op papier vast.", "translation": "喔，約翰，它又壞了。可能是卡紙了。", "start": 1902.52, "end": 1906.82}, {"text": "Je zet hem eerst op pauze. En dan kijk je waar het probleem zit.", "translation": "你先按暫停，然後看看問題在哪裡。", "start": 1908.5, "end": 1912.48}, {"text": "Dat zie je hier op het plaatje. Dan open je de klep.", "translation": "你可以從這張圖看見，接著打開蓋子。", "start": 1913.18, "end": 1916.98}, {"text": "En dat papier, dat haal je dan uit. Zo, hier.", "translation": "然後把那張紙拿出來。像這樣，這裡。", "start": 1918.16, "end": 1923.5}, {"text": "En ja, nu moet hij het weer doen. Je drukt op de groene knop.", "translation": "好了，現在它應該又可以用了。你按綠色按鈕。", "start": 1924.42, "end": 1927.7}, {"text": "En ja hoor, nu doet hij het weer. Als het je niet lukt, hoef je zelf niet zo lang te proberen.", "translation": "嗯，沒錯，他又開始運作了。如果你做不到，不必自己嘗試那麼久。", "start": 1928.48, "end": 1933.5}, {"text": "Dan kun je altijd even iemand bellen, van de technische dienst. Want ja, ik weet wel veel.", "translation": "那你可以隨時打電話給技術部門的人。因為，我確實知道很多。", "start": 1933.76, "end": 1938.86}, {"text": "Maar niet alles.", "translation": "但不是全部。", "start": 1939.64, "end": 1940.48}, {"text": "Suzanne denkt dat er papier vastzit.", "translation": "蘇珊娜認為卡住了紙張。", "start": 1942.54, "end": 1945.96}, {"text": "Wat moet ze dan als eerste doen?", "translation": "那她應該先做什麼？", "start": 1946.96, "end": 1950.52}, {"text": "Op de groene knop drukken.", "translation": "按下綠色按鈕。", "start": 1953.24, "end": 1955.42}, {"text": "De technische dienst bellen.", "translation": "打電話給技術服務部。", "start": 1957.86, "end": 1959.54}, {"text": "Op de pauzeknop drukken.", "translation": "按下暫停鍵。", "start": 1961.64, "end": 1963.9}, {"text": "De klep open- en dichtdoen.", "translation": "打開並關上蓋子。", "start": 1966.16, "end": 1968.96}, {"text": "John is op zijn werk.", "translation": "約翰在上班。", "start": 1982.96, "end": 1985.32}, {"text": "Het kopieerapparaat doet het niet meer.", "translation": "影印機壞了。", "start": 1987.16, "end": 1990.0}, {"text": "Suzanne legt uit wat hij moet doen. Lees eerst de vraag.", "translation": "蘇珊娜解釋他該怎麼做。先讀問題。", "start": 1992.4, "end": 1998.02}, {"text": "Kijk daarna naar de video.", "translation": "然後看影片。", "start": 1999.1, "end": 2000.72}, {"text": "Oh, John, hier is hij weer kapot. Er zit waarschijnlijk een papier vast.", "translation": "哦，約翰，這裡又壞了。可能是卡紙了。", "start": 2017.76, "end": 2021.9}, {"text": "Je zet hem eerst op pauze, en dan kijk je waar het probleem zit.", "translation": "你先按暫停，然後看問題在哪裡。", "start": 2023.58, "end": 2027.56}, {"text": "En dat zie je hier op het plaatje. Dan open je de klep.", "translation": "你可以在圖片上看到這個。接著打開蓋子。", "start": 2028.22, "end": 2032.06}, {"text": "En dat papier haal je dan uit. En dan zie je dat er een papier vastzit. Zo, hier.", "translation": "你就把卡住的紙拿出來。就是這裡。", "start": 2033.3, "end": 2038.6}, {"text": "En ja, nu moet hij het weer doen. Je drukt op de groene knop.", "translation": "現在它應該能用了。你按綠色按鈕。", "start": 2039.48, "end": 2042.76}, {"text": "En ja hoor, nu doet hij het weer. Als het je niet lukt, hoef je zelf niet zo lang te proberen.", "translation": "嗯，他又開始工作了。如果你做不到，不必自己嘗試那麼久。", "start": 2043.88, "end": 2048.56}, {"text": "Dan kun je altijd even iemand bellen, de technische dienst. Want ja, ik weet wel veel.", "translation": "那你可以隨時打電話給技術部門的人。因為，我確實知道很多。", "start": 2048.82, "end": 2053.92}, {"text": "Maar niet alles.", "translation": "但不是全部。", "start": 2054.72, "end": 2055.56}, {"text": "Wat kan John het beste doen als hij een probleem niet kan oplossen?", "translation": "當約翰無法解決問題時，他最應該做什麼？", "start": 2057.68, "end": 2063.34}, {"text": "Susan erbij roepen.", "translation": "叫蘇珊來幫忙。", "start": 2065.22, "end": 2068.16}, {"text": "Op de groene knop drukken.", "translation": "按下綠色按鈕。", "start": 2070.46, "end": 2072.66}, {"text": "De technische dienst bellen.", "translation": "打電話給技術服務部。", "start": 2074.88, "end": 2078.06}, {"text": "Hamza werkt bij een groothandel.", "translation": "哈姆扎在一家批發公司工作。", "start": 2090.6, "end": 2094.28}, {"text": "Een klant heeft een bestelling ingesproken op de voicemail.", "translation": "有一位顧客在語音信箱留下訂單。", "start": 2095.86, "end": 2099.86}, {"text": "Lees eerst de vraag. Luister daarna naar de tekst.", "translation": "先讀問題，再聽錄音。", "start": 2101.84, "end": 2106.94}, {"text": "Ja, Gerrits hier van Snackbar De Hoek. Ik wil even wat bestellen.", "translation": "是的，我是角落小吃店的Gerrits。我想訂些東西。", "start": 2119.66, "end": 2123.44}, {"text": "Ik wil graag zes dozen patat. Niet van die dikke, die moet ik zelf dan nog snijden.", "translation": "我想要六箱薯條。不是那種粗的，我還得自己切。", "start": 2123.9, "end": 2128.48}, {"text": "Maar van die Franse, zeg maar, die dunne. Honderd frikandellen en tweehonderd kroketten.", "translation": "而是那種法式的，較細的。要一百根炸肉條和兩百個可樂餅。", "start": 2128.88, "end": 2134.22}, {"text": "En even kijken. Ook dertig flessen mayonaise en twintig ketchup.", "translation": "還有三十瓶美乃滋和二十瓶番茄醬。", "start": 2134.62, "end": 2139.6}, {"text": "En graag tien dozen cola-blikjes. Maar dan niet van die zwarte, maar die grijze Cola Light.", "translation": "還要十箱可樂罐，但不是黑罐，要灰色的可樂輕怡。", "start": 2140.22, "end": 2145.2}, {"text": "En ja, bestelling gewoon naar de Snackbar sturen.", "translation": "訂單請直接送到小吃店。", "start": 2145.6, "end": 2148.6}, {"text": "Maar de rekening wel naar mijn postadres sturen, graag.", "translation": "但帳單請寄到我的郵寄地址。", "start": 2149.16, "end": 2152.64}, {"text": "Niet zoals de vorige keer naar mijn huisadres. Want dat is veranderd.", "translation": "不要像上次寄到我家地址，那地址已經變了。", "start": 2152.78, "end": 2156.66}, {"text": "Dat was het. Bedankt.", "translation": "就這樣，謝謝。", "start": 2156.76, "end": 2158.72}, {"text": "Welke patat bestelt meneer Gerritsen?", "translation": "Gerritsen先生訂的是哪種薯條？", "start": 2162.06, "end": 2166.04}, {"text": "Dikke patat. Patat die hij zelf nog moet snijden.", "translation": "粗薯條。那種他還得自己切的。", "start": 2168.36, "end": 2173.96}, {"text": "Franse patat.", "translation": "法式薯條。", "start": 2176.24, "end": 2177.4}, {"text": "Hamza werkt bij een groothandel.", "translation": "哈姆扎在一家批發公司工作。", "start": 2190.52, "end": 2194.18}, {"text": "Een klant heeft een bestelling ingesproken op de voicemail.", "translation": "有一位顧客在語音信箱留下訂單。", "start": 2195.96, "end": 2199.8}, {"text": "Lees eerst de vraag. Luister daarna naar de tekst.", "translation": "先讀問題，再聽錄音。", "start": 2201.76, "end": 2206.82}, {"text": "Ja, Gerrits hier van Snackbar De Hoek.", "translation": "是的，我是角落小吃店的Gerrits。", "start": 2218.72, "end": 2222.04}, {"text": "Ik wil even wat bestellen. Ik wil graag zes dozen patat.", "translation": "我想訂些東西。我想要六箱薯條。", "start": 2222.6, "end": 2226.14}, {"text": "Niet van die dikke, die moet ik zelf dan nog snijden. Maar van die Franse, zeg maar, die dunne.", "translation": "不是粗的，我還得自己切。是那種法式的，較細的。", "start": 2226.62, "end": 2230.44}, {"text": "Honderd frikandellen en tweehonderd kroketten.", "translation": "一百根炸肉條和兩百個可樂餅。", "start": 2230.92, "end": 2234.2}, {"text": "En even kijken. Ook dertig flessen mayonaise en twintig ketchup.", "translation": "還有三十瓶美乃滋和二十瓶番茄醬。", "start": 2234.46, "end": 2236.8}, {"text": "En graag tien dozen cola-blikjes.", "translation": "還要十箱可樂罐。", "start": 2239.46, "end": 2242.54}, {"text": "Maar dan niet van die zwarte, maar die grijze Cola Light. En ja, bestelling gewoon naar de Snackbar sturen.", "translation": "但不是黑罐，要灰色的可樂輕怡。訂單請直接送到小吃店。", "start": 2242.7, "end": 2248.62}, {"text": "Maar de rekening wel naar mijn postadres sturen, graag.", "translation": "但是請把帳單寄到我的郵寄地址。", "start": 2249.24, "end": 2252.66}, {"text": "Niet zoals de vorige keer naar mijn huisadres, want dat is veranderd.", "translation": "不要像上次那樣寄到我的住家地址，因為那個地址已經改變了。", "start": 2252.82, "end": 2256.72}, {"text": "Dat was het. Bedankt.", "translation": "就這樣。謝謝。", "start": 2256.78, "end": 2258.78}, {"text": "Welke cola bestelt meneer Gerritsen?", "translation": "Gerrits 先生要訂哪種可樂？", "start": 2262.78, "end": 2265.78}, {"text": "Zes dozen grijze blikjes.", "translation": "六盒灰色罐裝可樂。", "start": 2267.5, "end": 2271.52}, {"text": "Zes dozen zwarte blikjes.", "translation": "六盒黑色罐裝可樂。", "start": 2273.82, "end": 2277.18}, {"text": "Tien dozen grijze blikjes.", "translation": "十盒灰色罐裝可樂。", "start": 2279.6, "end": 2282.7}, {"text": "Tien dozen zwarte blikjes.", "translation": "十盒黑色罐裝可樂。", "start": 2285.32, "end": 2287.78}, {"text": "Hamza werkt bij een groothandel.", "translation": "Hamza 在一家批發商工作。", "start": 2300.9, "end": 2304.54}, {"text": "Een klant heeft een bestelling ingesproken op de voicemail.", "translation": "有位客人在語音信箱中留言訂購。", "start": 2306.22, "end": 2310.12}, {"text": "Lees eerst de vraag, luister daarna naar de tekst.", "translation": "先讀題目，再聽文字內容。", "start": 2312.1, "end": 2317.16}, {"text": "Ja, Gerrits hier van Snackbar De Hoek. Ik wil even wat bestellen.", "translation": "嗨，我是來自 Snackbar De Hoek 的 Gerrits。我想要訂些東西。", "start": 2330.2, "end": 2333.82}, {"text": "Ik wil graag zes dozen patat. Niet van die dikke, die moet ik zelf dan nog snijden.", "translation": "我想要六盒薯條。不要那種很厚的，我還得自己切。", "start": 2334.28, "end": 2338.86}, {"text": "Maar van die Franse, zeg maar, die dunne. Een honderd frikandellen en tweehonderd kroketten.", "translation": "但是那種法式的，細長的。一百根法蘭克香腸和兩百個可樂餅。", "start": 2339.18, "end": 2344.56}, {"text": "En even kijken, ook dertig flessen mayonaise en twintig ketchup.", "translation": "還有，看一下，三十瓶美乃滋和二十瓶番茄醬。", "start": 2344.84, "end": 2349.92}, {"text": "En graag tien dozen cola blikjes. Maar dan niet van die zwarte, maar die grijze Cola Light.", "translation": "還有請給我十盒罐裝可樂。但不要黑色的，請給我灰色的可樂輕怡。", "start": 2350.54, "end": 2355.52}, {"text": "En ja, bestelling gewoon naar de Snackbar sturen.", "translation": "訂單請直接寄到小吃店。", "start": 2355.52, "end": 2358.98}, {"text": "Maar de rekening wel naar mijn postadres sturen, graag.", "translation": "但是帳單請寄到我的郵寄地址。", "start": 2359.54, "end": 2363.0}, {"text": "Niet zoals de vorige keer naar mijn huisadres, want dat is veranderd.", "translation": "不要像上次那樣寄到我的住家地址，因為那個地址已經改變了。", "start": 2363.16, "end": 2366.78}, {"text": "Dat was het. Bedankt.", "translation": "就這樣。謝謝。", "start": 2367.14, "end": 2369.1}, {"text": "Waar moet Hamza de rekening naartoe sturen?", "translation": "Hamza 應該把帳單寄到哪裡？", "start": 2373.22, function renderAnalysisPanel(s) {
  const a = s.analysis;
  if (!a) return '';
  // Defensive: GPT sometimes returns string instead of array, or string instead of object
  const asArr = (x) => Array.isArray(x) ? x : (x == null ? [] : [x]);
  const lvColor = { A1:'#4ade80', A2:'#5eead4', B1:'#fb923c', B2:'#f87171' };
  const words = asArr(a.words_hard)
    .map(w => typeof w === 'string' ? { nl: w, zh: '', level: '' } : w)
    .filter(w => w && w.nl)
    .map(w => {
      const c = lvColor[w.level] || '#9ca3af';
      return `<span class="ana-word" style="background:${c}22;border-color:${c}66"
        title="${escapeHtml(w.level||'')}">
        <b>${escapeHtml(w.nl)}</b>
        <span class="ana-zh">${escapeHtml(w.zh||'')}</span>
        <span class="ana-lv" style="color:${c}">${escapeHtml(w.level||'')}</span>
      </span>`;
    }).join('');
  const stressed = asArr(a.stressed).filter(w => typeof w === 'string' && w).map(w =>
    `<span class="ana-stress">${escapeHtml(w)}</span>`).join('');
  const reductions = asArr(a.reductions).filter(r => r && typeof r === 'object' && r.written).map(r =>
    `<div class="ana-red"><span class="ana-red-w">${escapeHtml(r.written)}</span>
      <span class="ana-red-arr">→</span>
      <span class="ana-red-s">${escapeHtml(r.spoken)}</span></div>`).join('');
  // Support both new `frame` and legacy `grammar` field
  const frameText = a.frame || a.grammar || '';
  const trapText = (typeof a.trap === 'string' && a.trap.length > 3) ? a.trap : '';
  // No content at all → return empty so the parent button hides too
  if (!words && !frameText && !stressed && !reductions && !trapText) return '';
  return `<div class="line-analysis" onclick="event.stopPropagation()">
    ${words ? `<div class="ana-sec"><span class="ana-lbl">📚 生字</span>${words}</div>` : ''}
    ${frameText ? `<div class="ana-sec"><span class="ana-lbl">🎯 句框</span><span class="ana-text">${escapeHtml(frameText)}</span></div>` : ''}
    ${stressed ? `<div class="ana-sec"><span class="ana-lbl">🔔 重讀</span>${stressed}<span class="ana-hint">  ← 講者會強調，耳朵警鈴</span></div>` : ''}
    ${reductions ? `<div class="ana-sec"><span class="ana-lbl">🔊 連音</span>${reductions}</div>` : ''}
    ${trapText ? `<div class="ana-sec ana-trap"><span class="ana-lbl">⚠️ 陷阱</span><span class="ana-text">${escapeHtml(trapText)}</span></div>` : ''}
  </div>`;
}

function escapeHtml(t) { return String(t == null ? '' : t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Answer-key highlight (rule-based, NO GPT) ──
// Only mark words that bear EXAM ANSWERS — not function words / scope flippers.
// A2 inburgering luisteren = WH-questions → answers live in: places, names, numbers,
// times, days. Highlighting "niet/wel/maar/daarna" is noise that hurts more than helps.

// Common Dutch words that often appear at sentence start (capitalized) but are
// NOT proper nouns. Used to avoid false positives in proper-noun detection.
const DUTCH_SENTENCE_INITIAL = new Set([
  // Pronouns / articles / demonstratives
  'ik','jij','je','u','hij','zij','ze','wij','we','jullie','men',
  'die','dit','dat','deze','wie','wat','welke','iemand','niemand','iets','niets',
  'de','het','een','er','daar','hier',
  // Question words
  'hoe','waar','wanneer','waarom',
  // Common verbs (imperative or question-initial position)
  'kijk','lees','kom','komt','ga','gaat','zit','sta','doe','doet',
  'zoek','zoekt','vind','vindt','wil','wilt','kan','kun','kunt',
  'mag','moet','heb','hebt','heeft','ben','bent','is','zijn','was','waren',
  'word','wordt','worden','maak','maakt','denk','denkt','spreek','spreekt',
  'pas','past','eet','eten','drink','drinkt','help','helpt','geef','geeft',
  'neem','neemt','zet','breng','brengt','laat','laten','let','blijf','blijft',
  'hoor','hoort','zie','ziet','zeg','zegt','vraag','vraagt','luister','luistert',
  'praat','praten','werk','werkt','leer','leert','schrijf','speel','speelt',
  // Adverbs / connectives at sentence start
  'dan','nu','toen','soms','altijd','vaak','morgen','gisteren','vandaag',
  'straks','dadelijk','meteen','later','vroeger','eerst','daarna','eindelijk',
  'maar','ook','wel','al','nog','pas','toch','niet','geen','alleen',
  // Conjunctions / fillers
  'als','want','omdat','dus','en','of','nou','oh','hee','hoi','hallo','tot',
  'ja','nee','sorry','bedankt','dank','oké','okay','ok','natuurlijk',
  'misschien','prima','tuurlijk','goedemorgen','goedemiddag','goedenavond',
  // Prepositions (can appear sentence-initial: "Op zaterdag...", "In Amsterdam...")
  'op','in','voor','van','met','aan','naar','over','door','tegen','tussen',
  'boven','onder','achter','na','tot','bij','om','uit','zonder','behalve',
  // Common quantity / qualifier words (rarely answer-bearing)
  'veel','weinig','genoeg','elk','elke','iedere','sommige','allemaal','samen',
  'goed','beter','best','lekker','mooi','leuk','jammer','helaas',
  // Common content verbs sometimes capitalized at start
  'mooi','snel','langzaam','rustig','duidelijk',
]);

const DAYS = new Set([
  'maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag',
]);

const TIME_UNITS = new Set([
  'uur','euro','cent','jaar','jaren','maand','maanden','week','weken',
  'dag','dagen','minuut','minuten','seconde','seconden','keer','procent',
]);

const NUMBER_WORDS = new Set([
  'nul','een','twee','drie','vier','vijf','zes','zeven','acht','negen','tien',
  'elf','twaalf','dertien','veertien','vijftien','zestien','zeventien','achttien','negentien',
  'twintig','dertig','veertig','vijftig','zestig','zeventig','tachtig','negentig',
  'honderd','duizend','miljoen',
]);

const PROPER_NOUN_INITIAL_RE = /^[A-ZÄÖÜÉÈÊËÁÀÂÅÆÇÍÌÎÏÑÓÒÔØÚÙÛŸ]/;

// Lowercase utility ignoring trailing punctuation
const tokLower = s => String(s || '').toLowerCase().replace(/[.,!?;:'"()]+$/, '');
const tokClean = s => String(s || '').replace(/[.,!?;:'"()]+$/, '');

function highlightAnswerKeys(text) {
  if (!text) return '';
  // Answer-key (yellow) highlighting removed — wasn't useful and distracted from
  // active listening. Return the plain sentence; the rest of this function is dead.
  return escapeHtml(text);
  // Tokenize: keep whitespace + punctuation as separate tokens, but DO NOT split
  // on `.` or `,` when surrounded by digits (so "12,50" stays one token).
  const tokens = String(text).split(/(\s+|[!?;:"'()“”]|(?<!\d)[.,]|[.,](?!\d))/).filter(t => t !== '');
  const out = [];
  for (let i = 0; i < tokens.length; i++) {
    const tok = tokens[i];
    if (/^\s+$/.test(tok) || /^[!?;:"'()“”]$/.test(tok) || tok === '.' || tok === ',') {
      out.push(escapeHtml(tok));
      continue;
    }
    const lower = tokLower(tok);
    const clean = tokClean(tok);
    let isKey = false;

    // 1. Pure digit token: 5, 12, 12,50, 1.50
    if (/^\d+([.,]\d+)?$/.test(clean)) isKey = true;
    // 2. Day of week
    else if (DAYS.has(lower)) isKey = true;
    // 3. Time unit (only when adjacent to a number)
    else if (TIME_UNITS.has(lower)) {
      let j = i - 1;
      while (j >= 0 && /^\s+$/.test(tokens[j])) j--;
      const prev = j >= 0 ? tokLower(tokens[j]) : '';
      if (/^\d/.test(prev) || NUMBER_WORDS.has(prev)) isKey = true;
    }
    // 4. half / kwart (when followed by number → time expression)
    else if (lower === 'half' || lower === 'kwart') {
      let j = i + 1;
      while (j < tokens.length && /^\s+$/.test(tokens[j])) j++;
      const next = j < tokens.length ? tokLower(tokens[j]) : '';
      if (NUMBER_WORDS.has(next) || /^\d/.test(next)) isKey = true;
    }
    // 5. Spelled-out number (een/twee/...) when part of a time/quantity:
    //    preceded by half/kwart, OR followed by time unit
    else if (NUMBER_WORDS.has(lower)) {
      let j = i - 1;
      while (j >= 0 && /^\s+$/.test(tokens[j])) j--;
      const prev = j >= 0 ? tokLower(tokens[j]) : '';
      let k = i + 1;
      while (k < tokens.length && /^\s+$/.test(tokens[k])) k++;
      const next = k < tokens.length ? tokLower(tokens[k]) : '';
      if (prev === 'half' || prev === 'kwart') isKey = true;
      else if (TIME_UNITS.has(next)) isKey = true;
    }
    // 6. Proper nouns: capitalized, not "Ik", not a common sentence-initial word
    else if (PROPER_NOUN_INITIAL_RE.test(tok) && lower !== 'ik'
             && !DUTCH_SENTENCE_INITIAL.has(lower)) {
      isKey = true;
    }

    if (isKey) out.push(`<mark class="line-stress">${escapeHtml(tok)}</mark>`);
    else out.push(escapeHtml(tok));
  }
  return out.join('');
}

let loopRangeStart = null; // for multi-line loop selection

function loopLine(idx) {
  const s = segments[idx]; if (!s) return;

  // Multi-line loop: first click sets start, second click sets end
  if (loopRangeStart !== null && loopRangeStart !== idx) {
    const from = Math.min(loopRangeStart, idx);
    const to = Math.max(loopRangeStart, idx);
    pointA = segments[from].start;
    pointB = segments[to].end;
    loopEnabled = true; loopCount = 0;
    document.getElementById('loop-btn').classList.add('active');
    document.getElementById('set-a-btn').classList.add('active');
    document.getElementById('set-b-btn').classList.add('active');
    syncABLabels();
    audio.currentTime = pointA;
    updateProgressUI();
    audio.play().then(() => setPlayButton(true)).catch(() => {});
    // Highlight range
    const lines = document.querySelectorAll('.dialogue-line');
    lines.forEach((l, i) => l.classList.toggle('highlight', i >= from && i <= to));
    loopRangeStart = null;
    return;
  }

  // Single click: if no range active, start range OR single loop
  // Hold shift for range mode
  if (window._shiftHeld) {
    loopRangeStart = idx;
    // Visual feedback
    const lines = document.querySelectorAll('.dialogue-line');
    lines[idx].style.boxShadow = 'inset 3px 0 0 var(--green), inset -3px 0 0 var(--green)';
    return;
  }

  // Toggle: if already looping this line, cancel and show feedback
  if (loopEnabled && Math.abs(pointA - s.start) < 0.5 && Math.abs(pointB - s.end) < 0.5) {
    clearAB();
    // Reset all loop button styles
    document.querySelectorAll('.line-repeat-btn').forEach(b => { b.style.color = ''; b.style.opacity = ''; });
    return;
  }

  // Default: single line loop
  pointA = s.start; pointB = s.end;
  loopEnabled = true; loopCount = 0;
  document.getElementById('loop-btn').classList.add('active');
  document.getElementById('set-a-btn').classList.add('active');
  document.getElementById('set-b-btn').classList.add('active');
  syncABLabels();
  audio.currentTime = s.start;
  updateProgressUI();
  audio.play().then(() => setPlayButton(true)).catch(() => {});
  setActiveDialogueLine(idx);
  // Visual feedback on the 🔁 button
  const btns = document.querySelectorAll('.line-repeat-btn');
  btns.forEach(b => { b.style.color = ''; b.style.opacity = ''; });
  if (btns[idx]) { btns[idx].style.color = 'var(--accent)'; btns[idx].style.opacity = '1'; }
}
