<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🗣️ 口說模擬器 — Echo Dutch</title>
<style>
  :root {
    --bg:#050510; --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.09); --text:#f2f2f7; --text2:#a0a0b8; --text3:#606078;
    --green:#34d399; --red:#f87171; --orange:#fb923c; --blue:#60a5fa; --purple:#a78bfa;
    --accent:#5eead4;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,'Inter',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
  .wrap{max-width:480px;margin:0 auto;padding:14px 18px 80px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .back{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
    color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
  .top h1{font-size:18px;font-weight:800}
  .top .count{margin-left:auto;font-size:12px;color:var(--text3);font-weight:700}
  .progress{height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin-bottom:16px}
  .progress .fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--red));
    transition:width .35s;border-radius:3px;width:0}

  .howto{padding:14px 16px;border-radius:14px;background:var(--surface);border:1px solid var(--border);
    font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px}
  .howto b{color:var(--text)}
  .opt-row{display:flex;gap:8px;margin-bottom:14px;align-items:center}
  .opt-label{font-size:13px;font-weight:800;color:var(--text2);flex:0 0 64px}
  .seg{display:flex;gap:6px;flex:1}
  .seg button{flex:1;padding:9px 0;border-radius:10px;border:1px solid var(--border);background:var(--surface2);
    color:var(--text2);font-size:12.5px;font-weight:700;cursor:pointer}
  .seg button.on{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border-color:transparent}
  .start-btn{width:100%;padding:16px;border-radius:16px;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;font-size:16px;font-weight:800}
  .start-btn:disabled{opacity:.4}
  .mini-stat{font-size:12px;color:var(--text3);text-align:center;margin-top:12px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px 18px;
    animation:pop .3s cubic-bezier(.22,1,.36,1)}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .src-tag{font-size:10.5px;font-weight:800;letter-spacing:1px;color:var(--orange);margin-bottom:12px}
  .img-wrap{margin:0 0 14px;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08)}
  .img-wrap.compact{margin-top:10px}
  .q-img{display:block;width:100%;max-height:260px;object-fit:contain;background:#111827}
  .q-text{font-size:18px;font-weight:800;line-height:1.5}
  .q-zh{font-size:13.5px;color:var(--text2);margin-top:8px;line-height:1.6;display:none}
  .card.show-zh .q-zh{display:block}
  /* 遮住問題（口說反射練習：先聽再看） */
  .q-text{transition:filter .18s}
  .card.mask-on .q-text{filter:blur(9px);user-select:none;pointer-events:none}
  .card.mask-on .q-zh,.card.mask-on .zh-btn,.card.mask-on.show-zh .q-zh{display:none}
  .card.mask-on.revealed .q-text{filter:none;user-select:auto;pointer-events:auto}
  .card.mask-on.revealed .zh-btn{display:block}
  .card.mask-on.revealed.show-zh .q-zh{display:block}
  .mask-hint{display:none;font-size:12.5px;color:var(--text3);margin-top:10px;font-weight:700}
  .card.mask-on:not(.revealed) .mask-hint{display:block}
  .reveal-btn{display:none}
  .card.mask-on:not(.revealed) .reveal-btn{display:block}
  /* in-session 控制列（返回 / 隱藏原文） */
  .sess-bar{display:flex;gap:8px;margin-bottom:14px}
  .sess-btn{padding:7px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);
    color:var(--text2);font-size:12.5px;font-weight:700;cursor:pointer}
  .sess-btn:active{transform:scale(0.96)}
  .btn-row{display:flex;gap:8px;margin-top:16px}
  .b{flex:1;padding:13px;border-radius:13px;border:1px solid var(--border);background:var(--surface2);
    color:var(--text);font-size:14px;font-weight:700;cursor:pointer}
  .b:active{transform:scale(0.96)}
  .b.primary{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border:none;flex:1.5}

  /* countdown ring */
  .ring-box{display:flex;flex-direction:column;align-items:center;margin:18px 0 6px}
  .ring{position:relative;width:150px;height:150px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:44px;font-weight:900}
  .rec-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--red);
    animation:blink 1s infinite;margin-right:6px}
  @keyframes blink{50%{opacity:.2}}
  .rec-label{font-size:12px;color:var(--text2);margin-top:10px;font-weight:700}

  .model-box{margin-top:16px;padding:14px 15px;border-radius:13px;background:rgba(52,211,153,0.08);
    border:1px solid rgba(52,211,153,0.3)}
  .model-box .m-tag{font-size:11px;font-weight:800;color:var(--green);letter-spacing:1px;margin-bottom:6px}
  .model-box .m-nl{font-size:16px;font-weight:700;line-height:1.55}
  .model-box .m-zh{font-size:12.5px;color:var(--text2);margin-top:6px;line-height:1.6}
  .ai-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6)!important;color:#fff!important;border:none!important}
  .ai-card{margin-top:14px;padding:15px 16px;border-radius:14px;background:rgba(139,92,246,0.08);
    border:1px solid rgba(139,92,246,0.3)}
  .ai-card.ai-err{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.35);font-size:13px;line-height:1.6}
  .ai-load{font-size:13.5px;color:var(--text2);line-height:1.6}
  .ai-tag{font-size:11px;font-weight:800;letter-spacing:1px;color:#a78bfa;margin-bottom:8px}
  .ai-score{font-size:34px;font-weight:900;line-height:1;margin-bottom:12px}
  .ai-score span{font-size:15px;font-weight:700;color:var(--text3)}
  .ai-row{display:flex;gap:8px;margin-bottom:8px;font-size:13.5px;line-height:1.55}
  .ai-k{flex:0 0 46px;font-weight:800;color:var(--text3);font-size:11px;padding-top:2px}
  .ai-v{flex:1;color:var(--text)}
  .ai-fix{color:var(--green);font-weight:700}
  .ai-errs{margin:10px 0;display:flex;flex-direction:column;gap:6px}
  .ai-er{font-size:12.5px;line-height:1.5;padding:7px 10px;border-radius:9px;background:rgba(255,255,255,0.03)}
  .ai-wrong{color:var(--red);text-decoration:line-through}
  .ai-right{color:var(--green);font-weight:700}
  .ai-note{display:block;color:var(--text3);font-size:11.5px;margin-top:2px}
  .ai-pron{margin-top:10px;border-top:1px solid rgba(255,255,255,0.06);padding-top:10px}
  .ai-pron-title{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--accent);margin-bottom:7px}
  .ai-pron-item{font-size:12.5px;line-height:1.55;padding:7px 9px;border-radius:9px;
    background:rgba(94,234,212,0.06);margin-top:6px}
  .ai-pron-item b{color:var(--text)}
  .ai-pron-item span{color:var(--text2)}
  .ai-fb{margin-top:10px;font-size:13px;line-height:1.7;color:var(--text2);
    border-top:1px solid rgba(255,255,255,0.06);padding-top:10px}
  .grades{display:flex;gap:8px;margin-top:16px}
  .grade{flex:1;padding:12px 4px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);
    color:var(--text);cursor:pointer;text-align:center}
  .grade:active{transform:scale(0.94)}
  .grade .e{display:block;font-size:20px}
  .grade .t{display:block;font-size:10.5px;font-weight:700;color:var(--text2);margin-top:3px}
  .grade.g0{border-color:rgba(248,113,113,0.45)} .grade.g1{border-color:rgba(251,146,60,0.45)}
  .grade.g2{border-color:rgba(52,211,153,0.45)}

  .center-box{text-align:center;padding:50px 10px}
  .center-box .big{font-size:52px;margin-bottom:14px}
  .center-box h2{font-size:20px;font-weight:800;margin-bottom:10px}
  .center-box p{font-size:13px;color:var(--text2);line-height:1.7}
  .stat-row{display:flex;gap:10px;justify-content:center;margin:18px 0}
  .stat-pill{padding:10px 18px;border-radius:14px;background:var(--surface2);border:1px solid var(--border)}
  .stat-pill .n{font-size:22px;font-weight:900}
  .stat-pill .l{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-top:2px}
  .links{display:flex;flex-direction:column;gap:10px;margin-top:20px}
  .links a,.links button{display:block;width:100%;padding:13px;border-radius:13px;background:var(--surface2);
    border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:700;text-decoration:none;
    text-align:center;cursor:pointer}
</style>
  <script src="gate.js"></script>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">←</a>
    <h1>🗣️ 口說模擬器</h1>
    <span class="count" id="counter"></span>
  </div>
  <div class="progress"><div class="fill" id="prog"></div></div>
  <div id="stage">
    <div class="howto"><b>考試怎麼考，這裡就怎麼練：</b>聽問題 → 倒數內大聲回答（會錄音）→
      聽 Ad Appel 模範答案對照 → 自評。講不出來的題目下次優先再出。<br>
      <b>記得開聲音、找個能講話的地方。</b></div>
    <div class="opt-row">
      <span class="opt-label">作答秒數</span>
      <div class="seg" id="timer-seg"></div>
    </div>
    <div class="opt-row">
      <span class="opt-label">錄音</span>
      <div class="seg" id="mic-seg">
        <button data-v="1">🎙️ 開（可回聽自己）</button>
        <button data-v="0">關（只倒數）</button>
      </div>
    </div>
    <div class="opt-row">
      <span class="opt-label">遮住問題</span>
      <div class="seg" id="mask-seg">
        <button data-v="1">🙈 遮住（先聽再看）</button>
        <button data-v="0">關（直接看題）</button>
      </div>
    </div>
    <button class="start-btn" id="start" disabled onclick="startSession()">載入中…</button>
    <div class="mini-stat" id="mini-stat"></div>
  </div>
</div>

<script>
const DATA_URL = 'output/spreken_items.json';
const STORE_KEY = 'lph_spreken_v1';     // { "vid:idx": {reps, interval, due, lastGrade, tries} }
const TIMER_KEY = 'lph_spreken_timer';
const MIC_KEY = 'lph_spreken_mic';
const MASK_KEY = 'lph_spreken_mask';
const INTERVALS = [1, 3, 7, 14, 30];
const SESSION_N = 8;
const TIMERS = [15, 25, 35];

const esc = t => String(t == null ? '' : t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const attr = t => esc(t).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const todayStr = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const daysFromNow = n => { const d = new Date(); d.setDate(d.getDate()+n); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
function questionImage(it, compact=false) {
  if (!it || !it.img) return '';
  return `<div class="img-wrap ${compact ? 'compact' : ''}"><img class="q-img" src="${attr(it.img)}" alt="題目圖片" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;
}

let DATA = null;
let timerSec = parseInt(localStorage.getItem(TIMER_KEY)) || 25;
if (!TIMERS.includes(timerSec)) timerSec = 25;
let micOn = localStorage.getItem(MIC_KEY) !== '0';
let maskQ = localStorage.getItem(MASK_KEY) !== '0';   // 預設遮住（口說反射練習）
let qRevealed = false;
let session = [], si = 0, grades = [];
let micStream = null, mediaRec = null, recChunks = [], myRecUrl = null, myRecBlob = null;
// AI 口說批改後端（qq-website Vercel；金鑰在伺服器端，前端只送錄音）
const GRADE_API = 'https://www.qqleveragelife.com/api/grade-spreken';
let countdownT = null;

function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; } }
function saveStore(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

// ── Settings UI ──
function renderSettings() {
  document.getElementById('timer-seg').innerHTML = TIMERS.map(s =>
    `<button class="${s === timerSec ? 'on' : ''}" onclick="setTimer(${s})">${s} 秒</button>`).join('');
  document.querySelectorAll('#mic-seg button').forEach(b => {
    b.classList.toggle('on', (b.dataset.v === '1') === micOn);
    b.onclick = () => { micOn = b.dataset.v === '1'; localStorage.setItem(MIC_KEY, micOn ? '1' : '0'); renderSettings(); };
  });
  document.querySelectorAll('#mask-seg button').forEach(b => {
    b.classList.toggle('on', (b.dataset.v === '1') === maskQ);
    b.onclick = () => { maskQ = b.dataset.v === '1'; localStorage.setItem(MASK_KEY, maskQ ? '1' : '0'); renderSettings(); };
  });
}
function setTimer(s) { timerSec = s; localStorage.setItem(TIMER_KEY, String(s)); renderSettings(); }

// ── Load data ──
(async function init() {
  renderSettings();
  try {
    DATA = await (await fetch(DATA_URL)).json();
    const store = loadStore();
    const practiced = Object.keys(store).length;
    const t = todayStr();
    const due = Object.values(store).filter(r => r.due <= t || r.lastGrade === 0).length;
    document.getElementById('start').disabled = false;
    document.getElementById('start').textContent = `▶ 開始（${SESSION_N} 題）`;
    document.getElementById('mini-stat').textContent =
      `題庫 ${DATA.count} 題 · ${DATA.videos.length} 份 Ad Appel 考卷 · 已練 ${practiced} 題` +
      (due ? ` · ${due} 題該複習` : '');
  } catch(e) {
    document.getElementById('start').textContent = '題庫載入失敗';
  }
})();

// ── Session build: due/failed first → unseen (exam order) → rest ──
function startSession() {
  const store = loadStore();
  const t = todayStr();
  const all = [];
  DATA.videos.forEach(v => v.items.forEach((it, idx) =>
    all.push({ ...it, vid: v.vid, label: v.label, idx })));
  const due = [], unseen = [], rest = [];
  all.forEach(it => {
    const r = store[it.vid + ':' + it.idx];
    if (!r) unseen.push(it);
    else if (r.due <= t || r.lastGrade === 0) due.push(it);
    else rest.push(it);
  });
  const shuffle = arr => { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; };
  session = [...shuffle(due), ...unseen, ...shuffle(rest)].slice(0, SESSION_N);
  si = 0; grades = [];
  if (micOn) initMic();
  renderQuestion();
}

async function initMic() {
  if (micStream) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true } });
  } catch(e) { micOn = false; }
}

// ── Audio range playback ──
let _audio = null, _stopT = null, _onEnd = null;
function playRange(vid, start, end, onDone) {
  if (_stopT) { clearTimeout(_stopT); _stopT = null; }
  if (!_audio) _audio = new Audio();
  const src = `output/${vid}/audio.mp3`;
  if (_audio.src.indexOf(src) === -1) _audio.src = src;
  const go = () => {
    _audio.playbackRate = 1.0;
    _audio.currentTime = Math.max(0, start);
    _audio.play().catch(()=>{});
    const durMs = Math.max(1200, (end - start) * 1000 + 250);
    _stopT = setTimeout(() => { _audio.pause(); if (onDone) onDone(); }, durMs);
  };
  if (_audio.readyState >= 1) go();
  else { _audio.addEventListener('loadedmetadata', go, { once: true }); _audio.load(); }
}

// ── Phase 1: question ──
function renderQuestion() {
  if (countdownT) { clearInterval(countdownT); countdownT = null; }
  if (myRecUrl) { URL.revokeObjectURL(myRecUrl); myRecUrl = null; } myRecBlob = null;
  if (si >= session.length) return renderSummary();
  const it = session[si];
  document.getElementById('prog').style.width = Math.round(si / session.length * 100) + '%';
  document.getElementById('counter').textContent = `${si + 1} / ${session.length}`;
  qRevealed = false;
  phase = 'q';
  document.getElementById('stage').innerHTML = `
    <div class="card ${maskQ ? 'mask-on' : ''}" id="card">
      ${sessBar(true)}
      <div class="src-tag">🗣️ ${esc(it.label)} · 第 ${it.idx + 1} 題</div>
      ${questionImage(it)}
      <div class="q-text">${esc(it.q_nl)}</div>
      <div class="q-zh">${esc(it.q_zh)}</div>
      <div class="mask-hint">🙈 問題已遮住 — 先聽音檔、講完用上面「👁 顯示原文」揭曉</div>
      <div class="btn-row">
        <button class="b" onclick="playQ()">🔊 再聽問題</button>
        <button class="b zh-btn" onclick="document.getElementById('card').classList.toggle('show-zh')">中文</button>
      </div>
      <div class="btn-row">
        <button class="b primary" onclick="startAnswer()">🎙️ 開始作答（${timerSec} 秒）</button>
      </div>
    </div>`;
  playQ();
}
function playQ() { const it = session[si]; playRange(it.vid, it.q_start, it.q_end); }
function revealQ() { qRevealed = true; const c = document.getElementById('card'); if (c) c.classList.add('revealed'); }

// ── in-session 控制列：返回 + 隱藏/顯示原文 ──
let phase = 'q';   // 'q' 題目 / 'a' 作答 / 'm' 模範
function sessBar(withMask) {
  return `<div class="sess-bar">
    <button class="sess-btn" onclick="goBack()">← 返回</button>
    ${withMask ? `<button class="sess-btn" id="mask-toggle" onclick="toggleMask()">${maskQ ? '👁 顯示原文' : '🙈 隱藏原文'}</button>` : ''}
  </div>`;
}
function goBack() {
  if (countdownT) { clearInterval(countdownT); countdownT = null; }
  if (mediaRec && mediaRec.state === 'recording') { try { mediaRec.onstop = null; mediaRec.stop(); } catch(e){} }
  if (_audio) { try { _audio.pause(); } catch(e){} }
  if (phase === 'a' || phase === 'm') { renderQuestion(); return; }  // 回到本題題目
  if (si > 0) { si--; renderQuestion(); }                            // 回上一題
  else { location.reload(); }                                        // 第一題再返回＝回選單
}
function toggleMask() {
  const c = document.getElementById('card');
  const hidden = c && c.classList.contains('mask-on') && !c.classList.contains('revealed');
  if (hidden) { if (c) c.classList.add('revealed'); maskQ = false; }        // 目前遮住 → 顯示
  else { if (c) { c.classList.add('mask-on'); c.classList.remove('revealed'); } maskQ = true; } // 顯示 → 遮住
  localStorage.setItem(MASK_KEY, maskQ ? '1' : '0');
  const t = document.getElementById('mask-toggle');
  if (t) t.textContent = maskQ ? '👁 顯示原文' : '🙈 隱藏原文';
}

// ── Phase 2: countdown + record ──
function startAnswer() {
  if (_stopT) { clearTimeout(_stopT); _stopT = null; }
  if (_audio) _audio.pause();
  const it = session[si];
  const R = 66, CIRC = 2 * Math.PI * R;
  phase = 'a';
  document.getElementById('stage').innerHTML = `
    <div class="card ${maskQ && !qRevealed ? 'mask-on' : ''}" id="card">
      ${sessBar(true)}
      <div class="src-tag">🗣️ ${esc(it.label)} · 第 ${it.idx + 1} 題</div>
      <div class="q-text" style="font-size:15px;color:var(--text2)">${esc(it.q_nl)}</div>
      ${questionImage(it, true)}
      <div class="ring-box">
        <div class="ring">
          <svg width="150" height="150">
            <circle cx="75" cy="75" r="${R}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="9"/>
            <circle id="ring-fg" cx="75" cy="75" r="${R}" fill="none" stroke="#fb923c" stroke-width="9"
              stroke-linecap="round" stroke-dasharray="${CIRC}" stroke-dashoffset="0"/>
          </svg>
          <div class="num" id="cd-num">${timerSec}</div>
        </div>
        <div class="rec-label" id="rec-label">${micOn && micStream ? '<span class="rec-dot"></span>錄音中 — 大聲回答！' : '大聲回答！'}</div>
      </div>
      <div class="btn-row">
        <button class="b primary" onclick="finishAnswer()">講完了 →</button>
      </div>
    </div>`;
  // start recording
  recChunks = [];
  if (micOn && micStream) {
    try {
      let mime = '';
      for (const t of ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm']) {
        if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported(t)) { mime = t; break; }
      }
      mediaRec = mime ? new MediaRecorder(micStream, { mimeType: mime }) : new MediaRecorder(micStream);
      mediaRec.ondataavailable = e => { if (e.data.size) recChunks.push(e.data); };
      mediaRec.start();
    } catch(e) { mediaRec = null; }
  }
  // countdown
  let left = timerSec;
  const fg = document.getElementById('ring-fg');
  countdownT = setInterval(() => {
    left--;
    document.getElementById('cd-num').textContent = left;
    fg.style.strokeDashoffset = CIRC * (1 - left / timerSec);
    if (left <= 5) fg.style.stroke = '#f87171';
    if (left <= 0) finishAnswer();
  }, 1000);
}

function finishAnswer() {
  if (countdownT) { clearInterval(countdownT); countdownT = null; }
  if (mediaRec && mediaRec.state === 'recording') {
    mediaRec.onstop = () => {
      if (recChunks.length) {
        const blob = new Blob(recChunks, { type: mediaRec.mimeType || 'audio/webm' });
        myRecBlob = blob;
        myRecUrl = URL.createObjectURL(blob);
        const b = document.getElementById('my-rec-btn');
        if (b) b.style.display = 'block';
        const ab = document.getElementById('ai-grade-btn');
        if (ab) ab.style.display = 'block';
      }
    };
    mediaRec.stop();
  }
  renderModel();
}

// ── Phase 3: model answer + self grade ──
function renderModel() {
  const it = session[si];
  phase = 'm';
  document.getElementById('stage').innerHTML = `
    <div class="card show-zh">
      ${sessBar(false)}
      <div class="src-tag">🗣️ ${esc(it.label)} · 第 ${it.idx + 1} 題</div>
      <div class="q-text" style="font-size:14px;color:var(--text3)">${esc(it.q_nl)}</div>
      ${questionImage(it, true)}
      <div class="model-box">
        <div class="m-tag">✅ 模範答案</div>
        <div class="m-nl">${esc(it.a_nl)}</div>
        <div class="m-zh">${esc(it.a_zh)}</div>
      </div>
      <div class="btn-row">
        <button class="b" onclick="playA()">🔊 再聽模範</button>
        <button class="b" id="my-rec-btn" style="display:${myRecUrl ? 'block' : 'none'}"
          onclick="playMine()">▶ 自己的錄音</button>
      </div>
      <div class="btn-row">
        <button class="b ai-btn" id="ai-grade-btn" style="display:${myRecBlob ? 'block' : 'none'}"
          onclick="gradeMine()">🤖 AI 批改我的口說</button>
      </div>
      <div id="ai-feedback"></div>
      <div class="grades">
        <button class="grade g0" onclick="grade(0)"><span class="e">😣</span><span class="t">講不出來</span></button>
        <button class="grade g1" onclick="grade(1)"><span class="e">🤔</span><span class="t">卡卡的</span></button>
        <button class="grade g2" onclick="grade(2)"><span class="e">💪</span><span class="t">流暢</span></button>
      </div>
    </div>`;
  playA();
}
function playA() { const it = session[si]; playRange(it.vid, it.a_start, it.a_end); }
let _mine = null;
function playMine() {
  if (!myRecUrl) return;
  if (_audio) _audio.pause();
  if (!_mine) _mine = new Audio();
  _mine.src = myRecUrl; _mine.play().catch(()=>{});
}

async function gradeMine() {
  if (!myRecBlob) return;
  const it = session[si];
  const box = document.getElementById('ai-feedback');
  const btn = document.getElementById('ai-grade-btn');
  if (btn) { btn.disabled = true; btn.textContent = '🤖 批改中…（約 5–10 秒）'; }
  if (box) box.innerHTML = '<div class="ai-card"><div class="ai-load">🎧 正在聽你的錄音、對照題目批改…</div></div>';
  try {
    const fd = new FormData();
    const ext = (myRecBlob.type.indexOf('mp4') > -1) ? 'mp4' : 'webm';
    fd.append('audio', myRecBlob, 'answer.' + ext);
    fd.append('question', it.q_nl || '');
    fd.append('model', it.a_nl || '');
    fd.append('expected', it.a_nl || '');
    fd.append('answer_seconds', String(timerSec));
    fd.append('rubric', 'spreken-pronunciation-v2');
    fd.append('focus', 'pronunciation_fluency_word_stress_dutch_sounds');
    fd.append('code', localStorage.getItem('lph_access_code') || '');
    const res = await fetch(GRADE_API, { method: 'POST', body: fd });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    renderFeedback(data, it);
  } catch (e) {
    if (box) box.innerHTML = '<div class="ai-card ai-err">批改失敗：' + esc(e.message) +
      '<br><span style="color:var(--text3)">（可能是後端還沒設定金鑰，或網路問題）</span></div>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🤖 重新批改'; }
  }
}
const DUTCH_SOUND_RULES = [
  { sound: 'ui', re: /ui/i, tip: '嘴巴先圓再往前滑，不要念成英文 ui。' },
  { sound: 'ij / ei', re: /(ij|ei)/i, tip: '像短促的「欸」滑音，結尾要收乾淨。' },
  { sound: 'g / ch', re: /(g|ch)/i, tip: '喉音要有摩擦感，但不要變成 k。' },
  { sound: 'sch', re: /sch/i, tip: '先 s，再接喉音 ch，三個音不要糊成一團。' },
  { sound: 'oe / eu / uu', re: /(oe|eu|uu)/i, tip: '注意圓唇母音，嘴型比中文更固定。' },
  { sound: '長母音', re: /(aa|ee|oo)/i, tip: '長母音要拉開，太短時 AI 容易聽成別的字。' },
  { sound: '尾音 d/t', re: /[dt]$/i, tip: '字尾要輕但要在，不能完全吞掉。' },
  { sound: 'v / w', re: /^[vw]/i, tip: 'v 有唇齒摩擦，w 嘴唇更圓，兩者要分開。' }
];

function normWords(text) {
  return String(text || '').toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, ' ')
    .trim().split(/\s+/).filter(Boolean);
}

function buildPronunciationGuess(transcript, model) {
  const heard = new Set(normWords(transcript));
  const target = normWords(model).filter(w => w.length > 2);
  const uniqueTarget = [...new Set(target)];
  const missing = uniqueTarget.filter(w => !heard.has(w)).slice(0, 6);
  const rows = [];
  if (!String(transcript || '').trim()) {
    rows.push({ sound: '錄音辨識', words: [], tip: '這次幾乎沒有可用轉錄；先靠近麥克風，放慢 10%，每個字尾收清楚。' });
  } else if (missing.length) {
    rows.push({ sound: '少聽到的字', words: missing.slice(0, 5), tip: '如果你其實有講，通常是重音、母音長短或尾音太弱。' });
  }
  DUTCH_SOUND_RULES.forEach(rule => {
    const words = uniqueTarget.filter(w => rule.re.test(w)).slice(0, 4);
    if (!words.length) return;
    const missed = words.filter(w => !heard.has(w));
    if (missed.length || !transcript) rows.push({ sound: rule.sound, words: missed.length ? missed : words.slice(0, 2), tip: rule.tip });
  });
  return rows.slice(0, 5);
}

function normalizePronIssues(raw) {
  if (!raw) return [];
  const list = Array.isArray(raw) ? raw : [raw];
  return list.map(x => {
    if (typeof x === 'string') return { sound: '發音', words: [], tip: x };
    return {
      sound: x.sound || x.pattern || x.title || x.issue || '發音',
      words: Array.isArray(x.words) ? x.words : (x.word ? [x.word] : []),
      tip: x.tip_zh || x.tip || x.note_zh || x.note || x.feedback_zh || x.feedback || ''
    };
  }).filter(x => x.tip || x.words.length);
}

function renderPronunciationHints(rows, inferred) {
  if (!rows.length) return '';
  let html = '<div class="ai-pron"><div class="ai-pron-title">發音重點' + (inferred ? '（推測）' : '') + '</div>';
  rows.forEach(r => {
    html += '<div class="ai-pron-item"><b>' + esc(r.sound) + '</b>' +
      (r.words && r.words.length ? ' <span>' + esc(r.words.join(' · ')) + '</span>' : '') +
      (r.tip ? '<br><span>' + esc(r.tip) + '</span>' : '') + '</div>';
  });
  html += '</div>';
  return html;
}

function renderFeedback(d, it) {
  const box = document.getElementById('ai-feedback');
  if (!box) return;
  const apiPron = normalizePronIssues(d.pronunciation_issues || d.pronunciationIssues || d.pronunciation || d.sound_issues);
  const localPron = buildPronunciationGuess(d.transcript || '', (it && it.a_nl) || d.corrected || '');
  if (d.empty) {
    box.innerHTML = '<div class="ai-card ai-err">' + esc(d.feedback_zh || '沒聽到聲音，再錄一次。') +
      renderPronunciationHints(localPron, true) + '</div>';
    return;
  }
  const score = typeof d.score === 'number' ? d.score : null;
  const sColor = score == null ? 'var(--text2)' : score >= 70 ? 'var(--green)' : score >= 40 ? 'var(--orange)' : 'var(--red)';
  const pronRows = [...apiPron, ...localPron].slice(0, 6);
  const fluency = d.fluency_zh || d.fluency || d.fluencyFeedback || '';
  const tips = d.tips_zh || d.tips || d.next_steps || [];
  let html = '<div class="ai-card">';
  html += '<div class="ai-tag">🤖 AI 口說批改</div>';
  if (score != null) html += '<div class="ai-score" style="color:' + sColor + '">' + score + '<span>/100</span></div>';
  html += '<div class="ai-row"><span class="ai-k">你講的</span><span class="ai-v">' + esc(d.transcript || '（無）') + '</span></div>';
  if (d.corrected) html += '<div class="ai-row"><span class="ai-k">修正版</span><span class="ai-v ai-fix">' + esc(d.corrected) + '</span></div>';
  if (Array.isArray(d.errors) && d.errors.length) {
    html += '<div class="ai-errs">';
    d.errors.forEach(er => {
      html += '<div class="ai-er"><span class="ai-wrong">' + esc(er.wrong || '') + '</span> → <span class="ai-right">' +
        esc(er.right || '') + '</span>' + (er.note_zh ? '<span class="ai-note">' + esc(er.note_zh) + '</span>' : '') + '</div>';
    });
    html += '</div>';
  }
  html += renderPronunciationHints(pronRows, !apiPron.length);
  if (fluency) html += '<div class="ai-fb">' + esc(fluency) + '</div>';
  if (Array.isArray(tips) && tips.length) html += '<div class="ai-fb">' + tips.slice(0, 3).map(esc).join('<br>') + '</div>';
  if (d.feedback_zh) html += '<div class="ai-fb">' + esc(d.feedback_zh) + '</div>';
  html += '</div>';
  box.innerHTML = html;
}

function grade(g) {
  const it = session[si];
  const store = loadStore();
  const key = it.vid + ':' + it.idx;
  const cur = store[key] || { reps: 0, interval: 0, tries: 0 };
  let newReps, newInt;
  if (g === 0) { newReps = 0; newInt = 1; }
  else if (g === 1) { newReps = cur.reps; newInt = Math.max(2, Math.min(cur.interval || 1, 3)); }
  else { newReps = (cur.reps || 0) + 1; newInt = INTERVALS[Math.min(newReps, INTERVALS.length - 1)]; }
  store[key] = { reps: newReps, interval: newInt, due: daysFromNow(newInt),
    lastGrade: g, tries: (cur.tries || 0) + 1 };
  saveStore(store);
  grades.push({ it, g });
  si++;
  renderQuestion();
}

// ── Summary ──
function renderSummary() {
  document.getElementById('prog').style.width = '100%';
  document.getElementById('counter').textContent = '';
  if (myRecUrl) { URL.revokeObjectURL(myRecUrl); myRecUrl = null; } myRecBlob = null;
  const n0 = grades.filter(x => x.g === 0).length;
  const n1 = grades.filter(x => x.g === 1).length;
  const n2 = grades.filter(x => x.g === 2).length;
  document.getElementById('stage').innerHTML = `
    <div class="center-box">
      <div class="big">${n0 === 0 && n1 === 0 ? '🏆' : n2 >= n0 + n1 ? '💪' : '📝'}</div>
      <h2>口說 session 完成</h2>
      <div class="stat-row">
        <div class="stat-pill"><div class="n" style="color:var(--green)">${n2}</div><div class="l">流暢</div></div>
        <div class="stat-pill"><div class="n" style="color:var(--orange)">${n1}</div><div class="l">卡卡</div></div>
        <div class="stat-pill"><div class="n" style="color:var(--red)">${n0}</div><div class="l">講不出</div></div>
      </div>
      <p>講不出來的明天優先再考你一次。<br>口說不是知道答案，是嘴巴肌肉記住答案。</p>
      <div class="links">
        <button onclick="startSession()">🔁 再來 ${SESSION_N} 題</button>
        <a href="index.html">← 回首頁</a>
      </div>
    </div>`;
}
