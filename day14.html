<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>📅 14 天備考計畫 — A2 Listening Hub</title>
<style>
  *{box-sizing:border-box}
  :root{--bg:#0a0a0f;--card:#15151c;--card2:#1f1f29;--line:rgba(255,255,255,0.08);
    --text:#e8e8f0;--text2:#9ca3af;--dim:#6b7280;--ok:#4ade80;--bad:#f87171;
    --accent:#fb923c;--ring:#5eead4;--purple:#a78bfa;--gold:#fde047}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font:14.5px/1.55 -apple-system,"PingFang TC","Hiragino Sans","Noto Sans JP",sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:18px 14px 100px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  header a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:600}
  h1{margin:0;font-size:19px;flex:1}

  .hero{margin:8px 0 16px;padding:14px 16px;border-radius:14px;
    background:linear-gradient(135deg,rgba(167,139,250,0.18),rgba(94,234,212,0.1));
    border:1px solid rgba(167,139,250,0.3)}
  .hero .count{font-size:34px;font-weight:900;color:var(--purple);line-height:1}
  .hero .count .small{font-size:14px;color:var(--text2);font-weight:600;margin-left:6px}
  .hero .sub{font-size:12.5px;color:var(--text2);margin-top:4px;line-height:1.6}
  .hero .exam-date{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
    display:flex;gap:8px;align-items:center;font-size:12.5px}
  .hero .exam-date input{flex:1;padding:5px 10px;background:var(--card);
    border:1px solid var(--line);border-radius:6px;color:var(--text);font:inherit;font-size:12.5px}

  .progress{margin:14px 0;background:var(--card);border-radius:10px;padding:10px 14px}
  .progress-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:6px}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--ring),var(--ok));border-radius:3px;transition:width .3s}
  .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2)}

  .day{margin-bottom:10px;background:var(--card);border-radius:12px;
    border:1px solid var(--line);overflow:hidden}
  .day.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .day.done{opacity:.6}
  .day-head{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;user-select:none}
  .day-head:hover{background:var(--card2)}
  .day-num{flex:0 0 44px;height:44px;border-radius:10px;background:var(--card2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800}
  .day-num .d-n{font-size:18px;color:var(--text)}
  .day-num .d-d{font-size:9px;color:var(--text2);margin-top:1px}
  .day.today .day-num{background:var(--gold);color:#18181b}
  .day.today .day-num .d-n,.day.today .day-num .d-d{color:#18181b}
  .day.done .day-num{background:rgba(74,222,128,0.2);color:var(--ok)}
  .day.done .day-num .d-n,.day.done .day-num .d-d{color:var(--ok)}
  .day-meta{flex:1;min-width:0}
  .day-title{font-size:14px;font-weight:700;color:var(--text)}
  .day-sub{font-size:11.5px;color:var(--text2);margin-top:2px}
  .day-prog{font-size:11px;color:var(--text2);padding:3px 8px;background:var(--card2);
    border-radius:10px;font-weight:700}
  .day.today .day-prog{background:rgba(253,224,71,0.2);color:var(--gold)}
  .day.done .day-prog{background:rgba(74,222,128,0.18);color:var(--ok)}
  .day-toggle{font-size:14px;color:var(--text2);transition:transform .2s}
  .day.open .day-toggle{transform:rotate(180deg)}

  .day-body{display:none;padding:0 14px 14px;border-top:1px solid var(--line)}
  .day.open .day-body{display:block}
  .day-why{margin:12px 0 8px;padding:8px 11px;background:rgba(94,234,212,0.06);
    border-left:3px solid var(--ring);border-radius:0 6px 6px 0;
    color:var(--text);font-size:12.5px;line-height:1.6}
  .day-why .why-tag{color:var(--ring);font-weight:800;margin-right:5px}

  .task{display:flex;gap:11px;padding:10px;background:var(--card2);
    border-radius:8px;margin-bottom:6px;border:1px solid var(--line);
    transition:border-color .15s,background .15s}
  .task.done{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.35)}
  .task-check{flex:0 0 22px;height:22px;border-radius:50%;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;
    color:transparent;transition:all .15s;margin-top:2px}
  .task-check:hover{border-color:var(--ok)}
  .task.done .task-check{background:var(--ok);border-color:var(--ok);color:#000}
  .task-body{flex:1;min-width:0}
  .task-title{font-size:13.5px;font-weight:700;color:var(--text);line-height:1.4}
  .task.done .task-title{text-decoration:line-through;color:var(--text2)}
  .task-how{font-size:12px;color:var(--text2);line-height:1.55;margin-top:4px}
  .task-how b{color:var(--ring);font-weight:700}
  .task-link{display:inline-flex;align-items:center;gap:4px;margin-top:6px;
    padding:4px 9px;background:rgba(94,234,212,0.12);color:var(--ring);
    text-decoration:none;border-radius:5px;font-size:11.5px;font-weight:700;
    border:1px solid rgba(94,234,212,0.3)}
  .task-link:hover{background:rgba(94,234,212,0.22)}
  .task-time{font-size:10.5px;color:var(--dim);font-weight:700;
    padding:1px 6px;background:var(--card);border-radius:4px;margin-left:6px}

  .reset{margin-top:14px;text-align:center}
  .reset button{padding:6px 12px;background:transparent;border:1px solid var(--line);
    color:var(--text2);border-radius:6px;cursor:pointer;font-size:12px;font:inherit}
  .reset button:hover{border-color:var(--bad);color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="index.html">← 返回</a>
    <h1>📅 14 天備考計畫</h1>
  </header>

  <div class="hero">
    <div>
      <span class="count" id="days-left">14</span><span class="small">天後考試</span>
    </div>
    <div class="sub" id="hero-sub">
      14 天 = 你還有時間把「解碼速度」練起來。<b style="color:var(--ring)">每天 30 分鐘</b>，按表操課。
      別自由發揮、別跳關。每天完成 = ✓。
    </div>
    <div class="exam-date">
      <span>📍 考試日期：</span>
      <input type="date" id="exam-date">
      <button id="save-exam" style="padding:5px 12px;background:var(--ring);color:#000;
        border:0;border-radius:6px;font-weight:700;cursor:pointer;font:inherit;font-size:12px">儲存</button>
    </div>
  </div>

  <div class="progress">
    <div class="progress-label">
      <span>整體進度</span><span id="prog-text">0 / 0 task</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="days"></div>

  <div class="reset">
    <button onclick="resetProgress()">🗑 清空所有進度</button>
  </div>
</div>

function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) {
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${m}/${day}`;
}
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveState(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
function esc(t) { return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getExamDate() {
  const saved = localStorage.getItem(EXAM_KEY);
  if (saved) return new Date(saved);
  // Default: today + 14 days
  const d = new Date();
  d.setDate(d.getDate() + 14);
  return d;
}
function saveExamDate(iso) { localStorage.setItem(EXAM_KEY, iso); render(); }

function dayDate(dayNum, examDate) {
  // Day 1 = today, Day 14 = exam day - 1, Day 15 = exam day
  // So day N's date = examDate - (14 - N) days
  const d = new Date(examDate);
  d.setDate(d.getDate() - (15 - dayNum));
  return d;
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() &&
         d.getMonth() === t.getMonth() &&
         d.getDate() === t.getDate();
}
function isPast(d) {
  const t = new Date(); t.setHours(0, 0, 0, 0);
  return d < t;
}

function toggleTask(taskId) {
  const state = loadState();
  state[taskId] = !state[taskId];
  saveState(state);
  render();
}

function toggleDay(dayNum) {
  const all = document.querySelectorAll('.day');
  const target = document.querySelector(`[data-day="${dayNum}"]`);
  if (target) target.classList.toggle('open');
}

function dayProgress(day) {
  const state = loadState();
  const done = day.tasks.filter(t => state[t.id]).length;
  return { done, total: day.tasks.length };
}

function render() {
  const examDate = getExamDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const daysUntilExam = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));

  // Hero
  document.getElementById('days-left').textContent = Math.max(0, daysUntilExam);
  document.getElementById('exam-date').value = examDate.toISOString().slice(0, 10);
  if (daysUntilExam <= 0) {
    document.getElementById('hero-sub').innerHTML =
      '🎯 <b style="color:var(--gold)">考試日</b> — 祝你好運！記得呼吸、聽前先讀完選項。';
  } else if (daysUntilExam <= 3) {
    document.getElementById('hero-sub').innerHTML =
      `剩 <b style="color:var(--accent)">${daysUntilExam}</b> 天 — <b style="color:var(--ring)">不練新題</b>、只清弱點 + 早睡。考場靠肌肉記憶。`;
  }

  // Overall progress
  const state = loadState();
  let totalT = 0, doneT = 0;
  for (const day of PLAN) {
    totalT += day.tasks.length;
    doneT += day.tasks.filter(t => state[t.id]).length;
  }
  const pct = totalT ? Math.round(doneT / totalT * 100) : 0;
  document.getElementById('prog-text').textContent = `${doneT} / ${totalT} task (${pct}%)`;
  document.getElementById('prog-fill').style.width = pct + '%';

  // Days
  const box = document.getElementById('days');
  let html = '';
  let lastPhase = '';
  for (const day of PLAN) {
    const d = dayDate(day.d, examDate);
    const today_ = isToday(d);
    const past = isPast(d) && !today_;
    const prog = dayProgress(day);
    const fullDone = prog.done === prog.total;

    if (day.phase !== lastPhase) {
      html += `<div style="margin:18px 0 8px;padding:0 4px;font-size:11px;font-weight:800;
        color:var(--text2);letter-spacing:1px;text-transform:uppercase">${esc(day.phase)}</div>`;
      lastPhase = day.phase;
    }

    html += `<div class="day ${today_ ? 'today' : ''} ${fullDone ? 'done' : ''}" data-day="${day.d}">
      <div class="day-head" onclick="toggleDay(${day.d})">
        <div class="day-num">
          <div class="d-n">D${day.d}</div>
          <div class="d-d">${fmtDate(d)}</div>
        </div>
        <div class="day-meta">
          <div class="day-title">${esc(day.title)}</div>
          <div class="day-sub">${today_ ? '👉 今天' : (past ? '已過' : '')} · ${day.tasks.length} 件事</div>
        </div>
        <div class="day-prog">${prog.done}/${prog.total}</div>
        <span class="day-toggle">▼</span>
      </div>
      <div class="day-body">
        <div class="day-why"><span class="why-tag">💡 為什麼今天練這個：</span>${esc(day.why)}</div>
        ${day.tasks.map(t => `
          <div class="task ${state[t.id] ? 'done' : ''}">
            <div class="task-check" onclick="toggleTask('${t.id}')">${state[t.id] ? '✓' : ''}</div>
            <div class="task-body">
              <div class="task-title">${esc(t.name)}${t.min ? `<span class="task-time">${t.min} 分鐘</span>` : ''}</div>
              ${t.how ? `<div class="task-how">${t.how}</div>` : ''}
              ${t.link ? `<a class="task-link" href="${esc(t.link)}" target="_blank">→ 開始練 ${esc(t.t || '')}</a>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }
  box.innerHTML = html;

  // Auto-open today's day
  const todayCard = document.querySelector('.day.today');
  if (todayCard) todayCard.classList.add('open');
  // If no "today" (past exam date or future setup), open D1
  else {
    const firstCard = document.querySelector('.day');
    if (firstCard) firstCard.classList.add('open');
  }
}

function resetProgress() {
  if (!confirm('確定清空所有打勾進度？')) return;
  localStorage.removeItem(STORE_KEY);
  render();
}

document.getElementById('save-exam').onclick = () => {
  const v = document.getElementById('exam-date').value;
  if (v) saveExamDate(v);
};
document.getElementById('exam-date').addEventListener('change', e => {
  if (e.target.value) saveExamDate(e.target.value);
});

render();
</script>
</body>
</html>
